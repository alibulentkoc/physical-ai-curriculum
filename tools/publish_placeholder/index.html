<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Physical AI Curriculum — Under Review</title>
<style>
  :root{ --bg:#0b1220; --panel:#0f1a2e; --ink:#e6eefb; --mut:#8aa0c4; --accent:#7c3aed; --line:#22324f; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:"Segoe UI",Helvetica,Arial,sans-serif;
       display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{max-width:560px;background:var(--panel);border:1px solid var(--line);
        border-radius:16px;padding:36px 30px}
  h1{font-size:24px;margin:0 0 6px}
  .tag{display:inline-block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
       color:var(--accent);border:1px solid var(--accent);border-radius:999px;padding:4px 12px;margin-bottom:18px}
  p{color:var(--mut);font-size:14px;line-height:1.6;margin:8px 0}
  .arc{margin-top:18px;font-size:12px;color:var(--mut)}
  .arc b{color:var(--ink);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="tag">Under review</div>
    <h1>Physical AI Curriculum</h1>
    <p>The curriculum is complete and is being reviewed module by module before public release. Modules will appear here as each is approved.</p>
    <p class="arc"><b>represent → perceive → reach → move → integrate → twin</b></p>
  </div>
</body>
</html>
