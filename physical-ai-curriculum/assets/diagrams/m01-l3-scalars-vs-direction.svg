<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two bins: quantities fully described by one number (scalars) versus quantities that also need a direction.">
  <defs>
    <marker id="a13" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .t{font-size:18px;font-weight:700;fill:#0f172a}
      .h{font-size:15px;font-weight:700;fill:#0f172a}
      .l{font-size:13px;fill:#334155}
      .c{font-size:12px;fill:#64748b}
      .bin{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:12}
      .tile{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;rx:8}
    </style>
  </defs>
  <text x="380" y="30" text-anchor="middle" class="t">Does one number fully describe it?</text>

  <!-- Scalar bin -->
  <rect class="bin" x="30" y="56" width="330" height="232" rx="12"/>
  <text x="55" y="84" class="h">Scalar &#8212; magnitude only</text>
  <rect class="tile" x="55" y="100" width="280" height="34" rx="8"/><text x="70" y="122" class="l">Temperature &#8212; 28 &#176;C</text>
  <rect class="tile" x="55" y="142" width="280" height="34" rx="8"/><text x="70" y="164" class="l">Basket mass &#8212; 1.5 kg</text>
  <rect class="tile" x="55" y="184" width="280" height="34" rx="8"/><text x="70" y="206" class="l">Time since watering &#8212; 6 h</text>
  <rect class="tile" x="55" y="226" width="280" height="34" rx="8"/><text x="70" y="248" class="l">Gripper speed &#8212; 0.2 m/s</text>
  <text x="55" y="278" class="c">No direction; a single number suffices.</text>

  <!-- Needs direction bin -->
  <rect class="bin" x="400" y="56" width="330" height="232" rx="12"/>
  <text x="425" y="84" class="h">Needs a direction too</text>
  <rect class="tile" x="425" y="100" width="280" height="50" rx="8"/>
  <text x="440" y="122" class="l">Gripper velocity &#8212; 0.2 m/s</text>
  <line x1="585" y1="135" x2="690" y2="135" stroke="#0d9488" stroke-width="2.5" marker-end="url(#a13)"/>
  <text x="440" y="140" class="c">magnitude + direction (arrow)</text>
  <rect class="tile" x="425" y="158" width="280" height="50" rx="8"/>
  <text x="440" y="180" class="l">Tomato position (from base)</text>
  <line x1="600" y1="193" x2="690" y2="168" stroke="#e11d48" stroke-width="2.5" marker-end="url(#a13)"/>
  <text x="440" y="198" class="c">where, from an origin</text>
  <rect class="tile" x="425" y="216" width="280" height="44" rx="8"/>
  <text x="440" y="242" class="l">Force on the stem &#8212; direction matters</text>
  <text x="425" y="278" class="c">Reversing the direction changes the situation &#8594; vector (Unit 2).</text>

  <text x="380" y="308" text-anchor="middle" class="c">Test: if reversing a direction would change the situation, it is not a scalar.</text>
</svg>
