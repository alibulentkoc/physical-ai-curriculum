<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The Module 3 perception pipeline feeding a world target, with a dashed arrow to a Module 4 box labeled forward kinematics supplies T(world from arm).">
  <defs>
    <marker id="ka" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <marker id="kb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.m4{font-size:12px;font-weight:800;fill:#1d4ed8}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Module 3 → Module 4: seeing meets reaching</text>
  <rect x="40" y="70" width="300" height="56" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="190" y="92" text-anchor="middle" class="b">Module 3: perception → world target</text>
  <text x="190" y="112" text-anchor="middle" class="c">pixel → undistort → back-project → transform → P_w</text>
  <circle cx="400" cy="98" r="9" fill="#e11d48"/><text x="400" y="128" text-anchor="middle" class="c">fruit P_w</text>
  <line x1="340" y1="98" x2="388" y2="98" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ka)"/>
  <rect x="470" y="68" width="200" height="60" rx="10" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="570" y="90" text-anchor="middle" class="m4">Module 4</text>
  <text x="570" y="110" text-anchor="middle" class="c">Forward Kinematics (DH)</text>
  <path d="M 570 150 Q 570 175 410 175 Q 250 175 250 130" fill="none" stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#kb)"/>
  <text x="410" y="195" text-anchor="middle" class="m4">supplies T(world←arm) from joint angles</text>
</svg>
