<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The mini project at a glance: a detected tomato in the camera frame, the camera extrinsics, and the arm pose composed into a world-frame target the arm reaches.">
  <defs>
    <marker id="pg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.k{font-size:11px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">Capstone: detection → world target</text>
  <polygon points="40,290 380,290 470,250 130,250" fill="#f1f5f9" stroke="#cbd5e1"/>
  <!-- camera + tomato -->
  <g transform="translate(110,150)">
    <rect x="-22" y="-15" width="44" height="30" rx="5" fill="#8b5cf622" stroke="#8b5cf6"/>
    <polygon points="22,-9 40,-17 40,17 22,9" fill="#8b5cf622" stroke="#8b5cf6"/>
  </g>
  <circle cx="210" cy="150" r="9" fill="#e11d48"/><text x="210" y="135" text-anchor="middle" class="c">detected tomato</text>
  <line x1="134" y1="150" x2="198" y2="150" stroke="#0f172a" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#pg)"/>
  <!-- arm -->
  <line x1="300" y1="270" x2="130" y2="165" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
  <text x="300" y="288" text-anchor="middle" class="c">arm in world</text>
  <!-- world target -->
  <g transform="translate(540,180)">
    <line x1="0" y1="0" x2="32" y2="0" stroke="#e11d48" stroke-width="2.5" marker-end="url(#pg)"/>
    <line x1="0" y1="0" x2="0" y2="-32" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#pg)"/>
    <circle r="3.5" fill="#0f172a"/>
  </g>
  <circle cx="540" cy="150" r="8" fill="#e11d48"/>
  <text x="560" y="150" class="l">world target</text>
  <line x1="225" y1="150" x2="520" y2="155" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#pg)"/>
  <rect x="120" y="296" width="440" height="28" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="340" y="315" text-anchor="middle" class="k">T(world←tomato) = T(world←arm) · T(arm←cam) · T(cam←tomato)</text>
</svg>
