<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Three Unit 7 results pose, workspace, and perception bridge converging into the Unit 8 capstone, with a forward arrow to Module 5 inverse kinematics.">
  <defs>
    <marker id="r28" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <style>.t{font-size:15.5px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:10.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Kinematics meets the world</text>
  <rect x="30" y="50" width="150" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="105" y="74" text-anchor="middle" class="b">pose (pos + approach)</text>
  <rect x="30" y="96" width="150" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="105" y="120" text-anchor="middle" class="b">reachable workspace</text>
  <rect x="30" y="142" width="150" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="105" y="166" text-anchor="middle" class="b">T₀ⁿ = T(world←arm)</text>
  <line x1="180" y1="69" x2="300" y2="110" stroke="#10b981" stroke-width="2" marker-end="url(#r28)"/>
  <line x1="180" y1="115" x2="300" y2="115" stroke="#10b981" stroke-width="2" marker-end="url(#r28)"/>
  <line x1="180" y1="161" x2="300" y2="120" stroke="#10b981" stroke-width="2" marker-end="url(#r28)"/>
  <rect x="305" y="92" width="180" height="46" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="395" y="112" text-anchor="middle" class="b">Unit 8 capstone:</text><text x="395" y="128" text-anchor="middle" class="c">From Joints to the Fruit</text>
  <line x1="485" y1="115" x2="540" y2="115" stroke="#7c3aed" stroke-width="2" marker-end="url(#r28)"/>
  <rect x="545" y="92" width="130" height="46" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="610" y="112" text-anchor="middle" class="b" fill="#7c3aed">Module 5:</text><text x="610" y="128" text-anchor="middle" class="c">inverse kinematics</text>
  <text x="350" y="205" text-anchor="middle" class="c">Read it · where can it reach · join with perception → capstone → next: invert the map.</text>
</svg>
