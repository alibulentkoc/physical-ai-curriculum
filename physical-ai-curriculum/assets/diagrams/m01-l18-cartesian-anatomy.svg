<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The anatomy of a Cartesian coordinate: an origin, perpendicular x and y axes, and a point P reached by a signed x-step then a signed y-step.">
  <defs><style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:13px;font-weight:600;fill:#334155}.c{font-size:12px;fill:#64748b}.n{font-size:13px;font-weight:700;fill:#0f172a}</style></defs>
  <text x="320" y="30" text-anchor="middle" class="t">Anatomy of a Cartesian coordinate</text>
  <!-- axes through center -->
  <line x1="80" y1="210" x2="560" y2="210" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="320" y1="60" x2="320" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="548" y="228" class="c">x</text><text x="330" y="74" class="c">y</text>
  <circle cx="320" cy="210" r="4" fill="#0f172a"/><text x="300" y="232" class="c">origin (0,0)</text>
  <!-- point P -->
  <circle cx="460" cy="120" r="7" fill="#e11d48"/><text x="470" y="116" class="n">P = (x, y)</text>
  <!-- guide steps -->
  <line x1="320" y1="210" x2="460" y2="210" stroke="#0ea5e9" stroke-width="3"/><text x="372" y="228" class="c" fill="#0284c7">x = signed distance</text>
  <line x1="460" y1="210" x2="460" y2="120" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="5 4"/><text x="468" y="170" class="c" fill="#7c3aed">y = signed distance</text>
  <!-- sign hint -->
  <text x="150" y="120" class="c">(−x here)</text><text x="150" y="320" class="c">(−x, −y here)</text>
  <text x="320" y="366" text-anchor="middle" class="c">Step x along the first axis, then y along the second. Sign says which side of the origin.</text>
</svg>
