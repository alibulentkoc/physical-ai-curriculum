<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Unit 4 recap: the same square under identity, rotation, scaling, and reflection, plus a composition strip showing scale-then-rotate differs from rotate-then-scale.">
  <defs>
    <marker id="ra2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.big{font-size:13px;font-weight:800;fill:#b91c1c}</style>
  </defs>
  <text x="360" y="26" text-anchor="middle" class="t">What a matrix can do to space</text>
  <!-- four action panels -->
  <g>
    <!-- identity -->
    <rect x="40" y="60" width="50" height="50" fill="#10b98122" stroke="#10b981" stroke-width="2"/>
    <text x="65" y="128" text-anchor="middle" class="l" fill="#0f766e">identity</text>
    <text x="65" y="144" text-anchor="middle" class="c">do nothing</text>
    <!-- rotation -->
    <g transform="rotate(-30 200 85)"><rect x="175" y="60" width="50" height="50" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="2"/></g>
    <text x="200" y="128" text-anchor="middle" class="l" fill="#0284c7">rotation</text>
    <text x="200" y="144" text-anchor="middle" class="c">turn</text>
    <!-- scaling -->
    <rect x="310" y="60" width="80" height="40" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="2"/>
    <text x="350" y="128" text-anchor="middle" class="l" fill="#7c3aed">scaling</text>
    <text x="350" y="144" text-anchor="middle" class="c">resize</text>
    <!-- reflection -->
    <polygon points="470,110 520,110 470,60" fill="#e11d4822" stroke="#e11d48" stroke-width="2"/>
    <text x="500" y="128" text-anchor="middle" class="l" fill="#be123c">reflection</text>
    <text x="500" y="144" text-anchor="middle" class="c">mirror</text>
  </g>
  <line x1="40" y1="170" x2="680" y2="170" stroke="#e2e8f0"/>
  <!-- composition strip -->
  <text x="40" y="200" class="l">composition — order matters:</text>
  <rect x="60" y="215" width="30" height="30" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="98" y1="230" x2="125" y2="230" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ra2)"/>
  <rect x="132" y="210" width="30" height="60" fill="#0ea5e933" stroke="#0ea5e9" stroke-width="2"/>
  <text x="190" y="234" class="c">scale→rotate = A</text>
  <rect x="60" y="290" width="30" height="30" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="98" y1="305" x2="125" y2="305" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ra2)"/>
  <rect x="132" y="290" width="60" height="30" fill="#8b5cf633" stroke="#8b5cf6" stroke-width="2"/>
  <text x="215" y="309" class="c">rotate→scale = B</text>
  <text x="470" y="270" text-anchor="middle" class="big">A ≠ B</text>
  <text x="470" y="292" text-anchor="middle" class="c">order changes the result</text>
  <text x="360" y="346" text-anchor="middle" class="c">A matrix is an action, not a table. Next: Module 2 folds translation in (homogeneous coords, SE(3)).</text>
</svg>
