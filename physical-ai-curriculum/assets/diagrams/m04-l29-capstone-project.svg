<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The capstone pipeline: camera to P cam to frame bridge to P base; DH table to forward kinematics to gripper pose; both combine to fruit in gripper frame and a reach command.">
  <defs>
    <marker id="c29" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:10.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Capstone pipeline: From Joints to the Fruit</text>
  <!-- top perception row -->
  <rect x="20" y="50" width="100" height="40" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/><text x="70" y="68" text-anchor="middle" class="b">camera</text><text x="70" y="83" text-anchor="middle" class="c">P_cam (M3)</text>
  <line x1="120" y1="70" x2="148" y2="70" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c29)"/>
  <rect x="152" y="50" width="110" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="207" y="68" text-anchor="middle" class="b">frame bridge</text><text x="207" y="83" text-anchor="middle" class="c">T_base^cam (M2)</text>
  <line x1="262" y1="70" x2="290" y2="70" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c29)"/>
  <rect x="294" y="50" width="90" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="339" y="74" text-anchor="middle" class="b">P_base</text>
  <!-- middle FK row -->
  <rect x="20" y="120" width="110" height="40" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="75" y="138" text-anchor="middle" class="b">3-DOF DH table</text><text x="75" y="153" text-anchor="middle" class="c">(M4)</text>
  <line x1="130" y1="140" x2="158" y2="140" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c29)"/>
  <rect x="162" y="120" width="100" height="40" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="212" y="138" text-anchor="middle" class="b">dh_fk</text><text x="212" y="153" text-anchor="middle" class="c">gripper pose</text>
  <line x1="262" y1="140" x2="290" y2="140" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c29)"/>
  <rect x="294" y="120" width="90" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="339" y="144" text-anchor="middle" class="b">T₀³</text>
  <!-- converge -->
  <line x1="384" y1="70" x2="450" y2="100" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c29)"/>
  <line x1="384" y1="140" x2="450" y2="110" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c29)"/>
  <rect x="455" y="86" width="220" height="46" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="565" y="106" text-anchor="middle" class="b">fruit in gripper frame</text><text x="565" y="124" text-anchor="middle" class="c">→ move command</text>
  <text x="350" y="200" text-anchor="middle" class="c">Perceive · bridge frames · forward kinematics · decide/reach.</text>
  <text x="350" y="222" text-anchor="middle" class="c">Verify FK before trusting it. Solving for joint angles (IK) is Module 5.</text>
</svg>
