<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Identity = Do Nothing — Lesson 4.4</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--ok:#10b981;--fruit:#e11d48;--accent:#0ea5e9;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 320px;min-width:300px}
  .panel{flex:1 1 240px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .mtx{display:inline-grid;grid-template-columns:auto auto;gap:4px 14px;border-left:2px solid var(--ink);border-right:2px solid var(--ink);padding:6px 10px;font-variant-numeric:tabular-nums;font-weight:700}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;margin-top:10px}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 15px;font-size:14px;font-weight:700;cursor:pointer;margin:6px 6px 0 0}
  .btn.primary{background:#0f172a;color:#fff;border-color:#0f172a}
  .tag{display:inline-block;padding:3px 10px;border-radius:999px;font-weight:700;font-size:12.5px;margin-top:8px}
  .same{background:#dcfce7;color:#15803d}.diff{background:#fee2e2;color:#b91c1c}
  label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
  select{width:100%;padding:7px;border-radius:8px;border:1px solid var(--line);font-size:13.5px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 360 300" role="img" aria-label="A fruit-cluster shape with a ghost of its original position; applying the identity matrix leaves it exactly on the ghost.">
        <line x1="30" y1="250" x2="330" y2="250" stroke="#e2e8f0"/>
        <line x1="60" y1="40" x2="60" y2="270" stroke="#e2e8f0"/>
        <polygon id="ghost" points="" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
        <polygon id="shape" points="" fill="#0ea5e933" stroke="#0ea5e9" stroke-width="2"/>
      </svg>
      <div class="hint">The dashed outline is the original. Apply a matrix and see whether the shape moves off it.</div>
    </div>
    <div class="panel">
      <label for="pick">Matrix to apply</label>
      <select id="pick">
        <option value="I" selected>Identity  [[1,0],[0,1]]</option>
        <option value="S2">Scale ×2  [[2,0],[0,2]]</option>
        <option value="R90">Rotate 90°  [[0,-1],[1,0]]</option>
      </select>
      <div style="margin-top:10px"><span class="mtx" id="mtx"><span>1</span><span>0</span><span>0</span><span>1</span></span></div>
      <button id="apply" class="btn primary">Apply matrix</button>
      <button id="reset" class="btn">Reset</button>
      <div class="readout" aria-live="polite">
        <div id="msg">Identity selected. Applying it will change nothing.</div>
        <span id="tag" class="tag same">input = output</span>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  // base shape (fruit cluster) in math coords, origin at pixel (60,250), 60px=1 unit
  var OX=60, OY=250, S=60;
  var base=[[0.4,0.4],[1.4,0.4],[1.6,1.2],[0.9,1.7],[0.2,1.2]];
  var mats={I:[[1,0],[0,1]], S2:[[2,0],[0,2]], R90:[[0,-1],[1,0]]};
  var cur=[[1,0],[0,1]], applied=false, choice='I';
  var shape=document.getElementById('shape'), ghost=document.getElementById('ghost');
  var mtx=document.getElementById('mtx'), msg=document.getElementById('msg'), tag=document.getElementById('tag');
  function px(p){ return (OX+p[0]*S)+','+(OY-p[1]*S); }
  function apply(M,p){ return [M[0][0]*p[0]+M[0][1]*p[1], M[1][0]*p[0]+M[1][1]*p[1]]; }
  function draw(){
    ghost.setAttribute('points', base.map(px).join(' '));
    var pts = applied ? base.map(function(p){return apply(cur,p);}) : base;
    shape.setAttribute('points', pts.map(px).join(' '));
    var m=mats[choice]; mtx.innerHTML='<span>'+m[0][0]+'</span><span>'+m[0][1]+'</span><span>'+m[1][0]+'</span><span>'+m[1][1]+'</span>';
    var isI = choice==='I';
    if(!applied){ msg.textContent = isI?'Identity selected. Applying it will change nothing.':'This matrix will transform the shape when applied.'; tag.className='tag same'; tag.textContent='not applied yet'; }
    else if(isI){ msg.textContent='Identity applied — the shape sits exactly on the original. Nothing changed.'; tag.className='tag same'; tag.textContent='input = output ✓'; }
    else { msg.textContent='This matrix moved the shape off the original. That is what a non-identity does.'; tag.className='tag diff'; tag.textContent='output ≠ input'; }
  }
  document.getElementById('pick').addEventListener('change',function(){choice=this.value;cur=mats[choice];applied=false;draw();});
  document.getElementById('apply').addEventListener('click',function(){applied=true;cur=mats[choice];draw();});
  document.getElementById('reset').addEventListener('click',function(){applied=false;draw();});
  draw();
})();
</script>
</body>
</html>
