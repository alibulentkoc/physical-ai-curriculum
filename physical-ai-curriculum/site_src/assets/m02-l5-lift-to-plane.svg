<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The 2D floor shown as a height-1 slice of 3D; a floor point (x,y) becomes (x,y,1). A shear in the lifted space looks like a slide on the floor.">
  <defs>
    <marker id="h1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.l{font-size:12.5px;font-weight:700;fill:#334155}.c{font-size:11.5px;fill:#64748b}.v{font-size:13px;font-weight:700;fill:#0f172a}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">Lift each point to (x, y, 1): the height-1 plane</text>
  <!-- ground plane at "height 0" (faint) -->
  <polygon points="120,300 360,300 460,250 220,250" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="150" y="296" class="c">floor (height 0)</text>
  <!-- height-1 plane (raised) -->
  <polygon points="140,210 380,210 480,160 240,160" fill="#0ea5e918" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="250" y="150" class="l" fill="#0284c7">height-1 plane</text>
  <!-- vertical lift lines -->
  <line x1="240" y1="276" x2="260" y2="186" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- point on height-1 plane -->
  <circle cx="300" cy="185" r="7" fill="#e11d48"/><text x="318" y="174" class="v">(x, y, 1)</text>
  <circle cx="280" cy="285" r="4" fill="#94a3b8"/><text x="290" y="300" class="c">(x, y)</text>
  <!-- shear->slide note -->
  <line x1="300" y1="185" x2="380" y2="185" stroke="#0f172a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#h1)"/>
  <text x="500" y="200" class="c">a shear up here</text>
  <text x="500" y="218" class="c">= a slide on the floor</text>
  <text x="340" y="338" text-anchor="middle" class="c">Pay one extra number per point (the "1"); in return, translation becomes a matrix.</text>
</svg>
