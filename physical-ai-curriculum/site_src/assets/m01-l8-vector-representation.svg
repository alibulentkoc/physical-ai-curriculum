<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The same arrow written as components along the right and up axes, shown as a column of numbers.">
  <defs><marker id="av8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:14px;font-weight:600;fill:#334155}.c{font-size:12px;fill:#64748b}.n{font-size:15px;font-weight:700;fill:#0f172a}</style></defs>
  <text x="320" y="30" text-anchor="middle" class="t">One arrow, written as components</text>
  <line x1="70" y1="300" x2="380" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="70" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="290" y2="140" stroke="#0d9488" stroke-width="3" marker-end="url(#av8)"/>
  <line x1="70" y1="300" x2="290" y2="300" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="290" y1="300" x2="290" y2="140" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="170" y="318" class="c" fill="#0284c7">x = 0.30 m (right)</text>
  <text x="296" y="230" class="c" fill="#7c3aed">y = 0.40 m (up)</text>
  <rect x="430" y="120" width="160" height="110" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="510" y="150" text-anchor="middle" class="l">component form</text>
  <text x="510" y="186" text-anchor="middle" class="n">v = (0.30, 0.40)</text>
  <text x="510" y="212" text-anchor="middle" class="c">units: meters</text>
  <text x="320" y="344" text-anchor="middle" class="c">Components depend on the chosen axes; change the frame and the numbers change.</text>
</svg>
