<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The same fruit point shown with a camera-frame coordinate triad near a camera and a world-frame triad at the robot base, with a transform arrow T(world from cam) between them.">
  <defs>
    <marker id="ta" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1d4ed8"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}.w{font-size:12px;font-weight:800;fill:#1d4ed8}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Same point, two frames, one transform</text>
  <!-- camera frame -->
  <g transform="translate(120,150)">
    <line x1="0" y1="0" x2="38" y2="0" stroke="#0ea5e9" stroke-width="2"/><line x1="0" y1="0" x2="0" y2="-34" stroke="#10b981" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#0f172a"/>
    <text x="0" y="24" text-anchor="middle" class="c">camera frame</text>
  </g>
  <!-- fruit -->
  <circle cx="250" cy="105" r="9" fill="#e11d48"/><text x="250" y="92" text-anchor="middle" class="c" fill="#e11d48">fruit (same point)</text>
  <text x="250" y="130" text-anchor="middle" class="b">P_c=(0.06,-0.03,0.3)</text>
  <!-- world frame -->
  <g transform="translate(560,180)">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#1d4ed8" stroke-width="2.4"/><line x1="0" y1="0" x2="0" y2="-40" stroke="#7c3aed" stroke-width="2.4"/>
    <circle cx="0" cy="0" r="4" fill="#0f172a"/>
    <text x="0" y="22" text-anchor="middle" class="c">world frame (robot base)</text>
  </g>
  <path d="M 175 150 Q 360 60 545 175" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-dasharray="7 4" marker-end="url(#ta)"/>
  <text x="360" y="70" text-anchor="middle" class="w">T(world←cam)</text>
  <text x="350" y="232" text-anchor="middle" class="c">The point is correct; only its frame is wrong until transformed: P̃_w = T(world←cam)·P̃_c.</text>
</svg>
