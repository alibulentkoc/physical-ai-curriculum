<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Module 2 as one left-to-right arc through eight units ending at the perception-to-pose target, with an arrow out to kinematics and a side note deferring intrinsics to Module 3.">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <linearGradient id="rib" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b5cf6"/><stop offset="0.5" stop-color="#0ea5e9"/><stop offset="1" stop-color="#10b981"/></linearGradient>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#475569}.k{font-size:12.5px;font-weight:800;fill:#0f766e}.u{font-size:10px;font-weight:700;fill:#fff}</style>
  </defs>
  <text x="350" y="26" text-anchor="middle" class="t">Module 2 as one arc → perception-to-pose</text>
  <rect x="30" y="70" width="500" height="40" rx="20" fill="url(#rib)"/>
  <g class="u" text-anchor="middle">
    <text x="70" y="95">frames</text><text x="138" y="95">homog.</text><text x="200" y="95">SE(2)</text><text x="262" y="95">SE(3)</text>
    <text x="332" y="95">compose</text><text x="398" y="95">pose</text><text x="460" y="95">camera</text><text x="510" y="95">▶</text>
  </g>
  <text x="280" y="132" text-anchor="middle" class="c">Units 1–7 build the toolkit</text>
  <!-- target -->
  <circle cx="585" cy="90" r="26" fill="#e11d4822" stroke="#e11d48" stroke-width="2"/><text x="585" y="94" text-anchor="middle" class="c" fill="#e11d48">target</text>
  <line x1="530" y1="90" x2="557" y2="90" stroke="#0f172a" stroke-width="1.8" marker-end="url(#ar)"/>
  <!-- pipeline label -->
  <text x="585" y="135" text-anchor="middle" class="k">perception-to-pose</text>
  <!-- arrow to kinematics -->
  <line x1="585" y1="118" x2="585" y2="185" stroke="#0f172a" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="470" y="190" width="230" height="34" rx="9" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="585" y="212" text-anchor="middle" class="c" fill="#1d4ed8">→ kinematics (joint angles)</text>
  <!-- deferred note -->
  <rect x="30" y="190" width="300" height="34" rx="9" fill="#fef2f2" stroke="#fecaca"/>
  <text x="180" y="212" text-anchor="middle" class="c" fill="#b91c1c">deferred → Module 3: intrinsics / perception</text>
  <text x="350" y="262" text-anchor="middle" class="c">Placement = rigid transform; movement between frames = composition.</text>
  <text x="350" y="282" text-anchor="middle" class="c">The pipeline outputs a verified world-frame target pose.</text>
</svg>
