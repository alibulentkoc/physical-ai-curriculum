<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The cross product of two vectors is a third vector perpendicular to both; its length equals the area of the parallelogram they span.">
  <defs>
    <marker id="c1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0ea5e9"/></marker>
    <marker id="c2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/></marker>
    <marker id="c3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:14px;font-weight:700}.c{font-size:12px;fill:#64748b}</style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="t">Cross product: perpendicular vector + parallelogram area</text>
  <!-- parallelogram -->
  <polygon points="180,280 380,280 470,180 270,180" fill="#0d948822" stroke="#0d9488" stroke-width="1.5"/>
  <text x="320" y="245" text-anchor="middle" class="c">area = |a × b|</text>
  <line x1="180" y1="280" x2="380" y2="280" stroke="#0ea5e9" stroke-width="3" marker-end="url(#c1)"/>
  <text x="280" y="300" class="l" fill="#0284c7">a</text>
  <line x1="180" y1="280" x2="270" y2="180" stroke="#8b5cf6" stroke-width="3" marker-end="url(#c2)"/>
  <text x="205" y="225" class="l" fill="#7c3aed">b</text>
  <!-- normal -->
  <line x1="180" y1="280" x2="180" y2="110" stroke="#0d9488" stroke-width="3.5" marker-end="url(#c3)"/>
  <text x="190" y="120" class="l" fill="#0d9488">a × b (normal)</text>
  <text x="320" y="338" text-anchor="middle" class="c">Perpendicular to both a and b — a surface normal / camera-view direction; length = spanned area.</text>
</svg>
