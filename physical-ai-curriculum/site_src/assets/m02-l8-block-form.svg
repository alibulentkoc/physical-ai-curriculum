<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A 3x3 homogeneous matrix annotated: a 2x2 rotation block in the upper-left, a translation column on the right, and a bottom row of zero zero one. It turns and moves a shape in one application.">
  <defs>
    <marker id="b1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.n{font-size:15px;font-weight:700;fill:#0f172a}.rb{font-size:11.5px;font-weight:700;fill:#0284c7}.tb{font-size:11.5px;font-weight:700;fill:#0f766e}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">One matrix: rotation block + translation column</text>
  <!-- matrix -->
  <rect x="96" y="92" width="86" height="64" fill="#0ea5e914" stroke="#0ea5e9" stroke-width="1.4"/>
  <rect x="186" y="92" width="44" height="64" fill="#0d948814" stroke="#0d9488" stroke-width="1.4"/>
  <text x="110" y="120" class="n">cosθ</text><text x="150" y="120" class="n">−sinθ</text><text x="200" y="120" class="n">tx</text>
  <text x="110" y="150" class="n">sinθ</text><text x="155" y="150" class="n">cosθ</text><text x="200" y="150" class="n">ty</text>
  <text x="115" y="182" class="n">0</text><text x="160" y="182" class="n">0</text><text x="205" y="182" class="n">1</text>
  <path d="M88 88 v106 M236 88 v106" stroke="#0f172a" stroke-width="2"/>
  <text x="139" y="210" text-anchor="middle" class="rb">rotation block R</text>
  <text x="208" y="226" text-anchor="middle" class="tb">translation t</text>
  <text x="160" y="246" text-anchor="middle" class="c">bottom row [0 0 1]</text>
  <!-- effect: turn + move -->
  <line x1="360" y1="290" x2="650" y2="290" stroke="#cbd5e1"/><line x1="400" y1="90" x2="400" y2="290" stroke="#cbd5e1"/>
  <rect x="410" y="210" width="60" height="44" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <g transform="rotate(-40 560 175)"><rect x="525" y="150" width="60" height="44" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="2"/></g>
  <line x1="440" y1="232" x2="545" y2="180" stroke="#0f172a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#b1)"/>
  <text x="520" y="284" text-anchor="middle" class="c">turned + moved, one multiply</text>
  <text x="340" y="318" text-anchor="middle" class="c">Block form [[R, t],[0, 1]] — the template for every rigid transform (2D 3×3, 3D 4×4).</text>
</svg>
