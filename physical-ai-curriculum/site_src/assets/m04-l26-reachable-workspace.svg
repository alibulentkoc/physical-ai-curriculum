<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A joint-space box mapped by forward kinematics to a sampled reachable workspace, an annulus with outer radius L1 plus L2 and inner radius absolute L1 minus L2.">
  <defs>
    <marker id="w26" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Reachable workspace = image of forward kinematics</text>
  <!-- joint-space box -->
  <rect x="55" y="80" width="120" height="120" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="115" y="74" text-anchor="middle" class="c">joint space (θ1,θ2)</text>
  <text x="115" y="145" text-anchor="middle" class="b">configuration ranges</text>
  <line x1="180" y1="140" x2="245" y2="140" stroke="#10b981" stroke-width="2" marker-end="url(#w26)"/>
  <text x="212" y="132" text-anchor="middle" class="c">p = FK</text>
  <!-- annulus -->
  <g transform="translate(440,140)">
    <circle cx="0" cy="0" r="95" fill="#ecfdf5" stroke="#34d399"/>
    <circle cx="0" cy="0" r="20" fill="#ffffff" stroke="#34d399"/>
    <circle cx="0" cy="0" r="3" fill="#10b981"/>
    <line x1="0" y1="0" x2="95" y2="0" stroke="#0f766e" stroke-width="1.5"/><text x="40" y="-6" class="c">L1+L2</text>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#0f766e" stroke-width="1.5"/><text x="6" y="-10" class="c">|L1−L2|</text>
  </g>
  <text x="350" y="240" text-anchor="middle" class="c">Planar 2-link arm: annulus (outer L1+L2, inner |L1−L2|). Base swivel revolves it into a 3D shell.</text>
</svg>
