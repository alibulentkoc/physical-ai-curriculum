<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="SE(2) in three panels: build a 3x3 matrix from theta tx ty, apply it to move a shape rigidly, and invert it to return the shape to start.">
  <defs>
    <marker id="r5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12.5px;font-weight:700;fill:#334155}.k{font-size:12.5px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="350" y="26" text-anchor="middle" class="t">SE(2): build → apply → invert</text>
  <!-- build -->
  <rect x="30" y="60" width="190" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="125" y="84" text-anchor="middle" class="l">1. build</text>
  <text x="125" y="110" text-anchor="middle" class="c">(θ, tx, ty)</text>
  <text x="125" y="134" text-anchor="middle" class="c">→ 3×3 matrix</text>
  <text x="125" y="158" text-anchor="middle" class="c">[[R, t],[0, 1]]</text>
  <!-- apply -->
  <rect x="255" y="60" width="190" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="350" y="84" text-anchor="middle" class="l">2. apply (rigid)</text>
  <polygon points="290,170 340,170 345,145 315,135 290,145" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3 3"/>
  <g transform="translate(380,150) rotate(-30)"><polygon points="0,20 50,20 55,-5 25,-15 0,-5" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1.6"/></g>
  <text x="350" y="200" text-anchor="middle" class="c">same size, new pose</text>
  <!-- invert -->
  <rect x="480" y="60" width="190" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="575" y="84" text-anchor="middle" class="l">3. invert (go back)</text>
  <path d="M 620 150 Q 545 120 520 160" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#r5)"/>
  <text x="575" y="195" text-anchor="middle" class="c">T⁻¹ returns to start</text>
  <!-- arrows between -->
  <line x1="222" y1="135" x2="253" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#r5)"/>
  <line x1="447" y1="135" x2="478" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#r5)"/>
  <text x="350" y="246" text-anchor="middle" class="k">one rigid tool for the whole greenhouse floor</text>
  <text x="350" y="276" text-anchor="middle" class="c">Next: SE(3) lifts the same idea into 3D (a 4×4 matrix).</text>
</svg>
