<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rotation about the Origin — Lesson 4.5</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--accent:#0ea5e9;--ok:#10b981;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 320px;min-width:300px}
  .panel{flex:1 1 240px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:13px;color:var(--muted);display:block;margin-top:12px}
  input[type=range]{width:100%}
  .mtx{display:inline-grid;grid-template-columns:auto auto;gap:4px 14px;border-left:2px solid var(--ink);border-right:2px solid var(--ink);padding:6px 10px;font-variant-numeric:tabular-nums;font-weight:700;margin-top:8px}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;margin-top:10px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 320 320" role="img" aria-label="A shape rotating about the origin by an adjustable angle, with a ghost of the original and a circle showing distance from the origin is preserved.">
        <line x1="20" y1="160" x2="300" y2="160" stroke="#e2e8f0"/>
        <line x1="160" y1="20" x2="160" y2="300" stroke="#e2e8f0"/>
        <circle id="distc" cx="160" cy="160" r="0" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
        <polygon id="ghost" points="" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
        <polygon id="shape" points="" fill="#0ea5e933" stroke="#0ea5e9" stroke-width="2"/>
        <circle cx="160" cy="160" r="3.5" fill="#0f172a"/>
      </svg>
      <div class="hint">Drag the slider 0°→360°. The shape turns about the origin; its size never changes.</div>
    </div>
    <div class="panel">
      <label for="th">Rotation angle θ: <span id="thV">0</span>°</label>
      <input id="th" type="range" min="0" max="360" step="1" value="0">
      <div>R(θ) = <span class="mtx" id="mtx"><span>1.00</span><span>0.00</span><span>0.00</span><span>1.00</span></span></div>
      <div class="readout" aria-live="polite">
        A tracked point's distance from the origin:<br>
        before <b id="d0">1.00</b> → after <b id="d1">1.00</b>
        <div class="hint" id="note" style="margin-top:6px">Rotation preserves distance — only orientation changes. (θ = 0 is the identity.)</div>
      </div>
      <button id="reset" class="btn">Reset to 0°</button>
    </div>
  </div>
</div>
<script>
(function(){
  var OX=160, OY=160, S=60;
  var base=[[0.4,0.3],[1.3,0.3],[1.5,1.0],[0.8,1.4],[0.2,1.0]];
  var track=[1.3,0.3];
  var th=0;
  var shape=document.getElementById('shape'), ghost=document.getElementById('ghost'), distc=document.getElementById('distc');
  var mtx=document.getElementById('mtx'), thV=document.getElementById('thV'), d0=document.getElementById('d0'), d1=document.getElementById('d1');
  var Sl=document.getElementById('th');
  function px(p){ return (OX+p[0]*S)+','+(OY-p[1]*S); }
  function rot(p,a){ return [p[0]*Math.cos(a)-p[1]*Math.sin(a), p[0]*Math.sin(a)+p[1]*Math.cos(a)]; }
  function draw(){
    var a=th*Math.PI/180;
    ghost.setAttribute('points', base.map(px).join(' '));
    shape.setAttribute('points', base.map(function(p){return px(rot(p,a));}).join(' '));
    var r=Math.hypot(track[0],track[1]); distc.setAttribute('r', r*S);
    thV.textContent=Math.round(th);
    var c=Math.cos(a), s=Math.sin(a);
    mtx.innerHTML='<span>'+c.toFixed(2)+'</span><span>'+(-s).toFixed(2)+'</span><span>'+s.toFixed(2)+'</span><span>'+c.toFixed(2)+'</span>';
    d0.textContent=r.toFixed(2); d1.textContent=Math.hypot.apply(null,rot(track,a)).toFixed(2);
  }
  Sl.addEventListener('input',function(){th=parseFloat(this.value);draw();});
  document.getElementById('reset').addEventListener('click',function(){th=0;Sl.value=0;draw();});
  draw();
})();
</script>
</body>
</html>
