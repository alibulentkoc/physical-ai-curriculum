site_name: Physical AI Curriculum
site_description: A curriculum in Physical AI, Robotics, Computer Vision, Mechatronics, and Digital Twins, built around a greenhouse harvesting robot.
docs_dir: site_src

# The published student site is generated from site_src/ (presentation layer).
# Authoring sources live in modules/ and curriculum/. See note in site_src/index.md.

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: green
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Module 1 — Mathematical Foundations:
      - "Unit 1 — Physical Quantities & Measurement":
        - "1.1 Physical AI and the Physical World": module01/lesson01.md
        - "1.2 Units and Dimensions": module01/lesson02.md
        - "1.3 Scalars and Physical Quantities": module01/lesson03.md
        - "1.4 Measurement Error": module01/lesson04.md
        - "1.5 Accuracy and Precision": module01/lesson05.md
        - "1.6 Engineering Estimation": module01/lesson06.md
      - "Unit 2 — Vectors":
        - "2.1 What Is a Vector?": module01/lesson07.md
        - "2.2 Vector Representation": module01/lesson08.md
        - "2.3 Vector Addition": module01/lesson09.md
        - "2.4 Vector Subtraction": module01/lesson10.md
        - "2.5 Magnitude and Direction": module01/lesson11.md
        - "2.6 Unit Vectors": module01/lesson12.md
        - "2.7 Dot Product": module01/lesson13.md
        - "2.8 Cross Product": module01/lesson14.md
        - "2.9 Distance Between Points": module01/lesson15.md
        - "2.10 Vectors in Physical AI (Recap)": module01/lesson16.md
      - "Unit 3 — Coordinate Systems & Reference Frames":
        - "3.1 Why Coordinate Frames Matter": module01/lesson17.md
        - "3.2 Cartesian Coordinates": module01/lesson18.md
        - "3.3 2D Coordinate Systems": module01/lesson19.md
        - "3.4 3D Coordinate Systems": module01/lesson20.md
        - "3.5 Local and Global Frames": module01/lesson21.md
        - "3.6 Conceptual Frame Transformations": module01/lesson22.md
        - "3.7 Robot and Camera Frames": module01/lesson23.md
        - "3.8 Coordinate Frames in Physical AI (Recap)": module01/lesson24.md
      - "Unit 4 — Matrices as Transformations":
        - "4.1 Matrices as Operators": module01/lesson25.md
        - "4.2 Matrix Addition": module01/lesson26.md
        - "4.3 Matrix Multiplication": module01/lesson27.md
        - "4.4 The Identity Matrix": module01/lesson28.md
        - "4.5 Rotation Matrices": module01/lesson29.md
        - "4.6 Scaling Transformations": module01/lesson30.md
        - "4.7 Reflection Transformations": module01/lesson31.md
        - "4.8 Composition of Transformations": module01/lesson32.md
        - "4.9 Transformations in Physical AI (Recap)": module01/lesson33.md
  - "Module 2 — Spatial Transformations and SE(3)":
      - "Unit 1 — Why Transformations Matter":
        - "1.1 The Robot's Constant Problem": module02/lesson01.md
        - "1.2 Position and Orientation Together": module02/lesson02.md
        - "1.3 The Limit We Hit in Module 1": module02/lesson03.md
        - "1.4 Why Transformations Matter (Recap)": module02/lesson04.md
      - "Unit 2 — Homogeneous Coordinates":
        - "2.1 The Idea: One Extra Coordinate": module02/lesson05.md
        - "2.2 Points vs Directions": module02/lesson06.md
        - "2.3 Translation as a Matrix": module02/lesson07.md
        - "2.4 Rotation and Translation in One Matrix": module02/lesson08.md
        - "2.5 Homogeneous Coordinates in Physical AI (Recap)": module02/lesson09.md
      - "Unit 3 — SE(2) Transformations":
        - "3.1 What \"Rigid\" Means": module02/lesson10.md
        - "3.2 The SE(2) Transformation": module02/lesson11.md
        - "3.3 Applying SE(2) to Points and Shapes": module02/lesson12.md
        - "3.4 Inverse Transformations": module02/lesson13.md
        - "3.5 Rigid Motion in the Plane (Recap)": module02/lesson14.md
      - "Unit 4 — SE(3) Transformations":
        - "4.1 From 2D to 3D Rigid Motion": module02/lesson15.md
        - "4.2 3D Rotation": module02/lesson16.md
        - "4.3 The SE(3) Transformation": module02/lesson17.md
        - "4.4 Translation Vectors in 3D": module02/lesson18.md
        - "4.5 Applying SE(3); Inverses in 3D": module02/lesson19.md
        - "4.6 Rigid Motion in 3D (Recap)": module02/lesson20.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
