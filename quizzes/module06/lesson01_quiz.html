<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<script>var questions=[{"type": "mc", "prompt": "A differential motion of a rigid frame is best described as:", "options": [{"t": "a finite rotation followed by a finite translation", "ok": false}, {"t": "a small translation $d\\mathbf{p}$ together with a small rotation $\\delta\\boldsymbol{\\theta}$", "ok": true}, {"t": "a sequence of Euler-angle rotations", "ok": false}, {"t": "a pure translation only", "ok": false}], "ok": "Correct.", "no": "A differential motion is a small translation $d\\mathbf{p}$ plus a small"}, {"type": "mc", "prompt": "The differential approximation of a rotation by $\\delta\\boldsymbol{\\theta}$ is:", "options": [{"t": "$R \\approx S(\\delta\\boldsymbol{\\theta})$", "ok": false}, {"t": "$R \\approx I - S(\\delta\\boldsymbol{\\theta})$", "ok": false}, {"t": "$R \\approx I + S(\\delta\\boldsymbol{\\theta})$", "ok": true}, {"t": "$R \\approx I + S(\\delta\\boldsymbol{\\theta})^2$", "ok": false}], "ok": "Correct.", "no": "$R \\approx I + S(\\delta\\boldsymbol{\\theta})$. Option A drops the"}, {"type": "mc", "prompt": "As the rotation angle is halved, the error in $R \\approx I + S(\\delta\\boldsymbol{\\theta})$:", "options": [{"t": "halves", "ok": false}, {"t": "stays the same", "ok": false}, {"t": "quarters", "ok": true}, {"t": "doubles", "ok": false}], "ok": "Correct.", "no": "The error scales as $\\delta\\phi^2$, so halving the angle"}, {"type": "mc", "prompt": "Which statement is true?", "options": [{"t": "Both finite and differential rotations commute.", "ok": false}, {"t": "Differential rotations commute to first order; finite rotations generally do not.", "ok": true}, {"t": "Finite rotations commute; differential rotations do not.", "ok": false}, {"t": "Neither commutes under any circumstances.", "ok": false}], "ok": "Correct.", "no": "Differential rotations commute to first order because the cross term"}, {"type": "mc", "prompt": "The skew-symmetric operator $S(\\mathbf{v})$ satisfies:", "options": [{"t": "$S(\\mathbf{v})\\mathbf{u} = \\mathbf{v}\\cdot\\mathbf{u}$", "ok": false}, {"t": "$S(\\mathbf{v})\\mathbf{u} = \\mathbf{v}\\times\\mathbf{u}$", "ok": true}, {"t": "$S(\\mathbf{v})^\\top = S(\\mathbf{v})$", "ok": false}, {"t": "$S(\\mathbf{v})$ is always invertible", "ok": false}], "ok": "Correct.", "no": "$S(\\mathbf{v})\\mathbf{u} = \\mathbf{v}\\times\\mathbf{u}$. Note $S$ is"}, {"type": "short", "prompt": "In one or two sentences, explain why the M5 relation $\\Delta\\mathbf{p} \\approx J\\,\\Delta\\boldsymbol{\\theta}$ is a statement about differential motion.", "model": "Near the solution the joint update $\\Delta\\boldsymbol{\\theta}$ and pose error $\\Delta\\mathbf{p}$ are small, so the forward kinematics is well approximated by its first-order (linear) term, $\\Delta\\mathbf{p} \\approx J\\,\\Delta\\boldsymbol{\\theta}$. That linearization *is* differential motion: $J$ maps a differential joint motion to a differential end-effector motion."}, {"type": "short", "prompt": "Two differential rotations $\\delta\\boldsymbol{\\theta}_1$ and $\\delta\\boldsymbol{\\theta}_2$ are applied in sequence. Write the resulting first-order rotation matrix and state what happens to the rotation vectors.", "model": "Applying $\\delta\\boldsymbol{\\theta}_1$ then $\\delta\\boldsymbol{\\theta}_2$ gives, to first order, $$(I+S(\\delta\\boldsymbol{\\theta}_2))(I+S(\\delta\\boldsymbol{\\theta}_1)) \\approx I + S(\\delta\\boldsymbol{\\theta}_1 + \\delta\\boldsymbol{\\theta}_2),$$ so the rotation vectors simply **add**."}, {"type": "short", "prompt": "Give one concrete robotics situation where differential motion is the natural description, and say why a finite-motion description would be unnecessarily complicated there.", "model": "Examples: the final corrections of a numerical IK solver; a visual-servoing controller nudging the tool toward a target each frame; jogging a robot a tiny step in tool coordinates. A finite-motion description would force full nonlinear rotation composition (non-commuting, matrix-valued) where a simple additive linear update suffices."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);

else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);

sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
