<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<script>var questions=[{"type": "mc", "prompt": "`velocity_layer(q, xi_d)` returns:", "options": [{"t": "a trajectory", "ok": false}, {"t": "(q̇, info)", "ok": true}, {"t": "a torque", "ok": false}, {"t": "a pose error", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "The interface is \"narrow\" because it:", "options": [{"t": "handles every robot task", "ok": false}, {"t": "exposes only twist-in / joint-rate-out", "ok": true}, {"t": "requires Module 8", "ok": false}, {"t": "needs full dynamics", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Trajectory timing (when to be where) is owned by:", "options": [{"t": "Module 6", "ok": false}, {"t": "Module 7", "ok": true}, {"t": "Module 8", "ok": false}, {"t": "the analyzer", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Pose-error correction (feedback) is owned by:", "options": [{"t": "Module 6", "ok": false}, {"t": "Module 7", "ok": false}, {"t": "Module 8", "ok": true}, {"t": "the tracker", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Module 6's deliverable to Module 7 is:", "options": [{"t": "a controller", "ok": false}, {"t": "the velocity layer (robust twist→joint-rate map)", "ok": true}, {"t": "a dynamics model", "ok": false}, {"t": "a planner", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "short", "prompt": "Describe the velocity layer's interface in one sentence.", "model": "A single function taking the current configuration and a desired tool twist, returning a robust (scheduled-damping) joint-rate vector plus conditioning info — desired tool twists in, robust joint rates out."}, {"type": "short", "prompt": "Assign ownership: trajectory timing, feedback correction, posture/null-space control.", "model": "Trajectory timing → Module 7; feedback/pose-error correction → Module 8; posture/null-space control → Module 6 velocity layer (with goals possibly set by M7)."}, {"type": "short", "prompt": "How does this capstone close Module 6 and set up Module 7?", "model": "It packages all of Module 6 (differential kinematics, manipulability, singularity handling, damped inverse) behind one interface — the velocity stream Module 7's trajectory generators will drive, keeping planning and control cleanly in M7/M8."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;

if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
