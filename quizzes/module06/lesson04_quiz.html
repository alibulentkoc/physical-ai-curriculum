<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

</style></head><body><div class="wrap">

<script>var questions=[{"type": "mc", "prompt": "Transforming a twist between frames involves which two independent effects?", "options": [{"t": "scaling and shearing", "ok": false}, {"t": "rotating the components, and shifting the reference point", "ok": true}, {"t": "integrating and differentiating", "ok": false}, {"t": "translating only", "ok": false}], "ok": "Correct.", "no": "Rotate components by $R$; shift the reference point via $\\boldsymbol{\\omega}\\times\\mathbf{d}$."}, {"type": "mc", "prompt": "In the 6×6 twist transform, the off-diagonal block encodes:", "options": [{"t": "a scaling of angular velocity", "ok": false}, {"t": "the reference-point (lever-arm) shift", "ok": true}, {"t": "the determinant", "ok": false}, {"t": "nothing; it is always zero", "ok": false}], "ok": "Correct.", "no": "The $-R^\\top S(\\mathbf{d})$ block is the reference-point shift."}, {"type": "mc", "prompt": "When the two frames share an origin ($\\mathbf{d}=0$), the transform is:", "options": [{"t": "the identity", "ok": false}, {"t": "block-diagonal (pure rotation of both parts)", "ok": true}, {"t": "singular", "ok": false}, {"t": "lower-triangular", "ok": false}], "ok": "Correct.", "no": "With $\\mathbf{d}=0$ the transform is $\\text{diag}(R^\\top,R^\\top)$."}, {"type": "mc", "prompt": "The correct test that a twist transform is right is that:", "options": [{"t": "the matrix is orthogonal", "ok": false}, {"t": "the determinant is 1", "ok": false}, {"t": "physical point velocities are invariant", "ok": true}, {"t": "the trace is zero", "ok": false}], "ok": "Correct.", "no": "Invariance of physical point velocities is the correctness criterion (the matrix is"}, {"type": "mc", "prompt": "With $R=I$ and $\\mathbf{d}=(0,0.5,0)$, transforming $\\boldsymbol{\\xi}_A=[(1,0,0);(0,0,2)]$ gives $\\mathbf{v}_B=$", "options": [{"t": "$(2,0,0)$", "ok": false}, {"t": "$(0,0,0)$", "ok": true}, {"t": "$(1,0,0)$", "ok": false}, {"t": "$(-1,0,0)$", "ok": false}], "ok": "Correct.", "no": "$\\mathbf{v}_B=\\mathbf{v}_A+\\boldsymbol{\\omega}_A\\times\\mathbf{d}=(1,0,0)+(-1,0,0)=(0,0,0)$. B's origin is the instantaneous center (matches Lesson 1.3's stationary point)."}, {"type": "short", "prompt": "Why does the angular part of a twist only get rotated (never shifted) under a frame change?", "model": "$\\boldsymbol{\\omega}$ is a property of the whole body, identical at every point; only its *coordinates* change with the frame's orientation, hence a pure rotation. The reference point affects only where you \"stand\" to measure linear velocity."}, {"type": "short", "prompt": "Give the special case the transform reduces to when $R=I$, and what it does to the twist.", "model": "$R=I$ leaves orientation alone, so the transform shifts only the linear part by $\\boldsymbol{\\omega}\\times\\mathbf{d}$; $\\boldsymbol{\\omega}_B=\\boldsymbol{\\omega}_A$."}, {"type": "short", "prompt": "Explain how this transform makes the tool-frame Jacobian a one-line consequence of the base-frame Jacobian (preview of Lesson 2.4).", "model": "The base-frame Jacobian outputs the end-effector twist in world coordinates; applying the twist transform with the gripper's pose $(R,\\mathbf{d})$ re-expresses it in the tool frame, so no separate model/derivation is needed."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise();}
</script></body></html>
