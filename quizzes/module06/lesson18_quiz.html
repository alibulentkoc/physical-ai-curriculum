<script>var questions=[{"type": "mc", "prompt": "A boundary singularity occurs:", "options": [{"t": "inside the workspace", "ok": false}, {"t": "at the workspace edge (arm straight/folded)", "ok": true}, {"t": "only for redundant arms", "ok": false}, {"t": "never", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "An internal singularity occurs:", "options": [{"t": "at the edge", "ok": false}, {"t": "inside the workspace via special alignment", "ok": true}, {"t": "only at gimbal lock", "ok": false}, {"t": "at the base", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Commanding the lost direction near a singularity makes ‖q̇‖ scale like:", "options": [{"t": "σ_min", "ok": false}, {"t": "1/σ_min", "ok": true}, {"t": "σ_min²", "ok": false}, {"t": "constant", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "A command along a remaining (large-σ) direction near a singularity:", "options": [{"t": "also blows up", "ok": false}, {"t": "stays bounded/cheap", "ok": true}, {"t": "is impossible", "ok": false}, {"t": "reverses", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "For a planar 2R the boundary singularity sits at reach:", "options": [{"t": "0 only", "ok": false}, {"t": "L₁+L₂ (and |L₁−L₂|)", "ok": true}, {"t": "L₁ only", "ok": false}, {"t": "anywhere", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "short", "prompt": "Why do joint rates blow up near a singularity, and along which direction?", "model": "Realizing a tool velocity needs $\\dot q=J^{-1}\\xi$; a component along the shrinking axis is divided by a vanishing $\\sigma_{\\min}$, so $\\dot q$ explodes — only along the lost direction."}, {"type": "short", "prompt": "Why is an internal singularity more dangerous to a \"safe-looking\" interior path?", "model": "It sits inside the reachable region where a path looks smooth and modest, yet $1/\\sigma_{\\min}$ ramps up as the path nears it — spiking joint rates without any obvious workspace-edge warning."}, {"type": "short", "prompt": "State the ‖q̇‖ vs σ_min scaling.", "model": "$\\lVert\\dot q\\rVert \\sim 1/\\sigma_{\\min}\\to\\infty$ as $\\sigma_{\\min}\\to 0$."}];

else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
