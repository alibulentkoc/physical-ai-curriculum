<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<script>var questions=[{"type": "mc", "prompt": "The revolute-joint column of the geometric Jacobian is:", "options": [{"t": "$[\\mathbf{z}; \\mathbf{0}]$", "ok": false}, {"t": "$[\\mathbf{z}\\times(\\mathbf{o}_n-\\mathbf{o}_{i-1}); \\mathbf{z}]$", "ok": true}, {"t": "$[\\mathbf{o}_n-\\mathbf{o}_{i-1}; \\mathbf{z}]$", "ok": false}, {"t": "$[\\mathbf{z}; \\mathbf{o}_n]$", "ok": false}], "ok": "Correct.", "no": "$[\\mathbf{z}\\times(\\mathbf{o}_n-\\mathbf{o}_{i-1}); \\mathbf{z}]$. (A is prismatic.)"}, {"type": "mc", "prompt": "The axis used for joint $i$ is:", "options": [{"t": "$\\mathbf{z}_i$", "ok": false}, {"t": "$\\mathbf{z}_{i-1}$", "ok": true}, {"t": "$\\mathbf{o}_n$", "ok": false}, {"t": "the base $x$-axis", "ok": false}], "ok": "Correct.", "no": "Joint $i$ turns about $\\mathbf{z}_{i-1}$."}, {"type": "mc", "prompt": "The lever-arm vector in the linear part runs from:", "options": [{"t": "joint $i$ to joint $i+1$", "ok": false}, {"t": "the base to joint $i$", "ok": false}, {"t": "joint $i$'s frame origin to the end-effector origin", "ok": true}, {"t": "the end-effector to the base", "ok": false}], "ok": "Correct.", "no": "From joint $i$'s frame origin $\\mathbf{o}_{i-1}$ to the end-effector origin $\\mathbf{o}_n$."}, {"type": "mc", "prompt": "All quantities in the base-frame geometric Jacobian are expressed in:", "options": [{"t": "each joint's local frame", "ok": false}, {"t": "the tool frame", "ok": false}, {"t": "the base/world frame", "ok": true}, {"t": "camera coordinates", "ok": false}], "ok": "Correct.", "no": "Base/world frame (D-057)."}, {"type": "mc", "prompt": "A base joint contributes more tool speed when the arm is extended because:", "options": [{"t": "the motor is faster", "ok": false}, {"t": "the lever arm $(\\mathbf{o}_n-\\mathbf{o}_{i-1})$ is longer", "ok": true}, {"t": "the axis changes direction", "ok": false}, {"t": "friction is lower", "ok": false}], "ok": "Correct.", "no": "The lever arm is longer, so $\\mathbf{z}\\times(\\mathbf{o}_n-\\mathbf{o}_{i-1})$ is larger."}, {"type": "short", "prompt": "Where do $\\mathbf{z}_{i-1}$ and $\\mathbf{o}_{i-1}$ come from in practice?", "model": "From the forward-kinematics transforms $T_0^{i-1}$: $\\mathbf{z}_{i-1}$ is the third column of its rotation block, $\\mathbf{o}_{i-1}$ its translation."}, {"type": "short", "prompt": "Give the most common indexing error in building revolute columns and its consequence.", "model": "Using $\\mathbf{z}_i$ instead of $\\mathbf{z}_{i-1}$ (off-by-one). It corrupts that column and hence the whole Jacobian, producing wrong velocities everywhere."}, {"type": "short", "prompt": "In one sentence, why does only the outboard portion of the arm matter for joint $i$'s column?", "model": "Moving joint $i$ rotates only the links outboard of it (including the tool); inboard links don't move, so only the outboard geometry (the lever arm to $\\mathbf{o}_n$) enters the column."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});

</script></body></html>
