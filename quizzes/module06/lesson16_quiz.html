<script>var questions=[{"type": "mc", "prompt": "Joint torques for a tool force are:", "options": [{"t": "$\\tau=JF$", "ok": false}, {"t": "$\\tau=J^\\top F$", "ok": true}, {"t": "$\\tau=J^{-1}F$", "ok": false}, {"t": "$\\tau=F$", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "$\\tau=J^\\top F$ follows from:", "options": [{"t": "Newton's 2nd law", "ok": false}, {"t": "equality of power in joint and task space", "ok": true}, {"t": "the chain rule of position", "ok": false}, {"t": "energy storage", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Force-ellipsoid axes relate to velocity-ellipsoid axes as:", "options": [{"t": "identical lengths", "ok": false}, {"t": "reciprocal lengths ($1/\\sigma$), same directions", "ok": true}, {"t": "unrelated", "ok": false}, {"t": "doubled", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Easy-to-move directions are:", "options": [{"t": "strong-to-push", "ok": false}, {"t": "weak-to-push", "ok": true}, {"t": "impossible", "ok": false}, {"t": "singular", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "At a singularity the force ellipsoid axis (dual to the lost velocity axis):", "options": [{"t": "→ 0", "ok": false}, {"t": "→ ∞", "ok": true}, {"t": "stays fixed", "ok": false}, {"t": "disappears", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "short", "prompt": "Derive $\\tau=J^\\top F$ in one line from power equivalence.", "model": "$\\tau^\\top\\dot q=F^\\top\\xi=F^\\top J\\dot q$ for all $\\dot q\\Rightarrow \\tau=J^\\top F$."}, {"type": "short", "prompt": "State the easy-to-move / hard-to-push trade-off.", "model": "A direction the tool moves easily (long velocity axis) is one it can push only weakly (short force axis), and vice versa."}, {"type": "short", "prompt": "Physically interpret a force axis → ∞ at a singularity.", "model": "The arm cannot move in that direction but can resist arbitrarily large force there — it is \"braced\"/immobile (strong but stuck)."}];

questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
