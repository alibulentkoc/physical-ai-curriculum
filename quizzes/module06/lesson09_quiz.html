<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}

<script>var questions=[{"type": "mc", "prompt": "The analytic Jacobian maps joint rates to:", "options": [{"t": "joint torques", "ok": false}, {"t": "the rate of a pose representation $\\dot{\\mathbf{x}}=[\\dot{\\mathbf{p}};\\dot{\\boldsymbol{\\phi}}]$", "ok": true}, {"t": "the true twist $[\\mathbf{v};\\boldsymbol{\\omega}]$", "ok": false}, {"t": "link inertias", "ok": false}], "ok": "Correct.", "no": "Rates of a pose representation."}, {"type": "mc", "prompt": "Compared to the geometric Jacobian, the analytic Jacobian's position rows are:", "options": [{"t": "different", "ok": false}, {"t": "identical", "ok": true}, {"t": "always zero", "ok": false}, {"t": "scaled by $B(\\boldsymbol{\\phi})$", "ok": false}], "ok": "Correct.", "no": "Identical position rows."}, {"type": "mc", "prompt": "The orientation rows of the analytic Jacobian produce:", "options": [{"t": "angular velocity $\\boldsymbol{\\omega}$", "ok": false}, {"t": "angle-rates $\\dot{\\boldsymbol{\\phi}}$", "ok": true}, {"t": "torques", "ok": false}, {"t": "quaternions", "ok": false}], "ok": "Correct.", "no": "Angle-rates."}, {"type": "mc", "prompt": "The analytic Jacobian depends on:", "options": [{"t": "nothing extra", "ok": false}, {"t": "the chosen orientation representation", "ok": true}, {"t": "only link lengths", "ok": false}, {"t": "the base frame only", "ok": false}], "ok": "Correct.", "no": "The orientation representation."}, {"type": "mc", "prompt": "You should use the analytic Jacobian when:", "options": [{"t": "reasoning about physical twist", "ok": false}, {"t": "commands/errors are expressed in angle coordinates", "ok": true}, {"t": "computing forces", "ok": false}, {"t": "never", "ok": false}], "ok": "Correct.", "no": "Angle-coordinate commands/errors."}, {"type": "short", "prompt": "Why are the position rows of the two Jacobians identical?", "model": "Position velocity is independent of how orientation is described, so $J_p=J_v$ regardless of the angle convention. *Credit for representation-independence of position.*"}, {"type": "short", "prompt": "Write the analytic Jacobian as a derivative and name its blocks.", "model": "$J_a=\\partial\\mathbf{x}/\\partial\\mathbf{q}=[J_p;J_\\phi]$ with $\\mathbf{x}=[\\mathbf{p};\\boldsymbol{\\phi}]$; top block position velocity, bottom block angle-rates. *Credit for derivative form + blocks.*"}, {"type": "short", "prompt": "Name a control scenario that specifically needs the analytic Jacobian.", "model": "A teleop/orientation controller commanding roll-pitch-yaw rates (error in angle coordinates) maps them to joint rates via the analytic Jacobian."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
