<style>

<script>var questions=[{"type": "mc", "prompt": "Converting the base-frame Jacobian to the tool frame requires:", "options": [{"t": "a lever-arm shift and a rotation", "ok": false}, {"t": "a rotation of both blocks only", "ok": true}, {"t": "scaling", "ok": false}, {"t": "nothing", "ok": false}], "ok": "Correct.", "no": "Rotation of both blocks only."}, {"type": "mc", "prompt": "The conversion is the Lesson 1.4 transform with:", "options": [{"t": "$R=I$", "ok": false}, {"t": "$\\mathbf{d}=\\mathbf{0}$", "ok": true}, {"t": "$\\boldsymbol{\\omega}=0$", "ok": false}, {"t": "$n=6$", "ok": false}], "ok": "Correct.", "no": "$\\mathbf{d}=\\mathbf{0}$."}, {"type": "mc", "prompt": "$J_{\\text{tool}}$ equals:", "options": [{"t": "$J_{\\text{base}}$", "ok": false}, {"t": "$\\mathrm{blkdiag}((R^{n}_{0})^\\top,(R^{n}_{0})^\\top)\\,J_{\\text{base}}$", "ok": true}, {"t": "$(R^{n}_{0})^\\top J_{\\text{base}}$ (top block only)", "ok": false}, {"t": "$J_{\\text{base}}\\,(R^{n}_{0})$", "ok": false}], "ok": "Correct.", "no": "$\\mathrm{blkdiag}((R^n_0)^\\top,(R^n_0)^\\top)J_{\\text{base}}$."}, {"type": "mc", "prompt": "No lever-arm term appears because:", "options": [{"t": "the robot is planar", "ok": false}, {"t": "both Jacobians reference the same point (the tool origin)", "ok": true}, {"t": "$\\boldsymbol{\\omega}=0$", "ok": false}, {"t": "the tool is massless", "ok": false}], "ok": "Correct.", "no": "Same reference point."}, {"type": "mc", "prompt": "The correctness test for the conversion is:", "options": [{"t": "the matrix is orthogonal", "ok": false}, {"t": "the physical twist is invariant", "ok": true}, {"t": "$\\det=1$", "ok": false}, {"t": "the trace is zero", "ok": false}], "ok": "Correct.", "no": "Twist invariance."}, {"type": "short", "prompt": "Why is the base→tool conversion rotation-only?", "model": "Both Jacobians measure the velocity of the same point (the tool origin), so there is no reference-point shift; only the axes differ, giving a pure rotation. *Credit for \"same point ⇒ no shift.\"*"}, {"type": "short", "prompt": "When would a lever-arm term reappear?", "model": "If the Jacobian is moved to a *different* reference point (e.g., the fingertip offset by $\\mathbf{r}$), the lever-arm term $\\boldsymbol{\\omega}\\times\\mathbf{r}$ reappears. *Credit for reference-point change.*"}, {"type": "short", "prompt": "Give one task natural in the tool frame and one in the base frame.", "model": "Tool frame: pressing/sliding along the tool's approach axis (surface finishing, peg insertion). Base frame: gravity-direction reasoning, world-referenced moves."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
