<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "After Unit 3 the twin is:", "options": [{"t": "still a passive mirror", "ok": false}, {"t": "an active predictor — it can simulate the system forward", "ok": true}, {"t": "a fleet manager", "ok": false}, {"t": "a new controller", "ok": false}], "ok": "Right.", "no": "Simulation made the twin run the harvester forward."}, {"type": "mc", "prompt": "The three Unit 3 capabilities are:", "options": [{"t": "perceive, plan, recover", "ok": false}, {"t": "simulate (safe), sandbox (what-if), determinism (reproducible)", "ok": true}, {"t": "sync, drift, calibrate", "ok": false}, {"t": "monitor, predict, adapt", "ok": false}], "ok": "Right.", "no": "Simulation on a copy, fault-injection sandbox, and reproducible runs."}, {"type": "mc", "prompt": "Every simulated outcome is only as faithful as:", "options": [{"t": "the seed", "ok": false}, {"t": "the twin's model of reality", "ok": true}, {"t": "the cloud", "ok": false}, {"t": "the fleet size", "ok": false}], "ok": "Right.", "no": "A prediction inherits the twin's simplifications — the sim-to-real gap (Unit 4)."}, {"type": "mc", "prompt": "Which does Unit 3 NOT guarantee?", "options": [{"t": "safe simulation", "ok": false}, {"t": "reproducibility", "ok": false}, {"t": "that the prediction matches what the real robot will do", "ok": true}, {"t": "non-destructive what-ifs", "ok": false}], "ok": "Right.", "no": "Matching reality is not guaranteed — that's the sim-to-real gap, Unit 4."}, {"type": "tf", "prompt": "Unit 3 reuses Module 9 verbatim and adds no new robot theory.", "answer": true, "ok": "Correct.", "no": "True — simulation is the M9 model run forward in the twin."}, {"type": "short", "prompt": "Which does Unit 3 enable: (a) predict the harvest without touching reality, (b) rehearse a failure safely, (c) reproduce a harvest exactly, (d) guarantee the prediction matches the real robot?", "model": "(a) Yes — simulation runs the harvester forward on the twin's copy. (b) Yes —
