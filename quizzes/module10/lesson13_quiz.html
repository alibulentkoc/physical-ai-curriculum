<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Twin and reality can diverge because:", "options": [{"t": "they run different logic", "ok": false}, {"t": "they run the same logic on different worlds (reality has unmodeled effects)", "ok": true}, {"t": "the seed differs", "ok": false}, {"t": "the twin is broken", "ok": false}], "ok": "Right.", "no": "Same harvest_row; reality's world carries effects the twin's world lacks."}, {"type": "mc", "prompt": "The source of the sim-to-real gap is:", "options": [{"t": "a coding bug", "ok": false}, {"t": "unmodeled effects in reality the twin doesn't include", "ok": true}, {"t": "the cloud", "ok": false}, {"t": "random noise only", "ok": false}], "ok": "Right.", "no": "ε — the part of reality the twin's world doesn't model."}, {"type": "mc", "prompt": "An unmodeled obstacle makes:", "options": [{"t": "twin skip / reality harvest", "ok": false}, {"t": "twin predict harvested / reality skip that fruit", "ok": true}, {"t": "both skip", "ok": false}, {"t": "both harvest", "ok": false}], "ok": "Right.", "no": "The twin (not knowing) predicts harvested; reality (experiencing it) skips."}, {"type": "mc", "prompt": "The sim-to-real gap is:", "options": [{"t": "a bug to eliminate", "ok": false}, {"t": "inevitable (a model is simpler than the world) and informative", "ok": true}, {"t": "always zero", "ok": false}, {"t": "random", "ok": false}], "ok": "Right.", "no": "Any model misses something; where sim and real disagree points at what's unmodeled."}, {"type": "tf", "prompt": "A divergence between twin and reality is a diagnostic signal, not necessarily breakage.", "answer": true, "ok": "Correct.", "no": "True — it points at an effect the twin doesn't model."}, {"type": "short", "prompt": "The twin predicts a fruit harvested; reality skips it. Is the twin broken?", "model": "No. The twin ran the identical Module 9 harvester; the divergence came from an unmodeled effect in reality (the obstacle) that the twin's world didn't include. A model simpler than reality will miss such effects — that's the definition of a model, not a defect. The right reading: the twin and reality disagree on this fruit, which tells me reality has an effect here the twin doesn't model — diagnostic information, not breakage. Expecting a zero gap is the real error."}];

else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
