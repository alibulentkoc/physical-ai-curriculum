<script>var questions=[{"type": "mc", "prompt": "The four parts of a control system are:", "options": [{"t": "sensor, motor, gear, wire", "ok": false}, {"t": "reference, controller, plant, feedback", "ok": true}, {"t": "P, I, D, sum", "ok": false}, {"t": "goal, path, trajectory, validation", "ok": false}], "ok": "Correct.", "no": "Reference (desired), controller (correction), plant (controlled system), feedback (measurement)."}, {"type": "mc", "prompt": "In Module 8, the reference comes from:", "options": [{"t": "the user each tick", "ok": false}, {"t": "Module 7's reference trajectory layer", "ok": true}, {"t": "the motor", "ok": false}, {"t": "the sensor", "ok": false}], "ok": "Correct.", "no": "Module 7 supplies q_d, q\u0307_d, q\u0308_d \u2014 the reference the loop tracks."}, {"type": "mc", "prompt": "The 'plant' is:", "options": [{"t": "the controller", "ok": false}, {"t": "the system being controlled (the joint/arm)", "ok": true}, {"t": "the reference", "ok": false}, {"t": "the error signal", "ok": false}], "ok": "Correct.", "no": "The plant is the thing under control \u2014 here the greenhouse arm's joint."}, {"type": "mc", "prompt": "A disturbance enters the diagram at:", "options": [{"t": "the reference", "ok": false}, {"t": "the plant (perturbing its output)", "ok": true}, {"t": "the summing junction", "ok": false}, {"t": "the sensor only", "ok": false}], "ok": "Correct.", "no": "Disturbances (load, friction) act on the plant, perturbing q."}, {"type": "mc", "prompt": "Removing the feedback path turns the system into:", "options": [{"t": "a faster controller", "ok": false}, {"t": "an open-loop system that can't reject disturbances", "ok": true}, {"t": "a PID controller", "ok": false}, {"t": "a reference generator", "ok": false}], "ok": "Correct.", "no": "No feedback \u2192 open-loop \u2192 no error correction."}, {"type": "short", "prompt": "Name the four parts of a control system and the role of each, using the greenhouse arm.", "model": "Reference: the desired motion, q_d, q\u0307_d, q\u0308_d, supplied by Module 7 \u2014 where the arm should be. Controller: computes the correction (the command u) from the error \u2014 the 'brain' that decides how hard to drive. Plant: the system being controlled \u2014 the greenhouse arm's joint, which turns the command into motion but is also pushed by load and friction. Feedback: the sensor path that measures the actual q and returns it to be compared with q_d. Together they form the loop: reference in, error formed, correction computed, plant actuated, output measured and fed back."}, {"type": "short", "prompt": "Explain where a disturbance enters the control diagram and why that placement matters.", "model": "A disturbance enters at the plant, perturbing its output q directly (gravity-like load, friction, a payload). That placement matters because it means the disturbance is not in the reference or the command \u2014 the controller doesn't know it's coming. It only discovers it through the feedback path, when the perturbed q changes the measured error. This is exactly why feedback is necessary: the disturbance acts on the plant downstream of the controller, so only by measuring the plant's actual output can the loop detect and reject it."}, {"type": "short", "prompt": "Why is the feedback path the part that distinguishes a control system from open-loop execution?", "model": "The feedback path is what carries the actual measured output back to be compared with the reference, creating the error the controller acts on. Without it, the controller computes commands purely from the reference (or feedforward) and never learns what actually happened \u2014 that is open-loop execution, which cannot reject disturbances or correct model error. Adding the feedback path closes the loop: the system now responds to reality, not just to the plan. So the feedback path is the defining ingredient that converts a plan-and-hope pipeline into a true control system."}];
