<style>

*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

</style></head><body><div class="wrap">

<script>var questions=[{"type": "mc", "prompt": "The recommended tuning order is:", "options": [{"t": "I \u2192 P \u2192 D", "ok": false}, {"t": "P \u2192 D \u2192 I", "ok": true}, {"t": "D \u2192 I \u2192 P", "ok": false}, {"t": "all at once", "ok": false}], "ok": "Correct.", "no": "P for speed, then D for damping, then I for offset \u2014 one knob at a time."}, {"type": "mc", "prompt": "In step 1 you raise Kp until:", "options": [{"t": "the offset is zero", "ok": false}, {"t": "the response is brisk and just begins to oscillate, then back off", "ok": true}, {"t": "the actuator saturates", "ok": false}, {"t": "the joint stops", "ok": false}], "ok": "Correct.", "no": "Bring Kp to the oscillation edge for briskness, then back off for margin."}, {"type": "mc", "prompt": "Adding derivative (Kd) primarily:", "options": [{"t": "erases steady-state offset", "ok": false}, {"t": "damps overshoot (and buys headroom for more Kp)", "ok": true}, {"t": "speeds the rise only", "ok": false}, {"t": "adds offset", "ok": false}], "ok": "Correct.", "no": "D damps the overshoot and, by adding damping, lets you use more Kp safely."}, {"type": "mc", "prompt": "Integral (Ki) is added to:", "options": [{"t": "damp overshoot", "ok": false}, {"t": "erase the steady-state offset", "ok": true}, {"t": "increase speed", "ok": false}, {"t": "reduce noise", "ok": false}], "ok": "Correct.", "no": "I removes the residual offset P+D leaves under load; use the smallest that works."}, {"type": "mc", "prompt": "Why not tune to the very edge of oscillation?", "options": [{"t": "it's illegal", "ok": false}, {"t": "payload, wear, and delay eat the margin and push it unstable on the floor", "ok": true}, {"t": "it's too slow", "ok": false}, {"t": "it removes the offset", "ok": false}], "ok": "Correct.", "no": "Leave stability margin \u2014 real conditions are harsher than the bench."}, {"type": "short", "prompt": "State the P\u2192D\u2192I tuning workflow and what each step fixes.", "model": "Step 1 \u2014 P: with I and D off, raise the proportional gain until the response is brisk and just begins to oscillate, then back off (to roughly half\u2013two-thirds) for margin; this sets the basic speed and shrinks the offset. Step 2 \u2014 D: add derivative to damp the overshoot and ringing; because D adds damping it also buys headroom to push Kp a little higher for speed. Step 3 \u2014 I: add the smallest integral that erases the steady-state offset left under load in acceptable time. Then verify the four metrics (rise, overshoot, settling, steady-state error) and confirm comfortable stability margin. Each step fixes the defect the previous one left: P sets speed, D calms overshoot, I removes offset."}, {"type": "short", "prompt": "Why add derivative before integral?", "model": "Because derivative damps the overshoot and ringing that aggressive proportional (and, later, integral) action causes, and that damping creates the stability headroom you need before adding integral. Integral inherently adds lag and tends to increase overshoot \u2014 if you add it to a loop that's already lightly damped, you push it toward oscillation. By adding derivative first you make the loop well-damped, so when you then add integral to remove the offset, the extra lag it brings doesn't tip the response into ringing. D before I means you erase the offset on a stable, damped foundation rather than an oscillatory one."}, {"type": "short", "prompt": "You tune a joint perfectly on the bench, then it overshoots and oscillates after picking up a heavy payload. Explain and propose a fix.", "model": "The payload changed the effective load and inertia the controller faces, so the gains that were balanced for the unloaded joint are now mismatched \u2014 relatively too aggressive for the heavier, slower-responding joint \u2014 and the response overshoots and rings. The fix is to re-run the workflow for the loaded condition (or a representative worst case): back off Kp, increase Kd to restore damping, and adjust Ki for the new offset, leaving margin. Tuning with margin originally would have reduced the problem, since the loop wouldn't have been at the edge to begin with. If the payload varies widely, you'd consider gains scheduled to the load rather than a single fixed set \u2014 but always keeping margin so the worst case stays comfortably stable."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
