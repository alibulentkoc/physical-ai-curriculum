<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "Rise time measures:", "options": [{"t": "how far past target it goes", "ok": false}, {"t": "how quickly it climbs (10\u201390% of the span)", "ok": true}, {"t": "the final offset", "ok": false}, {"t": "when ringing stops", "ok": false}], "ok": "Correct.", "no": "Rise time is the 10%\u219290% climb time \u2014 the speed of the response."}, {"type": "mc", "prompt": "Overshoot measures:", "options": [{"t": "the final offset", "ok": false}, {"t": "how far the response sails past the target, as a % of the span", "ok": true}, {"t": "the rise speed", "ok": false}, {"t": "the settling band", "ok": false}], "ok": "Correct.", "no": "Overshoot is the peak excursion past target / span \u00d7 100% \u2014 aggressiveness."}, {"type": "mc", "prompt": "Settling time is:", "options": [{"t": "the rise time", "ok": false}, {"t": "the last time the response leaves a small band around target", "ok": true}, {"t": "the overshoot", "ok": false}, {"t": "the steady-state error", "ok": false}], "ok": "Correct.", "no": "After the settling time the response stays inside the stated band (e.g. \u00b12%)."}, {"type": "mc", "prompt": "Steady-state error is:", "options": [{"t": "a transient excursion", "ok": false}, {"t": "the residual offset once the response has settled", "ok": true}, {"t": "the peak value", "ok": false}, {"t": "the rise time", "ok": false}], "ok": "Correct.", "no": "It's the permanent gap from target after the transient dies \u2014 distinct from overshoot."}, {"type": "mc", "prompt": "Reducing rise time (going faster) usually:", "options": [{"t": "reduces overshoot", "ok": false}, {"t": "increases overshoot and can lengthen settling", "ok": true}, {"t": "has no side effect", "ok": false}, {"t": "removes steady-state error", "ok": false}], "ok": "Correct.", "no": "The speed-vs-overshoot trade: a more aggressive, faster response tends to overshoot more."}, {"type": "short", "prompt": "Define the four step-response metrics and say what behaviour each captures.", "model": "Rise time: how long to climb from 10% to 90% of the step \u2014 the response's speed. Overshoot (%): how far the response sails past the target relative to the step size \u2014 its aggressiveness/under-damping. Settling time: the last moment the response leaves a small band (e.g. \u00b12%) around the target \u2014 when the ringing effectively stops. Steady-state error: the residual gap between target and final value once settled \u2014 the response's precision. Together they convert a subjective 'looks good/bad' into a measurable specification you can tune toward and test against."}, {"type": "short", "prompt": "Explain the speed-vs-overshoot trade and why specifying only rise time is dangerous.", "model": "Making a response faster generally means correcting more aggressively, which gives the joint more momentum as it approaches the target \u2014 so it tends to sail further past (more overshoot) and then take longer to ring down (longer settling). Rise time and overshoot pull against each other. Specifying only rise time is dangerous because you can hit a fast rise while badly overshooting and oscillating \u2014 technically 'fast' but unusable for a task that can't tolerate overshoot (a welding head, a surgical tool). A sound spec constrains all four metrics together so speed isn't bought at the cost of an unacceptable shape."}, {"type": "short", "prompt": "Two joints have the same rise time; one overshoots 3%, the other 35%. For a camera gimbal that must not blur the shot, which is better and why?", "model": "The 3%-overshoot joint is better. A camera gimbal slewing to a target must arrive and hold steady so the image is sharp; 35% overshoot means it sails well past the aim point and rings back, blurring the shot and lengthening the settling time before the image is usable. With equal rise time, the low-overshoot response reaches and holds the target with minimal excursion, giving a clean, quickly-usable image. This shows that rise time alone doesn't decide quality \u2014 for this task overshoot (and the settling it implies) is the deciding metric, and less is decisively better."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
