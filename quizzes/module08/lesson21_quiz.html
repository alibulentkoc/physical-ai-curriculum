<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "A real robot's control loop is distributed across:", "options": [{"t": "one chip that does everything instantly", "ok": false}, {"t": "separate sensor, controller, and actuator subsystems that exchange messages", "ok": true}, {"t": "only the controller", "ok": false}, {"t": "the reference generator alone", "ok": false}], "ok": "Correct.", "no": "Sensing, control, and actuation are separate subsystems communicating by messages."}, {"type": "mc", "prompt": "Each arrow of the feedback loop is not instantaneous because:", "options": [{"t": "the gains are too low", "ok": false}, {"t": "the message it carries takes transit and processing time", "ok": true}, {"t": "the reference is delayed", "ok": false}, {"t": "the integrator is slow", "ok": false}], "ok": "Correct.", "no": "Messages between subsystems take time — that's the physical source of latency."}, {"type": "mc", "prompt": "The loop latency is computed as:", "options": [{"t": "the largest single hop time", "ok": false}, {"t": "the sum of the per-hop transit/processing times", "ok": true}, {"t": "the controller's update rate", "ok": false}, {"t": "the sensor resolution", "ok": false}], "ok": "Correct.", "no": "τ_loop = Σ hop times."}, {"type": "mc", "prompt": "This lesson explains Unit 3's 'latency' by:", "options": [{"t": "removing it", "ok": false}, {"t": "giving it a physical source — communication between subsystems takes time", "ok": true}, {"t": "proving it doesn't exist", "ok": false}, {"t": "blaming the gains", "ok": false}], "ok": "Correct.", "no": "Unit 3 inserted latency abstractly; here it arises because the arrows are real messages."}, {"type": "mc", "prompt": "The nervous-system analogy is best understood as:", "options": [{"t": "an exact model of how the controller computes", "ok": false}, {"t": "an analogy for 'distributed and delayed', not a model of computation", "ok": true}, {"t": "proof the robot is alive", "ok": false}, {"t": "a reason to ignore latency", "ok": false}], "ok": "Correct.", "no": "It conveys separate organs and signals that take time; messages are discrete and the controller is a fixed-rate program."}, {"type": "short", "prompt": "Reframe one pass of the feedback loop as a sequence of messages.", "model": "A sensor measures the joint and publishes that reading as a message to the controller; the message takes time to travel (a hop). The controller receives it, computes a command, and publishes that command as a message to the actuator — another hop. The actuator receives the command and drives the joint; the joint moves and is sensed again on a feedback hop, closing the loop. Sense, compare, correct, actuate are no longer instantaneous steps in one place but messages crossing gaps between subsystems, each costing time."}, {"type": "short", "prompt": "Three hops take 1 ms each. What is the loop latency, and what does it mean for the controller?", "model": "The loop latency is the sum of the per-hop times: 1 + 1 + 1 = 3 ms. It means the measurement the controller acts on is about 3 ms old by the time its correction takes effect — the state has aged by the full loop latency in transit and processing. Nothing in the control math changed, but the controller is always reacting to slightly stale information, which is exactly the delay that Lesson 6.3 will show can destabilise the loop."}, {"type": "short", "prompt": "State the nervous-system analogy and two ways it breaks down.", "model": "The analogy: a robot's loop is like a nervous system — sensors (senses) send signals over nerves to a controller (brain), which sends commands over nerves to actuators (muscles), and every signal takes time, so the loop is distributed and delayed. It breaks down in at least two ways: a robot's messages are discrete packets on named channels rather than continuous biochemical impulses, and the controller is a fixed-rate program rather than a plastic biological network with engineered, largely knowable timing. The analogy builds intuition for 'distributed and delayed', not a model of how the robot computes."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
