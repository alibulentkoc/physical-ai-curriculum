<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">

<script>var questions=[{"type": "mc", "prompt": "An actuator is best described as:", "options": [{"t": "a perfect wire that passes the command through", "ok": false}, {"t": "a converter from a requested command to a delivered effort", "ok": true}, {"t": "the controller's integral term", "ok": false}, {"t": "a model of motor electrodynamics", "ok": false}], "ok": "Correct.", "no": "It sits between controller and plant and converts the request into what is physically delivered."}, {"type": "mc", "prompt": "A deadband causes:", "options": [{"t": "large requests to be capped", "ok": false}, {"t": "small requests to deliver no motion until a threshold is crossed", "ok": true}, {"t": "the effort to ramp instead of jump", "ok": false}, {"t": "the integrator to wind up", "ok": false}], "ok": "Correct.", "no": "Inside the deadband, |request| ≤ d delivers nothing."}, {"type": "mc", "prompt": "Saturation causes:", "options": [{"t": "tiny requests to deliver nothing", "ok": false}, {"t": "requests above u_max to be capped at the ceiling; the surplus is discarded", "ok": true}, {"t": "the delivered effort to slew gradually", "ok": false}, {"t": "the deadband to widen", "ok": false}], "ok": "Correct.", "no": "Saturation is the effort ceiling ±u_max."}, {"type": "mc", "prompt": "A rate limit means:", "options": [{"t": "the delivered effort cannot change faster than r_max per second (it ramps)", "ok": true}, {"t": "the effort cannot exceed u_max", "ok": false}, {"t": "small requests are ignored", "ok": false}, {"t": "the controller updates slowly", "ok": false}], "ok": "Correct.", "no": "The rate limit caps how fast the delivered effort can slew."}, {"type": "mc", "prompt": "We model the actuator at the plant level (what is delivered) and NOT its electrodynamics because:", "options": [{"t": "electrodynamics is too easy", "ok": false}, {"t": "the delivered-effort view is what shapes the command and motion; motor internals are out of scope here", "ok": true}, {"t": "motors have no limits", "ok": false}, {"t": "the controller already models the motor", "ok": false}], "ok": "Correct.", "no": "This unit is plant-level: requested vs delivered effort, not current loops or motor dynamics."}, {"type": "short", "prompt": "Explain why a requested command is not the same as the delivered effort, naming the three plant-level nonlinearities.", "model": "The controller outputs a requested command, but an actuator sits between it and the joint and re-shapes that request before it becomes physical effort. Three plant-level nonlinearities do the re-shaping: saturation caps the delivered effort at a ceiling ±u_max (surplus is discarded), a deadband delivers nothing for requests too small to register, and a rate limit prevents the delivered effort from changing faster than r_max per second so it ramps rather than jumps. Only after these does the request become the delivered effort that drives the plant, so requested ≠ delivered in general."}, {"type": "short", "prompt": "Describe the transfer characteristic and label its three regions.", "model": "Plot requested command on the horizontal axis and delivered effort on the vertical. The curve is flat at zero across the central deadband (|request| ≤ d delivers nothing), rises with unit slope in the middle region (delivered ≈ request, shifted past the deadband), and flattens at ±u_max beyond the saturation ceiling. On top of this static curve, a rate limit means a sudden change in the request is delivered as a ramp, not a step."}, {"type": "short", "prompt": "A single requested command of 5 is sent through three actuators: ideal, a deadband of 8, and a ceiling of 3. What is delivered in each case, and why?", "model": "Ideal actuator: 5 — it passes the request through. Deadband of 8: 0 — since |5| ≤ 8 the request is inside the dead zone and nothing is delivered. Ceiling of 3: 3 — the request exceeds u_max so it is capped at the ceiling and the surplus is discarded. Same request, three different deliveries — the actuator, not the controller, decides what reaches the joint."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
