<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "The combined controller command is:", "options": [{"t": "u_ff only", "ok": false}, {"t": "u_fb only", "ok": false}, {"t": "u = u_ff + u_fb (feedforward plus feedback)", "ok": true}, {"t": "u = u_ff \u2212 u_fb", "ok": false}], "ok": "Correct.", "no": "Add the anticipatory feedforward and the corrective feedback."}, {"type": "mc", "prompt": "In the combination, feedforward handles the ___ and feedback handles the ___:", "options": [{"t": "unknown / known", "ok": false}, {"t": "known planned motion / unknown residual and disturbance", "ok": true}, {"t": "noise / plan", "ok": false}, {"t": "load / nothing", "ok": false}], "ok": "Correct.", "no": "Feedforward: known plan (performance). Feedback: unknown residual + disturbance (robustness)."}, {"type": "mc", "prompt": "On an identical trajectory, feedforward+feedback versus feedback-only:", "options": [{"t": "tracks worse", "ok": false}, {"t": "tracks several times tighter", "ok": true}, {"t": "is identical", "ok": false}, {"t": "diverges", "ok": false}], "ok": "Correct.", "no": "The combination tracks markedly tighter (e.g. ~4.5\u00d7) on the same trajectory."}, {"type": "mc", "prompt": "When feedforward is present and working, the feedback effort is:", "options": [{"t": "larger", "ok": false}, {"t": "smaller \u2014 feedforward did the bulk", "ok": true}, {"t": "unchanged", "ok": false}, {"t": "zero", "ok": false}], "ok": "Correct.", "no": "Feedback only mops up the small residual, so its command is smaller."}, {"type": "mc", "prompt": "Under model mismatch, feedforward+feedback beats feedforward-only because:", "options": [{"t": "it uses more feedforward", "ok": false}, {"t": "feedback corrects the residual the imperfect model leaves", "ok": true}, {"t": "it ignores the plan", "ok": false}, {"t": "it lowers the gain", "ok": false}], "ok": "Correct.", "no": "Feedback cleans up the mismatch residual that pure feedforward can't."}, {"type": "short", "prompt": "Write the combined command and explain the division of labour between its two parts.", "model": "The command is u = (m\u00b7q\u0308_d + b\u00b7q\u0307_d + \u2113) + PID(q_d \u2212 q): a feedforward term plus a feedback term. Feedforward handles the known, planned motion \u2014 using Module 7's q\u0307_d and q\u0308_d it supplies, in advance, most of the command the trajectory needs, giving lag-free performance. Feedback handles the unknown \u2014 the model is never perfect and disturbances happen, leaving a small residual error that the PID term corrects online. Because feedforward already did the bulk of the work, the residual is small, so the feedback gains can be modest and the loop stays well inside its stability margin. Feedforward for performance, feedback for robustness."}, {"type": "short", "prompt": "Why does feedforward+feedback track tighter than feedback-only on the same trajectory, with smaller feedback effort?", "model": "Feedback-only must generate the entire corrective command reactively: it waits for an error to form, then responds, so it always trails and leaves a following error. Adding feedforward changes the feedback's job: the feedforward term supplies the bulk of the command from the plan in advance, so the joint nearly follows the trajectory on its own, and only a small residual error remains for feedback to correct. Correcting a small residual takes a small command, so the feedback effort is smaller \u2014 and because the residual is small, the same gains drive it close to zero, giving much tighter tracking (several times lower RMS) on the identical trajectory. Less work, better result."}, {"type": "short", "prompt": "A colleague says 'feedforward+feedback is just feedback with higher gains.' Correct them.", "model": "It isn't. Higher feedback gains still rely on an error existing before the controller acts, so they only reduce \u2014 never eliminate \u2014 the following-error lag, and pushing them up spends stability margin and amplifies noise. Feedforward+feedback adds a different signal entirely: a command computed from the known plan (q\u0307_d, q\u0308_d), applied before any error forms. That anticipatory term removes the lag at its source rather than reacting harder to it. In fact, with feedforward present the feedback gains can be gentler, not higher, because feedback only handles the small residual. So the combination is more accurate and more stable than a high-gain feedback-only loop \u2014 a fundamentally different mechanism, not just a louder version of feedback."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
