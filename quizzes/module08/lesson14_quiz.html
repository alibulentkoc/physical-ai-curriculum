<script>var questions=[{"type": "mc", "prompt": "Feedback computes its command from:", "options": [{"t": "the known plan", "ok": false}, {"t": "the measured error (after it forms)", "ok": true}, {"t": "the future", "ok": false}, {"t": "nothing", "ok": false}], "ok": "Correct.", "no": "Feedback is reactive \u2014 it acts on the error that already exists."}, {"type": "mc", "prompt": "Feedforward computes its command from:", "options": [{"t": "the measured error", "ok": false}, {"t": "the known reference, before any error forms", "ok": true}, {"t": "the sensor noise", "ok": false}, {"t": "the load only", "ok": false}], "ok": "Correct.", "no": "Feedforward is anticipatory \u2014 computed from the plan in advance."}, {"type": "mc", "prompt": "The inverse-model feedforward command is:", "options": [{"t": "Kp\u00b7e", "ok": false}, {"t": "m\u00b7q\u0308_d + b\u00b7q\u0307_d + \u2113", "ok": true}, {"t": "Ki\u00b7\u222be", "ok": false}, {"t": "q_d \u2212 q", "ok": false}], "ok": "Correct.", "no": "It supplies the planned inertia (m\u00b7q\u0308_d), damping (b\u00b7q\u0307_d), and load (\u2113) terms."}, {"type": "mc", "prompt": "Which Module 7 signals does the feedforward command consume?", "options": [{"t": "only q_d", "ok": false}, {"t": "q\u0307_d and q\u0308_d (plus q_d)", "ok": true}, {"t": "none", "ok": false}, {"t": "the camera image", "ok": false}], "ok": "Correct.", "no": "Feedforward uses the planned velocity q\u0307_d and acceleration q\u0308_d \u2014 exactly why M7 computed them."}, {"type": "mc", "prompt": "With a good model and no disturbance, feedforward alone:", "options": [{"t": "lags like feedback", "ok": false}, {"t": "tracks a fast trajectory with almost no lag", "ok": true}, {"t": "diverges", "ok": false}, {"t": "leaves a big offset", "ok": false}], "ok": "Correct.", "no": "Because it's computed from the plan, it doesn't wait for an error \u2014 near-zero following error."}, {"type": "short", "prompt": "Contrast what feedback and feedforward act on, and why only feedforward avoids lag on a known trajectory.", "model": "Feedback acts on the measured error \u2014 it must wait for the joint to fall behind before it does anything, so on a moving reference it is always a step behind (lag). Feedforward acts on the known reference: using the planned velocity and acceleration, it computes in advance the command needed to produce the planned motion and applies it the instant it's needed, before any error forms. On a known trajectory with a good model, feedforward therefore produces the right command at every moment without ever needing an error to exist, so there's almost no following error. Feedback reacts to the past; feedforward anticipates the future."}, {"type": "short", "prompt": "Write the inverse-model feedforward command and explain which Module 7 signal each term uses and what it physically supplies.", "model": "The command is u_ff = m\u00b7q\u0308_d + b\u00b7q\u0307_d + \u2113. The term m\u00b7q\u0308_d uses the planned acceleration q\u0308_d and supplies the force to produce that acceleration (overcoming inertia). The term b\u00b7q\u0307_d uses the planned velocity q\u0307_d and supplies the force to overcome viscous damping at that speed. The term \u2113 holds the known load. Together they are the command that, with a perfect model and no disturbance, would make the joint follow the planned trajectory exactly. The point is that q\u0307_d and q\u0308_d \u2014 the very signals Module 7 computed and feedback ignored \u2014 are exactly what feedforward needs, which is why the reference layer carries velocity and acceleration, not just position."}, {"type": "short", "prompt": "Why did Module 7 compute q\u0307_d and q\u0308_d instead of just q_d?", "model": "Because the controller needs them to anticipate. Position alone (q_d) tells the controller where to be, but not where it's heading or how hard to push to get there on time \u2014 so a position-only controller can only react after falling behind, producing following-error lag. The planned velocity q\u0307_d and acceleration q\u0308_d describe the motion's direction and effort in advance, and feed directly into the feedforward command (b\u00b7q\u0307_d and m\u00b7q\u0308_d). With them, the controller computes most of the command from the plan and tracks fast trajectories with almost no lag. So Module 7 computed the derivatives precisely so Module 8 could anticipate \u2014 it's the hinge that makes the two modules one system."}];

opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);

sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
