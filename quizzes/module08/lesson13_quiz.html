<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "The simplest way to control a multi-joint arm is:", "options": [{"t": "one controller for the whole arm", "ok": false}, {"t": "one independent PID per joint, each tracking its own q_d(t)", "ok": true}, {"t": "no controller", "ok": false}, {"t": "a single shared error", "ok": false}], "ok": "Correct.", "no": "Per-joint independent PID \u2014 coupling handled as a disturbance, no formal dynamics."}, {"type": "mc", "prompt": "Tracking differs from regulation because tracking:", "options": [{"t": "holds a fixed setpoint", "ok": false}, {"t": "follows a time-varying reference q_d(t)", "ok": true}, {"t": "needs no sensor", "ok": false}, {"t": "ignores the target", "ok": false}], "ok": "Correct.", "no": "Regulation holds a constant target; tracking follows a moving one."}, {"type": "mc", "prompt": "Feedback-only tracking of a fast reference shows:", "options": [{"t": "zero error", "ok": false}, {"t": "a following error (lag) that grows with speed", "ok": true}, {"t": "perfect anticipation", "ok": false}, {"t": "divergence", "ok": false}], "ok": "Correct.", "no": "Feedback reacts after the error forms, so it trails a moving target \u2014 more at higher speed."}, {"type": "mc", "prompt": "The inter-joint coupling is handled by:", "options": [{"t": "a mass matrix", "ok": false}, {"t": "treating it as a disturbance the per-joint feedback rejects", "ok": true}, {"t": "Coriolis terms", "ok": false}, {"t": "ignoring all dynamics forever", "ok": false}], "ok": "Correct.", "no": "We treat joints independently and let feedback reject coupling as a disturbance \u2014 no formal dynamics."}, {"type": "mc", "prompt": "Following error during fast motion can be reduced by raising gains, but:", "options": [{"t": "it reaches zero", "ok": false}, {"t": "it never reaches zero and raising gains risks instability/noise", "ok": true}, {"t": "it grows", "ok": false}, {"t": "gains have no effect", "ok": false}], "ok": "Correct.", "no": "Gains help a little but can't erase following error and spend stability margin."}, {"type": "short", "prompt": "Distinguish tracking a trajectory from regulating to a setpoint, and explain why feedback-only tracking lags.", "model": "Regulation holds a single fixed target \u2014 the controller drives the error to zero and a good PID eventually nails it. Tracking follows a target q_d(t) that changes every instant, straight from Module 7. Feedback-only tracking lags because feedback can only act on an error after it has formed: at each instant it corrects the gap that already opened while the reference has moved on. The result is a following error that persists throughout fast motion and grows with the reference's speed. No finite PID gains remove it, because feedback has no information about where the reference is heading \u2014 only where the joint is relative to where it was asked to be."}, {"type": "short", "prompt": "Why do we control each joint independently, and what do we deliberately ignore?", "model": "We run one PID per joint, each treating its joint as its own plant (integrator + disturbance + saturation) with its own gains. This is simple, robust, and standard, and it keeps us within the module's dynamics boundary. What we deliberately ignore is the inter-joint coupling \u2014 the way one joint's motion exerts forces on another (the mass-matrix and Coriolis effects of full manipulator dynamics). Instead of modelling that coupling, we let each joint's feedback reject it as just another disturbance. This is the intuition-first stance: feedback handles the coupling as an unmodelled effect, so we get whole-arm control without deriving formal dynamics."}, {"type": "short", "prompt": "What two signals does Module 7 provide that feedback ignores, and why will they matter?", "model": "Module 7 provides the planned velocity q\u0307_d(t) and acceleration q\u0308_d(t) of the trajectory, alongside the position q_d(t). Feedback-only control uses only q_d (the position target) and discards the velocity and acceleration. They matter because they describe where the reference is heading and how hard the joint must push to follow it on time \u2014 exactly the information needed to stop lagging. The following error exists precisely because feedback ignores them. The next lessons use q\u0307_d and q\u0308_d in a feedforward term that anticipates the motion, removing the lag that feedback alone cannot. This is why Module 7 bothered to compute the derivatives, not just positions."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
