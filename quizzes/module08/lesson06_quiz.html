<style>

*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

</style></head><body><div class="wrap">

<script>var questions=[{"type": "mc", "prompt": "Integral control commands based on:", "options": [{"t": "the current error only", "ok": false}, {"t": "the accumulated error over time (\u222be)", "ok": true}, {"t": "the error's rate \u0117", "ok": false}, {"t": "the reference", "ok": false}], "ok": "Correct.", "no": "Integral action sums error over time: u_I = Ki\u00b7\u222be."}, {"type": "mc", "prompt": "Integral action removes the steady-state offset because:", "options": [{"t": "it ignores the load", "ok": false}, {"t": "its only equilibrium is e = 0 (otherwise \u222be keeps growing)", "ok": true}, {"t": "it lowers Kp", "ok": false}, {"t": "it adds noise", "ok": false}], "ok": "Correct.", "no": "As long as any error persists, \u222be keeps accumulating and pushing \u2014 equilibrium requires e = 0."}, {"type": "mc", "prompt": "Integral windup occurs when:", "options": [{"t": "Ki is zero", "ok": false}, {"t": "the actuator saturates and \u222be keeps accumulating uselessly", "ok": true}, {"t": "the error is zero", "ok": false}, {"t": "Kd is too high", "ok": false}], "ok": "Correct.", "no": "During saturation the output can't grow, but \u222be balloons, causing a big overshoot later."}, {"type": "mc", "prompt": "An anti-windup clamp:", "options": [{"t": "increases the integral without limit", "ok": false}, {"t": "limits the accumulated integral term to prevent windup", "ok": true}, {"t": "removes the proportional term", "ok": false}, {"t": "disables feedback", "ok": false}], "ok": "Correct.", "no": "Clamping \u222be (or its contribution) stops it ballooning during saturation."}, {"type": "mc", "prompt": "A cost of adding integral action is:", "options": [{"t": "it speeds settling with no downside", "ok": false}, {"t": "it can add lag and overshoot", "ok": true}, {"t": "it removes the offset", "ok": false}, {"t": "it reduces noise", "ok": false}], "ok": "Correct.", "no": "Integral introduces phase lag and can cause overshoot/oscillation if too strong."}, {"type": "short", "prompt": "Explain why integral control eliminates the steady-state offset that proportional control leaves.", "model": "Integral action accumulates the error over time and commands Ki\u00b7\u222be. As long as any steady error persists, the integral keeps growing, so the command keeps increasing \u2014 it cannot reach equilibrium until the error is zero. In effect, the integrator supplies the constant command needed to balance the load without requiring a standing error to generate it (unlike proportional). So the only resting state is e = 0: the offset that P-only control structurally required is erased, because the integrator, not a residual error, now provides the steady holding command."}, {"type": "short", "prompt": "What is integral windup, and how does an anti-windup clamp address it?", "model": "Windup happens when the actuator saturates (hits its limit) during a large error: the joint can't move any faster, but the integrator keeps accumulating the persistent error, so \u222be balloons to a huge value. When the joint finally catches up, that enormous accumulated term keeps driving the output past the target, causing a large overshoot and slow recovery. An anti-windup clamp limits the integral term (caps \u222be or its contribution) so it can't balloon while saturated; when the actuator comes out of saturation the integrator is at a sane value and the response settles cleanly instead of overshooting badly."}, {"type": "short", "prompt": "Integral action removes offset but isn't free. What does it cost, and what does that imply for tuning?", "model": "Integral action adds phase lag: because it responds to accumulated past error rather than the present, it reacts slowly and can push the system past the target, adding overshoot and even oscillation if Ki is too large. It also can wind up against saturation. The tuning implication is that Ki should be large enough to erase the offset in reasonable time but small enough to avoid excessive overshoot and ringing, usually paired with derivative action to damp the overshoot integral introduces and with an anti-windup clamp to handle saturation. It's a balance, not a 'more is better' knob."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
