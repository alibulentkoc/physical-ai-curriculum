<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Tracking error is defined as:", "options": [{"t": "q \u2212 q_d", "ok": false}, {"t": "e = q_d \u2212 q (desired minus actual)", "ok": true}, {"t": "q_d + q", "ok": false}, {"t": "the velocity q\u0307", "ok": false}], "ok": "Correct.", "no": "Error e = q_d \u2212 q: how far the actual output is from the desired."}, {"type": "mc", "prompt": "A positive error e > 0 means the joint is:", "options": [{"t": "ahead of the target", "ok": false}, {"t": "behind the target (below q_d)", "ok": true}, {"t": "exactly on target", "ok": false}, {"t": "moving too fast", "ok": false}], "ok": "Correct \u2014 q is below q_d.", "no": "e = q_d \u2212 q > 0 means q < q_d: the joint hasn't reached the target yet."}, {"type": "mc", "prompt": "The error changing sign during a response indicates:", "options": [{"t": "a sensor fault", "ok": false}, {"t": "overshoot \u2014 the output crossed past the target", "ok": true}, {"t": "steady state", "ok": false}, {"t": "zero gain", "ok": false}], "ok": "Correct.", "no": "If e flips sign, q went past q_d \u2014 that's overshoot."}, {"type": "mc", "prompt": "Steady-state error is:", "options": [{"t": "the error at t=0", "ok": false}, {"t": "the residual error remaining after the transient settles", "ok": true}, {"t": "the peak error", "ok": false}, {"t": "the average velocity", "ok": false}], "ok": "Correct.", "no": "Steady-state error is what's left once the response has settled."}, {"type": "mc", "prompt": "Control acts to:", "options": [{"t": "maximize the error", "ok": false}, {"t": "drive the error toward zero", "ok": true}, {"t": "hold the error constant", "ok": false}, {"t": "measure the reference", "ok": false}], "ok": "Correct.", "no": "The controller's whole job is to push e toward zero."}, {"type": "short", "prompt": "Define tracking error and distinguish transient error from steady-state error.", "model": "Tracking error is e = q_d \u2212 q, the signed gap between the desired and actual joint position at each instant. Transient error is the error during the response \u2014 large at first as the joint moves toward the target, possibly crossing zero if it overshoots. Steady-state error is the residual error that remains after the transient has settled; ideally zero, but proportional-only control leaves a nonzero steady-state offset under a sustained load. Control works to shrink both, especially driving the steady-state error toward zero."}, {"type": "short", "prompt": "Why does the sign of the error matter to a controller?", "model": "The sign tells the controller which way to push. If e = q_d \u2212 q is positive the joint is below the target and the controller must drive it up; if negative it has overshot and must pull back. A controller that ignored sign couldn't correct in the right direction. The sign also reveals overshoot: when the error flips from positive to negative, the output has crossed past the target, which is the signal the derivative term uses to start braking."}, {"type": "short", "prompt": "A proportional controller settles with a small constant error under load. What does that tell you about the error over time?", "model": "It tells you the error has a nonzero steady-state value: after the transient dies out, e settles to a constant offset rather than zero. Physically, the proportional command Kp\u00b7e must supply the steady force to balance the load, so some error must persist to generate that command \u2014 the error can't reach zero or the command would vanish and the load would win. The error-over-time curve therefore starts large, decays through the transient, and levels off at a constant nonzero offset, which is what integral action is later introduced to remove."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);

if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
