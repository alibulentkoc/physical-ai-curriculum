:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}

<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "The four stages of the feedback loop are:", "options": [{"t": "plan, parameterize, validate, execute", "ok": false}, {"t": "sense, compare, correct, actuate", "ok": true}, {"t": "read, write, store, send", "ok": false}, {"t": "perceive, plan, act, learn", "ok": false}], "ok": "Correct.", "no": "Sense the output \u2192 compare to the reference (form error) \u2192 correct (controller) \u2192 actuate (plant)."}, {"type": "mc", "prompt": "The summing junction in the loop:", "options": [{"t": "adds two references", "ok": false}, {"t": "subtracts measured q from q_d to form the error", "ok": true}, {"t": "amplifies the command", "ok": false}, {"t": "stores the state", "ok": false}], "ok": "Correct.", "no": "It computes e = q_d \u2212 q, the error the controller acts on."}, {"type": "mc", "prompt": "The defining power of feedback is that it:", "options": [{"t": "plans faster", "ok": false}, {"t": "rejects disturbances it was never told about", "ok": true}, {"t": "needs no sensor", "ok": false}, {"t": "removes the plant", "ok": false}], "ok": "Correct.", "no": "Because it measures the actual output, feedback corrects unmodeled disturbances automatically."}, {"type": "mc", "prompt": "Compared with open-loop, a closed loop after a disturbance kick:", "options": [{"t": "drifts further", "ok": false}, {"t": "recovers back toward the reference", "ok": true}, {"t": "ignores it", "ok": false}, {"t": "stops", "ok": false}], "ok": "Correct.", "no": "Feedback senses the disturbance-induced error and corrects it, recovering to the reference."}, {"type": "mc", "prompt": "Which stage actually moves the joint?", "options": [{"t": "sense", "ok": false}, {"t": "compare", "ok": false}, {"t": "correct", "ok": false}, {"t": "actuate", "ok": true}], "ok": "Correct.", "no": "Actuate: the command drives the plant, producing motion."}, {"type": "short", "prompt": "Walk through the feedback loop stage by stage for a single joint.", "model": "Sense: a sensor measures the actual joint angle q. Compare: a summing junction subtracts q from the desired q_d to form the error e = q_d \u2212 q. Correct: the controller turns that error into a command u (e.g. u = Kp\u00b7e for proportional). Actuate: the command drives the plant (the joint), producing new motion and a new q. That q is sensed again, closing the loop, so the cycle repeats continuously and the error is driven toward zero \u2014 and any disturbance that perturbs q is automatically sensed and corrected."}, {"type": "short", "prompt": "Why can a feedback loop reject a disturbance it was never explicitly told about?", "model": "Because feedback acts on the measured outcome, not on a model of the disturbance. Whatever the cause \u2014 a gust, a payload, friction, a modeling error \u2014 its effect shows up as a change in the measured q, which changes the error e, which the controller immediately acts to correct. The loop doesn't need to know what caused the deviation; it only needs to see the deviation. That is the fundamental advantage over open-loop, which, blind to the actual output, cannot respond to anything it wasn't told about in advance."}, {"type": "short", "prompt": "Contrast how open-loop and closed-loop respond to a mid-motion disturbance kick.", "model": "Open-loop executes its precomputed command regardless of what happens; a disturbance knocks the joint off course and it stays off \u2014 the error from the kick persists to the end because nothing measures or corrects it. Closed-loop senses the resulting error the instant the kick perturbs q, the controller generates a corrective command, and the joint is driven back toward the reference, recovering to the target. The kick produces a transient bump in the closed-loop response but it settles back; in open-loop it produces a permanent offset."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);

sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
