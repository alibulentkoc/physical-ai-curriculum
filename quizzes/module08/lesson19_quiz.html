reduces (load+deadband)/Kp but can't reach zero, and large Kp costs stability elsewhere."}, {"type": "short", "prompt": "Why doesn't derivative action help a joint stuck short of its target?", "model": "Derivative action responds to the rate of change of the error. When the joint is stalled by deadband or stiction, it isn't moving and the error isn't changing, so the error rate is essentially zero and the derivative term contributes nothing. Derivative is useful for damping motion, not for breaking a static stall — that needs a term that keeps building command while the joint sits still, which is the integral."}, {"type": "short", "prompt": "Explain how integral action overcomes deadband and stiction to reach the target.", "model": "While the joint sits stuck with a small residual error, the integral term keeps accumulating that error over time: e_i grows steadily even though e is small. Eventually the integral contribution K_i·e_i lifts the total command past the actuator's deadband and the joint's stiction breakaway threshold, the joint lurches forward, and the error collapses toward zero. The integrator is the only term that treats 'small but persistent' as a reason to keep pushing, which is exactly what the final approach requires."}, {"type": "short", "prompt": "With deadband, stiction, and a load, PD stalls at |e| ≈ 0.44 while PID reaches |e| ≈ 0.003. Interpret this.", "model": "The only difference between the runs is the integral term, yet it converts a permanent 0.44-rad miss into a near-perfect landing — more than two orders of magnitude better. PD's proportional command shrinks below the deadband/breakaway as the joint nears the target, so it freezes short; the integrator accumulates the residual until it crosses the threshold and finishes the move. The deadband and stiction never changed; integral action is what makes the last millimetre reachable."}];
