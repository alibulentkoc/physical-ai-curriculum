<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "Derivative control commands based on:", "options": [{"t": "accumulated error \u222be", "ok": false}, {"t": "the rate of change of the error, \u0117", "ok": true}, {"t": "the current error only", "ok": false}, {"t": "the reference", "ok": false}], "ok": "Correct.", "no": "Derivative acts on how fast the error is changing: u_D = Kd\u00b7\u0117."}, {"type": "mc", "prompt": "The derivative term behaves like:", "options": [{"t": "an accelerator", "ok": false}, {"t": "a brake/damper that opposes fast changes", "ok": true}, {"t": "a constant offset", "ok": false}, {"t": "a noise source by design", "ok": false}], "ok": "Correct.", "no": "It opposes rapid approach, damping overshoot \u2014 a velocity brake."}, {"type": "mc", "prompt": "Adding derivative action lets you:", "options": [{"t": "lower Kp only", "ok": false}, {"t": "push Kp/Ki higher while staying stable (gain headroom)", "ok": true}, {"t": "remove the sensor", "ok": false}, {"t": "ignore the load", "ok": false}], "ok": "Correct.", "no": "Damping from D buys headroom to use stronger P/I without ringing."}, {"type": "mc", "prompt": "The main practical drawback of derivative action is:", "options": [{"t": "it removes offset", "ok": false}, {"t": "it amplifies measurement noise", "ok": true}, {"t": "it adds steady-state error", "ok": false}, {"t": "it slows the response", "ok": false}], "ok": "Correct.", "no": "Differentiating a noisy measurement magnifies the noise into a jittery command."}, {"type": "mc", "prompt": "A common remedy for derivative noise sensitivity is:", "options": [{"t": "raising Ki", "ok": false}, {"t": "filtering the derivative or taking derivative-on-measurement", "ok": true}, {"t": "removing the P term", "ok": false}, {"t": "disabling feedback", "ok": false}], "ok": "Correct.", "no": "Low-pass filtering the derivative (or using derivative-on-measurement) tames the noise."}, {"type": "short", "prompt": "Explain how derivative control damps overshoot, using a physical analogy.", "model": "Derivative control acts on \u0117, the rate the error is changing, like a brake that senses how fast you're approaching a stop. As the joint rushes toward the target the error is shrinking fast (\u0117 large and negative), so the derivative term produces an opposing command that slows the approach before the joint arrives \u2014 like easing the brake as you near a parking spot instead of slamming it at the line. This anticipatory braking bleeds off momentum ahead of the target, so the joint settles cleanly instead of overshooting and ringing the way pure P or PI does."}, {"type": "short", "prompt": "What does 'gain headroom' mean, and how does derivative action provide it?", "model": "Gain headroom is the room to use larger proportional and integral gains \u2014 for faster, tighter response \u2014 without the loop overshooting or going unstable. Strong P/I alone tends to ring because there's nothing to damp the energy they inject. Derivative action adds damping: it opposes fast error changes, so it absorbs the oscillation that high P/I would cause. With D present, you can raise Kp and Ki further before the response becomes oscillatory, getting a faster, more accurate loop than P/I could safely achieve alone. So D 'buys' the headroom to be more aggressive elsewhere."}, {"type": "short", "prompt": "Why does derivative control amplify measurement noise, and what can be done about it?", "model": "Differentiation responds to the rate of change of the signal, and noise is rapid small fluctuation \u2014 so taking the derivative of a noisy measurement multiplies those fast wiggles into large, jagged swings in the command (dividing tiny noise by the small time step blows it up). A smooth proportional command becomes a jittery derivative command. Remedies include low-pass filtering the derivative term so only genuine trends pass, taking the derivative of the measurement rather than the error (derivative-on-measurement, which also avoids spikes on setpoint changes), and keeping Kd modest. These keep the damping benefit while suppressing the noise it would otherwise amplify."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
