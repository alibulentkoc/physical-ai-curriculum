: false}], "ok": "RMS ≈ 0.0007 (essentially perfect)", "no": "At a high enough rate the discrete execution reproduces the continuous design."}, {"type": "short", "prompt": "List the three steps the periodic loop performs each period and what bounds them.", "model": "Sense (read the measured state), compute (feedforward + PID through the actuator), actuate (send the command). They are bounded by the per-period timing budget: their total must fit within the control period T_c."}, {"type": "short", "prompt": "Explain the two opposing pressures that bound the choice of control rate.", "model": "A lower bound from stability: too low a rate adds loop delay and destabilises (Unit 6). An upper bound from the budget: too high a rate shrinks the per-period time available to finish the work. A good rate sits between them."}, {"type": "short", "prompt": "Why can a high-rate periodic loop be treated like the continuous controller you designed?", "model": "Because it acts at closely spaced sample instants and holds the command between them; at a high rate the held-between-samples staleness is negligible, so the sampled loop behaves like the continuous one. (Formal sampled-data analysis is out of scope.)"}];
