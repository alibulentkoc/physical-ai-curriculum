</style></head><body><div class="wrap">

<script>var questions=[{"type": "mc", "prompt": "Why do multi-joint point-to-point moves use one common time scaling?", "options": [{"t": "to save memory", "ok": false}, {"t": "so the joints start and finish together as one coordinated motion", "ok": true}, {"t": "to make the tool path straight", "ok": false}, {"t": "to avoid solving IK", "ok": false}], "ok": "Correct \u2014 a shared clock keeps the move coordinated.", "no": "A common time scaling makes all joints start and finish together \u2014 a single coordinated motion."}, {"type": "mc", "prompt": "How is the synchronizing duration T* computed?", "options": [{"t": "the minimum over joints of each joint's minimum time", "ok": false}, {"t": "the maximum over joints of each joint's minimum feasible time", "ok": true}, {"t": "the average of the joint times", "ok": false}, {"t": "the sum of the joint times", "ok": false}], "ok": "Correct \u2014 the slowest-limited joint sets the pace.", "no": "T* = max over joints of T_i^min: the slowest-limited joint sets the common duration."}, {"type": "mc", "prompt": "After synchronization, which joint runs at its limit?", "options": [{"t": "all of them", "ok": false}, {"t": "none of them", "ok": false}, {"t": "the bottleneck (slowest-limited) joint", "ok": true}, {"t": "the smallest-displacement joint", "ok": false}], "ok": "Correct \u2014 only the bottleneck rides its limit; the rest are stretched below it.", "no": "The bottleneck joint runs at its limit; every other joint runs comfortably below it."}, {"type": "mc", "prompt": "With unequal per-joint limits, the bottleneck is:", "options": [{"t": "always the largest-displacement joint", "ok": false}, {"t": "always joint 1", "ok": false}, {"t": "whichever joint needs the most time (largest limit-normalized displacement)", "ok": true}, {"t": "random", "ok": false}], "ok": "Correct \u2014 compute each T_i^min and take the max; a low-limit joint can dominate.", "no": "The bottleneck is the joint needing the most time; with unequal limits it may not be the largest-displacement joint."}, {"type": "mc", "prompt": "What is lost if each joint uses its own minimum time instead of T*?", "options": [{"t": "nothing", "ok": false}, {"t": "coordinated arrival \u2014 joints finish at different times and the configuration-space path bends", "ok": true}, {"t": "the ability to reach the goal", "ok": false}, {"t": "the smoothness of each joint", "ok": false}], "ok": "Correct \u2014 independent timing breaks coordination.", "no": "Independent timing makes joints finish at different times and bends the configuration-space path."}, {"type": "short", "prompt": "Describe how to find the synchronizing duration for a multi-joint move, and what each joint does afterward.", "model": "For each joint compute its minimum feasible time T_i^min from its displacement and limit (for a quintic, 15|\u0394q_i|/(8\u00b7v_max)). The synchronizing duration is T* = max_i T_i^min \u2014 the slowest-limited joint. Then every joint runs its polynomial over the same [0,T*]: the bottleneck joint runs at its limit, and all faster joints are stretched (slowed) to finish at the same time, giving coordinated arrival."}, {"type": "short", "prompt": "Why might a small-displacement joint be the bottleneck?", "model": "Because the bottleneck depends on displacement relative to the joint's limit, not displacement alone. A joint with a small displacement but a very low velocity (or acceleration) limit can need more time than a large-displacement joint with a high limit. Computing each joint's T_i^min and taking the maximum reveals the true bottleneck."}, {"type": "short", "prompt": "Explain the difference between coordinated (synchronized) and independent multi-joint motion.", "model": "Coordinated: all joints share one time scaling over a common duration, so their ratios are fixed for all t and they start and arrive together \u2014 the configuration sweeps the straight joint-space segment. Independent: each joint runs on its own clock and finishes whenever it can, so they arrive at different times, the arm appears to settle joint-by-joint, and the configuration-space path bends."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
