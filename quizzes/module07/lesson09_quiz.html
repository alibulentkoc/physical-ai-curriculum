ok": true}, {"t": "it is always time-optimal", "ok": false}, {"t": "the orientation is always correct", "ok": false}], "ok": "Correct \u2014 joint-feasibility is automatic; tool-path safety is not.", "no": "Each joint just runs a smooth bounded polynomial, so the motion is joint-feasible (not necessarily collision-free)."}, {"type": "mc", "prompt": "When is a joint move the right choice?", "options": [{"t": "when the tool must follow a straight line", "ok": false}, {"t": "when only the endpoints matter and the tool path is irrelevant", "ok": true}, {"t": "when inserting a peg", "ok": false}, {"t": "when welding a seam", "ok": false}], "ok": "Correct \u2014 joint moves shine for gross repositioning where the path doesn't matter.", "no": "Joint moves suit repositioning where only the endpoints matter; tool-path tasks need Cartesian moves."}, {"type": "short", "prompt": "Explain why a joint-space move is straight in joint space but curved in task space.", "model": "The configuration moves along the straight segment q(t)=q0+(qf\u2212q0)s(t) \u2014 a straight line in joint space. The tool position is f(q(t)), and forward kinematics f is nonlinear (it involves sines and cosines of the joint angles). A nonlinear map sends a straight line to a curve, so the tool sweeps a curved path even though every joint moves monotonically and smoothly."}, {"type": "short", "prompt": "Two joints move \u0394q1=60\u00b0 and \u0394q2=30\u00b0 over the same T with quintics. Compare their peak speeds and say which joint matters most for limits.", "model": "Peak speed scales with displacement: \u1e61max is the same for both (same T, same profile), so joint 1's peak is twice joint 2's (60\u00b0 vs 30\u00b0). The larger-displacement joint (joint 1) reaches the higher speed and acceleration, so it is the one that will hit a velocity/acceleration limit first \u2014 it drives synchronization and feasibility."}, {"type": "short", "prompt": "Give one task where a joint move is appropriate and one where it is not, with reasons.", "model": "Appropriate: gross repositioning of the harvester from stow to a new plant \u2014 only the endpoints matter, and the joint move is fast and always joint-feasible. Not appropriate: the final straight approach onto a fruit \u2014 the tool must travel a controlled straight path, which a curved joint move can't guarantee; that needs a Cartesian (MoveL) trajectory."}];
