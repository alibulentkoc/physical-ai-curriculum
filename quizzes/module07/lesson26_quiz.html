.wrap{max-width:760px;margin:0 auto;padding:6px}

<script>var questions=[{"type": "mc", "prompt": "Validation must check the reference:", "options": [{"t": "at the endpoints only", "ok": false}, {"t": "at every point along the whole trajectory (dense sampling)", "ok": true}, {"t": "at the midpoint", "ok": false}, {"t": "once at the start", "ok": false}], "ok": "Correct \u2014 dense sampling catches interior violations.", "no": "A violation can occur at one interior instant; validation samples densely along the whole reference."}, {"type": "mc", "prompt": "The overall validation verdict is:", "options": [{"t": "the first check", "ok": false}, {"t": "valid = AND of all the individual checks", "ok": true}, {"t": "the average", "ok": false}, {"t": "the last check", "ok": false}], "ok": "Correct \u2014 every check must pass.", "no": "valid = all(checks): every sub-check must pass for the trajectory to be valid."}, {"type": "mc", "prompt": "A failed check is useful because it:", "options": [{"t": "stops everything silently", "ok": false}, {"t": "localizes the problem and dictates the remedy", "ok": true}, {"t": "is ignored", "ok": false}, {"t": "means the goal is wrong", "ok": false}], "ok": "Correct \u2014 the failing check names the remedy.", "no": "The failing check localizes the problem (re-time vs re-plan vs fix construction)."}, {"type": "mc", "prompt": "Validation is the gate between:", "options": [{"t": "two joints", "ok": false}, {"t": "planning and execution", "ok": true}, {"t": "start and goal", "ok": false}, {"t": "two obstacles", "ok": false}], "ok": "Correct \u2014 nothing runs unvalidated.", "no": "Validation sits between planning (candidate produced) and execution (it runs)."}, {"type": "mc", "prompt": "Which is in the validation suite?", "options": [{"t": "torque limit", "ok": false}, {"t": "collision-free along the whole arm", "ok": true}, {"t": "energy budget", "ok": false}, {"t": "motor temperature", "ok": false}], "ok": "Correct \u2014 whole-arm collision-free is a validation check.", "no": "Collision-free (whole arm), plus endpoints, continuity, velocity/acceleration limits, reachability."}, {"type": "short", "prompt": "List the checks in the complete validation suite and how the overall verdict is formed.", "model": "Endpoints match the requested start/goal; boundary rest (zero velocity/acceleration at the ends for rest-to-rest); continuity (no position/velocity/acceleration jumps); within the velocity limit; within the acceleration limit; collision-free for the whole arm along the path; and reachable at every configuration. The overall verdict is valid = AND of all of these \u2014 every check must pass, evaluated by dense sampling. A failed check names the remedy."}, {"type": "short", "prompt": "A reference fails validation only on the velocity check. What's the remedy, and why don't the other checks change?", "model": "A velocity violation is a timing problem, so the remedy is to re-time (slow down / time-scale) the trajectory \u2014 not re-plan. The collision-free and reachability checks are about geometry (the path's shape), which slowing down doesn't change, so they remain True; only the speed-dependent checks were affected. This is the localization benefit: the failing check tells you it's a timing fix, and the unchanged checks confirm the geometry was fine."}, {"type": "short", "prompt": "Why must validation include a continuity check even when every individual configuration is feasible and collision-free?", "model": "A trajectory can be feasible and collision-free at every sampled instant yet still have a discontinuity at a segment join \u2014 e.g. a velocity jump where two pieces meet with mismatched speeds. No single-point check catches this, because each point individually is fine; only comparing successive samples reveals the leap. A velocity discontinuity is dangerous: it demands an instantaneous change the hardware can't deliver and the tracker can't follow, so validation must test continuity explicitly."}];

questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);

sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
