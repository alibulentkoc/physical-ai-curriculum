<script>var questions=[{"type": "mc", "prompt": "How many boundary conditions does a cubic time scaling satisfy?", "options": [{"t": "2 (positions only)", "ok": false}, {"t": "4 (positions and velocities at both ends)", "ok": true}, {"t": "6 (also accelerations)", "ok": false}, {"t": "8", "ok": false}], "ok": "Correct \u2014 a cubic has 4 coefficients for 4 endpoint conditions.", "no": "A cubic matches start/end position and velocity (4 conditions)."}, {"type": "mc", "prompt": "Why does the quintic give C\u00b2 where the cubic gives only C\u00b9?", "options": [{"t": "the quintic is shorter", "ok": false}, {"t": "the quintic additionally matches endpoint accelerations (set to 0), removing the acceleration jump", "ok": true}, {"t": "the cubic ignores position", "ok": false}, {"t": "the quintic is linear", "ok": false}], "ok": "Correct.", "no": "The quintic's two extra conditions zero the endpoint accelerations \u2192 continuous acceleration \u2192 C\u00b2."}, {"type": "mc", "prompt": "Compared to the cubic over the same move and time, the quintic:", "options": [{"t": "finishes sooner", "ok": false}, {"t": "has a slightly higher peak velocity/acceleration in the middle", "ok": true}, {"t": "has lower peaks everywhere", "ok": false}, {"t": "is identical", "ok": false}], "ok": "Correct \u2014 gentler ends are paid for with higher mid-move peaks.", "no": "The quintic trades higher mid-move peaks for zero endpoint acceleration."}, {"type": "mc", "prompt": "A cubic rest-to-rest move has endpoint acceleration:", "options": [{"t": "zero", "ok": false}, {"t": "nonzero ($\\pm 6\\,\\Delta/T^2$ for displacement $\\Delta$)", "ok": true}, {"t": "infinite", "ok": false}, {"t": "equal to the velocity", "ok": false}], "ok": "Correct.", "no": "The cubic leaves $\\ddot q(0)=+6\\Delta/T^2$ and $\\ddot q(T)=-6\\Delta/T^2$ \u2014 the jump."}, {"type": "mc", "prompt": "To also make endpoint jerk continuous, you would use a polynomial of degree:", "options": [{"t": "3 (cubic)", "ok": false}, {"t": "5 (quintic)", "ok": false}, {"t": "7 (septic)", "ok": true}, {"t": "1 (linear)", "ok": false}], "ok": "Correct \u2014 matching position+velocity+acceleration+jerk at both ends needs 8 conditions \u2192 degree 7.", "no": "Adding endpoint jerk conditions needs a degree-7 (septic) polynomial."}, {"type": "short", "prompt": "How many boundary conditions does a cubic satisfy, and which? A quintic?", "model": "A cubic satisfies 4: start and end position and start and end velocity. A quintic satisfies 6: also start and end acceleration. Each matched endpoint derivative consumes one coefficient and buys one rung of continuity."}, {"type": "short", "prompt": "Why does the cubic leave an acceleration jump while the quintic does not?", "model": "The cubic only constrains endpoint position and velocity, so its endpoint acceleration is whatever falls out \u2014 nonzero ($\\pm6\\Delta/T^2$), jumping from the resting zero. The quintic adds endpoint-acceleration conditions (=0), so acceleration is continuous with rest \u2192 C\u00b2, no jump."}, {"type": "short", "prompt": "You must hand off at t=T with q_f, a nonzero velocity v_f, and zero acceleration. Which degree and how many conditions?", "model": "Six boundary conditions: position, velocity, acceleration at t=0 (0,0,0 for rest start) and at t=T (q_f, v_f, 0). That is a quintic (degree 5). 'Stop at the handoff' would be wrong because the following segment is already cruising; matching v_f keeps the motion C\u00b2 across the handoff."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
