<style>

*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<script>var questions=[{"type": "mc", "prompt": "Stretching a trajectory's duration by a factor k changes the peaks how?", "options": [{"t": "velocity \u00d7k, acceleration \u00d7k\u00b2", "ok": false}, {"t": "velocity \u00f7k, acceleration \u00f7k\u00b2", "ok": true}, {"t": "both \u00f7k", "ok": false}, {"t": "both unchanged", "ok": false}], "ok": "Correct \u2014 velocity by 1/k, acceleration by 1/k\u00b2.", "no": "Uniform time scaling divides velocity by k and acceleration by k\u00b2."}, {"type": "mc", "prompt": "Under uniform time scaling, the path is:", "options": [{"t": "shortened", "ok": false}, {"t": "unchanged (only the clock rescales)", "ok": true}, {"t": "made straight", "ok": false}, {"t": "made curved", "ok": false}], "ok": "Correct \u2014 same geometry, different timing.", "no": "The path (geometry) is unchanged; only the time mapping s(t) is stretched."}, {"type": "mc", "prompt": "The minimum stretch factor that makes a move feasible is:", "options": [{"t": "the smaller of the velocity and acceleration requirements", "ok": false}, {"t": "the larger of them (the binding constraint)", "ok": true}, {"t": "their sum", "ok": false}, {"t": "always the velocity one", "ok": false}], "ok": "Correct \u2014 take the larger (binding) requirement.", "no": "Take the larger of v\u2080/v_lim and \u221a(a\u2080/a_lim) \u2014 the binding constraint."}, {"type": "mc", "prompt": "Why does slowing down NOT fix a reachability problem?", "options": [{"t": "it does fix it", "ok": false}, {"t": "an unreachable point stays unreachable no matter the speed", "ok": true}, {"t": "reachability is about acceleration", "ok": false}, {"t": "slowing changes the path", "ok": false}], "ok": "Correct \u2014 reachability is geometric, not about speed.", "no": "Slowing only beats speed/accel limits; an unreachable point is geometric and stays unreachable."}, {"type": "mc", "prompt": "Applying different stretch factors to different joints would:", "options": [{"t": "improve feasibility", "ok": false}, {"t": "break synchronization (joints finish at different times)", "ok": true}, {"t": "shorten the path", "ok": false}, {"t": "reduce acceleration only", "ok": false}], "ok": "Correct \u2014 use one common factor to stay synchronized.", "no": "Per-joint factors desynchronize the move; use one common (max binding) factor."}, {"type": "short", "prompt": "Explain uniform time scaling with the 'slow-motion video' analogy, including what changes and what doesn't.", "model": "Playing a motion's video at half speed shows the exact same path \u2014 every configuration, in the same order \u2014 but everything moves slower: velocities halve and accelerations drop even more. Uniform time scaling is exactly this: replace the clock so the trajectory takes k times as long. The geometry q(s) is unchanged; only s(t) stretches. Velocities scale by 1/k and accelerations by 1/k\u00b2, so a large enough k brings any speed/acceleration peaks under the limits without touching the path."}, {"type": "short", "prompt": "Give the rule for the minimum feasible stretch factor and why it always works for speed/acceleration limits.", "model": "Need v\u2080/k \u2264 v_lim and a\u2080/k\u00b2 \u2264 a_lim, i.e. k \u2265 v\u2080/v_lim (velocity) and k \u2265 \u221a(a\u2080/a_lim) (acceleration); take the larger (binding) one. It always works because as k\u2192\u221e both v\u2080/k and a\u2080/k\u00b2 \u2192 0, so any positive limits can be met by slowing enough. This is special to velocity/acceleration limits \u2014 it cannot fix a geometric (reachability or joint-angle) violation."}, {"type": "short", "prompt": "Why is uniform time scaling the safest first fix to try for an infeasible move?", "model": "Because it changes nothing about where the robot goes \u2014 the path, the approach, the via-points are all identical \u2014 it only rescales the clock. So it can't introduce a new collision or miss the target; it just makes the existing, correct motion gentler. For speed/acceleration infeasibility it's guaranteed to work with a single multiply on the time axis (the global feed-rate/override knob), which is why it's the first thing to reach for."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);

opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
