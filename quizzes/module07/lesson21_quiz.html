</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "A configuration-space obstacle (C-obstacle) is:", "options": [{"t": "the obstacle's shape in the workspace", "ok": false}, {"t": "the set of configurations where any part of the arm collides", "ok": true}, {"t": "the goal region", "ok": false}, {"t": "the joint limits", "ok": false}], "ok": "Correct \u2014 every colliding configuration.", "no": "The C-obstacle is the set of all configurations where any part of the arm intersects the obstacle."}, {"type": "mc", "prompt": "In configuration space, the robot becomes and a motion becomes:", "options": [{"t": "a region; a region", "ok": false}, {"t": "a single point; a curve", "ok": true}, {"t": "a line; a point", "ok": false}, {"t": "an obstacle; a path", "ok": false}], "ok": "Correct \u2014 robot = point, motion = curve.", "no": "The robot is a single point in C-space; a motion is a curve, collision-free if it stays in C_free."}, {"type": "mc", "prompt": "Why can a round workspace obstacle produce a complicated, non-convex C-obstacle?", "options": [{"t": "measurement error", "ok": false}, {"t": "the nonlinear map from joint angles to arm shape distorts it", "ok": true}, {"t": "the obstacle moves", "ok": false}, {"t": "the grid is coarse", "ok": false}], "ok": "Correct \u2014 the nonlinear arm map (same nonlinearity that curves tool paths).", "no": "The map from joint angles to the arm's shape is nonlinear, distorting a round obstacle into a curved C-space band."}, {"type": "mc", "prompt": "Motion planning, in C-space terms, is:", "options": [{"t": "building the whole obstacle", "ok": false}, {"t": "finding a curve in free space from start to goal", "ok": true}, {"t": "solving IK once", "ok": false}, {"t": "minimizing torque", "ok": false}], "ok": "Correct \u2014 a path through free space.", "no": "Planning = find a curve in C_free from the start configuration to the goal configuration."}, {"type": "mc", "prompt": "Two configurations are both collision-free, but the straight C-space segment between them:", "options": [{"t": "is always free too", "ok": false}, {"t": "can still be blocked by the C-obstacle", "ok": true}, {"t": "is always blocked", "ok": false}, {"t": "doesn't exist", "ok": false}], "ok": "Correct \u2014 free endpoints don't imply a free connecting segment.", "no": "Both endpoints free doesn't mean the direct segment is free; it can cross the C-obstacle."}, {"type": "short", "prompt": "Explain configuration space using the 'arm avoiding a pole becomes a dot avoiding a blob' picture.", "model": "Many arm poses (shoulder, elbow combinations) bump a given pole; charting shoulder vs elbow and shading every colliding pair makes a blob \u2014 the pole's forbidden region. Now forget the extended arm: you're a single dot on that chart at your current angles. To move your hand without hitting the pole, just slide the dot from its position to the target without entering the blob. The awkward arm-dodging-a-pole problem becomes 'move a point around a region' \u2014 that's configuration space, and it's why planning is tractable."}, {"type": "short", "prompt": "Why is configuration space the right place to reason about whole-arm collisions?", "model": "Because a C-obstacle is defined by whether ANY part of the arm collides, not just the gripper \u2014 so a single point in C-space already encodes the entire arm's clearance. Reasoning in the workspace means repeatedly checking an extended, jointed body against the obstacle for every pose; reasoning in C-space collapses that to point-vs-region. The whole arm's safety is captured by where the configuration point sits relative to the forbidden region."}, {"type": "short", "prompt": "Two free configurations have a blocked direct C-space segment. What does this imply for planning, and could a path fail to exist?", "model": "It implies a straight joint move between them would drive a link through the obstacle, so the planner must find a detour \u2014 a curved path through C_free around the C-obstacle. Whether a path exists at all depends on the connectivity of the free space: if the C-obstacle separates the start's free region from the goal's (disconnects C_free), no collision-free path exists, and one must move the obstacle, change the task, or use a different IK branch to open a route."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
