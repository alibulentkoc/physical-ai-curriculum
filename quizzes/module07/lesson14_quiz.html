*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "A Cartesian straight-line position trajectory is realized by:", "options": [{"t": "one IK solve at the goal", "ok": false}, {"t": "sampling the straight tool path in time and solving IK at each sample", "ok": true}, {"t": "a single joint move", "ok": false}, {"t": "interpolating the joint angles", "ok": false}], "ok": "Correct \u2014 sample the line, IK each sample.", "no": "Sample the straight tool path in time and solve IK at each sample (interpolate-then-IK)."}, {"type": "mc", "prompt": "What is an IK branch?", "options": [{"t": "a code path", "ok": false}, {"t": "one of the distinct configurations (e.g. elbow-up/down) that reach the same tool pose", "ok": true}, {"t": "a singularity", "ok": false}, {"t": "a joint limit", "ok": false}], "ok": "Correct \u2014 e.g. elbow-up vs elbow-down for the 2R arm.", "no": "An IK branch is one of the distinct solutions (elbow-up/down) reaching the same tool pose."}, {"type": "mc", "prompt": "If the IK branch flips mid-path, the joint trajectory:", "options": [{"t": "stays smooth", "ok": false}, {"t": "jumps discontinuously (a sudden reconfiguration)", "ok": true}, {"t": "reaches the goal faster", "ok": false}, {"t": "becomes straight", "ok": false}], "ok": "Correct \u2014 a branch flip is a joint-space discontinuity.", "no": "A branch flip makes q(t) jump by the inter-branch distance \u2014 a discontinuity to avoid."}, {"type": "mc", "prompt": "How can the per-sample IK keep a consistent branch?", "options": [{"t": "pick any solution each time", "ok": false}, {"t": "choose the solution nearest the previous sample (or fix the elbow sign)", "ok": true}, {"t": "always pick elbow-down", "ok": false}, {"t": "ignore the previous sample", "ok": false}], "ok": "Correct \u2014 nearest-to-previous (or fixed elbow) keeps q(t) continuous.", "no": "Choose the IK solution closest to the previous configuration, or fix the elbow sign for the whole path."}, {"type": "mc", "prompt": "A smooth tool path guarantees a smooth joint path only if:", "options": [{"t": "the arm is fast", "ok": false}, {"t": "the branch is consistent and the path avoids singularities", "ok": true}, {"t": "the duration is long", "ok": false}, {"t": "the tool is light", "ok": false}], "ok": "Correct \u2014 branch consistency and singularity avoidance are both required.", "no": "Branch flips and singularities can break joint smoothness even on a smooth tool path."}, {"type": "short", "prompt": "Why does a smooth tool path not guarantee a smooth joint path?", "model": "Because the joint motion comes from IK applied along the path, and IK has two failure modes that a smooth tool path doesn't prevent. First, a branch flip (elbow-up to elbow-down) makes the joints jump discontinuously even though the tool point moved smoothly. Second, near a singularity the joints stay continuous but the joint rates needed to keep the tool on the line spike. So smooth p(t) needs a consistent IK branch and a singularity-free path to yield smooth q(t)."}, {"type": "short", "prompt": "Describe how to keep IK branch consistency and why it matters.", "model": "At each sample, choose the IK solution closest to the previous configuration (minimizing \u2016q_k\u2212q_{k\u22121}\u2016), or simply fix the elbow sign for the whole path. This keeps q(t) continuous. It matters because a branch flip is a large instantaneous jump in joint angles \u2014 the velocity layer would have to execute an impossible instantaneous reconfiguration, and physically the arm would convulse, possibly colliding, even though the tool path was perfectly smooth."}, {"type": "short", "prompt": "Why must every sample on a straight-line path be reachable, and what should the loop do if one isn't?", "model": "Each sampled tool point needs an IK solution; if any point lies outside the workspace, no joint configuration realizes it and the straight-line move is infeasible there. Reachable endpoints don't guarantee a reachable line. The loop should detect the unreachable sample and fail cleanly (raise an error / reject the move) rather than return an invalid or silently wrong configuration \u2014 so the planner can reroute (add a via-point) or reorient."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
