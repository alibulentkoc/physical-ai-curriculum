<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}
textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:9px;padding:8px;font-family:inherit;font-size:14px;resize:vertical}
.btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:8px}.btn:hover{background:var(--soft)}
.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Why can't a joint move guarantee a straight tool path?", "options": [{"t": "joints are too slow", "ok": false}, {"t": "forward kinematics is nonlinear, so straight joint motion curves the tool path", "ok": true}, {"t": "the tool is too heavy", "ok": false}, {"t": "IK is unavailable", "ok": false}], "ok": "Correct \u2014 straight in joints, curved in space.", "no": "Forward kinematics is nonlinear, so a joint move (straight in joints) curves the tool path."}, {"type": "mc", "prompt": "The basic Cartesian straight-line recipe is:", "options": [{"t": "solve IK once and run a joint move", "ok": false}, {"t": "interpolate the tool path, then solve IK at each sample", "ok": true}, {"t": "average the start and goal angles", "ok": false}, {"t": "use the velocity layer alone", "ok": false}], "ok": "Correct \u2014 interpolate the tool path, IK each sample.", "no": "Cartesian recipe: interpolate p(t)=p0+(p1\u2212p0)s(t), then solve IK at each sample."}, {"type": "mc", "prompt": "What does Cartesian planning gain over a joint move?", "options": [{"t": "lower computation", "ok": false}, {"t": "control of the tool's path in space (e.g. a straight line)", "ok": true}, {"t": "guaranteed feasibility", "ok": false}, {"t": "no need for IK", "ok": false}], "ok": "Correct \u2014 it controls the tool path, at the cost of computation and new failure modes.", "no": "Cartesian planning controls the tool path (e.g. straight line); it costs more computation and adds failure modes."}, {"type": "mc", "prompt": "Which is a cost/failure mode introduced by Cartesian planning?", "options": [{"t": "the tool path is always curved", "ok": false}, {"t": "a straight path can leave the workspace even with reachable endpoints", "ok": true}, {"t": "joints can't be synchronized", "ok": false}, {"t": "orientation can't be set", "ok": false}], "ok": "Correct \u2014 reachability along the path is not guaranteed by reachable endpoints.", "no": "A straight line between two reachable points can pass outside the workspace (and near singularities)."}, {"type": "mc", "prompt": "For the same endpoints, in a Cartesian move what is straight?", "options": [{"t": "the joint path", "ok": false}, {"t": "the tool path", "ok": true}, {"t": "both", "ok": false}, {"t": "neither", "ok": false}], "ok": "Correct \u2014 Cartesian straightens the tool path; the joint path curves.", "no": "Cartesian moves make the tool path straight; the joint path becomes the curve."}, {"type": "short", "prompt": "Why do some tasks require planning in Cartesian space rather than joint space?", "model": "Because the task constrains the tool's path through space, not just the endpoints \u2014 e.g. approaching a fruit straight along its stem axis, inserting a peg, or following a weld seam. A joint move only guarantees smooth joint motion and leaves the tool path curved, so it can't promise 'straight in' or 'along this line.' Cartesian planning designs the tool path directly and derives the joint motion from it via IK."}, {"type": "short", "prompt": "State the interpolate-then-IK recipe and the three costs it carries.", "model": "Recipe: define the tool path p(t)=p0+(p1\u2212p0)s(t) with a smooth time scaling s(t), then solve inverse kinematics q(t)=IK(p(t)) at each sampled time. Costs: (1) IK must be solved many times along the path (computation); (2) every path point must be reachable \u2014 a straight line can leave the workspace even with reachable endpoints; (3) the path can pass near a singularity, where the required joint rates blow up."}, {"type": "short", "prompt": "Both endpoints of a straight-line move are reachable, yet the move fails. How?", "model": "The straight line between the two reachable endpoints can pass through a point outside the workspace \u2014 for the planar arm, through the inner hole (r < L1\u2212L2) or beyond the reach (r > L1+L2). Reachability of the endpoints doesn't imply reachability of every point on the connecting line, so IK fails partway and the Cartesian move is infeasible (even though a joint move between the same endpoints would succeed)."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});

</script></body></html>
