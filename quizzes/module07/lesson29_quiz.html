<script>var questions=[{"type": "mc", "prompt": "The four stages of the workflow, in order, are:", "options": [{"t": "Validate, Plan, Execute, Parameterize", "ok": false}, {"t": "Plan, Parameterize, Validate, Execute", "ok": true}, {"t": "Execute, Validate, Parameterize, Plan", "ok": false}, {"t": "Parameterize, Plan, Validate, Execute", "ok": false}], "ok": "Correct.", "no": "Plan \u2192 Parameterize \u2192 Validate \u2192 Execute."}, {"type": "mc", "prompt": "PLAN produces, and PARAMETERIZE produces:", "options": [{"t": "a reference; a path", "ok": false}, {"t": "a collision-free path; a timed trajectory", "ok": true}, {"t": "a verdict; a path", "ok": false}, {"t": "motion; a path", "ok": false}], "ok": "Correct.", "no": "PLAN \u2192 a collision-free path; PARAMETERIZE \u2192 a timed trajectory."}, {"type": "mc", "prompt": "Each stage maps to:", "options": [{"t": "a random method", "ok": false}, {"t": "an earlier unit (Plan=U6, Parameterize=U2-5, Validate=U7, Execute=U7 boundary\u2192M8)", "ok": true}, {"t": "Module 8", "ok": false}, {"t": "a single function unrelated to the units", "ok": false}], "ok": "Correct.", "no": "PLAN=Unit 6, PARAMETERIZE=Units 2-5, VALIDATE=Unit 7, EXECUTE=discretize+handoff."}, {"type": "mc", "prompt": "'Execute' within Module 7 means:", "options": [{"t": "closed-loop tracking", "ok": false}, {"t": "open-loop playback of the reference + handoff to Module 8", "ok": true}, {"t": "computing torques", "ok": false}, {"t": "commanding motors with feedback", "ok": false}], "ok": "Correct \u2014 open-loop reference handoff.", "no": "Execute = open-loop playback + handing the reference to Module 8; tracking is Module 8."}, {"type": "mc", "prompt": "The pipeline composes cleanly because:", "options": [{"t": "stages are independent of each other", "ok": false}, {"t": "each stage consumes the previous stage's output", "ok": true}, {"t": "there is only one stage", "ok": false}, {"t": "it skips validation", "ok": false}], "ok": "Correct.", "no": "Each stage's output is the next stage's input: path \u2192 trajectory \u2192 validated reference \u2192 motion."}, {"type": "short", "prompt": "Name the four stages and what each produces.", "model": "PLAN produces a collision-free geometric path (from the task's start and goal, around obstacles). PARAMETERIZE produces a timed trajectory by assigning a time scaling that respects the velocity/acceleration limits. VALIDATE produces a validated reference (or a rejection) by running the complete check suite. EXECUTE produces motion by discretizing and handing off the validated reference \u2014 in Module 7 this is open-loop playback plus delivery to Module 8, which does the closed-loop tracking."}, {"type": "short", "prompt": "Map each stage to the earlier unit that implements it.", "model": "PLAN is Unit 6 (configuration space, collision checking, RRT, smoothing). PARAMETERIZE is Units 2-5 (polynomial/spline time scaling and the feasibility time-scaling that respects limits). VALIDATE is Unit 7 (the complete validation suite). EXECUTE is the Unit 7 boundary work \u2014 discretizing the reference (7.4) and handing it off (7.3) \u2014 with the actual closed-loop tracking belonging to Module 8. So the capstone is the wiring of units already built."}, {"type": "short", "prompt": "Trace a greenhouse 'reach a pre-grasp pose' task through the four stages and say where Module 7 ends.", "model": "PLAN: IK the start and pre-grasp tool poses to configurations, then RRT + smoothing find a collision-free path around the canopy. PARAMETERIZE: time each segment to its minimum feasible duration, producing q(t), q\u0307(t), q\u0308(t) within the limits. VALIDATE: run the suite \u2014 endpoints, continuity, limits, collision-free, reachable \u2014 and certify VALID. EXECUTE: discretize the validated reference and hand it off (open-loop playback in Module 7). Module 7 ends exactly at delivering the validated reference; Module 8 begins by tracking it on the real arm."}];
