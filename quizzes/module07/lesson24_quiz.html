<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "Why is a raw RRT path not yet an executable trajectory?", "options": [{"t": "it has collisions", "ok": false}, {"t": "it's jagged and untimed (no velocities/duration)", "ok": true}, {"t": "it's too short", "ok": false}, {"t": "it's optimal", "ok": false}], "ok": "Correct \u2014 it's a route, not a timed trajectory.", "no": "It's collision-free but jagged (random zig-zags) and has no timing \u2014 a route, not a trajectory."}, {"type": "mc", "prompt": "Shortcut smoothing shortens a path by:", "options": [{"t": "adding via-points", "ok": false}, {"t": "replacing a sub-path with a direct segment when that segment is collision-free", "ok": true}, {"t": "slowing it down", "ok": false}, {"t": "gridding C-space", "ok": false}], "ok": "Correct \u2014 collision-checked shortcuts remove zig-zags.", "no": "Try a straight segment between two path points; if collision-free, replace the in-between."}, {"type": "mc", "prompt": "Time scaling the smoothed path ensures the trajectory respects:", "options": [{"t": "only joint limits", "ok": false}, {"t": "velocity and acceleration limits", "ok": true}, {"t": "only reachability", "ok": false}, {"t": "torque limits", "ok": false}], "ok": "Correct \u2014 the Unit 5 limits.", "no": "Time scaling makes every joint's velocity and acceleration peak fit under the limits."}, {"type": "mc", "prompt": "The full pipeline is:", "options": [{"t": "Trajectory \u2192 Path \u2192 Obstacle", "ok": false}, {"t": "Obstacle \u2192 Constraint (C-obstacle) \u2192 Safe Path \u2192 Feasible Trajectory", "ok": true}, {"t": "Path \u2192 Obstacle \u2192 Goal", "ok": false}, {"t": "Goal \u2192 Path \u2192 Obstacle", "ok": false}], "ok": "Correct.", "no": "Obstacle \u2192 C-obstacle (constraint) \u2192 safe path (check/RRT/smooth) \u2192 feasible trajectory (time-scale)."}, {"type": "mc", "prompt": "Smoothing can introduce a collision but time scaling cannot, because:", "options": [{"t": "both change geometry", "ok": false}, {"t": "smoothing changes geometry (recheck it); time scaling changes only the clock", "ok": true}, {"t": "time scaling changes the path", "ok": false}, {"t": "smoothing is always safe", "ok": false}], "ok": "Correct.", "no": "Smoothing alters geometry (a spline can bulge into an obstacle) so recheck it; time scaling only rescales time."}, {"type": "short", "prompt": "Explain how a jagged RRT path becomes an executable trajectory in two steps.", "model": "Step 1 \u2014 smooth: repeatedly test a straight C-space segment between two points of the path; if it's collision-free, replace the wandering sub-path with that direct segment. After several shortcuts the path is much shorter and more direct, still entirely collision-free. Step 2 \u2014 time-scale: treat the smoothed waypoints as via-points, build a synchronized blended trajectory, and stretch its duration until every joint's velocity and acceleration peak fits under the limits (Unit 5). The result is smooth in space, gentle in time, and executable open-loop."}, {"type": "short", "prompt": "State the Obstacle \u2192 Feasible Trajectory pipeline and where each stage was built.", "model": "Obstacle (workspace) \u2192 Constraint: the C-obstacle / forbidden region in configuration space (6.1, using the collision check of 6.2) \u2192 Safe Path: a collision-free path found by RRT (6.3) and shortened by shortcut smoothing (6.4) \u2192 Feasible Trajectory: the smoothed path time-scaled to respect velocity/acceleration limits (6.4, using Unit 5). Each stage reuses earlier machinery, and the design deliberately decouples planning the path from timing it (plan-then-time, not kinodynamic)."}, {"type": "short", "prompt": "Why must a smoothing spline be re-collision-checked, while a time-scaled trajectory need not be?", "model": "Smoothing changes the geometry: replacing waypoints with a fitted C\u00b2 spline can make the curve bulge away from the original segments, and that bulge may clip an obstacle even though the shortcut segments were clear \u2014 so any smoothing that alters the path must be re-collision-checked (and a waypoint re-inserted if it fails). Time scaling, by contrast, changes only the clock (s(t)), leaving the path identical; since the geometry is untouched, it can never introduce a collision and needs no re-check for collisions (only the limit check)."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);

sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
