nonzero velocity while staying C\u00b2, use:", "options": [{"t": "a natural spline", "ok": false}, {"t": "a clamped spline (end velocities specified)", "ok": true}, {"t": "stop-at-each", "ok": false}, {"t": "a linear interpolation", "ok": false}], "ok": "Correct \u2014 clamped ends fix the end velocities.", "no": "A clamped spline fixes the end velocities, suited to a hand-off; natural ends only zero the end acceleration."}, {"type": "short", "prompt": "Explain how a cubic spline produces a C\u00b2 flow-through trajectory.", "model": "A cubic spline is a piecewise cubic that passes through every via-point and is constrained so that position, velocity, and acceleration all match across each interior knot (C\u00b2). Writing the unknowns as the knot second-derivatives reduces these conditions to one tridiagonal linear system; solving it yields the interior slopes and curvatures that make the whole curve smooth. The result flows through the via-points (nonzero passing velocity) with no velocity kink and no acceleration jump at any seam."}, {"type": "short", "prompt": "How do natural and clamped boundary conditions differ, and when do you use each?", "model": "Natural: the end acceleration (second derivative) is set to zero \u2014 'relaxed' ends, suited to an overall rest-to-rest move. Clamped: the end velocities are specified \u2014 used when the trajectory must start or finish matching a particular velocity, e.g. handing off to a following Cartesian approach. Both keep the interior C\u00b2; they differ only in the two boundary equations, and those propagate inward to give different interior velocities."}, {"type": "short", "prompt": "Why can't you pick each via-point's passing velocity independently?", "model": "Because the velocity (and acceleration) that makes the incoming segment smooth at a via-point must also make the outgoing segment smooth there \u2014 the two sides are coupled. Choosing them independently would generally leave a velocity kink or an acceleration jump at the seam. The spline solves all the interior values together (one linear system) so every seam is simultaneously C\u00b2."}];
