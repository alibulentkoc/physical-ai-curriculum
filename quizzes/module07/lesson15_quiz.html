<script>var questions=[{"type": "mc", "prompt": "Why can't you interpolate orientation by averaging rotation-matrix entries?", "options": [{"t": "it's too slow", "ok": false}, {"t": "the entry-wise average is not a valid rotation (it skews/shrinks)", "ok": true}, {"t": "rotations can't be stored", "ok": false}, {"t": "averaging needs four points", "ok": false}], "ok": "Correct \u2014 the average of two rotation matrices isn't a rotation.", "no": "Averaging rotation-matrix entries gives a non-rotation (it shrinks/skews); orientation lives on a curved space."}, {"type": "mc", "prompt": "SLERP interpolates between two orientations along:", "options": [{"t": "the longest arc", "ok": false}, {"t": "the shortest arc at constant angular rate", "ok": true}, {"t": "a straight chord", "ok": false}, {"t": "a random path", "ok": false}], "ok": "Correct \u2014 shortest arc, constant rate, always valid.", "no": "SLERP follows the shortest (great-circle) arc at constant angular rate, always a valid rotation."}, {"type": "mc", "prompt": "How is the shortest arc enforced in quaternion SLERP?", "options": [{"t": "normalize twice", "ok": false}, {"t": "flip the sign of one quaternion if their dot product is negative", "ok": true}, {"t": "use Euler angles", "ok": false}, {"t": "double the angle", "ok": false}], "ok": "Correct \u2014 sign-flip the far quaternion so the turn is the short way.", "no": "If q0\u00b7q1<0, negate q1 (same rotation) so SLERP takes the short way."}, {"type": "mc", "prompt": "For a planar (single-angle) orientation, SLERP reduces to:", "options": [{"t": "matrix exponentials", "ok": false}, {"t": "shortest-arc angle interpolation (wrap the difference to (\u2212\u03c0,\u03c0])", "ok": true}, {"t": "linear interpolation of raw angles", "ok": false}, {"t": "no interpolation", "ok": false}], "ok": "Correct \u2014 wrap the angle difference and interpolate.", "no": "Planar SLERP is shortest-arc angle interpolation: wrap the difference into (\u2212\u03c0,\u03c0] and interpolate."}, {"type": "mc", "prompt": "Interpolating Euler angles risks:", "options": [{"t": "nothing", "ok": false}, {"t": "gimbal lock and weird detours", "ok": true}, {"t": "faster motion", "ok": false}, {"t": "invalid positions", "ok": false}], "ok": "Correct \u2014 Euler interpolation can hit gimbal lock / detours; SLERP avoids it.", "no": "Euler-angle interpolation can pass through gimbal lock or take strange detours; interpolate the rotation itself."}, {"type": "short", "prompt": "Why does averaging two rotations fail, and how does SLERP fix it?", "model": "Orientations don't live in a flat space, so the entry-wise average of two rotation matrices (or quaternions) is generally not a rotation at all \u2014 it skews and shrinks, like a slack dial. SLERP treats each orientation as a point on the unit sphere of rotations and slides along the great-circle arc between them: it stays on the sphere (always a valid rotation), takes the shortest path, and moves at constant angular rate \u2014 the rotational analog of a straight line."}, {"type": "short", "prompt": "State the three properties that make SLERP the right orientation interpolant.", "model": "(1) Validity: the result is a unit quaternion for every s, so it's always a valid rotation. (2) Shortest arc: it traces the great-circle (shortest) path between the two orientations (with a sign flip to guarantee the short way). (3) Constant rate: it turns at a constant angular speed. Together these give a smooth, well-defined orientation path with no detours, no invalid intermediate states, and no gimbal lock."}, {"type": "short", "prompt": "Roll the planar tool from 170\u00b0 to \u2212170\u00b0. What is the shortest-arc turn, and what does naive linear-angle interpolation do?", "model": "The shortest-arc difference is wrap(\u2212170\u2212170)=wrap(\u2212340\u00b0)=+20\u00b0, so the tool turns +20\u00b0 through 180\u00b0 (the short way), reaching \u2212180\u00b0/180\u00b0 at the midpoint. Naive linear interpolation of the raw angles would sweep 170\u2192\u2212170 as \u2212340\u00b0, spinning the wrist almost all the way around the long way \u2014 clearly wrong. SLERP/shortest-arc avoids that by wrapping the difference."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
