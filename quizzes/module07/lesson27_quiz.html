<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "For a tracker to follow it, the reference must provide at every instant:", "options": [{"t": "position only", "ok": false}, {"t": "desired position, velocity, and acceleration (feed-forward)", "ok": true}, {"t": "torque only", "ok": false}, {"t": "motor current", "ok": false}], "ok": "Correct \u2014 the full feed-forward triple.", "no": "It must provide q_d, q\u0307_d, q\u0308_d \u2014 the feed-forward triple \u2014 continuously."}, {"type": "mc", "prompt": "Feed-forward (q\u0307_d, q\u0308_d) helps a tracker by:", "options": [{"t": "adding error", "ok": false}, {"t": "telling it how fast to move so it isn't always lagging behind error", "ok": true}, {"t": "computing torque", "ok": false}, {"t": "closing the loop", "ok": false}], "ok": "Correct \u2014 anticipation, less lag.", "no": "Feed-forward lets the tracker keep up and anticipate, rather than only reacting to error."}, {"type": "mc", "prompt": "The Module 7 / Module 8 boundary is:", "options": [{"t": "M7 tracks, M8 plans", "ok": false}, {"t": "M7 produces the reference; M8 tracks it", "ok": true}, {"t": "both track", "ok": false}, {"t": "M8 produces the reference", "ok": false}], "ok": "Correct.", "no": "Module 7 produces the open-loop reference; Module 8 builds the tracker that follows it."}, {"type": "mc", "prompt": "Which would make a reference un-trackable (Module 7's responsibility to prevent)?", "options": [{"t": "providing velocity feed-forward", "ok": false}, {"t": "a discontinuity / infeasibility / missing derivatives", "ok": true}, {"t": "being continuous", "ok": false}, {"t": "being feasible", "ok": false}], "ok": "Correct \u2014 those are upstream defects.", "no": "Missing derivatives, infeasibility, discontinuities, or too-coarse sampling make it un-trackable."}, {"type": "mc", "prompt": "The reference produced by Module 7 contains NO:", "options": [{"t": "desired position", "ok": false}, {"t": "desired velocity", "ok": false}, {"t": "tracking error / torque / motor command", "ok": true}, {"t": "desired acceleration", "ok": false}], "ok": "Correct \u2014 those belong to Module 8.", "no": "The reference has the desired motion only; error, torque, and motor commands are Module 8."}, {"type": "short", "prompt": "Explain tracking prerequisites with the 'composer writes a playable score' analogy, including the boundary.", "model": "The composer (Module 7) writes a score that's playable: the notes (desired position), how they move (velocity), and phrasing cues to anticipate what's coming (acceleration) \u2014 complete and feasible. The musician (Module 8) performs it, reading the score and producing the sound, correcting as they go. The composer never performs; if the score is unplayable (impossibly fast, gaps), no musician can play it, and that's the composer's fault. So Module 7 provides the full feed-forward reference (q_d, q\u0307_d, q\u0308_d), continuous and feasible; Module 8 does the actual following."}, {"type": "short", "prompt": "What is feed-forward and why does providing it (not just position) matter for the tracker?", "model": "Feed-forward is the desired velocity and acceleration supplied alongside the desired position. With it, the tracker already knows how fast it should be moving and how that speed should change, so it can command roughly the right motion in advance and only correct the small residual error. Without it \u2014 given position alone \u2014 the tracker is always reacting to accumulated error and lags the reference, especially in fast motions. Providing the full triple makes the tracker's job well-posed and keeps the lag and error small; that work shouldn't be pushed onto Module 8."}, {"type": "short", "prompt": "State precisely where Module 7 ends and Module 8 begins, and why a clean boundary matters.", "model": "Module 7 ends at producing and validating the open-loop reference: q_d(t), q\u0307_d(t), q\u0308_d(t), continuous, feasible, sampled. Module 8 begins at consuming that reference and making the robot actually follow it \u2014 computing tracking error, applying control gains, accounting for dynamics, and commanding the actuators. The boundary is the reference signal itself: it's the input to Module 8's controller, not a controller. A clean boundary matters because it lets each layer be built and tested independently, and lets the same validated reference run in simulation and on hardware."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
