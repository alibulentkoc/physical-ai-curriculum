<script>var questions=[{"type": "mc", "prompt": "Quality (vs feasibility) is best described as:", "options": [{"t": "a pass/fail gate", "ok": false}, {"t": "a ranking among feasible trajectories", "ok": true}, {"t": "a collision check", "ok": false}, {"t": "a reachability test", "ok": false}], "ok": "Correct \u2014 feasibility is pass/fail; quality ranks the feasible options.", "no": "Feasibility is a pass/fail gate; quality is a ranking among trajectories that already pass."}, {"type": "mc", "prompt": "Peak jerk measures:", "options": [{"t": "the top speed", "ok": false}, {"t": "the rate of change of acceleration (smoothness)", "ok": true}, {"t": "the path length", "ok": false}, {"t": "the duration", "ok": false}], "ok": "Correct \u2014 low jerk = smooth.", "no": "Jerk is the rate of change of acceleration; low peak jerk means smooth motion."}, {"type": "mc", "prompt": "Why is there no single best trajectory independent of the task?", "options": [{"t": "the metrics never conflict", "ok": false}, {"t": "the metrics trade off, so 'best' depends on a task-specific weighting", "ok": true}, {"t": "feasibility decides it", "ok": false}, {"t": "jerk is always minimized", "ok": false}], "ok": "Correct \u2014 best depends on priorities.", "no": "Metrics trade off (shorter time raises jerk/accel), so the best depends on how you weight them."}, {"type": "mc", "prompt": "The quality metrics in this lesson are:", "options": [{"t": "energy, torque, power", "ok": false}, {"t": "duration, peak speed, peak acceleration, peak jerk, path length", "ok": true}, {"t": "mass, inertia, friction", "ok": false}, {"t": "voltage, current, heat", "ok": false}], "ok": "Correct \u2014 geometric/temporal metrics.", "no": "Duration, peak speed, peak acceleration, peak jerk, and Cartesian path length."}, {"type": "mc", "prompt": "These metrics are NOT measures of:", "options": [{"t": "smoothness", "ok": false}, {"t": "duration", "ok": false}, {"t": "energy or dynamics", "ok": true}, {"t": "path length", "ok": false}], "ok": "Correct \u2014 energy/dynamics need the robot's mass/inertia (Module 8+).", "no": "They are geometric/temporal; energy and dynamics require the robot's mass/inertia (out of scope)."}, {"type": "short", "prompt": "Name the trajectory quality metrics and what each captures.", "model": "Duration (total time \u2014 faster vs slower); peak speed and peak acceleration (how hard the motion pushes the velocity/acceleration limits); peak jerk (the rate of change of acceleration \u2014 smoothness, with low jerk meaning gentle motion); and Cartesian path length (how far the tool actually travels \u2014 efficiency of the route). Together they let you compare feasible trajectories objectively rather than by feel."}, {"type": "short", "prompt": "Explain why two feasible trajectories to the same goal can be ranked differently, using a smoothness-vs-speed example.", "model": "Both pass the feasibility gates, but they differ on the metrics. A smooth quintic over a longer duration has low peak jerk (gentle) but takes more time; a faster trapezoidal motion finishes sooner but spikes jerk at the ramp corners. For delicate fruit handling you weight jerk heavily and prefer the smooth one; for a fast empty-gripper reposition you weight duration heavily and prefer the fast one. Same start and goal, both feasible \u2014 the ranking flips with the task's priority."}, {"type": "short", "prompt": "Why are these metrics geometric/temporal rather than energy or effort measures, and why does that keep them in Module 7's scope?", "model": "Each metric is computed purely from the trajectory's shape and timing \u2014 positions, their time-derivatives, and the tool's path length \u2014 none of which require knowing the robot's mass, inertia, or motor torques. Energy and actuator effort, by contrast, depend on dynamics (force = mass times acceleration, torque-inertia relationships), which is Module 8 and beyond. By measuring only the motion's geometry and timing, the quality metrics stay within Module 7's deliberate no-dynamics scope."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
