<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}
textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:9px;padding:8px;font-family:inherit;font-size:14px;resize:vertical}
.btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:8px}.btn:hover{background:var(--soft)}
.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Can a smooth, goal-reaching trajectory be infeasible?", "options": [{"t": "No \u2014 if it's smooth it's executable", "ok": false}, {"t": "Yes \u2014 it can demand more speed or acceleration than the hardware allows", "ok": true}, {"t": "Only if it's not C\u00b2", "ok": false}, {"t": "Only if the goal is unreachable", "ok": false}], "ok": "Correct \u2014 feasibility is a separate, physical question.", "no": "A C\u00b2 goal-reaching trajectory can still demand impossible speeds/accelerations \u2014 feasibility is its own check."}, {"type": "mc", "prompt": "The two hardware limits feasibility must respect are:", "options": [{"t": "position and jerk", "ok": false}, {"t": "velocity and acceleration", "ok": true}, {"t": "torque and power", "ok": false}, {"t": "mass and inertia", "ok": false}], "ok": "Correct \u2014 maximum joint velocity and maximum joint acceleration.", "no": "Feasibility (here) caps maximum velocity and maximum acceleration per joint."}, {"type": "mc", "prompt": "As the duration T shrinks, the peak speed and peak acceleration:", "options": [{"t": "both stay constant", "ok": false}, {"t": "grow as 1/T and 1/T\u00b2 respectively", "ok": true}, {"t": "shrink", "ok": false}, {"t": "grow equally", "ok": false}], "ok": "Correct \u2014 speed ~ 1/T, acceleration ~ 1/T\u00b2 (acceleration grows faster).", "no": "Peak speed scales as 1/T and peak acceleration as 1/T\u00b2, so shrinking T inflates both (accel faster)."}, {"type": "mc", "prompt": "Which joint is the first to violate a limit in a synchronized move?", "options": [{"t": "the smallest-displacement joint", "ok": false}, {"t": "the largest-displacement joint", "ok": true}, {"t": "the first joint always", "ok": false}, {"t": "none \u2014 all violate together", "ok": false}], "ok": "Correct \u2014 peaks scale with displacement, so the largest-\u0394q joint binds first.", "no": "Peaks scale with |\u0394q|, so the largest-displacement joint hits a limit first (the bottleneck)."}, {"type": "mc", "prompt": "Feasibility is distinct from reachability because:", "options": [{"t": "they are the same", "ok": false}, {"t": "a reachable goal can still have an infeasible (too-fast) timing", "ok": true}, {"t": "reachability is about speed", "ok": false}, {"t": "feasibility is about geometry", "ok": false}], "ok": "Correct \u2014 reachable goal, impossible timing: separate checks.", "no": "A perfectly reachable goal can have an impossible timing; reachability (geometry) and feasibility (timing) are separate."}, {"type": "short", "prompt": "Explain, with the 'cross the room in half a second' analogy, why a smooth trajectory can be infeasible.", "model": "You can plan a smooth motion to cross the room in half a second; the plan's shape is fine, but below some duration it demands a top speed your legs can't reach \u2014 it's infeasible, not wrong. A robot joint is the same: a smooth quintic over too short a duration demands a peak speed or acceleration past the motor's limit. The geometry never changed; the timing pushed the peaks past the hardware ceiling. Feasibility asks whether the demanded peaks fit under the limits."}, {"type": "short", "prompt": "How do peak speed and peak acceleration depend on the duration, and what does that imply for fixing infeasibility?", "model": "For a quintic, peak speed = (15/8)|\u0394q|/T and peak acceleration = (10/\u221a3)|\u0394q|/T\u00b2 \u2014 speed scales as 1/T, acceleration as 1/T\u00b2. So shrinking T inflates the peaks (acceleration faster than velocity) and a short-enough T always breaks feasibility. The implication: going the other way \u2014 lengthening T (slowing down) \u2014 always shrinks the peaks back under the limits, which is the fix in the next lesson."}, {"type": "short", "prompt": "A grower reports the arm 'won't run' a 0.2-second snap to a fruit. Diagnose using feasibility.", "model": "The 0.2 s snap demands very high wrist speeds and accelerations (peaks scale as 1/T and 1/T\u00b2), almost certainly exceeding the small distal motor's velocity/acceleration limits \u2014 so the controller either clamps the speed (smearing the move) or rejects the trajectory as infeasible. The goal is reachable; the timing isn't. The fix is to lengthen the duration until the peaks fall under the limits."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});

</script></body></html>
