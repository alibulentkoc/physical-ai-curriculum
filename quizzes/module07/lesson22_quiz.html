<style>

*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

<script>var questions=[{"type": "mc", "prompt": "To test if a configuration is in collision you:", "options": [{"t": "check only the tool", "ok": false}, {"t": "compute the arm's link geometry (FK) and test each link against the obstacle", "ok": true}, {"t": "solve IK", "ok": false}, {"t": "measure torque", "ok": false}], "ok": "Correct \u2014 build the link segments, test against the obstacle.", "no": "Use forward kinematics to get the link segments, then test each against the obstacle."}, {"type": "mc", "prompt": "A path is checked for collisions by:", "options": [{"t": "testing the endpoints", "ok": false}, {"t": "densely sampling configurations along it and testing each", "ok": true}, {"t": "one IK solve", "ok": false}, {"t": "checking the goal only", "ok": false}], "ok": "Correct \u2014 sample along the edge, test every sample.", "no": "Sample configurations densely along each edge and collision-check every one."}, {"type": "mc", "prompt": "Tunneling is:", "options": [{"t": "a planning method", "ok": false}, {"t": "coarse sampling missing a thin obstacle the arm sweeps through between samples", "ok": true}, {"t": "a smoothing step", "ok": false}, {"t": "a type of obstacle", "ok": false}], "ok": "Correct \u2014 the check passes at each sample but the motion sweeps through.", "no": "Tunneling: coarse samples straddle a thin obstacle, so the edge is wrongly reported free."}, {"type": "mc", "prompt": "Tunneling is prevented by:", "options": [{"t": "fewer samples", "ok": false}, {"t": "a step small relative to the obstacle's thinness and the arm's speed", "ok": true}, {"t": "checking only endpoints", "ok": false}, {"t": "a larger obstacle", "ok": false}], "ok": "Correct \u2014 fine enough sampling.", "no": "Choose the C-space step small relative to obstacle thickness so no sweep is skipped."}, {"type": "mc", "prompt": "The collision-checking primitive is kept cheap because:", "options": [{"t": "it runs once", "ok": false}, {"t": "planners call it millions of times", "ok": true}, {"t": "it's hard to compute", "ok": false}, {"t": "it needs dynamics", "ok": false}], "ok": "Correct \u2014 it's the inner loop of planning.", "no": "It's the inner loop of planning (called constantly), so it must be fast."}, {"type": "short", "prompt": "Describe the per-configuration collision test for the planar 2-link arm against a disk obstacle.", "model": "From the configuration, forward kinematics gives the base, elbow, and tool points, so the two links are known line segments. For a disk obstacle (center c, radius r), compute the shortest distance from each link segment to c; the arm is in collision if either distance is \u2264 r. The configuration is in free space iff both links clear the disk. Real systems use richer geometry (capsules, meshes), but the principle is identical: build the body's geometry, test it against the obstacle."}, {"type": "short", "prompt": "Why must a whole path be sampled, and what is tunneling?", "model": "A motion is safe only if every configuration along it is clear, but we can only test finitely many, so we sample configurations along each edge. Tunneling is the failure where the samples are too far apart: the arm is clear at each sampled instant but sweeps through a thin obstacle in between, so the edge is wrongly reported collision-free \u2014 like stepping over a tripwire because you only checked your foot every two metres. The fix is a step size small relative to the obstacle's thinness and the arm's speed."}, {"type": "short", "prompt": "Why is collision checking the most performance-critical operation in a planner, and how is it sped up?", "model": "Planners explore by testing huge numbers of candidate configurations and edges, calling the collision check as the inner loop \u2014 millions of times for a hard problem. Its cost dominates planning time. Real systems speed it up with fast geometric proxies (capsules, convex hulls, bounding-volume hierarchies) so a single check is microseconds, and use swept/continuous collision detection where tunneling must be ruled out exactly. Cheap, correct checks are what make sampling-based planning practical."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
