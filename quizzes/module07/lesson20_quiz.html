<script>var questions=[{"type": "mc", "prompt": "A trajectory is feasible only if it passes its checks:", "options": [{"t": "at the endpoints", "ok": false}, {"t": "at every point along the whole trajectory", "ok": true}, {"t": "at the midpoint", "ok": false}, {"t": "on average", "ok": false}], "ok": "Correct \u2014 every constraint, every point.", "no": "Feasibility must hold at every point; a single interior violation makes it infeasible."}, {"type": "mc", "prompt": "Which violation is fixed by slowing down?", "options": [{"t": "a joint exceeding its angle limit", "ok": false}, {"t": "a velocity/acceleration limit exceeded", "ok": true}, {"t": "an unreachable path point", "ok": false}, {"t": "a branch flip", "ok": false}], "ok": "Correct \u2014 speed/accel violations are timing-fixable.", "no": "Velocity/acceleration violations are timing-fixable (slow down); the others are geometric."}, {"type": "mc", "prompt": "A reachability violation is:", "options": [{"t": "timing-fixable", "ok": false}, {"t": "geometric \u2014 needs a different path", "ok": true}, {"t": "fixed by more acceleration", "ok": false}, {"t": "not a real problem", "ok": false}], "ok": "Correct \u2014 geometry, not timing.", "no": "Reachability is geometric: slowing won't help; you need a different path."}, {"type": "mc", "prompt": "Why must feasibility be checked by dense sampling?", "options": [{"t": "to save time", "ok": false}, {"t": "a violation can occur at one interior instant a coarse check skips", "ok": true}, {"t": "endpoints are enough", "ok": false}, {"t": "to reduce computation", "ok": false}], "ok": "Correct \u2014 a momentary violation can hide between coarse samples.", "no": "A joint can graze a limit at one instant; dense sampling is needed to catch it."}, {"type": "mc", "prompt": "The four whole-trajectory checks are:", "options": [{"t": "mass, speed, torque, power", "ok": false}, {"t": "joint limits, velocity, acceleration, reachability", "ok": true}, {"t": "position, velocity, jerk, snap", "ok": false}, {"t": "smoothness, safety, efficiency, speed", "ok": false}], "ok": "Correct.", "no": "Joint-angle limits, velocity limits, acceleration limits, and reachability (Cartesian)."}, {"type": "short", "prompt": "List the whole-trajectory feasibility checks and classify each as timing-fixable or geometric.", "model": "Checks: (1) joint-angle limits \u2014 geometric; (2) velocity limits \u2014 timing-fixable; (3) acceleration limits \u2014 timing-fixable; (4) reachability of every Cartesian path point \u2014 geometric. Velocity/acceleration violations mean the motion is just too fast (slow down). Joint-limit and reachability violations mean the trajectory wants a pose or point that can't exist (change the path). All must hold at every sampled point."}, {"type": "short", "prompt": "Why does slowing down fix a velocity violation but not a reachability violation?", "model": "Slowing down divides velocities by k and accelerations by k\u00b2, so a large enough stretch always brings speed/acceleration peaks under their limits \u2014 those are about how fast the motion runs. A reachability violation is about geometry: a tool point lies outside the workspace, so no joint configuration realizes it, at any speed. The clock has no effect on whether a point can be reached; only a different path (rerouting, a via-point, reorientation) can fix it."}, {"type": "short", "prompt": "A single joint momentarily exceeds its angle limit at one interior point of an otherwise-feasible trajectory. What's the remedy, and why is it a via-point problem?", "model": "It's a geometric violation, so slowing down won't help \u2014 the path itself must change to keep that joint within range. The minimal fix is to reroute the trajectory through an intermediate configuration that stays within the joint limit while preserving the endpoints \u2014 i.e. insert a via-point and re-blend (Unit 3). So the remedy lives in path design, not timing: it's a via-point/routing problem, the same machinery used to avoid bad regions."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
