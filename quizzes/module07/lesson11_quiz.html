<script>var questions=[{"type": "mc", "prompt": "What is a via-point?", "options": [{"t": "the final goal configuration", "ok": false}, {"t": "an intermediate configuration the trajectory must pass through", "ok": true}, {"t": "a singularity to avoid", "ok": false}, {"t": "a joint velocity limit", "ok": false}], "ok": "Correct \u2014 a via-point is an intermediate configuration on the way to the goal.", "no": "A via-point is an intermediate configuration the trajectory must pass through."}, {"type": "mc", "prompt": "In a stop-at-each multi-segment trajectory, the joint velocity at each interior via-point is:", "options": [{"t": "maximum", "ok": false}, {"t": "zero", "ok": true}, {"t": "negative", "ok": false}, {"t": "undefined", "ok": false}], "ok": "Correct \u2014 stop-at-each comes to rest at every via-point.", "no": "Stop-at-each runs rest-to-rest segments, so velocity is zero at each interior via-point."}, {"type": "mc", "prompt": "Why is stopping at every via-point wasteful?", "options": [{"t": "it uses more memory", "ok": false}, {"t": "every via-point becomes a full halt and restart \u2014 slow and jerky at the seams", "ok": true}, {"t": "it changes the goal", "ok": false}, {"t": "it requires more joints", "ok": false}], "ok": "Correct \u2014 each stop costs time and a jolt.", "no": "Stopping at each via-point adds a full deceleration/acceleration and a seam jolt \u2014 slow and jerky."}, {"type": "mc", "prompt": "To flow through a via-point instead of stopping, you must:", "options": [{"t": "increase the duration", "ok": false}, {"t": "assign a nonzero passing velocity (and acceleration) matched on both sides", "ok": true}, {"t": "remove the via-point", "ok": false}, {"t": "use a cubic instead of a quintic", "ok": false}], "ok": "Correct \u2014 nonzero matched passing values let the motion glide through.", "no": "Flow-through assigns nonzero passing velocity/acceleration matched across the via-point."}, {"type": "mc", "prompt": "The path between two via-points in a joint-space multi-segment trajectory is:", "options": [{"t": "always straight in space", "ok": false}, {"t": "curved in space (each segment is a joint move)", "ok": true}, {"t": "always vertical", "ok": false}, {"t": "always horizontal", "ok": false}], "ok": "Correct \u2014 each segment is a joint move, so the tool path between vias is curved.", "no": "Each segment is a joint move, so the tool path between via-points is curved (3.1)."}, {"type": "short", "prompt": "Contrast stop-at-each with flow-through for via-points.", "model": "Stop-at-each chains rest-to-rest segments: the trajectory passes through each via-point but the joint comes to a complete stop there (zero velocity), so the motion stutters and is slow \u2014 every via-point is a halt and restart. Flow-through assigns each interior via-point a nonzero passing velocity (and acceleration), matched on both sides, so the motion glides through the via-points as one continuous trajectory without stopping."}, {"type": "short", "prompt": "Why are multi-segment trajectories (with via-points) needed at all?", "model": "Because a single straight joint-space move from start to goal may take the tool through a bad region \u2014 dragging the gripper through the canopy or approaching from the wrong side. Routing the motion through intermediate configurations (via-points) keeps the in-between path clear and lines up the final approach. Via-points let the trajectory follow a chosen route instead of the single direct segment."}, {"type": "short", "prompt": "Give a case where you would deliberately stop at a via-point even though flow-through is available.", "model": "When an action must happen at the via-point that requires the arm to be momentarily still \u2014 e.g. taking a precise sensor/camera reading, performing a regrasp, or waiting for an external trigger. There, stopping is intentional, not waste; flow-through would be wrong because the task needs zero velocity at that configuration."}];

questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
