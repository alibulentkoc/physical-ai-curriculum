<svg viewBox="0 0 520 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A configuration collision test using link-to-obstacle distance, and a tunneling illustration where coarse sampling straddles a thin obstacle while dense sampling catches it">
<title>A configuration collision test using link-to-obstacle distance, and a tunneling illustration where coarse sampling straddles a thin obstacle while dense sampling catches it</title>
<rect width="520" height="250" fill="white"/>
<text x="260" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Collision check: link-to-obstacle distance, and tunneling</text>
<text x="120" y="48" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">is this pose safe?</text>
<rect x="30" y="58" width="200" height="180" fill="#f8fafc" stroke="#e2e8f0"/>
<circle cx="185" cy="142" r="9" fill="#e11d48"/>
<line x1="110" y1="150" x2="162" y2="180" stroke="#0f172a" stroke-width="5"/>
<line x1="162" y1="180" x2="204" y2="165" stroke="#0f172a" stroke-width="5"/>
<line x1="162" y1="180" x2="185" y2="142" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="179.48076211353316" y="161.25" text-anchor="start" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#10b981">dist</text>
<text x="120" y="232" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">collision if dist ≤ r</text>
<!-- tunneling -->
<text x="390" y="48" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#b91c1c">coarse sampling tunnels</text>
<rect x="260" y="58" width="230" height="180" fill="#f8fafc" stroke="#e2e8f0"/>
<circle cx="375" cy="148" r="14" fill="#e11d48"/><text x="375" y="124" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#e11d48">thin obstacle</text>
<!-- dense samples (green ticks) catch it -->
<circle cx="300" cy="180" r="2.5" fill="#10b981"/><circle cx="315" cy="180" r="2.5" fill="#10b981"/><circle cx="330" cy="180" r="2.5" fill="#10b981"/><circle cx="345" cy="180" r="2.5" fill="#10b981"/><circle cx="360" cy="180" r="2.5" fill="#10b981"/><circle cx="375" cy="180" r="2.5" fill="#10b981"/><circle cx="390" cy="180" r="2.5" fill="#10b981"/><circle cx="405" cy="180" r="2.5" fill="#10b981"/><circle cx="420" cy="180" r="2.5" fill="#10b981"/><circle cx="435" cy="180" r="2.5" fill="#10b981"/><circle cx="450" cy="180" r="2.5" fill="#10b981"/><circle cx="465" cy="180" r="2.5" fill="#10b981"/>
<text x="375" y="196" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#10b981">dense: caught</text>
<!-- coarse samples straddle it -->
<circle cx="300" cy="100" r="4" fill="#b91c1c"/><circle cx="450" cy="100" r="4" fill="#b91c1c"/>
<line x1="300" y1="100" x2="450" y2="100" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="375" y="92" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#b91c1c">coarse: straddles → missed</text>
</svg>
