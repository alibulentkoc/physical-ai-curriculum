<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The four elementary motions Rot z theta, Trans z d, Trans x a, Rot x alpha composed left to right into the DH link transform T i minus one i.">
  <defs>
    <marker id="d21" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="24" text-anchor="middle" class="t">DH link transform = four elementary motions</text>
  <g>
   <rect x="20" y="70" width="120" height="48" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="80" y="92" text-anchor="middle" class="b">Rot_z(θ)</text><text x="80" y="108" text-anchor="middle" class="c">spin about z</text>
   <text x="148" y="98" class="b">·</text>
   <rect x="160" y="70" width="120" height="48" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="220" y="92" text-anchor="middle" class="b">Trans_z(d)</text><text x="220" y="108" text-anchor="middle" class="c">slide along z</text>
   <text x="288" y="98" class="b">·</text>
   <rect x="300" y="70" width="120" height="48" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="360" y="92" text-anchor="middle" class="b">Trans_x(a)</text><text x="360" y="108" text-anchor="middle" class="c">walk along x</text>
   <text x="428" y="98" class="b">·</text>
   <rect x="440" y="70" width="120" height="48" rx="9" fill="#fef2f2" stroke="#fecaca"/><text x="500" y="92" text-anchor="middle" class="b">Rot_x(α)</text><text x="500" y="108" text-anchor="middle" class="c">tilt about x</text>
  </g>
  <line x1="562" y1="94" x2="595" y2="94" stroke="#0f172a" stroke-width="1.6" marker-end="url(#d21)"/>
  <rect x="600" y="70" width="80" height="48" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="640" y="98" text-anchor="middle" class="b">T_{i-1}^i</text>
  <text x="350" y="168" text-anchor="middle" class="c">Standard (distal) order. Plug in four numbers, get the link transform. d=0,α=0 → planar transform.</text>
</svg>
