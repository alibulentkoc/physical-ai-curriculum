<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two frames A and B; B is offset and rotated from A. One fixed point is described in both, illustrating that a transformation is an offset plus a rotation.">
  <defs>
    <marker id="fa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
    <marker id="fb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <marker id="fo" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:13px;font-weight:700}.c{font-size:12px;fill:#64748b}.n{font-size:12.5px;font-weight:700;fill:#0f172a}</style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="t">Transformation = offset + rotation</text>
  <!-- frame A at lower left -->
  <line x1="90" y1="300" x2="200" y2="300" stroke="#0d9488" stroke-width="2.5" marker-end="url(#fa)"/>
  <line x1="90" y1="300" x2="90" y2="190" stroke="#0d9488" stroke-width="2.5" marker-end="url(#fa)"/>
  <text x="70" y="320" class="l" fill="#0f766e">frame A</text>
  <!-- frame B offset and rotated -->
  <g transform="rotate(-28 360 250)">
    <line x1="360" y1="250" x2="470" y2="250" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#fb)"/>
    <line x1="360" y1="250" x2="360" y2="140" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#fb)"/>
  </g>
  <text x="372" y="276" class="l" fill="#1d4ed8">frame B (rotated θ)</text>
  <!-- offset arrow A->B origins -->
  <line x1="90" y1="300" x2="360" y2="250" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#fo)"/>
  <text x="180" y="288" class="c">offset (dx, dy)</text>
  <!-- the one fixed point -->
  <circle cx="430" cy="150" r="9" fill="#e11d48"/>
  <text x="442" y="146" class="n">same point P</text>
  <rect x="300" y="70" width="300" height="48" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="312" y="90" class="c">P in A: (large x, large y)</text>
  <text x="312" y="108" class="c">P in B: (smaller, turned numbers)</text>
  <text x="320" y="366" text-anchor="middle" class="c">Shift by the offset, then turn by θ — re-describe the same point. It never moves.</text>
</svg>
