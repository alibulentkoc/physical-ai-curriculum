<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Top, a left-to-right command pipeline of boxes from reference through controller, requested command, actuator with deadband saturation and rate limit, delivered effort, to joint motion, with the actuator box emphasised; bottom-left a feasibility envelope rectangle on effort versus rate-of-change axes with a gentle demand curve inside and an aggressive demand curve spilling outside where it is clipped; bottom-right a small position plot where the gentle trajectory tracks and the aggressive one drifts">
<title>Top, a left-to-right command pipeline of boxes from reference through controller, requested command, actuator with deadband saturation and rate limit, delivered effort, to joint motion, with the actuator box emphasised; bottom-left a feasibility envelope rectangle on effort versus rate-of-change axes with a gentle demand curve inside and an aggressive demand curve spilling outside where it is clipped; bottom-right a small position plot where the gentle trajectory tracks and the aggressive one drifts</title>
<rect width="680" height="420" fill="white"/>
<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker><marker id="ahs" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#0ea5e9"/></marker><marker id="ahe" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#10b981"/></marker></defs>
<text x="150" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="15" font-weight="650" fill="#0f172a">The command pipeline and the feasibility envelope</text>
