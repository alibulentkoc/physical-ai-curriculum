<line x1="370" y1="280" x2="630" y2="150" stroke="#0d9488" stroke-width="1.4" stroke-dasharray="5 4"/>
<text x="628" y="148" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#0d9488">reference</text>
<polyline points="370.0,280.0 630.0,152.0" fill="none" stroke="#10b981" stroke-width="2.4"/>
<text x="628" y="164" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#10b981">gentle tracks</text>
<polyline points="370.0,280.0 450.0,240.0 630.0,250.0" fill="none" stroke="#e11d48" stroke-width="2.4"/>
<text x="628" y="256" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#e11d48">aggressive drifts</text>
