<text x="396.0" y="86.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" font-weight="600" fill="#0f172a">(deadband·sat·rate)</text>
<line x1="444" y1="79.0" x2="456" y2="79.0" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="456" y="50" width="96" height="58" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="1.6"/>
