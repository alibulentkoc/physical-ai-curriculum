<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs><marker id="ax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#1f2937"/></marker>
  <marker id="tw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker></defs>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Same tool motion, two frames: turn your head, don't move your feet</text>
  <line x1="360" y1="44" x2="360" y2="276" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- base view -->
  <text x="185" y="62" text-anchor="middle" font-size="13" fill="#6b7280">base / world frame</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="90" y1="230" x2="170" y2="160"/><line x1="170" y1="160" x2="250" y2="140"/></g>
  <circle cx="250" cy="140" r="6" fill="#0d9488"/>
  <line x1="250" y1="140" x2="310" y2="120" stroke="#0d9488" stroke-width="3.2" marker-end="url(#tw)"/>
  <g stroke="#1f2937" stroke-width="1.8" fill="none"><line x1="100" y1="245" x2="134" y2="245" marker-end="url(#ax)"/><line x1="100" y1="245" x2="100" y2="213" marker-end="url(#ax)"/></g>
  <text x="92" y="262" font-size="11" fill="#6b7280">world axes</text>
  <text x="185" y="232" font-size="12" fill="#0d9488">&#958;_base</text>
  <!-- tool view -->
  <text x="540" y="62" text-anchor="middle" font-size="13" fill="#6b7280">tool frame</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="445" y1="230" x2="525" y2="160"/><line x1="525" y1="160" x2="605" y2="140"/></g>
  <circle cx="605" cy="140" r="6" fill="#0d9488"/>
  <line x1="605" y1="140" x2="665" y2="120" stroke="#0d9488" stroke-width="3.2" marker-end="url(#tw)"/>
  <!-- tool axes rotated -->
  <g stroke="#1f2937" stroke-width="1.8" fill="none" transform="rotate(18 605 140)"><line x1="605" y1="140" x2="639" y2="140" marker-end="url(#ax)"/><line x1="605" y1="140" x2="605" y2="108" marker-end="url(#ax)"/></g>
  <text x="600" y="170" font-size="11" fill="#6b7280">tool axes</text>
  <text x="540" y="232" font-size="12" fill="#0d9488">&#958;_tool</text>
  <text x="360" y="262" text-anchor="middle" font-size="12.5" fill="#111827">J_tool = blkdiag(R&#7488;, R&#7488;) J_base   (rotation only, no lever arm)</text>
</svg>
