<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The computed world target shown with world, arm, and camera frames; a forward chain arrow and a dashed inverse arrow recovering the camera-frame detection; an annotation that the camera-to-tomato distance is preserved.">
  <defs>
    <marker id="vf" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <marker id="vb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker>
    <marker id="va" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:11.5px;font-weight:700;fill:#334155}.fwd{font-size:11.5px;font-weight:700;fill:#1d4ed8}.bk{font-size:11.5px;font-weight:700;fill:#0f766e}.d{font-size:11px;font-weight:700;fill:#15803d}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">Verify: inverse recovers the detection; distance is preserved</text>
  <polygon points="60,270 360,270 470,228 170,228" fill="#f1f5f9" stroke="#cbd5e1"/>
  <!-- camera frame -->
  <g transform="translate(150,250)"><line x1="0" y1="0" x2="22" y2="0" stroke="#8b5cf6" stroke-width="2.2" marker-end="url(#va)"/><line x1="0" y1="0" x2="0" y2="-22" stroke="#8b5cf6" stroke-width="2.2" marker-end="url(#va)"/><circle r="3" fill="#0f172a"/></g>
  <text x="150" y="272" text-anchor="middle" class="c">camera</text>
  <!-- arm frame -->
  <g transform="translate(300,210)"><line x1="0" y1="0" x2="22" y2="0" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#va)"/><line x1="0" y1="0" x2="0" y2="-22" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#va)"/><circle r="3" fill="#0f172a"/></g>
  <text x="300" y="232" text-anchor="middle" class="c">arm</text>
  <!-- tomato target -->
  <circle cx="470" cy="170" r="10" fill="#e11d48"/>
  <text x="470" y="152" text-anchor="middle" class="l">tomato target (world)</text>
  <!-- forward chain -->
  <path d="M 172 240 Q 320 150 458 168" fill="none" stroke="#1d4ed8" stroke-width="2" marker-end="url(#vf)"/>
  <text x="315" y="158" text-anchor="middle" class="fwd">chain → world target</text>
  <!-- inverse roundtrip -->
  <path d="M 460 182 Q 320 250 168 256" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#vb)"/>
  <text x="320" y="250" text-anchor="middle" class="bk">inverse recovers detection (0,0,0.3)</text>
  <rect x="150" y="292" width="380" height="30" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="340" y="312" text-anchor="middle" class="d">distance camera→tomato = 0.3 in both frames (rigid)</text>
</svg>
