<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A distorted bowed grid with a measured edge point being iteratively nudged back onto the straight ideal grid; the center point is unchanged and the correction is larger at the edge.">
  <defs>
    <marker id="ua" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.lab{font-size:12px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Undistortion: recover the ideal point from the measured one</text>
  <!-- ideal straight grid (light) -->
  <g stroke="#cbd5e1" stroke-width="1" fill="none">
    <rect x="120" y="55" width="240" height="150"/>
    <line x1="120" y1="105" x2="360" y2="105"/><line x1="120" y1="155" x2="360" y2="155"/>
    <line x1="200" y1="55" x2="200" y2="205"/><line x1="280" y1="55" x2="280" y2="205"/>
  </g>
  <!-- distorted bowed overlay -->
  <g stroke="#7c3aed" stroke-width="1.3" fill="none" opacity="0.8">
    <path d="M120,55 Q240,40 360,55"/><path d="M120,205 Q240,220 360,205"/>
    <path d="M120,55 Q105,130 120,205"/><path d="M360,55 Q375,130 360,205"/>
  </g>
  <!-- center unchanged -->
  <circle cx="240" cy="130" r="4" fill="#64748b"/><text x="240" y="150" text-anchor="middle" class="c">center: no change</text>
  <!-- measured edge point nudged back -->
  <circle cx="352" cy="80" r="5" fill="#7c3aed"/><text x="352" y="50" text-anchor="middle" class="c" fill="#7c3aed">measured</text>
  <line x1="350" y1="82" x2="364" y2="92" stroke="#0f766e" stroke-width="1.6" marker-end="url(#ua)"/>
  <circle cx="366" cy="94" r="5" fill="#10b981"/><text x="430" y="95" class="c" fill="#0f766e">ideal (after a few iterations)</text>
  <text x="350" y="232" text-anchor="middle" class="c">No closed-form inverse — iterate the distortion model; convergence is fast; cv2.undistortPoints / undistort.</text>
</svg>
