<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Unit 3 recap: one fixed tomato described by world, robot, and camera frames, with an offset-plus-rotation transform arrow linking robot and camera. Same tomato, different observers.">
  <defs>
    <marker id="ra" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:12.5px;font-weight:700}.c{font-size:11.5px;fill:#64748b}.rd{font-size:12.5px;font-weight:700}</style>
  </defs>
  <text x="360" y="28" text-anchor="middle" class="t">Unit 3 in one picture: same tomato, different observers</text>
  <rect x="30" y="48" width="660" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- tomato fixed -->
  <circle cx="470" cy="135" r="13" fill="#e11d48"/>
  <text x="470" y="118" text-anchor="middle" class="c">the tomato (never moves)</text>
  <!-- readings legend -->
  <text x="70" y="80" class="c">one tomato, three observers:</text>
  <circle cx="78" cy="102" r="5" fill="#0d9488"/><text x="92" y="106" class="rd" fill="#0f766e">world:  (2.0, 1.5)</text>
  <circle cx="78" cy="128" r="5" fill="#1d4ed8"/><text x="92" y="132" class="rd" fill="#1d4ed8">robot:  (0.6, 0.2)</text>
  <circle cx="78" cy="154" r="5" fill="#8b5cf6"/><text x="92" y="158" class="rd" fill="#7c3aed">camera: (0.3, -0.1)</text>
  <!-- world frame -->
  <line x1="90" y1="312" x2="190" y2="312" stroke="#0d9488" stroke-width="2"/><line x1="90" y1="312" x2="90" y2="232" stroke="#0d9488" stroke-width="2"/>
  <text x="78" y="332" class="l" fill="#0f766e">world (fixed)</text>
  <!-- robot frame -->
  <rect x="332" y="300" width="16" height="16" rx="3" fill="#1d4ed8"/>
  <line x1="340" y1="308" x2="420" y2="308" stroke="#1d4ed8" stroke-width="2"/><line x1="340" y1="308" x2="340" y2="240" stroke="#1d4ed8" stroke-width="2"/>
  <text x="320" y="332" class="l" fill="#1d4ed8">robot (local)</text>
  <!-- camera frame -->
  <g transform="rotate(-20 420 250)">
    <line x1="420" y1="250" x2="486" y2="250" stroke="#8b5cf6" stroke-width="2"/><line x1="420" y1="250" x2="420" y2="200" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="430" y="276" class="l" fill="#7c3aed">camera (local)</text>
  <!-- transform arrow robot<->camera -->
  <line x1="360" y1="296" x2="416" y2="258" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ra)"/>
  <text x="500" y="300" class="c">transform = offset + rotation</text>
  <text x="360" y="368" text-anchor="middle" class="c">Unit 2: how do we describe position?  →  Unit 3: who is describing it?  Next: one matrix for offset + rotation.</text>
</svg>
