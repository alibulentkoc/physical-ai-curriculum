<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Left: a simple greenhouse reach showing the gripper, the displacement arrow to the tomato, and the reach arc. Right: a legend listing the eight Unit 2 vector tools and the robot question each answers.">
  <defs>
    <marker id="rk" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
    <style>
      .t{font-size:18px;font-weight:700;fill:#0f172a}
      .h{font-size:14px;font-weight:700;fill:#0f172a}
      .l{font-size:13px;font-weight:600;fill:#334155}
      .c{font-size:12px;fill:#64748b}
      .row{font-size:12.5px;fill:#334155}
      .q{font-size:11.5px;fill:#64748b}
    </style>
  </defs>
  <text x="360" y="30" text-anchor="middle" class="t">The Unit 2 toolkit</text>

  <!-- LEFT: clean scene -->
  <rect x="24" y="50" width="330" height="320" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- reach arc (dashed, no fill blob) -->
  <path d="M 320 320 A 250 250 0 0 0 70 70" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="250" y="92" class="c" fill="#0d9488">reach (distance)</text>
  <!-- axes -->
  <line x1="70" y1="320" x2="330" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="70" y1="320" x2="70" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- gripper -->
  <rect x="61" y="311" width="18" height="18" rx="3" fill="#0f172a"/>
  <text x="58" y="350" class="c">gripper (origin)</text>
  <!-- displacement arrow to tomato (inside reach) -->
  <line x1="70" y1="320" x2="232" y2="188" stroke="#0d9488" stroke-width="3.5" marker-end="url(#rk)"/>
  <text x="92" y="250" class="l" fill="#0d9488" transform="rotate(-39 92 250)">displacement</text>
  <!-- tomato -->
  <circle cx="240" cy="182" r="12" fill="#e11d48"/>
  <text x="190" y="170" class="l">tomato</text>

  <!-- RIGHT: legend -->
  <text x="392" y="74" class="h">Each tool answers one robot question</text>
  <!-- rows -->
  <g>
    <circle cx="400" cy="100" r="5" fill="#e11d48"/><text x="416" y="104" class="row">Position (2.1–2.2)</text><text x="572" y="104" class="q">where is the fruit?</text>
    <circle cx="400" cy="132" r="5" fill="#0d9488"/><text x="416" y="136" class="row">Displacement b−a (2.4)</text><text x="572" y="136" class="q">what move reaches it?</text>
    <circle cx="400" cy="164" r="5" fill="#0d9488"/><text x="416" y="168" class="row">Magnitude (2.5)</text><text x="572" y="168" class="q">how far?</text>
    <circle cx="400" cy="196" r="5" fill="#0ea5e9"/><text x="416" y="200" class="row">Unit vector (2.6)</text><text x="572" y="200" class="q">which way (heading)?</text>
    <circle cx="400" cy="228" r="5" fill="#8b5cf6"/><text x="416" y="232" class="row">Dot product (2.7)</text><text x="572" y="232" class="q">is it aligned?</text>
    <circle cx="400" cy="260" r="5" fill="#8b5cf6"/><text x="416" y="264" class="row">Cross product (2.8)</text><text x="572" y="264" class="q">surface normal?</text>
    <circle cx="400" cy="292" r="5" fill="#10b981"/><text x="416" y="296" class="row">Distance (2.9)</text><text x="572" y="296" class="q">within reach?</text>
  </g>
  <line x1="392" y1="316" x2="700" y2="316" stroke="#e2e8f0" stroke-width="1"/>
  <text x="392" y="340" class="c">Perception gives positions; reasoning combines them;</text>
  <text x="392" y="358" class="c">action follows the resulting vector.</text>
</svg>
