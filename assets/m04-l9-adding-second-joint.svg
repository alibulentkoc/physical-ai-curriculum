<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A planar two-link arm: the first link at angle theta one places the elbow, the second link at the accumulated angle theta one plus theta two reaches the gripper, with the position formula.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.f{font-family:monospace;font-size:12px;fill:#0f172a}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Two-link arm: the second joint lives at the elbow</text>
  <!-- base -->
  <circle cx="120" cy="220" r="6" fill="#10b981"/><text x="120" y="242" text-anchor="middle" class="c">base</text>
  <!-- link1 to elbow at 30deg -->
  <line x1="120" y1="220" x2="259" y2="140" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="259" cy="140" r="6" fill="#10b981"/><text x="265" y="158" class="c">elbow (L1cosθ1, L1sinθ1)</text>
  <path d="M 170 220 A 50 50 0 0 0 156 192" fill="none" stroke="#475569" stroke-width="1.4"/><text x="178" y="208" class="c">θ1</text>
  <!-- link2 to gripper at accumulated 90deg (straight up) -->
  <line x1="259" y1="140" x2="259" y2="50" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="259" cy="50" r="7" fill="#e11d48"/><text x="270" y="50" class="c">gripper</text>
  <path d="M 300 140 A 42 42 0 0 0 285 108" fill="none" stroke="#475569" stroke-width="1.4"/><text x="300" y="120" class="c">θ2 (rel. to link 1)</text>
  <text x="440" y="120" class="f">gripper =</text>
  <text x="440" y="142" class="f">(L1cosθ1 + L2cos(θ1+θ2),</text>
  <text x="440" y="160" class="f"> L1sinθ1 + L2sin(θ1+θ2))</text>
  <text x="440" y="186" class="b">orientation = θ1 + θ2</text>
</svg>
