<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="On the left, two engineers place coordinate frames differently on the same arm giving inconsistent matrices; on the right, the DH convention gives one agreed frame placement and a compact four-number description.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Arbitrary frames → inconsistent · DH convention → one standard</text>
  <!-- left: arbitrary -->
  <rect x="30" y="45" width="300" height="180" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="180" y="68" text-anchor="middle" class="b">same arm, different frames</text>
  <circle cx="90" cy="160" r="5" fill="#10b981"/>
  <line x1="90" y1="160" x2="180" y2="120" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <line x1="180" y1="120" x2="250" y2="90" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <!-- engineer A frames (red-ish) -->
  <line x1="90" y1="160" x2="112" y2="160" stroke="#dc2626" stroke-width="2"/><line x1="90" y1="160" x2="90" y2="138" stroke="#dc2626" stroke-width="2"/>
  <line x1="180" y1="120" x2="200" y2="112" stroke="#dc2626" stroke-width="2"/>
  <!-- engineer B frames (purple, rotated) -->
  <line x1="90" y1="160" x2="105" y2="145" stroke="#7c3aed" stroke-width="2" stroke-dasharray="2 2"/>
  <line x1="180" y1="120" x2="172" y2="103" stroke="#7c3aed" stroke-width="2" stroke-dasharray="2 2"/>
  <text x="180" y="205" text-anchor="middle" class="c">engineer A vs B → different matrices</text>
  <!-- right: DH -->
  <rect x="370" y="45" width="300" height="180" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="520" y="68" text-anchor="middle" class="b">DH frames + 4-number table</text>
  <circle cx="430" cy="160" r="5" fill="#10b981"/>
  <line x1="430" y1="160" x2="520" y2="120" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <line x1="520" y1="120" x2="590" y2="90" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <line x1="430" y1="160" x2="452" y2="160" stroke="#dc2626" stroke-width="2"/><line x1="430" y1="160" x2="430" y2="138" stroke="#10b981" stroke-width="2"/>
  <line x1="520" y1="120" x2="540" y2="112" stroke="#dc2626" stroke-width="2"/><line x1="520" y1="120" x2="513" y2="100" stroke="#10b981" stroke-width="2"/>
  <text x="520" y="200" text-anchor="middle" class="c">(θ, d, a, α) per joint</text>
  <text x="350" y="244" text-anchor="middle" class="c">Same physics; DH standardizes the description: 6 free choices per frame → 4 parameters.</text>
</svg>
