<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Unit conversion is multiplication by ratios equal to one; dimensions must match across an equation.">
  <defs>
    <marker id="a12" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .t{font-size:18px;font-weight:700;fill:#0f172a}
      .l{font-size:14px;font-weight:600;fill:#0f172a}
      .c{font-size:12px;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:10}
      .gate{fill:#f8fafc;stroke:#0d9488;stroke-width:1.5;rx:10}
      .flow{fill:none;stroke:#334155;stroke-width:2.5;marker-end:url(#a12)}
    </style>
  </defs>
  <text x="380" y="30" text-anchor="middle" class="t">Two rules: convert by &#215;1, and keep dimensions matched</text>

  <!-- conversion chain -->
  <text x="40" y="76" class="l">Unit conversion = multiply by a ratio equal to 1</text>
  <rect class="box" x="40" y="92" width="120" height="50" rx="10"/>
  <text x="100" y="122" text-anchor="middle" class="l">30 cm</text>
  <rect class="gate" x="200" y="92" width="150" height="50" rx="10"/>
  <text x="275" y="116" text-anchor="middle" class="c">&#215; (1 m / 100 cm)</text>
  <text x="275" y="132" text-anchor="middle" class="c">= &#215; 1</text>
  <rect class="box" x="390" y="92" width="120" height="50" rx="10"/>
  <text x="450" y="122" text-anchor="middle" class="l">0.30 m</text>
  <path class="flow" d="M162 117 L198 117"/>
  <path class="flow" d="M352 117 L388 117"/>
  <text x="560" y="122" class="c">same length,</text>
  <text x="560" y="138" class="c">different unit</text>

  <!-- dimension match -->
  <text x="40" y="196" class="l">Dimensional homogeneity: each side must share a dimension</text>
  <rect class="box" x="40" y="214" width="300" height="70" rx="10"/>
  <text x="60" y="244" class="l" fill="#15803d">v = d / t</text>
  <text x="60" y="268" class="c">L T&#8315;&#185; = L / T = L T&#8315;&#185;  &#10003; dimensions match</text>

  <rect class="box" x="420" y="214" width="300" height="70" rx="10"/>
  <text x="440" y="244" class="l" fill="#b91c1c">v = d &#183; t</text>
  <text x="440" y="268" class="c">L T&#8315;&#185; vs L T  &#10007; mismatch &#8594; wrong equation</text>

  <text x="380" y="308" text-anchor="middle" class="c">A number without a unit is not an instruction; a dimension mismatch is a bug you can catch before computing.</text>
</svg>
