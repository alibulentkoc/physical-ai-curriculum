<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A serial chain of alternating rigid links and joints with one revolute joint shown with a rotation arrow and one prismatic joint shown with a slide arrow, and a note that degrees of freedom equals the number of joints.">
  <defs>
    <marker id="rv" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">A serial arm: alternating links and joints</text>
  <!-- base -->
  <rect x="40" y="150" width="40" height="20" fill="#475569"/><text x="60" y="186" text-anchor="middle" class="c">base</text>
  <!-- revolute joint -->
  <circle cx="120" cy="150" r="10" fill="#10b981"/>
  <path d="M 120 128 A 22 22 0 0 1 142 150" fill="none" stroke="#047857" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" class="c" fill="#047857">revolute (θ)</text>
  <!-- link 1 -->
  <line x1="120" y1="150" x2="240" y2="150" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <text x="180" y="172" text-anchor="middle" class="c">link (rigid)</text>
  <!-- prismatic joint -->
  <rect x="240" y="142" width="60" height="16" fill="#f59e0b"/>
  <line x1="300" y1="150" x2="350" y2="150" stroke="#475569" stroke-width="1.5"/>
  <line x1="310" y1="135" x2="345" y2="135" stroke="#b45309" stroke-width="2"/><polygon points="345,131 353,135 345,139" fill="#b45309"/><polygon points="310,131 302,135 310,139" fill="#b45309"/>
  <text x="320" y="124" text-anchor="middle" class="c" fill="#b45309">prismatic (d)</text>
  <!-- link 2 + gripper -->
  <line x1="350" y1="150" x2="470" y2="150" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <path d="M 470 142 L 486 142 M 470 158 L 486 158 M 470 142 L 470 158" stroke="#e11d48" stroke-width="3" fill="none"/>
  <text x="478" y="176" text-anchor="middle" class="c" fill="#e11d48">gripper</text>
  <text x="350" y="212" text-anchor="middle" class="b">Each joint adds one degree of freedom · DOF = number of joints · serial chain: base → … → gripper</text>
</svg>
