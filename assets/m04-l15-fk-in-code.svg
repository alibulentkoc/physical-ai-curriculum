<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A code-flow diagram: list of joint factors, multiply in order, T 0 n, extract position and orientation, with a SymPy branch giving a symbolic formula.">
  <defs>
    <marker id="f15" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Forward kinematics in code</text>
  <rect x="30" y="60" width="130" height="46" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="95" y="80" text-anchor="middle" class="b">joint factors</text><text x="95" y="96" text-anchor="middle" class="c">[T₀¹, T₁², …]</text>
  <line x1="160" y1="83" x2="195" y2="83" stroke="#0f172a" stroke-width="1.5" marker-end="url(#f15)"/>
  <rect x="200" y="60" width="120" height="46" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="260" y="80" text-anchor="middle" class="b">multiply (∏)</text><text x="260" y="96" text-anchor="middle" class="c">base→tip</text>
  <line x1="320" y1="83" x2="355" y2="83" stroke="#0f172a" stroke-width="1.5" marker-end="url(#f15)"/>
  <rect x="360" y="60" width="90" height="46" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="405" y="87" text-anchor="middle" class="b">T₀ⁿ</text>
  <line x1="450" y1="83" x2="485" y2="70" stroke="#0f172a" stroke-width="1.5" marker-end="url(#f15)"/>
  <line x1="450" y1="83" x2="485" y2="98" stroke="#0f172a" stroke-width="1.5" marker-end="url(#f15)"/>
  <rect x="490" y="50" width="110" height="30" rx="8" fill="#fff" stroke="#e2e8f0"/><text x="545" y="70" text-anchor="middle" class="b">position p</text>
  <rect x="490" y="88" width="110" height="30" rx="8" fill="#fff" stroke="#e2e8f0"/><text x="545" y="108" text-anchor="middle" class="b">orientation R</text>
  <!-- sympy branch -->
  <rect x="200" y="140" width="250" height="40" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="325" y="165" text-anchor="middle" class="b" fill="#7c3aed">SymPy → symbolic p(θ), R(θ)</text>
  <text x="350" y="210" text-anchor="middle" class="c">One function for any arm · verify numeric FK vs the planar closed form.</text>
</svg>
