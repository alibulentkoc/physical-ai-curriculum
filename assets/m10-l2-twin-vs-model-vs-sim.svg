<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:12px;fill:#94a3b8}</style></defs>
  <text x="350" y="30" text-anchor="middle" class="t">Model &#8834; Simulation &#8834; Digital Twin</text>
  <rect x="120" y="60" width="460" height="290" rx="16" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.6"/>
  <text x="350" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#0d9488">Digital Twin &#8212; paired + live</text>
  <rect x="170" y="104" width="360" height="210" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="350" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">Simulation &#8212; runs it forward</text>
  <rect x="225" y="148" width="250" height="140" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="350" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Model</text>
  <text x="350" y="192" text-anchor="middle" class="c">how the system behaves</text>
  <text x="350" y="232" text-anchor="middle" class="c">(the Module 9 layers)</text>
  <text x="350" y="262" text-anchor="middle" class="c">run forward &#8594; a trajectory</text>
  <!-- binding arrow into twin ring only -->
  <path d="M40,205 L118,150" fill="none" stroke="#b45309" stroke-width="2.6" marker-end="url(#a)"/>
  <text x="60" y="240" class="c" fill="#b45309">sync to</text>
  <text x="48" y="254" class="c" fill="#b45309">real asset</text>
  <text x="350" y="338" text-anchor="middle" class="c">twin = model + simulation + live pairing</text>
</svg>
