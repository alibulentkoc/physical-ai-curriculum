<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A matrix shown as a machine: input unit arrows and a shape enter, the matrix acts, and transformed arrows and shape come out. The matrix columns are where the unit arrows land.">
  <defs>
    <marker id="oi" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0ea5e9"/></marker>
    <marker id="oj" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b5cf6"/></marker>
    <marker id="ob" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:13px;font-weight:700;fill:#334155}.c{font-size:12px;fill:#64748b}</style>
  </defs>
  <text x="350" y="28" text-anchor="middle" class="t">A matrix is an action: points in → moved points out</text>
  <!-- input -->
  <text x="110" y="64" text-anchor="middle" class="l">input</text>
  <line x1="60" y1="240" x2="160" y2="240" stroke="#94a3b8" stroke-width="1"/>
  <line x1="60" y1="240" x2="60" y2="140" stroke="#94a3b8" stroke-width="1"/>
  <line x1="60" y1="240" x2="130" y2="240" stroke="#0ea5e9" stroke-width="3" marker-end="url(#oi)"/>
  <line x1="60" y1="240" x2="60" y2="170" stroke="#8b5cf6" stroke-width="3" marker-end="url(#oj)"/>
  <text x="135" y="256" class="c" fill="#0284c7">e1</text><text x="40" y="165" class="c" fill="#7c3aed">e2</text>
  <!-- machine -->
  <rect x="280" y="120" width="140" height="120" rx="14" fill="#f1f5f9" stroke="#0f172a" stroke-width="1.5"/>
  <text x="350" y="175" text-anchor="middle" class="l">matrix M</text>
  <text x="350" y="198" text-anchor="middle" class="c">the action</text>
  <line x1="180" y1="190" x2="270" y2="190" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ob)"/>
  <line x1="430" y1="190" x2="520" y2="190" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ob)"/>
  <!-- output (rotated+scaled example) -->
  <text x="600" y="64" text-anchor="middle" class="l">output</text>
  <line x1="540" y1="240" x2="660" y2="240" stroke="#94a3b8" stroke-width="1"/>
  <line x1="540" y1="240" x2="540" y2="120" stroke="#94a3b8" stroke-width="1"/>
  <line x1="540" y1="240" x2="610" y2="210" stroke="#0ea5e9" stroke-width="3" marker-end="url(#oi)"/>
  <line x1="540" y1="240" x2="575" y2="150" stroke="#8b5cf6" stroke-width="3" marker-end="url(#oj)"/>
  <text x="615" y="208" class="c" fill="#0284c7">e1→</text><text x="578" y="148" class="c" fill="#7c3aed">e2→</text>
  <text x="350" y="284" text-anchor="middle" class="c">The columns of M are where the unit arrows e1, e2 land — that fully defines the action.</text>
  <text x="350" y="306" text-anchor="middle" class="c">(2×2 matrices turn / stretch / flip about the origin; translation stays conceptual until Module 2.)</text>
</svg>
