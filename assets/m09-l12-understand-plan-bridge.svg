<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:700;fill:#0f172a}
      .caption{font-size:12px;fill:#94a3b8}
      .pose{fill:#fee2e2;stroke:#ef4444;stroke-width:2}
      .pier{fill:#fff;stroke-width:2}
      .p1{stroke:#8b5cf6}.p2{stroke:#0ea5e9}
      .out{fill:#dcfce7;stroke:#15803d;stroke-width:2}
      .name{font-size:12px;font-weight:700;fill:#0f172a}
      .sub{font-size:10px;fill:#64748b}
      .flow{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}
      .fault{font-size:10px;font-weight:700;fill:#b91c1c}
    </style>
  </defs>
  <text x="390" y="28" text-anchor="middle" class="title">Unit 3 &#183; The Understand &#8594; Plan Bridge</text>
  <text x="390" y="48" text-anchor="middle" class="caption">pose &#8594; configuration &#8594; reference &#183; from deciding to moving</text>

  <rect class="pose" x="20"  y="120" width="130" height="64" rx="12"/><text x="85"  y="150" text-anchor="middle" class="name">target pose</text><text x="85"  y="168" text-anchor="middle" class="sub">(x, y) from U2</text>
  <rect class="pier p1" x="210" y="120" width="150" height="64" rx="12"/><text x="285" y="146" text-anchor="middle" class="name">IK + FK verify</text><text x="285" y="164" text-anchor="middle" class="sub">M5 / M4</text>
  <rect class="pier p2" x="420" y="120" width="150" height="64" rx="12"/><text x="495" y="146" text-anchor="middle" class="name">M7 planner</text><text x="495" y="164" text-anchor="middle" class="sub">wrapped verbatim</text>
  <rect class="out" x="630" y="120" width="130" height="64" rx="12"/><text x="695" y="146" text-anchor="middle" class="name">reference(t)</text><text x="695" y="164" text-anchor="middle" class="sub">validated &#8594; Execute</text>

  <path class="flow" d="M150,152 L208,152"/>
  <path class="flow" d="M360,152 L418,152"/>
  <path class="flow" d="M570,152 L628,152"/>

  <text x="285" y="208" text-anchor="middle" class="fault">IK &#8594; None = unreachable</text>
  <text x="495" y="208" text-anchor="middle" class="fault">validated=False = infeasible</text>
  <text x="390" y="244" text-anchor="middle" class="caption">math is M5/M7 &#183; the seam decisions are integration's</text>
</svg>
