<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Several camera-frame points projected onto an image: most land inside the frame, one lands outside (out of frame), one is behind the camera and flagged invalid.">
  <defs>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.ok{font-size:10.5px;font-weight:700;fill:#15803d}.out{font-size:10.5px;font-weight:700;fill:#b45309}.bad{font-size:10.5px;font-weight:700;fill:#b91c1c}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">Projecting many points: × K, ÷Z per point, then check validity</text>
  <circle cx="60" cy="160" r="4" fill="#0f172a"/><text x="44" y="150" class="c">cam</text>
  <!-- image frame -->
  <rect x="360" y="70" width="220" height="170" rx="4" fill="#0f172a"/><text x="470" y="62" text-anchor="middle" class="c">image (640×480)</text>
  <!-- valid points -->
  <circle cx="150" cy="130" r="6" fill="#e11d48"/><circle cx="170" cy="180" r="6" fill="#e11d48"/>
  <line x1="156" y1="132" x2="430" y2="120" stroke="#64748b" stroke-width="1" marker-end="url(#ma)"/>
  <line x1="176" y1="180" x2="470" y2="180" stroke="#64748b" stroke-width="1" marker-end="url(#ma)"/>
  <circle cx="430" cy="120" r="6" fill="#22c55e"/><circle cx="470" cy="180" r="6" fill="#22c55e"/>
  <text x="470" y="225" text-anchor="middle" class="ok">in frame ✓</text>
  <!-- out of frame -->
  <circle cx="200" cy="95" r="6" fill="#e11d48"/>
  <line x1="206" y1="96" x2="610" y2="90" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ma)"/>
  <circle cx="615" cy="90" r="6" fill="#f59e0b"/><text x="600" y="60" text-anchor="middle" class="out">out of frame</text>
  <!-- behind camera -->
  <circle cx="40" cy="220" r="6" fill="#94a3b8"/><text x="120" y="235" class="bad">Z ≤ 0 behind camera = invalid</text>
  <text x="340" y="284" text-anchor="middle" class="c">Valid = in front (Z&gt;0) AND in frame (0 ≤ u &lt; W, 0 ≤ v &lt; H).</text>
</svg>
