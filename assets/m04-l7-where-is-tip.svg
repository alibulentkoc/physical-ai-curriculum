<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The pose matrix T 0 1 with its translation column highlighted as position and its rotation block highlighted as orientation, next to the one-joint arm with those quantities marked.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.m{font-family:monospace;font-size:15px;fill:#0f172a}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Reading the gripper pose out of the matrix</text>
  <!-- matrix -->
  <text x="70" y="95" class="m">cosθ  −sinθ │ Lcosθ</text>
  <text x="70" y="125" class="m">sinθ   cosθ │ Lsinθ</text>
  <text x="70" y="155" class="m">  0      0   │   1</text>
  <rect x="63" y="78" width="118" height="86" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <text x="122" y="190" text-anchor="middle" class="b" fill="#7c3aed">orientation (R block)</text>
  <rect x="188" y="78" width="86" height="86" fill="none" stroke="#e11d48" stroke-width="2"/>
  <text x="231" y="208" text-anchor="middle" class="b" fill="#e11d48">position (last column)</text>
  <!-- arm -->
  <circle cx="430" cy="160" r="5" fill="#10b981"/>
  <line x1="430" y1="160" x2="510" y2="100" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="510" cy="100" r="7" fill="#e11d48"/>
  <line x1="510" y1="100" x2="540" y2="78" stroke="#7c3aed" stroke-width="2"/>
  <text x="560" y="100" class="c">position = tip</text>
  <text x="560" y="80" class="c">orientation = arrow</text>
  <text x="350" y="232" text-anchor="middle" class="c">Last column → position; upper-left block → orientation. Same recipe for any T₀ⁿ.</text>
</svg>
