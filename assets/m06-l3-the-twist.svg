<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="v" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
    <marker id="w" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/></marker>
    <marker id="vp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#be123c"/></marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="600" fill="#111827">One twist sets the velocity of every point:  v_P = v + &#969; &#215; r</text>

  <!-- rigid body: bracket / L shape -->
  <path d="M 220 300 L 220 180 L 250 180 L 250 270 L 380 270 L 380 300 Z" fill="#f1f5f9" stroke="#334155" stroke-width="2.5"/>

  <!-- reference point O -->
  <circle cx="235" cy="285" r="5" fill="#334155"/>
  <text x="216" y="305" font-size="14" font-weight="600" fill="#334155">O</text>
  <!-- v at O -->
  <line x1="235" y1="285" x2="320" y2="262" stroke="#0d9488" stroke-width="3.2" marker-end="url(#v)"/>
  <text x="300" y="252" font-size="15" fill="#0d9488" font-weight="600">v</text>
  <!-- omega arc at O -->
  <path d="M 256 268 A 26 26 0 0 1 218 268" stroke="#b45309" stroke-width="2.8" fill="none" marker-end="url(#w)"/>
  <text x="260" y="252" font-size="15" fill="#b45309" font-weight="600">&#969;</text>

  <!-- point P -->
  <circle cx="365" cy="285" r="5" fill="#be123c"/>
  <text x="360" y="305" font-size="14" font-weight="600" fill="#be123c">P</text>
  <!-- r from O to P -->
  <line x1="240" y1="285" x2="358" y2="285" stroke="#475569" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#r)"/>
  <text x="295" y="300" font-size="13" fill="#475569">r</text>
  <!-- v_P at P -->
  <line x1="365" y1="285" x2="455" y2="250" stroke="#be123c" stroke-width="3.2" marker-end="url(#vp)"/>
  <text x="452" y="242" font-size="15" fill="#be123c" font-weight="600">v_P</text>

  <!-- twist stack -->
  <rect x="540" y="160" width="120" height="92" rx="8" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="600" y="150" text-anchor="middle" font-size="14" fill="#111827" font-weight="600">twist &#958;</text>
  <line x1="556" y1="206" x2="644" y2="206" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="600" y="192" text-anchor="middle" font-size="16" fill="#0d9488" font-weight="700">v</text>
  <text x="600" y="234" text-anchor="middle" font-size="16" fill="#b45309" font-weight="700">&#969;</text>
  <text x="600" y="268" text-anchor="middle" font-size="12.5" fill="#6b7280">(D-057: linear on top)</text>

  <text x="360" y="392" text-anchor="middle" font-size="13.5" fill="#6b7280">&#969; is shared by all points; v is tied to the reference point O</text>
</svg>
