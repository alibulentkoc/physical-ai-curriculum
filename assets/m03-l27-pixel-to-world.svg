<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The full pixel-to-world pipeline: detected pixel, undistort, K inverse ray plus depth, camera-frame point, transform to world, ending at a fruit world position near the robot.">
  <defs>
    <marker id="fa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:10.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="20" text-anchor="middle" class="t">Pixel → world: the assembled estimate</text>
  <rect x="14" y="70" width="86" height="50" rx="9" fill="#0f172a"/><text x="57" y="92" text-anchor="middle" class="b" fill="#fff">pixel</text><text x="57" y="108" text-anchor="middle" class="c" fill="#cbd5e1">(u_d,v_d)</text>
  <rect x="116" y="70" width="92" height="50" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="162" y="92" text-anchor="middle" class="b">undistort</text><text x="162" y="108" text-anchor="middle" class="c">Unit 5</text>
  <rect x="224" y="70" width="104" height="50" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="276" y="92" text-anchor="middle" class="b">K⁻¹ ray + depth</text><text x="276" y="108" text-anchor="middle" class="c">Unit 6</text>
  <rect x="344" y="70" width="92" height="50" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="390" y="92" text-anchor="middle" class="b">P_c (camera)</text><text x="390" y="108" text-anchor="middle" class="c">3D point</text>
  <rect x="452" y="70" width="104" height="50" rx="9" fill="#e0e7ff" stroke="#a5b4fc"/><text x="504" y="92" text-anchor="middle" class="b">T(world←cam)</text><text x="504" y="108" text-anchor="middle" class="c">Unit 7</text>
  <rect x="572" y="70" width="112" height="50" rx="9" fill="#fee2e2" stroke="#fecaca"/><text x="628" y="92" text-anchor="middle" class="b">P_w (world)</text><text x="628" y="108" text-anchor="middle" class="c">arm target</text>
  <g stroke="#0f172a" stroke-width="1.5">
    <line x1="100" y1="95" x2="114" y2="95" marker-end="url(#fa)"/>
    <line x1="208" y1="95" x2="222" y2="95" marker-end="url(#fa)"/>
    <line x1="328" y1="95" x2="342" y2="95" marker-end="url(#fa)"/>
    <line x1="436" y1="95" x2="450" y2="95" marker-end="url(#fa)"/>
    <line x1="556" y1="95" x2="570" y2="95" marker-end="url(#fa)"/>
  </g>
  <text x="350" y="165" text-anchor="middle" class="c">P̃_w = T(world←cam) · [ Z · K⁻¹ · undistort(u_d,v_d) ]   ·  sanity-check: re-projection, distance, workspace</text>
</svg>
