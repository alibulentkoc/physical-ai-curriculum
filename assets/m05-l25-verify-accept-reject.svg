<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The solve-verify-accept-or-reject pipeline: an IK solver produces a candidate theta, forward kinematics computes the reached point, a comparator checks the residual against tolerance; within tolerance the candidate is accepted and commanded, otherwise rejected and re-solved.">
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
<marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b91c1c"/></marker>
<marker id="ak" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">Solve → verify with FK → accept or reject</text>
<rect x="24" y="60" width="120" height="48" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="84" y="80" text-anchor="middle" class="b">IK solver</text><text x="84" y="98" text-anchor="middle" class="c">candidate θ</text>
<line x1="146" y1="84" x2="176" y2="84" stroke="#0d9488" stroke-width="2" marker-end="url(#ak)"/>
<rect x="178" y="60" width="140" height="48" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="248" y="80" text-anchor="middle" class="b">forward kinematics</text><text x="248" y="98" text-anchor="middle" class="c">p_reached = f(θ)</text>
<line x1="320" y1="84" x2="350" y2="84" stroke="#0d9488" stroke-width="2" marker-end="url(#ak)"/>
<rect x="352" y="58" width="150" height="52" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="427" y="80" text-anchor="middle" class="b">‖p_target − p_reached‖</text><text x="427" y="98" text-anchor="middle" class="c">&lt; tol ?</text>
<line x1="504" y1="74" x2="556" y2="56" stroke="#15803d" stroke-width="2" marker-end="url(#ag)"/>
<line x1="504" y1="96" x2="556" y2="118" stroke="#b91c1c" stroke-width="2" marker-end="url(#ar)"/>
<rect x="558" y="36" width="92" height="36" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="604" y="59" text-anchor="middle" class="b" fill="#15803d">accept ✓</text>
<rect x="558" y="104" width="92" height="36" rx="8" fill="#fef2f2" stroke="#fecaca"/><text x="604" y="127" text-anchor="middle" class="b" fill="#b91c1c">reject ✗</text>
<text x="604" y="86" text-anchor="middle" class="c">command</text>
<text x="604" y="156" text-anchor="middle" class="c">re-solve / reposition</text>
<text x="330" y="200" text-anchor="middle" class="c">FK is exact and independent — it catches analytical, numerical, and selection errors alike.</text>
</svg>
