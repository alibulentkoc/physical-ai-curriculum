<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A frame graph: nodes world, base, arm, gripper, camera connected by directed transform edges; a highlighted path from camera through arm and base to world, with a dashed reverse edge shown as an inverse.">
  <defs>
    <marker id="g1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <marker id="g2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.n{font-size:12px;font-weight:700;fill:#0f172a}.hl{font-size:11px;font-weight:700;fill:#0f766e}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">Frames as a graph: compose along the path</text>
  <!-- nodes -->
  <g class="n" text-anchor="middle">
    <circle cx="90" cy="170" r="32" fill="#8b5cf622" stroke="#8b5cf6"/><text x="90" y="174">camera</text>
    <circle cx="250" cy="110" r="32" fill="#1d4ed822" stroke="#1d4ed8"/><text x="250" y="114">arm</text>
    <circle cx="420" cy="110" r="32" fill="#1d4ed822" stroke="#1d4ed8"/><text x="420" y="114">base</text>
    <circle cx="590" cy="170" r="32" fill="#0d948822" stroke="#0d9488"/><text x="590" y="174">world</text>
    <circle cx="250" cy="250" r="32" fill="#e11d4822" stroke="#e11d48"/><text x="250" y="254">gripper</text>
  </g>
  <!-- highlighted path camera->arm->base->world -->
  <line x1="120" y1="156" x2="222" y2="122" stroke="#0d9488" stroke-width="2.5" marker-end="url(#g2)"/>
  <line x1="282" y1="110" x2="388" y2="110" stroke="#0d9488" stroke-width="2.5" marker-end="url(#g2)"/>
  <line x1="450" y1="124" x2="560" y2="158" stroke="#0d9488" stroke-width="2.5" marker-end="url(#g2)"/>
  <text x="160" y="128" class="hl">cam→arm</text><text x="335" y="100" class="hl">arm→base</text><text x="520" y="128" class="hl">base→world</text>
  <!-- other edge + inverse dashed -->
  <line x1="250" y1="142" x2="250" y2="218" stroke="#334155" stroke-width="1.6" marker-end="url(#g1)"/><text x="300" y="185" class="c">arm→gripper</text>
  <path d="M 232 220 Q 200 185 232 150" fill="none" stroke="#0d9488" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#g2)"/><text x="178" y="190" class="c">inverse</text>
  <rect x="150" y="288" width="380" height="30" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="340" y="308" text-anchor="middle" class="hl">cam→world = (base→world)(arm→base)(cam→arm)</text>
</svg>
