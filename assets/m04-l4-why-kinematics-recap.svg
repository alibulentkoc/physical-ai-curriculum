<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The Unit 1 picture: a configuration box maps through forward kinematics to a gripper pose box, with a ladder underneath showing the build-up from one joint to n joints to a DH table.">
  <defs>
    <marker id="r4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Unit 1: the forward-kinematics map, built up one joint at a time</text>
  <rect x="120" y="55" width="150" height="48" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="195" y="84" text-anchor="middle" class="b">configuration q</text>
  <line x1="270" y1="79" x2="340" y2="79" stroke="#10b981" stroke-width="2" marker-end="url(#r4)"/><text x="305" y="70" text-anchor="middle" class="c">FK</text>
  <rect x="350" y="55" width="170" height="48" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="435" y="84" text-anchor="middle" class="b">gripper pose T₀ⁿ</text>
  <!-- ladder -->
  <text x="350" y="140" text-anchor="middle" class="c">1 joint (Unit 2)  →  2–3 joints (Unit 3)  →  n joints (Unit 4)  →  DH table (Units 5–6)</text>
  <text x="350" y="178" text-anchor="middle" class="c">joint space → task space · many-to-one · DH makes each factor systematic</text>
</svg>
