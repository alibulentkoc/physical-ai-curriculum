<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A pixel back-projected into a ray from the camera center; three candidate 3D points near, mid, and far along the ray all project to the same pixel, so depth is unknown from one image.">
  <defs>
    <marker id="ya" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}.q{font-size:20px;font-weight:800;fill:#e11d48}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">A pixel is a ray: direction known, depth unknown</text>
  <!-- camera center -->
  <circle cx="70" cy="150" r="6" fill="#0f172a"/><text x="70" y="178" text-anchor="middle" class="c">camera center</text>
  <!-- image plane -->
  <line x1="140" y1="95" x2="140" y2="205" stroke="#1d4ed8" stroke-width="2"/><text x="140" y="225" text-anchor="middle" class="c">image plane</text>
  <rect x="134" y="130" width="12" height="12" fill="#e11d48"/><text x="150" y="128" class="c" fill="#e11d48">pixel (u,v)</text>
  <!-- ray -->
  <line x1="70" y1="150" x2="660" y2="55" stroke="#f59e0b" stroke-width="2" marker-end="url(#ya)"/>
  <text x="430" y="92" class="b" fill="#b45309">ray P_c(λ) = λ·(x_n, y_n, 1)</text>
  <!-- candidate points -->
  <circle cx="260" cy="123" r="6" fill="#10b981"/><text x="260" y="113" text-anchor="middle" class="c">near</text>
  <circle cx="410" cy="99" r="6" fill="#10b981"/><text x="410" y="89" text-anchor="middle" class="c">mid</text>
  <circle cx="560" cy="75" r="6" fill="#10b981"/><text x="560" y="65" text-anchor="middle" class="c">far</text>
  <line x1="260" y1="123" x2="140" y2="136" stroke="#94a3b8" stroke-dasharray="2 2"/>
  <line x1="410" y1="99" x2="140" y2="136" stroke="#94a3b8" stroke-dasharray="2 2"/>
  <line x1="560" y1="75" x2="140" y2="136" stroke="#94a3b8" stroke-dasharray="2 2"/>
  <text x="610" y="150" class="q">λ = ?</text>
  <text x="350" y="252" text-anchor="middle" class="c">All points on the ray project to the same pixel. K⁻¹ gives the direction; depth λ = Z selects the point.</text>
</svg>
