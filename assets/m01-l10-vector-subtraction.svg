<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Vector subtraction: b minus a is the arrow pointing from the tip of a to the tip of b, the displacement from a to b.">
  <defs>
    <marker id="sa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0ea5e9"/></marker>
    <marker id="sb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/></marker>
    <marker id="sd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:14px;font-weight:700}.c{font-size:12px;fill:#64748b}</style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="t">Vector subtraction: b − a points from a to b</text>
  <line x1="80" y1="320" x2="560" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="80" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="71" y="311" width="18" height="18" rx="3" fill="#0f172a"/><text x="60" y="350" class="c">origin</text>
  <line x1="80" y1="320" x2="240" y2="230" stroke="#0ea5e9" stroke-width="3" marker-end="url(#sa)"/>
  <text x="140" y="250" class="l" fill="#0284c7">a (gripper)</text>
  <line x1="80" y1="320" x2="430" y2="130" stroke="#8b5cf6" stroke-width="3" marker-end="url(#sb)"/>
  <text x="300" y="200" class="l" fill="#7c3aed">b (tomato)</text>
  <line x1="240" y1="230" x2="430" y2="130" stroke="#0d9488" stroke-width="3.5" marker-end="url(#sd)"/>
  <text x="320" y="158" class="l" fill="#0d9488">b − a (move to make)</text>
  <text x="320" y="346" text-anchor="middle" class="c">The arm must travel b − a to go from where it is (a) to the fruit (b).</text>
</svg>
