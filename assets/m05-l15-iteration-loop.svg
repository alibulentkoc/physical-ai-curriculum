<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A gripper walking toward a target over several iterations with the error vector shrinking each step, and a side box listing the loop: measure error, joint step equals pseudoinverse of J times error, step theta, stop when error is below tolerance.">
<defs><marker id="ae" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#e11d48"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.s{font-size:11px;fill:#334155}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">Guess, measure error, step — repeat</text>
<circle cx="120" cy="235" r="5" fill="#94a3b8"/><line x1="120" y1="235" x2="326" y2="154" stroke="#e11d48" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ae)" opacity="0.70"/><circle cx="190" cy="205" r="5" fill="#94a3b8"/><line x1="190" y1="205" x2="326" y2="154" stroke="#e11d48" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ae)" opacity="0.60"/><circle cx="250" cy="182" r="5" fill="#94a3b8"/><line x1="250" y1="182" x2="326" y2="154" stroke="#e11d48" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ae)" opacity="0.50"/><circle cx="295" cy="166" r="5" fill="#94a3b8"/><line x1="295" y1="166" x2="326" y2="154" stroke="#e11d48" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ae)" opacity="0.40"/><circle cx="322" cy="156" r="5" fill="#94a3b8"/><line x1="322" y1="156" x2="326" y2="154" stroke="#e11d48" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ae)" opacity="0.30"/><text x="120" y="255" text-anchor="middle" class="c">seed θ₀</text><circle cx="330" cy="150" r="7" fill="#e11d48"/><text x="342" y="150" class="b">target</text><text x="200" y="130" class="c">error shrinks each step</text><rect x="430" y="60" width="210" height="170" rx="10" fill="#f8fafc" stroke="#e2e8f0"/><text x="445" y="85" class="b">the loop</text><text x="445" y="110" class="s">1. e = p_target − f(θ)</text><text x="445" y="134" class="s">2. Δθ = J⁺ e</text><text x="445" y="158" class="s">3. θ ← θ + α Δθ</text><text x="445" y="182" class="s">4. stop if |e| &lt; tol</text><text x="445" y="212" class="c">seed, step α, tol</text><text x="330" y="284" text-anchor="middle" class="c">The Jacobian converts the gripper-error vector into a joint correction.</text></svg>
