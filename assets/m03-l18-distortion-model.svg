<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A normalized point undergoes radial scaling that grows with radius, then a small tangential nudge, then is mapped by K to a pixel. The distortion coefficient vector is k1, k2, p1, p2, k3.">
  <defs>
    <marker id="da" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.k{font-size:11px;font-weight:800;fill:#7c3aed;font-family:monospace}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">The distortion model: radial + tangential, before K</text>
  <rect x="20" y="70" width="120" height="56" rx="10" fill="#eef2f7" stroke="#cbd5e1"/><text x="80" y="94" text-anchor="middle" class="b">ideal (x_n,y_n)</text><text x="80" y="112" text-anchor="middle" class="c">r² = x_n²+y_n²</text>
  <rect x="190" y="70" width="150" height="56" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/><text x="265" y="92" text-anchor="middle" class="b">radial × (1+k1r²+k2r⁴+k3r⁶)</text><text x="265" y="112" text-anchor="middle" class="c">grows with r</text>
  <rect x="390" y="70" width="130" height="56" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/><text x="455" y="94" text-anchor="middle" class="b">tangential (p1,p2)</text><text x="455" y="112" text-anchor="middle" class="c">slight skew</text>
  <rect x="570" y="70" width="110" height="56" rx="10" fill="#0f172a"/><text x="625" y="94" text-anchor="middle" class="b" fill="#fff">× K → pixel</text>
  <line x1="140" y1="98" x2="188" y2="98" stroke="#0f172a" stroke-width="1.6" marker-end="url(#da)"/>
  <line x1="340" y1="98" x2="388" y2="98" stroke="#0f172a" stroke-width="1.6" marker-end="url(#da)"/>
  <line x1="520" y1="98" x2="568" y2="98" stroke="#0f172a" stroke-width="1.6" marker-end="url(#da)"/>
  <text x="350" y="165" text-anchor="middle" class="k">distCoeffs = (k1, k2, p1, p2, k3)</text>
  <text x="350" y="190" text-anchor="middle" class="c">k1 dominant (sign sets barrel vs pincushion); p1,p2 usually tiny; all zero = ideal pinhole.</text>
</svg>
