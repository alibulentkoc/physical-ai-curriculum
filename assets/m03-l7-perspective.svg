<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A row of equally spaced equal-size tomatoes receding in depth, imaged with the divide-by-Z pulling distant ones toward the center; two rails converge to a vanishing point.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}</style></defs>
  <text x="340" y="24" text-anchor="middle" class="t">Perspective: divide by Z pulls distant points toward the center</text>
  <!-- vanishing rails -->
  <line x1="60" y1="280" x2="500" y2="150" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="60" y1="70" x2="500" y2="150" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="500" cy="150" r="3" fill="#64748b"/><text x="510" y="153" class="c">vanishing point</text>
  <!-- receding tomatoes, equal world size, shrinking image -->
  <circle cx="110" cy="175" r="24" fill="#e11d48"/>
  <circle cx="220" cy="168" r="17" fill="#e11d48"/>
  <circle cx="310" cy="160" r="12" fill="#e11d48"/>
  <circle cx="380" cy="156" r="8" fill="#e11d48"/>
  <circle cx="430" cy="153" r="5" fill="#e11d48"/>
  <text x="110" y="220" text-anchor="middle" class="c">near</text>
  <text x="430" y="140" text-anchor="middle" class="c">far</text>
  <text x="340" y="306" text-anchor="middle" class="c">Equally spaced, equal-size in the world; converging and shrinking in the image (x = fX/Z).</text>
</svg>
