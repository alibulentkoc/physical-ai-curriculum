<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:700;fill:#0f172a}
      .caption{font-size:12px;fill:#94a3b8}
      .stage{fill:#fff;stroke-width:2}
      .s1{stroke:#0ea5e9}.s2{stroke:#6366f1}.s3{stroke:#8b5cf6}.s4{stroke:#10b981}
      .name{font-size:11.5px;font-weight:700;fill:#0f172a}
      .flow{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}
      .guard{fill:#fee2e2;stroke:#ef4444;stroke-width:1.6}
      .gt{font-size:9px;font-weight:700;fill:#b91c1c}
      .warn{fill:#fef3c7;stroke:#f59e0b;stroke-width:1.6}
      .wt{font-size:9px;font-weight:700;fill:#b45309}
      .halt{font-size:9px;font-weight:700;fill:#b91c1c}
    </style>
  </defs>
  <text x="410" y="28" text-anchor="middle" class="title">Guards: a Tripwire at Each Seam</text>
  <text x="410" y="48" text-anchor="middle" class="caption">read the existing output &#183; fire the event &#183; hard failure halts, warning flags</text>

  <rect class="stage s1" x="30"  y="150" width="120" height="54" rx="11"/><text x="90"  y="182" text-anchor="middle" class="name">Understand</text>
  <rect class="stage s2" x="220" y="150" width="120" height="54" rx="11"/><text x="280" y="182" text-anchor="middle" class="name">Plan (IK)</text>
  <rect class="stage s3" x="410" y="150" width="120" height="54" rx="11"/><text x="470" y="182" text-anchor="middle" class="name">Plan</text>
  <rect class="stage s4" x="600" y="150" width="120" height="54" rx="11"/><text x="660" y="182" text-anchor="middle" class="name">Execute &#8594; Track</text>

  <path class="flow" d="M150,177 L218,177"/>
  <path class="flow" d="M340,177 L408,177"/>
  <path class="flow" d="M530,177 L598,177"/>

  <!-- guards above each seam -->
  <rect class="guard" x="40" y="95" width="100" height="40" rx="8"/><text x="90" y="112" text-anchor="middle" class="gt">no target?</text><text x="90" y="127" text-anchor="middle" class="halt">NO_TARGET halt</text>
  <rect class="guard" x="230" y="95" width="100" height="40" rx="8"/><text x="280" y="112" text-anchor="middle" class="gt">None?</text><text x="280" y="127" text-anchor="middle" class="halt">UNREACHABLE halt</text>
  <rect class="guard" x="420" y="95" width="100" height="40" rx="8"/><text x="470" y="112" text-anchor="middle" class="gt">validated=False?</text><text x="470" y="127" text-anchor="middle" class="halt">PLAN_INVALID halt</text>
  <rect class="guard" x="600" y="95" width="120" height="40" rx="8"/><text x="660" y="112" text-anchor="middle" class="gt">verdict false?</text><text x="660" y="127" text-anchor="middle" class="halt">TRACKING_FAILURE</text>
  <path class="flow" d="M90,135 L90,148"/>
  <path class="flow" d="M280,135 L280,148"/>
  <path class="flow" d="M470,135 L470,148"/>
  <path class="flow" d="M660,135 L660,148"/>

  <!-- health screen (warning) under Execute -->
  <rect class="warn" x="600" y="220" width="120" height="46" rx="8"/>
  <text x="660" y="238" text-anchor="middle" class="wt">health screen</text>
  <text x="660" y="253" text-anchor="middle" class="wt">NEAR_SINGULAR / EFFORT</text>
  <path class="flow" d="M660,204 L660,218"/>

  <text x="410" y="312" text-anchor="middle" class="caption">run_pipeline = these guards in sequence &#183; each reads a signal already emitted</text>
</svg>
