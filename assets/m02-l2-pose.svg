<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two panels: a gripper at the right position but wrong orientation fails; at the right position and orientation it succeeds. Pose is position plus orientation.">
  <defs>
    <marker id="p1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:13px;font-weight:700}.c{font-size:11.5px;fill:#64748b}.bad{font-size:12.5px;font-weight:700;fill:#b91c1c}.good{font-size:12.5px;font-weight:700;fill:#15803d}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">A pose = position + orientation (both needed to act)</text>
  <!-- left panel: position only, wrong orientation -->
  <rect x="40" y="55" width="280" height="220" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <circle cx="180" cy="170" r="12" fill="#e11d48"/><text x="180" y="150" text-anchor="middle" class="c">tomato</text>
  <!-- gripper wrong angle -->
  <g transform="rotate(60 180 170)"><rect x="150" y="150" width="14" height="40" fill="#1d4ed822" stroke="#1d4ed8"/><rect x="196" y="150" width="14" height="40" fill="#1d4ed822" stroke="#1d4ed8"/></g>
  <text x="180" y="258" text-anchor="middle" class="bad">position only → wrong angle → fails</text>
  <!-- right panel: pose -->
  <rect x="360" y="55" width="280" height="220" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <circle cx="500" cy="170" r="12" fill="#e11d48"/>
  <rect x="470" y="120" width="14" height="40" fill="#1d4ed822" stroke="#1d4ed8"/><rect x="516" y="120" width="14" height="40" fill="#1d4ed822" stroke="#1d4ed8"/>
  <line x1="500" y1="200" x2="500" y2="160" stroke="#1d4ed8" stroke-width="2" marker-end="url(#p1)"/><text x="514" y="185" class="c" fill="#1d4ed8">θ</text>
  <text x="500" y="258" text-anchor="middle" class="good">pose (position + orientation) → clean grasp</text>
  <text x="340" y="300" text-anchor="middle" class="c">Same position, different orientation: one fails, one works. Position alone is half an instruction.</text>
</svg>
