<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A faux-3D frame moved by an SE(3) transform T to a new pose and returned by T-inverse exactly to the start, with a tracked edge of equal length showing rigidity.">
  <defs>
    <marker id="go3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <marker id="bk3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.go{font-size:12px;font-weight:700;fill:#1d4ed8}.bk{font-size:12px;font-weight:700;fill:#0f766e}.len{font-size:10.5px;font-weight:700;fill:#15803d}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">Apply SE(3), then its inverse: back to start (rigid)</text>
  <!-- start frame (ghost) -->
  <g transform="translate(140,210)">
    <line x1="0" y1="0" x2="26" y2="-7" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 2"/>
    <line x1="0" y1="0" x2="12" y2="-24" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 2"/>
    <line x1="0" y1="0" x2="-18" y2="-12" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 2"/>
    <circle r="3" fill="#94a3b8"/>
  </g>
  <text x="140" y="245" text-anchor="middle" class="c">start</text>
  <line x1="140" y1="210" x2="166" y2="203" stroke="#15803d" stroke-width="2.5"/><text x="120" y="195" class="len">d</text>
  <!-- moved frame -->
  <g transform="translate(500,140) rotate(-35)">
    <line x1="0" y1="0" x2="26" y2="-7" stroke="#e11d48" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="12" y2="-24" stroke="#15803d" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-18" y2="-12" stroke="#1d4ed8" stroke-width="2.5"/>
    <circle r="3" fill="#0f172a"/>
  </g>
  <text x="500" y="110" text-anchor="middle" class="go">moved</text>
  <text x="520" y="170" class="len">d (unchanged)</text>
  <!-- go / back arrows -->
  <path d="M 168 200 Q 330 120 478 138" fill="none" stroke="#1d4ed8" stroke-width="2" marker-end="url(#go3)"/>
  <text x="320" y="135" text-anchor="middle" class="go">T (apply)</text>
  <path d="M 480 160 Q 330 250 168 218" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#bk3)"/>
  <text x="330" y="250" text-anchor="middle" class="bk">T⁻¹ (rotate back, then move back)</text>
  <text x="340" y="312" text-anchor="middle" class="c">T⁻¹T = identity; the inverse of an SE(3) motion is itself SE(3).</text>
</svg>
