<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A DH table of rows theta d a alpha feeding into each row becomes a link transform then a product giving T 0 n.">
  <defs>
    <marker id="r20" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.m{font-family:monospace;font-size:11px;fill:#0f172a}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">A robot is four numbers per joint</text>
  <rect x="40" y="55" width="180" height="100" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="130" y="76" text-anchor="middle" class="b">DH table</text>
  <text x="60" y="98" class="m">i  θ    d   a    α</text>
  <text x="60" y="116" class="m">1  θ1   0   0    90</text>
  <text x="60" y="134" class="m">2  θ2   0  0.4   0</text>
  <line x1="225" y1="105" x2="285" y2="105" stroke="#10b981" stroke-width="2" marker-end="url(#r20)"/>
  <rect x="290" y="80" width="170" height="50" rx="9" fill="#fff" stroke="#e2e8f0"/><text x="375" y="110" text-anchor="middle" class="b">each row → T_{i-1}^i</text>
  <line x1="465" y1="105" x2="525" y2="105" stroke="#10b981" stroke-width="2" marker-end="url(#r20)"/>
  <rect x="530" y="80" width="130" height="50" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="595" y="110" text-anchor="middle" class="b">∏ → T₀ⁿ(θ)</text>
  <text x="350" y="190" text-anchor="middle" class="c">The table is the robot's kinematic identity. Unit 6: turn it into forward kinematics.</text>
</svg>
