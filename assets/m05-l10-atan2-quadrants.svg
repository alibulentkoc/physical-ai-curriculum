<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="An x y plane with four quadrants showing two opposite vectors, to (1,1) and to (-1,-1); atan2 gives 45 degrees and -135 degrees respectively while arctan collapses both to 45 degrees.">
<defs><marker id="v1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<marker id="v2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e11d48"/></marker>
<style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.warn{font-size:11px;font-weight:700;fill:#b91c1c}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">atan2 keeps the quadrant; arctan loses it</text>
<line x1="220" y1="150" x2="440" y2="150" stroke="#cbd5e1"/><line x1="330" y1="50" x2="330" y2="250" stroke="#cbd5e1"/><text x="445" y="154" class="c">x</text><text x="326" y="45" class="c">y</text><line x1="330" y1="150" x2="410" y2="70" stroke="#0d9488" stroke-width="3" marker-end="url(#v1)"/><text x="416" y="66" class="b" fill="#0d9488">(1, 1): atan2 = 45°</text><line x1="330" y1="150" x2="250" y2="230" stroke="#e11d48" stroke-width="3" marker-end="url(#v2)"/><text x="100" y="248" class="b" fill="#e11d48">(−1, −1): atan2 = −135°</text><text x="330" y="278" text-anchor="middle" class="warn">arctan(y/x) = 45° for BOTH — same slope, opposite directions</text></svg>
