<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two pinhole setups: small focal length gives a wide field of view and small image; large focal length gives a narrow field of view and large image.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}</style></defs>
  <text x="340" y="22" text-anchor="middle" class="t">Focal length trades field of view against magnification</text>
  <!-- top: small f -->
  <text x="60" y="64" class="l">small f</text>
  <circle cx="70" cy="110" r="4" fill="#0f172a"/>
  <line x1="70" y1="110" x2="150" y2="60" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="70" y1="110" x2="150" y2="160" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="150" y1="55" x2="150" y2="165" stroke="#94a3b8" stroke-width="2"/>
  <text x="250" y="100" class="c">wide FOV, small image</text>
  <path d="M 95 95 A 30 30 0 0 1 95 125" fill="none" stroke="#0ea5e9" stroke-width="1.3"/><text x="108" y="114" class="c" fill="#0284c7">θ large</text>
  <!-- bottom: large f -->
  <text x="60" y="224" class="l">large f</text>
  <circle cx="70" cy="270" r="4" fill="#0f172a"/>
  <line x1="70" y1="270" x2="260" y2="240" stroke="#7c3aed" stroke-width="1.4"/>
  <line x1="70" y1="270" x2="260" y2="300" stroke="#7c3aed" stroke-width="1.4"/>
  <line x1="260" y1="232" x2="260" y2="308" stroke="#94a3b8" stroke-width="2"/>
  <text x="360" y="272" class="c">narrow FOV, large image</text>
  <path d="M 100 262 A 32 32 0 0 1 100 280" fill="none" stroke="#7c3aed" stroke-width="1.3"/><text x="112" y="276" class="c" fill="#7c3aed">θ small</text>
  <text x="340" y="324" text-anchor="middle" class="c">FOV = 2·arctan(w/f). Larger f → more zoom, narrower view.</text>
</svg>
