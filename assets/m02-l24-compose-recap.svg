<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Unit 5 recap: a frame graph path composed into a product, an inset showing T times R is not R times T, and a dashed inverse arrow for the reverse path.">
  <defs>
    <marker id="rc" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <marker id="rc2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.k{font-size:12.5px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="350" y="26" text-anchor="middle" class="t">Unit 5: compose along the path (order matters; invert to reverse)</text>
  <!-- graph path -->
  <rect x="30" y="55" width="420" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <g class="l" text-anchor="middle">
    <circle cx="90" cy="130" r="26" fill="#8b5cf622" stroke="#8b5cf6"/><text x="90" y="134">cam</text>
    <circle cx="240" cy="100" r="26" fill="#1d4ed822" stroke="#1d4ed8"/><text x="240" y="104">arm</text>
    <circle cx="390" cy="130" r="26" fill="#0d948822" stroke="#0d9488"/><text x="390" y="134">world</text>
  </g>
  <line x1="114" y1="118" x2="216" y2="106" stroke="#0f766e" stroke-width="2.4" marker-end="url(#rc)"/>
  <line x1="264" y1="106" x2="366" y2="120" stroke="#0f766e" stroke-width="2.4" marker-end="url(#rc)"/>
  <path d="M 366 142 Q 240 200 114 132" fill="none" stroke="#0f766e" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#rc)"/>
  <text x="240" y="190" text-anchor="middle" class="c">reverse path = inverse</text>
  <!-- order inset -->
  <rect x="470" y="55" width="200" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="570" y="80" text-anchor="middle" class="l">order matters</text>
  <line x1="500" y1="170" x2="560" y2="170" stroke="#334155" stroke-width="1.8" marker-end="url(#rc2)"/><text x="530" y="190" text-anchor="middle" class="c">T·R</text>
  <line x1="610" y1="180" x2="610" y2="110" stroke="#334155" stroke-width="1.8" marker-end="url(#rc2)"/><text x="635" y="150" class="c">R·T</text>
  <text x="570" y="105" text-anchor="middle" class="c">different endings</text>
  <text x="350" y="242" text-anchor="middle" class="k">composition is the heart of the module</text>
  <text x="350" y="272" text-anchor="middle" class="c">Next: the midpoint checkpoint, then robot pose (Unit 6).</text>
</svg>
