<svg viewBox="0 0 540 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A feedback-loop block diagram: reference into a summing junction that subtracts measured output to form the error, error into the controller producing a command, command into the plant producing the output, and the output fed back, labeled sense, compare, correct, actuate">
<title>A feedback-loop block diagram: reference into a summing junction that subtracts measured output to form the error, error into the controller producing a command, command into the plant producing the output, and the output fed back, labeled sense, compare, correct, actuate</title>
<rect width="540" height="210" fill="white"/>
<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
<text x="270" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="650" fill="#0f172a">The feedback loop: sense → compare → correct → actuate</text>
<circle cx="120" cy="80" r="16" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
<text x="120" y="85" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="16" font-weight="400" fill="#0f172a">∑</text><text x="120" y="52" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">compare</text>
<text x="58" y="76" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="400" fill="#0d9488">q_d</text><line x1="74" y1="80" x2="102" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
<text x="96" y="96" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="400" fill="#b91c1c">−</text>
<line x1="136" y1="80" x2="190" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/><text x="163" y="72" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="400" fill="#b91c1c">e</text>
<rect x="190" y="58" width="110" height="44" rx="8" fill="#f8fafc" stroke="#0d9488" stroke-width="2"/><text x="245" y="78" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="650" fill="#0d9488">Controller</text><text x="245" y="94" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">correct</text>
<line x1="300" y1="80" x2="356" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/><text x="328" y="72" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="400" fill="#8b5cf6">u</text>
<rect x="356" y="58" width="110" height="44" rx="8" fill="#f8fafc" stroke="#0ea5e9" stroke-width="2"/><text x="411" y="78" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="650" fill="#0ea5e9">Plant (joint)</text><text x="411" y="94" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">actuate</text>
<line x1="466" y1="80" x2="510" y2="80" stroke="#64748b" stroke-width="2"/><text x="500" y="72" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="400" fill="#0f172a">q</text>
<line x1="510" y1="80" x2="510" y2="150" stroke="#64748b" stroke-width="2"/>
<line x1="510" y1="150" x2="120" y2="150" stroke="#64748b" stroke-width="2"/>
<line x1="120" y1="150" x2="120" y2="96" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
<text x="300" y="164" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">sense: measured q fed back</text>
</svg>
