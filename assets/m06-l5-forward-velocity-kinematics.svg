<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="c1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="c2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="sum" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#111827"/></marker>
  </defs>
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Each joint pushes the tool; the Jacobian columns are those pushes</text>
  <line x1="253" y1="44" x2="253" y2="288" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="507" y1="44" x2="507" y2="288" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- arm geometry helper: base (40,230), joint1 angle 0 -> link1 to (120,150), joint2 -> tool (180,110). reused in each panel with x-offset -->
  <!-- Panel 1: spin joint 1 -->
  <text x="127" y="60" text-anchor="middle" font-size="13" fill="#6b7280">spin joint 1</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round">
    <line x1="50" y1="240" x2="120" y2="170"/>
    <line x1="120" y1="170" x2="175" y2="135"/>
  </g>
  <circle cx="50" cy="240" r="6" fill="#334155"/><circle cx="120" cy="170" r="5" fill="#334155"/><circle cx="175" cy="135" r="5" fill="#dc2626"/>
  <text x="44" y="258" font-size="11" fill="#6b7280">joint 1</text>
  <line x1="175" y1="135" x2="205" y2="185" stroke="#dc2626" stroke-width="3" marker-end="url(#c1)"/>
  <text x="200" y="200" font-size="12" fill="#dc2626" font-weight="700">q&#775;&#8321; J&#8321;</text>

  <!-- Panel 2: spin joint 2 -->
  <text x="380" y="60" text-anchor="middle" font-size="13" fill="#6b7280">spin joint 2</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round">
    <line x1="303" y1="240" x2="373" y2="170"/>
    <line x1="373" y1="170" x2="428" y2="135"/>
  </g>
  <circle cx="303" cy="240" r="6" fill="#334155"/><circle cx="373" cy="170" r="5" fill="#2563eb"/><circle cx="428" cy="135" r="5" fill="#2563eb"/>
  <text x="360" y="188" font-size="11" fill="#6b7280">joint 2</text>
  <line x1="428" y1="135" x2="452" y2="180" stroke="#2563eb" stroke-width="3" marker-end="url(#c2)"/>
  <text x="446" y="196" font-size="12" fill="#2563eb" font-weight="700">q&#775;&#8322; J&#8322;</text>

  <!-- Panel 3: both -> sum -->
  <text x="634" y="60" text-anchor="middle" font-size="13" fill="#6b7280">both together</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round">
    <line x1="557" y1="240" x2="627" y2="170"/>
    <line x1="627" y1="170" x2="682" y2="135"/>
  </g>
  <circle cx="557" cy="240" r="6" fill="#334155"/><circle cx="627" cy="170" r="5" fill="#334155"/><circle cx="682" cy="135" r="5" fill="#111827"/>
  <!-- two contributions faint -->
  <line x1="682" y1="135" x2="712" y2="185" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#c1)" opacity="0.7"/>
  <line x1="682" y1="135" x2="706" y2="180" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#c2)" opacity="0.7"/>
  <!-- sum (resultant) -->
  <line x1="682" y1="135" x2="724" y2="205" stroke="#111827" stroke-width="3.2" marker-end="url(#sum)"/>
  <text x="690" y="222" font-size="12" fill="#111827" font-weight="700">&#958; = J q&#775;</text>
  <text x="634" y="285" text-anchor="middle" font-size="11.5" fill="#6b7280">tool twist = sum of per-joint pushes</text>
</svg>
