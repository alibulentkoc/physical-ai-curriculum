<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A two-link arm reaching a target with the base, elbow, and gripper forming a triangle; sides L1, L2, and reach r are labeled, the elbow interior angle theta2 and the base corner angle beta are marked.">
<defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<text x="310" y="26" text-anchor="middle" class="t">Inverse kinematics is a triangle</text>
<line x1="150.0" y1="165.0" x2="219.3" y2="115.5" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/><line x1="150.0" y1="165.0" x2="216.0" y2="164.9" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><line x1="216.0" y1="164.9" x2="219.3" y2="115.5" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/><circle cx="150.0" cy="165.0" r="5" fill="#334155"/><text x="144" y="185" class="c">base</text><circle cx="216.0" cy="164.9" r="5" fill="#475569"/><text x="224" y="181" class="c">elbow</text><circle cx="219.3" cy="115.5" r="7" fill="#e11d48"/><text x="231" y="116" class="b">target</text><text x="179" y="183" class="c">L₁</text><text x="226" y="140" class="c">L₂</text><text x="155" y="134" class="c">r = reach</text><text x="214" y="155" class="c">θ₂</text><text x="176" y="157" class="c">β</text><text x="310" y="280" text-anchor="middle" class="c">cos θ₂ = (r² − L₁² − L₂²) / (2 L₁ L₂);  θ₁ = atan2(y,x) − β.</text></svg>
