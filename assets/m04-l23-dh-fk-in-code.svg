<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="DH table plus configuration feeding per-row DH transform, then a product, then T 0 n, then position and orientation, with a SymPy branch for the symbolic pose.">
  <defs>
    <marker id="c23" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:10.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">DH forward kinematics in code</text>
  <rect x="20" y="60" width="120" height="46" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="80" y="80" text-anchor="middle" class="b">DH table + config</text>
  <line x1="140" y1="83" x2="172" y2="83" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c23)"/>
  <rect x="176" y="60" width="130" height="46" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="241" y="80" text-anchor="middle" class="b">build T_{i-1}^i / row</text><text x="241" y="96" text-anchor="middle" class="c">4-factor formula</text>
  <line x1="306" y1="83" x2="338" y2="83" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c23)"/>
  <rect x="342" y="60" width="110" height="46" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="397" y="87" text-anchor="middle" class="b">multiply (∏)</text>
  <line x1="452" y1="83" x2="484" y2="83" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c23)"/>
  <rect x="488" y="60" width="80" height="46" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="528" y="87" text-anchor="middle" class="b">T₀ⁿ</text>
  <line x1="568" y1="83" x2="600" y2="72" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c23)"/>
  <line x1="568" y1="83" x2="600" y2="98" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c23)"/>
  <rect x="604" y="56" width="80" height="26" rx="7" fill="#fff" stroke="#e2e8f0"/><text x="644" y="73" text-anchor="middle" class="b">position</text>
  <rect x="604" y="90" width="80" height="26" rx="7" fill="#fff" stroke="#e2e8f0"/><text x="644" y="107" text-anchor="middle" class="b">orientation</text>
  <rect x="176" y="140" width="240" height="38" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="296" y="164" text-anchor="middle" class="b" fill="#7c3aed">symbolic table → SymPy → p(θ), R(θ)</text>
  <text x="350" y="208" text-anchor="middle" class="c">One function, any arm · verify vs the planar closed form · numeric + symbolic.</text>
</svg>
