<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="z" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="lev" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="vel" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
  </defs>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">A revolute column, read off the geometry:  J = [ z &#215; (o&#8345; &#8722; o) ; z ]</text>

  <!-- arm: base -> joint i -> end-effector -->
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round">
    <line x1="90" y1="270" x2="220" y2="210"/>
    <line x1="220" y1="210" x2="400" y2="150"/>
    <line x1="400" y1="150" x2="560" y2="180"/>
  </g>
  <circle cx="90" cy="270" r="6" fill="#334155"/>
  <circle cx="220" cy="210" r="7" fill="#7c3aed"/>
  <circle cx="400" cy="150" r="5" fill="#334155"/>
  <circle cx="560" cy="180" r="6" fill="#dc2626"/>
  <text x="74" y="288" font-size="12" fill="#6b7280">base o&#8320;</text>
  <text x="196" y="232" font-size="12" fill="#7c3aed" font-weight="600">joint i  (o)</text>
  <text x="556" y="204" font-size="12" fill="#dc2626" font-weight="600">tool o&#8345;</text>

  <!-- axis z out of joint i -->
  <line x1="220" y1="210" x2="220" y2="120" stroke="#7c3aed" stroke-width="3" marker-end="url(#z)"/>
  <text x="226" y="118" font-size="14" fill="#7c3aed" font-weight="700">z  (axis)</text>

  <!-- lever arm o_n - o -->
  <line x1="226" y1="208" x2="554" y2="180" stroke="#475569" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#lev)"/>
  <text x="370" y="205" font-size="13" fill="#475569">o&#8345; &#8722; o  (lever arm)</text>

  <!-- resulting linear velocity z x (o_n - o): perpendicular to lever arm, in plane -->
  <line x1="560" y1="180" x2="588" y2="100" stroke="#dc2626" stroke-width="3.2" marker-end="url(#vel)"/>
  <text x="572" y="92" font-size="13" fill="#dc2626" font-weight="700">z &#215; (o&#8345;&#8722;o)</text>

  <text x="360" y="320" text-anchor="middle" font-size="13.5" fill="#6b7280">spin joint i: the tool rotates about z, gaining velocity z &#215; (lever arm); angular part is just z</text>
</svg>
