<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Applying transformation A then B to a shape equals applying the single product matrix BA. Top row shows the two-step sequence; bottom shows the one-step product giving the same result.">
  <defs>
    <marker id="ma" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:12px;fill:#64748b}.l{font-size:12.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">Multiplication composes: "do A, then B" = apply product BA</text>
  <!-- top row: sequence -->
  <polygon points="50,90 95,90 80,60 60,60" fill="#94a3b822" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="78" x2="160" y2="78" stroke="#0f172a" stroke-width="2" marker-end="url(#ma)"/><text x="135" y="68" text-anchor="middle" class="c">A</text>
  <polygon points="175,95 210,80 200,50 170,58" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="230" y1="78" x2="280" y2="78" stroke="#0f172a" stroke-width="2" marker-end="url(#ma)"/><text x="255" y="68" text-anchor="middle" class="c">B</text>
  <polygon points="300,100 345,92 360,60 315,55" fill="#0d948822" stroke="#0d9488" stroke-width="1.5"/>
  <text x="400" y="84" class="l">= result</text>
  <text x="180" y="120" class="c">do A, then B (two steps)</text>
  <!-- bottom row: product -->
  <polygon points="50,230 95,230 80,200 60,200" fill="#94a3b822" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="218" x2="280" y2="218" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ma)"/><text x="195" y="208" text-anchor="middle" class="c">apply BA (one step)</text>
  <polygon points="300,240 345,232 360,200 315,195" fill="#0d948822" stroke="#0d9488" stroke-width="1.5"/>
  <text x="400" y="224" class="l">= same result</text>
  <!-- note -->
  <rect x="470" y="70" width="190" height="160" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="565" y="100" text-anchor="middle" class="l">B(A p) = (BA) p</text>
  <text x="565" y="128" text-anchor="middle" class="c">first action on the right</text>
  <text x="565" y="156" text-anchor="middle" class="c">order matters:</text>
  <text x="565" y="176" text-anchor="middle" class="c">AB ≠ BA in general</text>
  <text x="565" y="208" text-anchor="middle" class="c">(explored in 4.8)</text>
</svg>
