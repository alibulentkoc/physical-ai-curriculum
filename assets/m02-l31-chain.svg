<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The chain camera to arm to world as three composed SE(3) poses, carrying a tomato detection from the camera frame to a world position.">
  <defs>
    <marker id="ha" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.k{font-size:11.5px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">camera → arm → world: a composed pose chain</text>
  <g class="l" text-anchor="middle">
    <circle cx="110" cy="150" r="34" fill="#8b5cf622" stroke="#8b5cf6"/><text x="110" y="146">camera</text><text x="110" y="162" class="c">detection</text>
    <circle cx="340" cy="150" r="34" fill="#1d4ed822" stroke="#1d4ed8"/><text x="340" y="154">arm</text>
    <circle cx="570" cy="150" r="34" fill="#0d948822" stroke="#0d9488"/><text x="570" y="154">world</text>
  </g>
  <line x1="144" y1="150" x2="306" y2="150" stroke="#0f766e" stroke-width="2.4" marker-end="url(#ha)"/>
  <text x="225" y="138" text-anchor="middle" class="c">T(arm←cam) extrinsics</text>
  <line x1="374" y1="150" x2="536" y2="150" stroke="#0f766e" stroke-width="2.4" marker-end="url(#ha)"/>
  <text x="455" y="138" text-anchor="middle" class="c">T(world←arm) arm pose</text>
  <circle cx="110" cy="210" r="8" fill="#e11d48"/><text x="110" y="232" text-anchor="middle" class="c">tomato (cam)</text>
  <circle cx="570" cy="210" r="8" fill="#e11d48"/><text x="570" y="232" text-anchor="middle" class="c">tomato (world)</text>
  <line x1="120" y1="216" x2="560" y2="216" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ha)"/>
  <rect x="150" y="262" width="380" height="34" rx="9" fill="#ecfdf5" stroke="#10b981"/>
  <text x="340" y="284" text-anchor="middle" class="k">p_world = T(world←arm) · T(arm←cam) · p_cam</text>
</svg>
