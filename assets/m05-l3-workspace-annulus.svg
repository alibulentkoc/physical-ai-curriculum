<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The reachable workspace of a two-link arm shown as an annulus between inner radius absolute value of L1 minus L2 and outer radius L1 plus L2, with a reachable target inside marked with a check and an unreachable target outside marked with a cross.">
<defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.g{fill:#15803d;font-size:12px;font-weight:700}.r{fill:#b91c1c;font-size:12px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">The workspace is the set of solvable targets</text>
<circle cx="240" cy="170" r="105.0" fill="#ecfdf5" stroke="#34d399"/><circle cx="240" cy="170" r="15.0" fill="#ffffff" stroke="#34d399"/><circle cx="240" cy="170" r="5" fill="#334155"/><text x="240" y="188" text-anchor="middle" class="c">base</text><line x1="240" y1="170" x2="345.0" y2="170" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3 3"/><text x="305" y="162" class="c">L₁+L₂</text><text x="247" y="164" class="c">|L₁−L₂|</text><circle cx="292.5" cy="125.0" r="6" fill="#15803d"/><text x="302" y="119" class="g">reachable ✓</text><circle cx="367.5" cy="87.5" r="6" fill="#fecaca" stroke="#b91c1c"/><text x="376" y="82" class="r">unreachable ✗</text><text x="320" y="290" text-anchor="middle" class="c">A target is solvable iff |L₁−L₂| ≤ r ≤ L₁+L₂. Joint limits would carve this down.</text></svg>
