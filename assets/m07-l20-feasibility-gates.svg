<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A trajectory passing four feasibility gates (joint limits, velocity, acceleration, reachability) with timing-fixable and geometric remedies labeled">
<title>A trajectory passing four feasibility gates (joint limits, velocity, acceleration, reachability) with timing-fixable and geometric remedies labeled</title>
<rect width="560" height="240" fill="white"/><text x="280" y="26" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="650" fill="#0f172a">Whole-trajectory feasibility: gates and remedies</text><line x1="40" y1="110" x2="520" y2="110" stroke="#e2e8f0" stroke-width="2"/><circle cx="40" cy="110" r="6" fill="#0f172a"/><text x="40" y="134" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">start</text><circle cx="520" cy="110" r="6" fill="#10b981"/><text x="520" y="134" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#10b981">run</text><rect x="86" y="86" width="68" height="48" rx="6" fill="#f8fafc" stroke="#10b981" stroke-width="2"/><text x="120" y="106" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0f172a">joint limits</text><text x="120" y="124" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#10b981">✓</text><rect x="186" y="86" width="68" height="48" rx="6" fill="#f8fafc" stroke="#d97706" stroke-width="2"/><text x="220" y="106" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0f172a">velocity</text><text x="220" y="124" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#d97706">→ slow down</text><text x="220" y="150" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#d97706">timing</text><rect x="286" y="86" width="68" height="48" rx="6" fill="#f8fafc" stroke="#10b981" stroke-width="2"/><text x="320" y="106" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0f172a">acceleration</text><text x="320" y="124" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#10b981">✓</text><rect x="386" y="86" width="68" height="48" rx="6" fill="#f8fafc" stroke="#b91c1c" stroke-width="2"/><text x="420" y="106" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0f172a">reachability</text><text x="420" y="124" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#b91c1c">→ new path</text><text x="420" y="150" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#b91c1c">geometric</text><text x="280" y="196" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">velocity/acceleration → slow down (timing)   │   joint limits/reachability → change path (geometric)</text><text x="280" y="216" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#334155">feasible only if every gate passes at every point</text>
</svg>
