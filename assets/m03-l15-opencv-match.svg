<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two parallel boxes: a hand-built pipeline and OpenCV projectPoints, both taking K, pose, and 3D points and producing the same pixels, marked as a match.">
  <defs>
    <marker id="oa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.eq{font-size:14px;font-weight:800;fill:#15803d}.mono{font-size:10.5px;font-family:monospace;fill:#1d4ed8}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">OpenCV computes our exact pipeline</text>
  <rect x="30" y="55" width="260" height="90" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="160" y="78" text-anchor="middle" class="b">by hand</text>
  <text x="160" y="100" text-anchor="middle" class="mono">P_c = R·P + t</text>
  <text x="160" y="120" text-anchor="middle" class="mono">u = f_x·X_c/Z_c + c_x</text>
  <rect x="390" y="55" width="260" height="90" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="520" y="78" text-anchor="middle" class="b">OpenCV</text>
  <text x="520" y="103" text-anchor="middle" class="mono">cv2.projectPoints(</text>
  <text x="520" y="120" text-anchor="middle" class="mono">pts, rvec, tvec, K, 0)</text>
  <!-- result -->
  <rect x="250" y="185" width="180" height="50" rx="10" fill="#0f172a"/><text x="340" y="216" text-anchor="middle" class="b" fill="#fff">same pixel (u,v)</text>
  <line x1="160" y1="145" x2="300" y2="184" stroke="#0f172a" stroke-width="1.6" marker-end="url(#oa)"/>
  <line x1="520" y1="145" x2="380" y2="184" stroke="#0f172a" stroke-width="1.6" marker-end="url(#oa)"/>
  <text x="340" y="120" text-anchor="middle" class="eq">≡</text>
  <text x="340" y="260" text-anchor="middle" class="c">Same K; rvec/tvec ≡ (R,t); distCoeffs=0 = ideal pinhole. Results match.</text>
</svg>
