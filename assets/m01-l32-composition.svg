<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Order matters: scale then rotate produces a different result from rotate then scale, shown side by side on the same starting shape.">
  <defs>
    <marker id="ca" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.l{font-size:12.5px;font-weight:700;fill:#334155}.big{font-size:14px;font-weight:800;fill:#b91c1c}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">Order matters: scale→rotate ≠ rotate→scale</text>
  <!-- Path 1: scale then rotate -->
  <text x="60" y="70" class="l" fill="#0284c7">scale → rotate</text>
  <rect x="40" y="85" width="40" height="40" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="90" y1="105" x2="120" y2="105" stroke="#0f172a" stroke-width="1.8" marker-end="url(#ca)"/><text x="105" y="98" text-anchor="middle" class="c">×2 x</text>
  <rect x="130" y="85" width="80" height="40" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="220" y1="105" x2="250" y2="105" stroke="#0f172a" stroke-width="1.8" marker-end="url(#ca)"/><text x="235" y="98" text-anchor="middle" class="c">rot 90°</text>
  <rect x="265" y="70" width="40" height="80" fill="#0ea5e933" stroke="#0ea5e9" stroke-width="2"/>
  <text x="330" y="114" class="l">result A</text>
  <!-- Path 2: rotate then scale -->
  <text x="60" y="220" class="l" fill="#7c3aed">rotate → scale</text>
  <rect x="40" y="235" width="40" height="40" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="90" y1="255" x2="120" y2="255" stroke="#0f172a" stroke-width="1.8" marker-end="url(#ca)"/><text x="105" y="248" text-anchor="middle" class="c">rot 90°</text>
  <rect x="135" y="235" width="40" height="40" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="185" y1="255" x2="215" y2="255" stroke="#0f172a" stroke-width="1.8" marker-end="url(#ca)"/><text x="200" y="248" text-anchor="middle" class="c">×2 x</text>
  <rect x="230" y="235" width="80" height="40" fill="#8b5cf633" stroke="#8b5cf6" stroke-width="2"/>
  <text x="330" y="260" class="l">result B</text>
  <!-- contrast -->
  <text x="500" y="150" text-anchor="middle" class="big">result A ≠ result B</text>
  <text x="500" y="174" text-anchor="middle" class="c">same two actions,</text>
  <text x="500" y="192" text-anchor="middle" class="c">different order,</text>
  <text x="500" y="210" text-anchor="middle" class="c">different outcome</text>
  <text x="340" y="340" text-anchor="middle" class="c">Composition = matrix product, read right-to-left. Add translate to the chain and order matters even more.</text>
</svg>
