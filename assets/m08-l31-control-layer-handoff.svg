<svg viewBox='0 0 760 420' xmlns='http://www.w3.org/2000/svg' role='img' aria-label="The control layer is the Module 9 handoff: tracking_controller(reference, measured_state) → actuator_command, the third link in velocity layer (M6) → reference layer (M7) → control layer (M8) → integrated system (M9)."><title>The control layer is the Module 9 handoff: tracking_controller(reference, measured_state) → actuator_command, the third link in velocity layer (M6) → reference layer (M7) → control layer (M8) → integrated system (M9).</title><rect x='0' y='0' width='760' height='420' fill='white'/><defs><marker id='ar' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f172a'/></marker><marker id='arT' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0d9488'/></marker></defs><text x='30' y='34' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='17' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='start'>The control layer: the Module 9 handoff</text><rect x='70' y='70' width='140' height='52' rx='12' fill='#f8fafc' stroke='#64748b' stroke-width='2'/><text x='140' y='94' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>velocity layer</text><text x='140' y='112' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#64748b' font-weight='700' font-style='normal' text-anchor='middle'>M6</text><rect x='230' y='70' width='140' height='52' rx='12' fill='#f8fafc' stroke='#64748b' stroke-width='2'/><text x='300' y='94' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>reference layer</text><text x='300' y='112' font-family='system-ui,-apple-system,Segoe UI,R