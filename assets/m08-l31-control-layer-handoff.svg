rward + feedback → actuator</text><text x='380' y='262' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#64748b' font-weight='400' font-style='italic' text-anchor='middle'>inside: M8 — anticipate · correct · deliver</text><rect x='20' y='190' width='150' height='28' rx='14' fill='white' stroke='#0ea5e9' stroke-width='2'/><text x='95.0' y='209' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0ea5e9' font-weight='700' font-style='normal' text-anchor='middle'>reference</text><line x1='170' y1='204' x2='180' y2='210' stroke='#0ea5e9' stroke-width='2' marker-end='url(#ar)'/><rect x='20' y='250' width='150' height='28' rx='14' fill='white' stroke='#0ea5e9' stroke-width='2'/><text x='95.0' y='269' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0ea5e9' font-weight='700' font-style='normal' text-anchor='middle'>measured_state</text><line x1='170' y1='264' x2='180' y2='258' stroke='#0ea5e9' stroke-width='2' marker-end='url(#ar)'/><rect x='590' y='222' width='150' height='28' rx='14' fill='white' stroke='#10b981' stroke-width='2'/><text x='665.0' y='241' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#10b981' font-weight='700' font-style='normal' text-anchor='middle'>actuator_command</text><line x1='580' y1='236' x2='588' y2='236' stroke='#10b981' stroke-width='2' marker-end='url(#ar)'/><line x1='40' y1='346' x2='720' y2='346' stroke='#d97706' stroke-width='1.5' stroke-dasharray='6 4'/><text x='40' y='338' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#d97706' font-weight='700' font-style='normal' text-anchor='start'>beyond the control layer → Module 9 (not here):</text><text x='40' y='372' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='13' fill='#64748b' font-weight='400' font-style='normal' text-anchor='start'>plan the world   ·   coordinate subsystems  