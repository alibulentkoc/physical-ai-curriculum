<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="An SE(2) 3x3 matrix annotated with a rotation block, translation column, and bottom row, beside a top-down robot pose turned by theta and moved by (tx, ty).">
  <defs>
    <marker id="s2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.n{font-size:14px;font-weight:700;fill:#0f172a}.rb{font-size:11px;font-weight:700;fill:#0284c7}.tb{font-size:11px;font-weight:700;fill:#0f766e}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">SE(2): one planar rigid motion = one 3×3 matrix</text>
  <!-- matrix -->
  <rect x="60" y="92" width="92" height="64" fill="#0ea5e914" stroke="#0ea5e9" stroke-width="1.4"/>
  <rect x="156" y="92" width="46" height="64" fill="#0d948814" stroke="#0d9488" stroke-width="1.4"/>
  <text x="74" y="120" class="n">cosθ</text><text x="116" y="120" class="n">−sinθ</text><text x="170" y="120" class="n">tx</text>
  <text x="74" y="150" class="n">sinθ</text><text x="120" y="150" class="n">cosθ</text><text x="170" y="150" class="n">ty</text>
  <text x="80" y="182" class="n">0</text><text x="126" y="182" class="n">0</text><text x="174" y="182" class="n">1</text>
  <path d="M52 88 v106 M208 88 v106" stroke="#0f172a" stroke-width="2"/>
  <text x="106" y="210" text-anchor="middle" class="rb">rotation block R(θ)</text>
  <text x="179" y="226" text-anchor="middle" class="tb">translation t</text>
  <text x="130" y="246" text-anchor="middle" class="c">bottom row [0 0 1]</text>
  <!-- pose on floor -->
  <line x1="320" y1="270" x2="640" y2="270" stroke="#cbd5e1"/><line x1="360" y1="90" x2="360" y2="270" stroke="#cbd5e1"/>
  <text x="335" y="285" class="c">floor</text>
  <circle cx="360" cy="270" r="12" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="360" y="300" text-anchor="middle" class="c">start</text>
  <g transform="translate(520,170) rotate(-50)">
    <circle r="14" fill="#1d4ed822" stroke="#1d4ed8" stroke-width="2"/>
    <line x1="0" y1="0" x2="26" y2="0" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#s2)"/>
  </g>
  <line x1="360" y1="270" x2="520" y2="170" stroke="#0f172a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="430" y="232" class="c">(tx, ty)</text><text x="540" y="150" class="c" fill="#1d4ed8">θ heading</text>
  <text x="340" y="314" text-anchor="middle" class="c">Three numbers (θ, tx, ty) specify the whole pose.</text>
</svg>
