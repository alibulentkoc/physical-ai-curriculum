<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:700;fill:#0f172a}
      .caption{font-size:12px;fill:#94a3b8}
      .stage{fill:#fff;stroke-width:2}
      .s1{stroke:#0ea5e9}.s2{stroke:#6366f1}.s3{stroke:#8b5cf6}.s4{stroke:#0ea5e9}
      .name{font-size:12px;font-weight:700;fill:#0f172a}
      .own{font-size:9.5px;fill:#64748b}
      .flow{fill:none;stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
      .baton{font-size:10px;font-weight:700;fill:#334155}
      .ok{font-size:10.5px;font-weight:700;fill:#15803d}
    </style>
  </defs>
  <text x="410" y="28" text-anchor="middle" class="title">Pose to Plan, Wired End to End</text>
  <text x="410" y="48" text-anchor="middle" class="caption">compose verified layers &#183; read the trace &#183; check the contract chain</text>

  <rect class="stage s1" x="20"  y="120" width="150" height="64" rx="12"/><text x="95"  y="148" text-anchor="middle" class="name">Perceive + Understand</text><text x="95"  y="166" text-anchor="middle" class="own">M3 + M9</text>
  <rect class="stage s2" x="250" y="120" width="140" height="64" rx="12"/><text x="320" y="148" text-anchor="middle" class="name">to_configuration</text><text x="320" y="166" text-anchor="middle" class="own">M5 IK (+ M4 FK)</text>
  <rect class="stage s3" x="470" y="120" width="140" height="64" rx="12"/><text x="540" y="148" text-anchor="middle" class="name">plan_reference</text><text x="540" y="166" text-anchor="middle" class="own">M7 planner</text>
  <rect class="stage s4" x="690" y="120" width="110" height="64" rx="12"/><text x="745" y="148" text-anchor="middle" class="name">reference(t)</text><text x="745" y="166" text-anchor="middle" class="own">&#8594; Execute</text>

  <path class="flow" d="M170,152 L248,152"/><text x="209" y="112" text-anchor="middle" class="baton">target pose</text>
  <path class="flow" d="M390,152 L468,152"/><text x="429" y="112" text-anchor="middle" class="baton">q_goal</text>
  <path class="flow" d="M610,152 L688,152"/><text x="649" y="112" text-anchor="middle" class="baton">reference</text>

  <!-- end-to-end check -->
  <text x="410" y="226" text-anchor="middle" class="ok">contract chain: target reachable &#8594; FK(q_goal)=target &#8594; validated, endpoint=target &#10003;</text>
  <text x="410" y="252" text-anchor="middle" class="caption">a break localises to a stage: None at IK (unreachable) &#183; validated=False at Plan (infeasible)</text>
</svg>
