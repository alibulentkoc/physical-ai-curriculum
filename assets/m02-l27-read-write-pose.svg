<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A robot pose before and after a move: the motion transform composed onto the old pose yields the new pose; position is the translation column and orientation the rotation block.">
  <defs>
    <marker id="rw" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <marker id="rw2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">Read a pose; update by composing a motion</text>
  <line x1="40" y1="250" x2="640" y2="250" stroke="#e2e8f0"/><line x1="120" y1="60" x2="120" y2="250" stroke="#e2e8f0"/>
  <!-- old pose -->
  <g transform="translate(200,210)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#94a3b8" stroke-width="2" marker-end="url(#rw2)"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#94a3b8" stroke-width="2" marker-end="url(#rw2)"/>
    <circle r="3" fill="#94a3b8"/>
  </g>
  <text x="200" y="234" text-anchor="middle" class="c">old pose (2,1, 0°)</text>
  <!-- motion arrow -->
  <line x1="235" y1="195" x2="430" y2="150" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#rw)"/>
  <text x="330" y="160" text-anchor="middle" class="c" fill="#1d4ed8">motion Δ</text>
  <!-- new pose -->
  <g transform="translate(470,150) rotate(-90)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#e11d48" stroke-width="2.5" marker-end="url(#rw2)"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#rw2)"/>
    <circle r="3.5" fill="#0f172a"/>
  </g>
  <text x="500" y="150" text-anchor="middle" class="l">new pose (3,1, 90°)</text>
  <rect x="170" y="270" width="340" height="34" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="340" y="292" text-anchor="middle" class="l" fill="#1d4ed8">T_new = T_old · Δ &#160;&#160;(read: t = position, R = orientation)</text>
</svg>
