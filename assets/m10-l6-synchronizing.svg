<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#94a3b8}.p{font-size:12px;font-weight:700;fill:#0f172a}</style></defs>
  <text x="360" y="28" text-anchor="middle" class="t">Synchronizing Twin &#8596; Real: the Heartbeat</text>
  <!-- loop -->
  <rect x="50" y="70" width="150" height="50" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="125" y="100" text-anchor="middle" class="p">report state</text>
  <rect x="285" y="70" width="150" height="50" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/><text x="360" y="100" text-anchor="middle" class="p">sync (copy in)</text>
  <rect x="520" y="70" width="150" height="50" rx="10" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/><text x="595" y="100" text-anchor="middle" class="p">gap &#8594; 0</text>
  <path d="M200,95 L283,95" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#a)"/>
  <path d="M435,95 L518,95" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#a)"/>
  <path d="M595,122 C595,150 125,150 125,124" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text x="360" y="166" text-anchor="middle" class="c">robot acts &#8594; gap grows &#8594; next sync resets it</text>
  <!-- sawtooth -->
  <text x="360" y="200" text-anchor="middle" class="p">divergence (gap) vs time</text>
  <line x1="80" y1="320" x2="660" y2="320" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="80" y2="320" stroke="#cbd5e1" stroke-width="1.5"/>
  <polyline points="80,320 180,250 180,320 280,250 280,320 380,250 380,320 480,250 480,320 580,250 580,320" fill="none" stroke="#0d9488" stroke-width="2.4"/>
  <text x="180" y="338" text-anchor="middle" class="c">sync</text><text x="280" y="338" text-anchor="middle" class="c">sync</text><text x="380" y="338" text-anchor="middle" class="c">sync</text><text x="480" y="338" text-anchor="middle" class="c">sync</text>
  <text x="640" y="258" class="c">sync = heartbeat</text>
</svg>
