<svg viewBox='0 0 760 420' xmlns='http://www.w3.org/2000/svg' role='img' aria-label="Jitter, overruns, and missed deadlines all add loop delay: a deterministic periodic loop is stable, but jitter and missed deadlines push the loop along the Unit-6 delay axis into instability."><title>Jitter, overruns, and missed deadlines all add loop delay: a deterministic periodic loop is stable, but jitter and missed deadlines push the loop along the Unit-6 delay axis into instability.</title><rect x='0' y='0' width='760' height='420' fill='white'/><defs><marker id='ar' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f172a'/></marker><marker id='arT' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0d9488'/></marker></defs><text x='30' y='34' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='17' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='start'>Jitter, overruns, and missed deadlines = added loop delay</text><text x='30' y='58' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#10b981' font-weight='700' font-style='normal' text-anchor='start'>(a) deterministic</text><line x1='80' y1='70' x2='80' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='150' y1='70' x2='150' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='220' y1='70' x2='220' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='290' y1='70' x2='290' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='360' y1='70' x2='360' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='430' y1='70' x2='430' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='500' y1='70' x2='500' y2='94' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><circ