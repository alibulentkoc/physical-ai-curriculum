<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A single target reached two ways by a two-link arm: an elbow-down and an elbow-up configuration mirrored across the base-to-target line, with a note that they merge into one straight arm at the workspace boundary.">
<defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<text x="310" y="24" text-anchor="middle" class="t">Two arms, one fingertip</text>
<line x1="180" y1="170" x2="258.8" y2="152.5" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5 4"/><text x="219" y="177" class="c">mirror axis (base→target)</text><polyline points="180.0,170.0 242.1,202.3 258.8,152.5" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="232" y="222" class="b" fill="#1d4ed8">elbow-down (θ₂&gt;0)</text><polyline points="180.0,170.0 222.6,114.4 258.8,152.5" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="213" y="104" class="b" fill="#0d9488">elbow-up (θ₂&lt;0)</text><circle cx="180" cy="170" r="5" fill="#334155"/><circle cx="258.8" cy="152.5" r="7" fill="#e11d48"/><text x="269" y="156" class="b">target</text><text x="310" y="282" text-anchor="middle" class="c">θ₂ = ±arccos(...). The two solutions merge into one straight arm at r = L₁+L₂.</text></svg>
