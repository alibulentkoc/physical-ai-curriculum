<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two arms side by side: a two-link arm with two clean solutions where closed form works, and a redundant multi-joint arm shown in three configurations all reaching the same target where closed form fails and numerical methods are needed.">
<defs><style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<text x="330" y="22" text-anchor="middle" class="t">When closed form runs out</text>
<line x1="330" y1="40" x2="330" y2="255" stroke="#e2e8f0"/>
<polyline points="120.0,170.0 173.2,197.7 187.5,155.0" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="120.0,170.0 156.5,122.4 187.5,155.0" fill="none" stroke="#0d9488" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="120" cy="170" r="4" fill="#334155"/><circle cx="187.5" cy="155.0" r="5" fill="#e11d48"/><text x="120" y="250" text-anchor="middle" class="b">2-link: closed form</text><text x="120" y="268" text-anchor="middle" class="c">clean triangle → 2 solutions</text><polyline points="470.0,170.0 477.8,206.7 504.6,180.5 537.5,162.5" fill="none" stroke="#1d4ed8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/><polyline points="470.0,170.0 493.3,199.4 500.0,162.5 537.5,162.5" fill="none" stroke="#0d9488" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/><polyline points="470.0,170.0 505.5,182.0 504.6,144.5 537.5,162.5" fill="none" stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/><circle cx="470" cy="170" r="4" fill="#334155"/><circle cx="537.5" cy="162.5" r="5" fill="#e11d48"/><text x="470" y="250" text-anchor="middle" class="b">redundant: numerical</text><text x="470" y="268" text-anchor="middle" class="c">∞ solutions (free θ₃)</text></svg>
