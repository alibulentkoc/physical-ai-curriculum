<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Unit 7 recap: detection in camera, extrinsics to arm, arm pose to world, composed into a world target, with a note that intrinsics are deferred.">
  <defs>
    <marker id="rr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.k{font-size:12px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="350" y="24" text-anchor="middle" class="t">How a detection becomes a robot target</text>
  <g class="l" text-anchor="middle">
    <rect x="40" y="70" width="120" height="56" rx="9" fill="#8b5cf622" stroke="#8b5cf6"/><text x="100" y="94">detection</text><text x="100" y="112" class="c">camera frame</text>
    <rect x="230" y="70" width="120" height="56" rx="9" fill="#1d4ed822" stroke="#1d4ed8"/><text x="290" y="94">camera on</text><text x="290" y="112">arm (ext.)</text>
    <rect x="420" y="70" width="120" height="56" rx="9" fill="#1d4ed822" stroke="#1d4ed8"/><text x="480" y="94">arm in</text><text x="480" y="112">world (pose)</text>
    <rect x="560" y="70" width="110" height="56" rx="9" fill="#0d948822" stroke="#0d9488"/><text x="615" y="94">world</text><text x="615" y="112">target</text>
  </g>
  <line x1="160" y1="98" x2="228" y2="98" stroke="#0f766e" stroke-width="2" marker-end="url(#rr)"/>
  <line x1="350" y1="98" x2="418" y2="98" stroke="#0f766e" stroke-width="2" marker-end="url(#rr)"/>
  <line x1="540" y1="98" x2="558" y2="98" stroke="#0f766e" stroke-width="2" marker-end="url(#rr)"/>
  <rect x="150" y="170" width="400" height="34" rx="9" fill="#ecfdf5" stroke="#10b981"/>
  <text x="350" y="192" text-anchor="middle" class="k">compose the chain: T(world←arm) · T(arm←cam) · p_cam</text>
  <text x="350" y="240" text-anchor="middle" class="c">Pure pose composition — image formation (intrinsics/projection) is Module 3.</text>
  <text x="350" y="266" text-anchor="middle" class="c">Next: the Unit 8 perception-to-pose capstone.</text>
</svg>
