<svg viewBox="0 0 520 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The greenhouse harvest cycle: home, pre-grasp, grasp, and retreat poses connected by leg paths, each leg a Plan-Parameterize-Validate workflow producing a validated reference, chained at rest into a cycle handed to Module 8">
