<svg viewBox='0 0 760 420' xmlns='http://www.w3.org/2000/svg' role='img' aria-label="Real-time means bounded worst-case timing, not average speed: a loop with every deadline met is stable; a loop that is fast on average but occasionally very late is unstable."><title>Real-time means bounded worst-case timing, not average speed: a loop with every deadline met is stable; a loop that is fast on average but occasionally very late is unstable.</title><rect x='0' y='0' width='760' height='420' fill='white'/><defs><marker id='ar' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f172a'/></marker><marker id='arT' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0d9488'/></marker></defs><text x='30' y='34' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='17' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='start'>What real-time means: worst-case timing, not average</text><text x='30' y='78' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='13' fill='#0d9488' font-weight='700' font-style='normal' text-anchor='start'>real-time: every deadline met → bounded worst case</text><line x1='90' y1='90' x2='90' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='180' y1='90' x2='180' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='270' y1='90' x2='270' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='360' y1='90' x2='360' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='450' y1='90' x2='450' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='540' y1='90' x2='540' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><line x1='630' y1='90' x2='630' y2='118' stroke='#64748b' stroke-width='1' stroke-dasharray='3 3'/><rec