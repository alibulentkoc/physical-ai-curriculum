<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs><marker id="o2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  <marker id="bk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker></defs>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">B(&#966;) converts dial-rates to real turning &#8212; and breaks at gimbal lock</text>
  <line x1="360" y1="44" x2="360" y2="276" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- left: converter -->
  <text x="185" y="62" text-anchor="middle" font-size="13" fill="#6b7280">conversion  &#969; = B(&#966;) &#966;&#775;</text>
  <text x="80" y="120" font-size="12" fill="#dc2626">r&#775;</text><text x="80" y="150" font-size="12" fill="#2563eb">p&#775;</text><text x="80" y="180" font-size="12" fill="#16a34a">y&#775;</text>
  <line x1="92" y1="116" x2="150" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#bk)"/>
  <line x1="92" y1="148" x2="150" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#bk)"/>
  <line x1="92" y1="180" x2="150" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#bk)"/>
  <rect x="150" y="128" width="46" height="44" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="173" y="156" text-anchor="middle" font-size="15" fill="#7c3aed" font-weight="700">B</text>
  <line x1="196" y1="150" x2="250" y2="150" stroke="#7c3aed" stroke-width="3" marker-end="url(#o2)"/><text x="254" y="155" font-size="14" fill="#7c3aed" font-weight="700">&#969;</text>
  <text x="185" y="220" text-anchor="middle" font-size="12" fill="#6b7280">pose-dependent converter</text>
  <!-- right: axes collapse -->
  <text x="540" y="62" text-anchor="middle" font-size="13" fill="#6b7280">near pitch 90&#176;: axes collapse</text>
  <line x1="540" y1="180" x2="540" y2="100" stroke="#dc2626" stroke-width="3"/><text x="520" y="96" font-size="11" fill="#dc2626">roll axis</text>
  <line x1="540" y1="180" x2="548" y2="100" stroke="#16a34a" stroke-width="3"/><text x="552" y="110" font-size="11" fill="#16a34a">yaw axis</text>
  <text x="540" y="210" text-anchor="middle" font-size="12.5" fill="#b91c1c" font-weight="600">det B &#8594; 0  (gimbal lock)</text>
  <text x="540" y="232" text-anchor="middle" font-size="11.5" fill="#6b7280">huge dial-rates for a small turn</text>
  <text x="360" y="262" text-anchor="middle" font-size="12.5" fill="#111827">columns of B = the axis each dial currently turns the body about</text>
</svg>
