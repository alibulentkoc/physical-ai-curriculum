<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Pose recap: an object's frame (pose), the same pose as a frame-to-frame transform, and an update arrow composing a motion onto it.">
  <defs>
    <marker id="pr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <marker id="pr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.k{font-size:12.5px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="350" y="26" text-anchor="middle" class="t">Pose: state · transform · updatable</text>
  <rect x="30" y="55" width="200" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="130" y="80" text-anchor="middle" class="l">state</text>
  <g transform="translate(110,150)"><line x1="0" y1="0" x2="28" y2="0" stroke="#e11d48" stroke-width="2.2" marker-end="url(#pr2)"/><line x1="0" y1="0" x2="0" y2="-28" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#pr2)"/><circle r="3" fill="#0f172a"/></g>
  <text x="130" y="185" text-anchor="middle" class="c">position + orientation</text>
  <rect x="250" y="55" width="200" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="350" y="80" text-anchor="middle" class="l">transform</text>
  <circle cx="300" cy="140" r="20" fill="#0d948822" stroke="#0d9488"/><text x="300" y="144" text-anchor="middle" class="c">world</text>
  <circle cx="410" cy="140" r="20" fill="#e11d4822" stroke="#e11d48"/><text x="410" y="144" text-anchor="middle" class="c">obj</text>
  <line x1="388" y1="140" x2="322" y2="140" stroke="#0f766e" stroke-width="2" marker-end="url(#pr)"/>
  <text x="350" y="180" text-anchor="middle" class="c">frame → frame</text>
  <rect x="470" y="55" width="200" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="570" y="80" text-anchor="middle" class="l">updatable</text>
  <g transform="translate(530,150)"><line x1="0" y1="0" x2="0" y2="-26" stroke="#94a3b8" stroke-width="2" marker-end="url(#pr2)"/></g>
  <line x1="535" y1="140" x2="600" y2="120" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#pr)"/>
  <text x="570" y="185" text-anchor="middle" class="c">T_new = T_old · Δ</text>
  <text x="350" y="238" text-anchor="middle" class="k">robots store, compose, and update poses</text>
  <text x="350" y="266" text-anchor="middle" class="c">Next: the camera→robot→world pipeline (Unit 7).</text>
</svg>
