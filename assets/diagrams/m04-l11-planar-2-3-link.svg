<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A planar three-link arm with links drawn at accumulated angles phi one, phi two, phi three, and the gripper as the vector sum of the three link reaches.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.f{font-family:monospace;font-size:12px;fill:#0f172a}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Three-link arm: sum of reaches at accumulated angles</text>
  <!-- base at (140,240) -->
  <circle cx="140" cy="240" r="6" fill="#10b981"/><text x="140" y="262" text-anchor="middle" class="c">base</text>
  <!-- L1 at phi1=30 -> elbow (140+0.4*scale*cos, ...). scale ~ 250 -->
  <line x1="140" y1="240" x2="227" y2="190" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <text x="175" y="205" class="c">L1 @ φ1</text>
  <!-- L2 at phi2=90 (straight up) -->
  <line x1="227" y1="190" x2="227" y2="115" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <text x="234" y="155" class="c">L2 @ φ2</text>
  <!-- L3 at phi3=60 -->
  <line x1="227" y1="115" x2="277" y2="72" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <text x="246" y="86" class="c">L3 @ φ3</text>
  <circle cx="277" cy="72" r="7" fill="#e11d48"/><text x="288" y="72" class="c">gripper</text>
  <text x="430" y="120" class="f">φ1=θ1</text>
  <text x="430" y="140" class="f">φ2=θ1+θ2</text>
  <text x="430" y="160" class="f">φ3=θ1+θ2+θ3</text>
  <text x="430" y="190" class="b">gripper = Σ Lk(cosφk, sinφk)</text>
  <text x="430" y="212" class="b">orientation = φ3</text>
</svg>
