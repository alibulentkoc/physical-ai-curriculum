<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#94a3b8}.p{font-size:12px;font-weight:700}.s{font-size:12.5px;font-weight:700;fill:#334155}</style></defs>
  <text x="360.0" y="28" text-anchor="middle" class="t">Capstone: The Self-Improving Greenhouse Harvest</text>
  <text x="360.0" y="46" text-anchor="middle" class="c">twin-in-the-loop beats the blind plan — same robot, same row</text>
  <rect x="40" y="80" width="300" height="180" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.2"/>
  <text x="190" y="106" text-anchor="middle" class="s" fill="#dc2626">blind plan</text>
  <text x="190" y="138" text-anchor="middle" class="c">reaches the blocked fruit</text>
  <text x="190" y="158" text-anchor="middle" class="c">burns its attempts, fails</text>
  <text x="190" y="178" text-anchor="middle" class="c">skips it late</text>
  <text x="190" y="214" text-anchor="middle" class="p" fill="#dc2626">fewer picks</text>
  <text x="190" y="232" text-anchor="middle" class="c">more wasted effort</text>
  <rect x="380" y="80" width="300" height="180" rx="12" fill="#ecfdf5" stroke="#15803d" stroke-width="2.2"/>
  <text x="530" y="106" text-anchor="middle" class="s" fill="#15803d">twin-in-the-loop</text>
  <text x="530" y="138" text-anchor="middle" class="c">pre-validates the pick</text>
  <text x="530" y="158" text-anchor="middle" class="c">predicts the skip</text>
  <text x="530" y="178" text-anchor="middle" class="c">adapts: re-order / skip clean</text>
  <text x="530" y="214" text-anchor="middle" class="p" fill="#15803d">more picks</text>
  <text x="530" y="232" text-anchor="middle" class="c">less wasted effort</text>
  <text x="360.0" y="288" text-anchor="middle" class="s">Mirror &#183; Simulate &#183; Monitor &#183; Predict &#183; Adapt — the full spine on one harvest</text>
  <text x="360.0" y="312" text-anchor="middle" class="c" fill="#b45309">“self-improving” = the loop improved the outcome, not that anything was learned</text>
</svg>
