<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A 4x4 SE(3) matrix annotated with a 3x3 rotation block, a 3D translation column, and bottom row 0 0 0 1, beside a faux-3D gripper pose in the canopy.">
  <defs>
    <marker id="ax3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.n{font-size:12px;font-weight:700;fill:#0f172a}.rb{font-size:10.5px;font-weight:700;fill:#0284c7}.tb{font-size:10.5px;font-weight:700;fill:#0f766e}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">SE(3): 3D rigid motion = one 4×4 matrix</text>
  <!-- 4x4 matrix -->
  <rect x="55" y="80" width="96" height="84" fill="#0ea5e914" stroke="#0ea5e9" stroke-width="1.3"/>
  <rect x="153" y="80" width="34" height="84" fill="#0d948814" stroke="#0d9488" stroke-width="1.3"/>
  <g class="n" text-anchor="middle">
    <text x="75" y="100">r11</text><text x="105" y="100">r12</text><text x="135" y="100">r13</text><text x="170" y="100">tx</text>
    <text x="75" y="124">r21</text><text x="105" y="124">r22</text><text x="135" y="124">r23</text><text x="170" y="124">ty</text>
    <text x="75" y="148">r31</text><text x="105" y="148">r32</text><text x="135" y="148">r33</text><text x="170" y="148">tz</text>
    <text x="75" y="180">0</text><text x="105" y="180">0</text><text x="135" y="180">0</text><text x="170" y="180">1</text>
  </g>
  <path d="M48 74 v118 M193 74 v118" stroke="#0f172a" stroke-width="2"/>
  <text x="103" y="206" text-anchor="middle" class="rb">3×3 rotation R</text>
  <text x="170" y="222" text-anchor="middle" class="tb">t=(tx,ty,tz)</text>
  <text x="120" y="240" text-anchor="middle" class="c">bottom row [0 0 0 1]</text>
  <!-- faux-3D pose -->
  <polygon points="320,250 470,250 560,210 410,210" fill="#f1f5f9" stroke="#cbd5e1"/>
  <line x1="360" y1="234" x2="520" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#ax3)"/>
  <line x1="360" y1="234" x2="410" y2="210" stroke="#334155" stroke-width="1.4" marker-end="url(#ax3)"/>
  <line x1="360" y1="234" x2="360" y2="110" stroke="#334155" stroke-width="1.4" marker-end="url(#ax3)"/>
  <!-- gripper frame -->
  <g transform="translate(470,150)">
    <line x1="0" y1="0" x2="28" y2="-8" stroke="#e11d48" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="14" y2="-26" stroke="#15803d" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-20" y2="-14" stroke="#1d4ed8" stroke-width="2.5"/>
    <circle r="3.5" fill="#0f172a"/>
  </g>
  <line x1="360" y1="234" x2="470" y2="150" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 4"/>
  <text x="486" y="150" class="c">gripper pose</text>
  <text x="340" y="318" text-anchor="middle" class="c">6 DOF: 3 position + 3 orientation. Same block meaning as SE(2), one dimension higher.</text>
</svg>
