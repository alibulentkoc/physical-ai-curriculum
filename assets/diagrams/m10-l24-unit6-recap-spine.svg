  <rect x="232" y="74" width="96" height="46" rx="9" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/><text x="280" y="102" text-anchor="middle" class="p" fill="#15803d">Simulate &#10003;</text>
  <rect x="336" y="74" width="96" height="46" rx="9" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/><text x="384" y="102" text-anchor="middle" class="p" fill="#15803d">Monitor &#10003;</text>
  <rect x="440" y="74" width="96" height="46" rx="9" fill="#ecfdf5" stroke="#15803d" stroke-width="2.4"/><text x="488" y="102" text-anchor="middle" class="p" fill="#15803d">Predict &#10003;</text>
