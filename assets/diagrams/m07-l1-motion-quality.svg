<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two arm motions reaching the same tomato: a jerky snap with an abrupt speed profile versus a smooth ease with a rounded speed profile">
<title>Two arm motions reaching the same tomato: a jerky snap with an abrupt speed profile versus a smooth ease with a rounded speed profile</title>
<rect width="640" height="360" fill="white"/>
<text x="320" y="28" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="17" font-weight="650" fill="#0f172a">Same target tomato — two motions</text>
<!-- left: jerky -->
<g>
<text x="160" y="56" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="600" fill="#b91c1c">jerky: bruised fruit, hardware shock</text>
<line x1="60" y1="200" x2="120" y2="140" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
<line x1="120" y1="140" x2="190" y2="120" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
<circle cx="60" cy="200" r="6" fill="#334155"/><circle cx="120" cy="140" r="5" fill="#334155"/>
<circle cx="200" cy="116" r="9" fill="#e11d48"/>
<path d="M 196 104 l 6 -9 M 208 110 l 9 -4 M 206 122 l 9 3" stroke="#b91c1c" stroke-width="2" fill="none"/>
<!-- speed inset: abrupt boxcar -->
<rect x="70" y="232" width="180" height="86" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="160" y="248" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#64748b">speed vs time (abrupt)</text>
<path d="M 82 308 L 100 308 L 100 262 L 215 262 L 215 308 L 238 308" fill="none" stroke="#b91c1c" stroke-width="2.5"/>
</g>
<!-- right: smooth -->
<g>
<text x="480" y="56" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="600" fill="#10b981">smooth: gentle contact</text>
<line x1="380" y1="200" x2="440" y2="140" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
<line x1="440" y1="140" x2="510" y2="120" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
<circle cx="380" cy="200" r="6" fill="#334155"/><circle cx="440" cy="140" r="5" fill="#334155"/>
<circle cx="520" cy="116" r="9" fill="#e11d48"/>
<rect x="390" y="232" width="180" height="86" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="480" y="248" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#64748b">speed vs time (eased)</text>
<path d="M 402.0 308.0 L 404.6 307.9 L 407.2 307.5 L 409.8 306.9 L 412.4 306.0 L 415.0 304.9 L 417.6 303.6 L 420.2 302.1 L 422.8 300.4 L 425.4 298.5 L 428.0 296.5 L 430.6 294.4 L 433.2 292.1 L 435.8 289.8 L 438.4 287.4 L 441.0 285.0 L 443.6 282.6 L 446.2 280.2 L 448.8 277.9 L 451.4 275.6 L 454.0 273.5 L 456.6 271.5 L 459.2 269.6 L 461.8 267.9 L 464.4 266.4 L 467.0 265.1 L 469.6 264.0 L 472.2 263.1 L 474.8 262.5 L 477.4 262.1 L 480.0 262.0 L 482.6 262.1 L 485.2 262.5 L 487.8 263.1 L 490.4 264.0 L 493.0 265.1 L 495.6 266.4 L 498.2 267.9 L 500.8 269.6 L 503.4 271.5 L 506.0 273.5 L 508.6 275.6 L 511.2 277.9 L 513.8 280.2 L 516.4 282.6 L 519.0 285.0 L 521.6 287.4 L 524.2 289.8 L 526.8 292.1 L 529.4 294.4 L 532.0 296.5 L 534.6 298.5 L 537.2 300.4 L 539.8 302.1 L 542.4 303.6 L 545.0 304.9 L 547.6 306.0 L 550.2 306.9 L 552.8 307.5 L 555.4 307.9 L 558.0 308.0" fill="none" stroke="#10b981" stroke-width="2.5"/>
</g>
<text x="320" y="345" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" fill="#64748b">Same start and target — the difference is the speed-vs-time shape, not the destination.</text>
</svg>
