<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A faux-3D translation vector from the origin to a gripper position with components tx ty tz along the axes, and an inset showing a point translating while a direction only rotates.">
  <defs>
    <marker id="ta" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <marker id="tv" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.tt{font-size:12px;font-weight:700;fill:#0f766e}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">Translation in 3D: t = (tx, ty, tz) = position</text>
  <!-- main faux-3D -->
  <rect x="40" y="50" width="380" height="258" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <line x1="110" y1="270" x2="330" y2="270" stroke="#334155" stroke-width="1.4" marker-end="url(#ta)"/><text x="335" y="274" class="c">x</text>
  <line x1="110" y1="270" x2="180" y2="235" stroke="#334155" stroke-width="1.4" marker-end="url(#ta)"/><text x="184" y="232" class="c">y</text>
  <line x1="110" y1="270" x2="110" y2="110" stroke="#334155" stroke-width="1.4" marker-end="url(#ta)"/><text x="116" y="112" class="c">z</text>
  <!-- translation vector -->
  <line x1="110" y1="270" x2="280" y2="150" stroke="#0d9488" stroke-width="2.5" marker-end="url(#tv)"/>
  <text x="250" y="145" class="tt">t</text>
  <!-- component steps (dashed) -->
  <line x1="110" y1="270" x2="250" y2="270" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/><text x="175" y="285" class="c">tx</text>
  <line x1="250" y1="270" x2="285" y2="252" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/><text x="270" y="266" class="c">ty</text>
  <line x1="285" y1="252" x2="280" y2="150" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/><text x="290" y="200" class="c">tz</text>
  <circle cx="280" cy="150" r="5" fill="#0f766e"/>
  <!-- inset point vs direction -->
  <rect x="440" y="50" width="200" height="258" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="540" y="74" text-anchor="middle" class="l">point vs direction</text>
  <text x="455" y="110" class="c">point (w=1):</text><text x="465" y="128" class="c">rotates + translates</text>
  <circle cx="475" cy="155" r="5" fill="#94a3b8"/><line x1="475" y1="155" x2="560" y2="145" stroke="#0f172a" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ta)"/><circle cx="560" cy="145" r="5" fill="#e11d48"/>
  <text x="455" y="205" class="c">direction (w=0):</text><text x="465" y="223" class="c">rotates only</text>
  <line x1="470" y1="265" x2="520" y2="240" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#ta)"/>
  <line x1="560" y1="265" x2="610" y2="240" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#ta)"/>
  <text x="340" y="328" text-anchor="middle" class="c">Position is the translation column; points pick up t, directions do not.</text>
</svg>
