<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The solver core: an entry solve target arm, a decision whether the closed form applies; if yes the analytical branch returns elbow-up and elbow-down; if no the numerical branch seeds the solver N times to get candidates; both merge into an unverified candidate list handed to the pipeline.">
<defs>
<marker id="as" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">solve(): analytical first, numerical fallback</text>
<rect x="40" y="60" width="120" height="42" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="100" y="86" text-anchor="middle" class="b">solve(target, arm)</text>
<rect x="250" y="56" width="160" height="50" rx="9" fill="#fffbeb" stroke="#fde68a"/><text x="330" y="78" text-anchor="middle" class="b">closed form applies?</text><text x="330" y="96" text-anchor="middle" class="c">(structure cooperates)</text>
<line x1="162" y1="81" x2="248" y2="81" stroke="#0d9488" stroke-width="2" marker-end="url(#as)"/>
<rect x="470" y="40" width="170" height="44" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="555" y="60" text-anchor="middle" class="b">analytic: ik_2link_closed</text><text x="555" y="76" text-anchor="middle" class="c">{elbow-up, elbow-down}</text>
<rect x="470" y="100" width="170" height="44" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="555" y="120" text-anchor="middle" class="b">numeric: seed × N</text><text x="555" y="136" text-anchor="middle" class="c">ik_solve (Newton / DLS)</text>
<line x1="410" y1="74" x2="468" y2="62" stroke="#0d9488" stroke-width="2" marker-end="url(#as)"/><text x="438" y="58" class="c">yes</text>
<line x1="410" y1="92" x2="468" y2="118" stroke="#0d9488" stroke-width="2" marker-end="url(#as)"/><text x="438" y="116" class="c">no</text>
<rect x="250" y="170" width="160" height="44" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="330" y="190" text-anchor="middle" class="b">candidate list</text><text x="330" y="206" text-anchor="middle" class="c">(unverified, unfiltered)</text>
<line x1="555" y1="84" x2="555" y2="160" stroke="#94a3b8" stroke-width="1.4"/><line x1="555" y1="160" x2="412" y2="186" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#as)"/>
<text x="150" y="200" class="c">→ verify / filter / select</text>
</svg>
