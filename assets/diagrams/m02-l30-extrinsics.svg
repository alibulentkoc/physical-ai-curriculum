<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A camera mounted on a robot arm, with the extrinsics shown as the SE(3) pose (offset and orientation) from the arm frame to the camera frame.">
  <defs>
    <marker id="ea" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <marker id="eo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.k{font-size:12px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">Camera extrinsics = the camera's pose on the robot</text>
  <!-- arm -->
  <line x1="120" y1="280" x2="260" y2="150" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round"/>
  <g transform="translate(120,280)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#e11d48" stroke-width="2.5" marker-end="url(#ea)"/>
    <line x1="0" y1="0" x2="0" y2="-34" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ea)"/>
    <circle r="3.5" fill="#0f172a"/>
  </g>
  <text x="120" y="300" text-anchor="middle" class="l">arm frame</text>
  <!-- camera at wrist -->
  <g transform="translate(290,130) rotate(-20)">
    <rect x="-22" y="-15" width="44" height="30" rx="5" fill="#8b5cf622" stroke="#8b5cf6"/>
    <polygon points="22,-9 40,-17 40,17 22,9" fill="#8b5cf622" stroke="#8b5cf6"/>
    <line x1="0" y1="0" x2="34" y2="0" stroke="#e11d48" stroke-width="2.2" marker-end="url(#ea)"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#ea)"/>
  </g>
  <text x="300" y="95" text-anchor="middle" class="l">camera frame</text>
  <!-- extrinsics arrow -->
  <path d="M 140 268 Q 220 200 270 150" fill="none" stroke="#0f766e" stroke-width="2.2" marker-end="url(#eo)"/>
  <text x="170" y="205" class="k">T(arm←cam)</text>
  <!-- annotation -->
  <rect x="430" y="90" width="220" height="150" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <text x="540" y="116" text-anchor="middle" class="k">extrinsics</text>
  <text x="445" y="146" class="c">• offset t_ext (where)</text>
  <text x="445" y="172" class="c">• orientation R_ext (which way)</text>
  <text x="445" y="198" class="c">= one SE(3) pose</text>
  <text x="445" y="224" class="c">(intrinsics: lens/pixels → Module 3)</text>
  <text x="340" y="314" text-anchor="middle" class="c">Extrinsics convert detections out of the camera frame; intrinsics are a separate, later topic.</text>
</svg>
