<svg viewBox='0 0 760 420' xmlns='http://www.w3.org/2000/svg' role='img' aria-label="A lightweight ROS 2 tracker node: two subscriptions (reference and measured state) and one publication (the command), wrapping the control law; the intelligence is the law, the node is plumbing."><title>A lightweight ROS 2 tracker node: two subscriptions (reference and measured state) and one publication (the command), wrapping the control law; the intelligence is the law, the node is plumbing.</title><rect x='0' y='0' width='760' height='420' fill='white'/><defs><marker id='ar' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f172a'/></marker><marker id='arT' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0d9488'/></marker></defs><text x='30' y='34' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='17' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='start'>A lightweight ROS 2 tracker node</text><rect x='220' y='80' width='320' height='180' rx='16' fill='#f8fafc' stroke='#64748b' stroke-width='2' stroke-dasharray='6 4'/><text x='380' y='104' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#64748b' font-weight='700' font-style='normal' text-anchor='middle'>node = plumbing</text><text x='380' y='122' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#64748b' font-weight='400' font-style='normal' text-anchor='middle'>subscribe · compute once/cycle · publish</text><rect x='250' y='140' width='260' height='90' rx='12' fill='white' stroke='#0d9488' stroke-width='2'/><text x='380' y='162' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='13' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='middle'>tracker node</text><rect x='268' y='176' width='224' height='30' rx='8' fill='#f1f5f9' stroke='#10b981' stroke-width='1.5'/><text x='380' y='196' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>feedforward + PID → actuator</text><text x='380' y='224' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='10' fill='#64748b' font-weight='400' font-style='italic' text-anchor='middle'>control law (Units 1–5) = intelligence</text><rect x='30' y='150' width='180' height='28' rx='14' fill='white' stroke='#0ea5e9' stroke-width='2'/><text x='120' y='169' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0ea5e9' font-weight='700' font-style='normal' text-anchor='middle'>reference q_d,q̇_d,q̈_d</text><rect x='30' y='200' width='180' height='28' rx='14' fill='white' stroke='#0ea5e9' stroke-width='2'/><text x='120' y='219' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0ea5e9' font-weight='700' font-style='normal' text-anchor='middle'>joint/state (q, q̇)</text><line x1='210' y1='164' x2='250' y2='170' stroke='#0ea5e9' stroke-width='2' marker-end='url(#ar)'/><line x1='210' y1='214' x2='250' y2='200' stroke='#0ea5e9' stroke-width='2' marker-end='url(#ar)'/><rect x='560' y='170' width='170' height='28' rx='14' fill='white' stroke='#0d9488' stroke-width='2'/><text x='645' y='189' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0d9488' font-weight='700' font-style='normal' text-anchor='middle'>joint/command (u)</text><line x1='510' y1='184' x2='556' y2='184' stroke='#0d9488' stroke-width='2' marker-end='url(#ar)'/><rect x='560' y='222' width='170' height='30' rx='8' fill='#fdebc8' stroke='#d97706' stroke-width='1.5'/><text x='645' y='242' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#d97706' font-weight='700' font-style='normal' text-anchor='middle'>N states in → N out</text><text x='30' y='300' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='13' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>the engineering is the control law; wrapping it as a node is a thin, repeatable pattern</text><text x='30' y='330' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#64748b' font-weight='400' font-style='normal' text-anchor='start'>two subscriptions  ·  one publication  ·  one control-law evaluation per cycle</text></svg>