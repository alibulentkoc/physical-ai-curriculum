  <text x="425.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M6</text>
  <text x="425.0" y="158" text-anchor="middle" class="c">Jacobian</text>
  <path d="M458,143 L466,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="466" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="499.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M7</text>
  <text x="499.0" y="158" text-anchor="middle" class="c">trajectory</text>
  <path d="M532,143 L540,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="540" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="573.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M8</text>
  <text x="573.0" y="158" text-anchor="middle" class="c">control</text>
  <path d="M606,143 L614,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="614" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="647.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M9</text>
  <text x="647.0" y="158" text-anchor="middle" class="c">integrate</text>
  <path d="M680,143 L688,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="688" y="110" width="66" height="66" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.2"/>
  <text x="721.0" y="138" text-anchor="middle" class="p" fill="#7c3aed">M10</text>
  <text x="721.0" y="158" text-anchor="middle" class="c">twin</text>
  <text x="48" y="104" text-anchor="middle" class="c" fill="#dc2626">tomato</text>
  <text x="722" y="104" text-anchor="middle" class="c" fill="#15803d">basket</text>
  <text x="380.0" y="236" text-anchor="middle" class="s">each stage’s output is the next stage’s input — ten modules, one pipeline</text>
  <text x="380.0" y="262" text-anchor="middle" class="c">one fruit silently exercises the entire curriculum</text>
