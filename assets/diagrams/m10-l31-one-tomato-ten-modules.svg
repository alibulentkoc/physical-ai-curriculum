  <rect x="96" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="129.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M2</text>
  <text x="129.0" y="158" text-anchor="middle" class="c">frames</text>
  <path d="M162,143 L170,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="170" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="203.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M3</text>
  <text x="203.0" y="158" text-anchor="middle" class="c">perceive</text>
  <path d="M236,143 L244,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="244" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="277.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M4</text>
  <text x="277.0" y="158" text-anchor="middle" class="c">FK</text>
  <path d="M310,143 L318,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="318" y="110" width="66" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
  <text x="351.0" y="138" text-anchor="middle" class="p" fill="#6366f1">M5</text>
  <text x="351.0" y="158" text-anchor="middle" class="c">IK</text>
  <path d="M384,143 L392,143" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
