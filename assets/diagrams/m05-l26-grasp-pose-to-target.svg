<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The hand-off chain: a camera viewing a fruit gives p_cam, the camera-to-base transform converts it to a base-frame grasp pose with an approach orientation, which becomes the inverse-kinematics target producing joint angles."><defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}</style>
<text x="330" y="24" text-anchor="middle" class="t">From a perceived fruit to joint angles</text>
<rect x="20" y="74" width="150" height="56" rx="9" fill="#eff6ff" stroke="#bfdbfe"/><text x="95.0" y="98" text-anchor="middle" class="b">camera</text><text x="95.0" y="116" text-anchor="middle" class="c">sees fruit: p_cam</text><line x1="170" y1="102" x2="180" y2="102" stroke="#0d9488" stroke-width="2" marker-end="url(#ah)"/><rect x="182" y="74" width="150" height="56" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="257.0" y="98" text-anchor="middle" class="b">T_base^cam</text><text x="257.0" y="116" text-anchor="middle" class="c">mounting / extrinsics</text><line x1="332" y1="102" x2="342" y2="102" stroke="#0d9488" stroke-width="2" marker-end="url(#ah)"/><rect x="344" y="74" width="150" height="56" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="419.0" y="98" text-anchor="middle" class="b">grasp pose</text><text x="419.0" y="116" text-anchor="middle" class="c">T_target^base (pos + R_g)</text><line x1="494" y1="102" x2="504" y2="102" stroke="#0d9488" stroke-width="2" marker-end="url(#ah)"/><rect x="506" y="74" width="150" height="56" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="581.0" y="98" text-anchor="middle" class="b">inverse kinematics</text><text x="581.0" y="116" text-anchor="middle" class="c">θ</text><text x="80" y="160" class="c">camera frame</text><text x="330" y="160" class="c">base frame</text><text x="560" y="160" class="c">joint space</text><text x="330" y="195" text-anchor="middle" class="c">Frames, units, and tolerances must align end to end, or the reach fails silently.</text></svg>
