<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A perceive-to-reach loop: perceive with Module 3, place in the base frame with Modules 2 and 4, solve IK with Module 5, verify with forward kinematics, then accept and reach or reject and re-solve; labeled pixels to verified joint angles."><defs><marker id="al" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}</style>
<text x="330" y="22" text-anchor="middle" class="t">The perceive-to-reach loop</text>
<rect x="264" y="39" width="132" height="36" rx="9" fill="#eff6ff" stroke="#bfdbfe"/><text x="330" y="62" text-anchor="middle" class="b">perceive (M3)</text><rect x="382" y="117" width="132" height="36" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="448" y="140" text-anchor="middle" class="b">place in base (M2/M4)</text><rect x="264" y="195" width="132" height="36" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="330" y="218" text-anchor="middle" class="b">verify FK (M4)</text><rect x="146" y="117" width="132" height="36" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="212" y="140" text-anchor="middle" class="b">solve IK (M5)</text><line x1="396" y1="57" x2="368" y2="117" stroke="#0d9488" stroke-width="2" marker-end="url(#al)"/><line x1="448" y1="153" x2="396" y2="211" stroke="#0d9488" stroke-width="2" marker-end="url(#al)"/><line x1="264" y1="213" x2="292" y2="153" stroke="#0d9488" stroke-width="2" marker-end="url(#al)"/><line x1="212" y1="117" x2="264" y2="59" stroke="#0d9488" stroke-width="2" marker-end="url(#al)"/><text x="330" y="140" text-anchor="middle" class="c">pixels → verified θ</text><text x="330" y="250" text-anchor="middle" class="c">accept → reach · reject → re-solve / reposition (verify before any move).</text></svg>
