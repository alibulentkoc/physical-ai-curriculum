<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A Newton inverse-kinematics convergence picture: on the left an error norm versus iteration curve dropping steeply to a tolerance line, on the right a two-link arm gripper closing onto a target over three or four steps with shrinking error arrows.">
<defs><marker id="ae" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#e11d48"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.ax{font-size:10px;fill:#94a3b8}</style></defs>
<text x="330" y="22" text-anchor="middle" class="t">Newton step: fast convergence to the target</text>
<line x1="330" y1="40" x2="330" y2="255" stroke="#e2e8f0"/>
<line x1="70" y1="210" x2="280" y2="210" stroke="#94a3b8"/><line x1="70" y1="210" x2="70" y2="60" stroke="#94a3b8"/><text x="250" y="226" class="ax">iteration</text><text x="58" y="64" class="ax">|e|</text><polyline points="70.0,79.2 122.5,98.1 175.0,135.0 227.5,177.5 280.0,210.0" fill="none" stroke="#0d9488" stroke-width="2.5"/><circle cx="70.0" cy="79.2" r="3" fill="#0d9488"/><circle cx="122.5" cy="98.1" r="3" fill="#0d9488"/><circle cx="175.0" cy="135.0" r="3" fill="#0d9488"/><circle cx="227.5" cy="177.5" r="3" fill="#0d9488"/><circle cx="280.0" cy="210.0" r="3" fill="#0d9488"/><line x1="70" y1="160.0" x2="280" y2="160.0" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4 3"/><text x="256" y="156" class="ax" fill="#b91c1c">tol</text><text x="175" y="248" text-anchor="middle" class="c">error ≈ squares each step</text><polyline points="420.0,200.0 479.1,189.6 518.1,167.1" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/><polyline points="420.0,200.0 480.0,200.0 505.8,163.1" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/><polyline points="420.0,200.0 476.4,220.5 502.2,183.7" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/><polyline points="420.0,200.0 473.7,226.7 510.0,200.0" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/><circle cx="420" cy="200" r="4" fill="#334155"/><circle cx="495.0" cy="170.0" r="6" fill="#e11d48"/><text x="480" y="248" text-anchor="middle" class="c">θ ← θ + α J⁺ e</text></svg>
