<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:700;fill:#0f172a}
      .caption{font-size:12px;fill:#94a3b8}
      .stage{fill:#fff;stroke-width:2.2}
      .s1{stroke:#0ea5e9}.s2{stroke:#6366f1}.s3{stroke:#8b5cf6}.s4{stroke:#10b981}
      .grey{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:5 4}
      .name{font-size:12px;font-weight:700;fill:#0f172a}
      .gname{font-size:12px;font-weight:700;fill:#94a3b8}
      .flow{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}
      .gflow{fill:none;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:4 4}
      .data{font-size:10px;font-weight:600;fill:#334155}
      .arr{font-size:12px;font-weight:700;fill:#15803d}
    </style>
  </defs>
  <text x="410" y="28" text-anchor="middle" class="title">Midpoint: The Forward Path, Assembled</text>
  <text x="410" y="48" text-anchor="middle" class="caption">Perceive &#8594; Understand &#8594; Plan &#8594; Execute &#183; run once, no failure handling</text>

  <rect class="stage s1" x="20"  y="110" width="130" height="58" rx="12"/><text x="85"  y="144" text-anchor="middle" class="name">Perceive</text>
  <rect class="stage s2" x="190" y="110" width="130" height="58" rx="12"/><text x="255" y="144" text-anchor="middle" class="name">Understand</text>
  <rect class="stage s3" x="360" y="110" width="130" height="58" rx="12"/><text x="425" y="144" text-anchor="middle" class="name">Plan</text>
  <rect class="stage s4" x="530" y="110" width="130" height="58" rx="12"/><text x="595" y="144" text-anchor="middle" class="name">Execute</text>

  <path class="flow" d="M150,139 L188,139"/><text x="169" y="104" text-anchor="middle" class="data">detections</text>
  <path class="flow" d="M320,139 L358,139"/><text x="339" y="104" text-anchor="middle" class="data">target+pose</text>
  <path class="flow" d="M490,139 L528,139"/><text x="509" y="104" text-anchor="middle" class="data">reference</text>

  <!-- arrival -->
  <circle cx="700" cy="139" r="10" fill="#ef4444"/>
  <text x="700" y="172" text-anchor="middle" class="arr">arrived &#10003;</text>
  <path class="flow" d="M660,139 L688,139"/><text x="676" y="104" text-anchor="middle" class="data">motion</text>

  <!-- greyed back half -->
  <rect class="grey" x="190" y="220" width="130" height="50" rx="12"/><text x="255" y="250" text-anchor="middle" class="gname">Track</text>
  <rect class="grey" x="360" y="220" width="130" height="50" rx="12"/><text x="425" y="250" text-anchor="middle" class="gname">Recover</text>
  <text x="600" y="250" text-anchor="middle" class="caption">back half &#8212; Units 5&#8211;8: detect &amp; recover</text>
  <path class="gflow" d="M255,220 L255,170"/>
  <path class="gflow" d="M425,220 L425,170"/>
</svg>
