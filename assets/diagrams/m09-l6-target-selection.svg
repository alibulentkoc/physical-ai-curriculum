<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:700;fill:#0f172a}
      .caption{font-size:12px;fill:#94a3b8}
      .h{font-size:12.5px;font-weight:700;fill:#0f172a}
      .fruit{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}
      .out{fill:#f1f5f9;stroke:#cbd5e1;stroke-width:1.4}
      .ok{fill:#ecfdf5;stroke:#10b981;stroke-width:1.6}
      .win{fill:#dcfce7;stroke:#15803d;stroke-width:2.4}
      .lbl{font-size:11px;fill:#334155}
      .grey{font-size:11px;fill:#94a3b8}
      .step{font-size:11.5px;font-weight:700;fill:#3730a3}
      .flow{fill:none;stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="380" y="30" text-anchor="middle" class="title">Target Selection: Filter &#8594; Rank &#8594; Commit</text>
  <text x="380" y="50" text-anchor="middle" class="caption">feasibility precedes cost</text>

  <!-- world state -->
  <text x="110" y="84" text-anchor="middle" class="h">world state</text>
  <rect class="fruit" x="40" y="98" width="140" height="24" rx="6"/><text x="50" y="114" class="lbl">F0 &#183; unripe</text>
  <rect class="fruit" x="40" y="128" width="140" height="24" rx="6"/><text x="50" y="144" class="lbl">F1 &#183; ripe &#183; r=0.9</text>
  <rect class="fruit" x="40" y="158" width="140" height="24" rx="6"/><text x="50" y="174" class="lbl">F2 &#183; ripe &#183; d=0.45</text>
  <rect class="fruit" x="40" y="188" width="140" height="24" rx="6"/><text x="50" y="204" class="lbl">F3 &#183; ripe &#183; d=0.60</text>
  <rect class="fruit" x="40" y="218" width="140" height="24" rx="6"/><text x="50" y="234" class="lbl">F4 &#183; ripe &#183; d=0.55</text>

  <!-- filter -->
  <text x="300" y="84" text-anchor="middle" class="step">filter: ripe &#8743; reachable</text>
  <rect class="out" x="240" y="98" width="120" height="24" rx="6"/><text x="250" y="114" class="grey">F0 &#10007; unripe</text>
  <rect class="out" x="240" y="128" width="120" height="24" rx="6"/><text x="250" y="144" class="grey">F1 &#10007; far</text>
  <rect class="ok" x="240" y="158" width="120" height="24" rx="6"/><text x="250" y="174" class="lbl">F2 &#10003;</text>
  <rect class="ok" x="240" y="188" width="120" height="24" rx="6"/><text x="250" y="204" class="lbl">F3 &#10003;</text>
  <rect class="ok" x="240" y="218" width="120" height="24" rx="6"/><text x="250" y="234" class="lbl">F4 &#10003;</text>
  <path class="flow" d="M182,170 L238,170"/>

  <!-- rank + commit -->
  <text x="500" y="84" text-anchor="middle" class="step">rank by distance</text>
  <rect class="win" x="430" y="120" width="140" height="28" rx="7"/><text x="440" y="139" class="lbl">F2 &#183; 0.45 &#9733; commit</text>
  <rect class="ok" x="430" y="156" width="140" height="26" rx="6"/><text x="440" y="173" class="lbl">F4 &#183; 0.55 (fallback)</text>
  <rect class="ok" x="430" y="190" width="140" height="26" rx="6"/><text x="440" y="207" class="lbl">F3 &#183; 0.60 (fallback)</text>
  <path class="flow" d="M362,180 L428,150"/>

  <!-- to plan -->
  <rect x="620" y="120" width="100" height="28" rx="8" fill="#eef2ff" stroke="#6366f1"/><text x="670" y="139" text-anchor="middle" class="step">&#8594; Plan</text>
  <path class="flow" d="M572,134 L618,134"/>
  <text x="670" y="166" text-anchor="middle" class="caption">target + pose</text>
</svg>
