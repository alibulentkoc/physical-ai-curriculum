<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Three error-versus-iteration curves: a converged curve dropping below a tolerance line, a diverged curve rising, and a stalled curve flattening above tolerance, with a max-iterations line marked.">
<defs><style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.ax{font-size:10px;fill:#94a3b8}.b{font-size:11px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">Three outcomes of the iteration</text>
<line x1="80" y1="230" x2="560" y2="230" stroke="#94a3b8"/><line x1="80" y1="230" x2="80" y2="60" stroke="#94a3b8"/><text x="536" y="246" class="ax">iteration</text><text x="66" y="64" class="ax">|e|</text><line x1="80" y1="200" x2="560" y2="200" stroke="#15803d" stroke-width="1" stroke-dasharray="4 3"/><text x="542" y="196" class="ax" fill="#15803d">tol</text><line x1="500" y1="230" x2="500" y2="60" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/><text x="494" y="72" class="ax" text-anchor="end">max_iter</text><polyline points="80.0,80.0 160.0,140.0 240.0,180.0 320.0,198.0 400.0,204.0" fill="none" stroke="#15803d" stroke-width="2.5"/><text x="410" y="200" class="b" fill="#15803d">converged</text><polyline points="80.0,110.0 170.0,100.0 260.0,80.0 340.0,65.0" fill="none" stroke="#b91c1c" stroke-width="2.5"/><text x="280" y="58" class="b" fill="#b91c1c">diverged (α too big)</text><polyline points="80.0,90.0 170.0,135.0 260.0,152.0 380.0,158.0 500.0,160.0" fill="none" stroke="#b45309" stroke-width="2.5"/><text x="330" y="152" class="b" fill="#b45309">stalled (unreachable / singular)</text></svg>
