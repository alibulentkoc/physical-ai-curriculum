<svg viewBox="0 0 430 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two feasible trajectories compared across duration, peak speed, peak acceleration, peak jerk, and path length: A smooth-and-longer, B fast-and-jerkier">
<title>Two feasible trajectories compared across duration, peak speed, peak acceleration, peak jerk, and path length: A smooth-and-longer, B fast-and-jerkier</title>
<rect width="430" height="250" fill="white"/>
<text x="215" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="650" fill="#0f172a">Trajectory quality: comparing feasible candidates</text>
<text x="270" y="46" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">metrics (A vs B)</text><text x="116" y="61" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">duration</text><rect x="120" y="52" width="150" height="9" rx="2" fill="#0d9488"/><rect x="120" y="63" width="98" height="9" rx="2" fill="#8b5cf6"/><text x="116" y="87" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">peak speed</text><rect x="120" y="78" width="84" height="9" rx="2" fill="#0d9488"/><rect x="120" y="89" width="129" height="9" rx="2" fill="#8b5cf6"/><text x="116" y="113" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">peak accel</text><rect x="120" y="104" width="64" height="9" rx="2" fill="#0d9488"/><rect x="120" y="115" width="111" height="9" rx="2" fill="#8b5cf6"/><text x="116" y="139" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">peak jerk</text><rect x="120" y="130" width="45" height="9" rx="2" fill="#0d9488"/><rect x="120" y="141" width="142" height="9" rx="2" fill="#8b5cf6"/><text x="116" y="165" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">path len</text><rect x="120" y="156" width="105" height="9" rx="2" fill="#0d9488"/><rect x="120" y="167" width="105" height="9" rx="2" fill="#8b5cf6"/>
<rect x="120" y="214" width="11" height="11" fill="#0d9488"/><text x="137" y="223" text-anchor="start" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#0d9488">A: smooth (low jerk, longer)</text>
<rect x="290" y="214" width="11" height="11" fill="#8b5cf6"/><text x="307" y="223" text-anchor="start" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#8b5cf6">B: fast (short, high jerk)</text>
<text x="215" y="238" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">best depends on priority (geometric/temporal only — no energy/dynamics)</text>
</svg>
