<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A one-panel midpoint summary with two columns: analytical inverse kinematics using triangle, law of cosines and atan2 giving exact all solutions; numerical using the Jacobian and guess measure step giving one solution for any arm; joined by a Jacobian bridge, under a midpoint checkpoint banner.">
<defs><style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<rect x="0" y="0" width="660" height="36" fill="#f0fdfa"/>
<text x="330" y="24" text-anchor="middle" class="t">Midpoint: the two halves of inverse kinematics</text>
<rect x="30" y="60" width="260" height="150" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
<text x="160" y="86" text-anchor="middle" class="b">Analytical (Units 1–3)</text>
<text x="160" y="112" text-anchor="middle" class="c">triangle → law of cosines + atan2</text>
<text x="160" y="134" text-anchor="middle" class="c">exact · all solutions · instant</text>
<text x="160" y="156" text-anchor="middle" class="c">needs cooperative structure</text>
<rect x="370" y="60" width="260" height="150" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
<text x="500" y="86" text-anchor="middle" class="b">Numerical (Units 4–5)</text>
<text x="500" y="112" text-anchor="middle" class="c">J = ∂p/∂θ → guess–measure–step</text>
<text x="500" y="134" text-anchor="middle" class="c">one solution near the seed</text>
<text x="500" y="156" text-anchor="middle" class="c">works for any arm</text>
<rect x="270" y="120" width="120" height="36" rx="8" fill="#faf5ff" stroke="#e9d5ff"/>
<text x="330" y="143" text-anchor="middle" class="b" fill="#8b5cf6">Jacobian bridge</text>
<text x="330" y="240" text-anchor="middle" class="c">You are here — confirm the closed-form half before Unit 5 deepens the numerical half.</text>
</svg>
