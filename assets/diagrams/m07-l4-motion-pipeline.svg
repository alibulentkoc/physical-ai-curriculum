<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Four-stage motion pipeline (plan, parameterize, execute open-loop, track) with a bracket marking the three stages Module 7 owns and a dashed feedback loop confined to the Module 8 box">
<title>Four-stage motion pipeline (plan, parameterize, execute open-loop, track) with a bracket marking the three stages Module 7 owns and a dashed feedback loop confined to the Module 8 box</title>
<rect width="680" height="300" fill="white"/>
<text x="340" y="26" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="17" font-weight="650" fill="#0f172a">The motion pipeline</text>
<rect x="20" y="90" width="140" height="70" rx="8" fill="#8b5cf6" opacity="0.18" stroke="#8b5cf6" stroke-width="2"/><text x="90.0" y="121.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Plan</text><text x="90.0" y="139.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" fill="#64748b">path q(s) — geometry</text>
<rect x="185" y="90" width="150" height="70" rx="8" fill="#0d9488" opacity="0.18" stroke="#0d9488" stroke-width="2"/><text x="260.0" y="121.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Parameterize</text><text x="260.0" y="139.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" fill="#64748b">trajectory q(t)</text>
<rect x="360" y="90" width="150" height="70" rx="8" fill="#10b981" opacity="0.18" stroke="#10b981" stroke-width="2"/><text x="435.0" y="121.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Execute open-loop</text><text x="435.0" y="139.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" fill="#64748b">via M6 velocity layer</text>
<rect x="535" y="90" width="128" height="70" rx="8" fill="#64748b" opacity="0.18" stroke="#64748b" stroke-width="2"/><text x="599.0" y="121.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Track (M8)</text><text x="599.0" y="139.0" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" fill="#64748b">closes the loop</text>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#334155"/></marker></defs>
<line x1="160" y1="125" x2="183" y2="125" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
<line x1="335" y1="125" x2="358" y2="125" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
<line x1="510" y1="125" x2="533" y2="125" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
<text x="425" y="80" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" fill="#0d9488">reference q_ref, q̇_ref, q̈_ref →</text>
<!-- dashed feedback loop only inside M8 -->
<path d="M 645 160 q 30 40 -50 40 q -45 0 -45 -35" fill="none" stroke="#b91c1c" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<text x="599" y="220" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" fill="#b91c1c">feedback (M8 only)</text>
<!-- brackets -->
<path d="M 20 175 L 20 190 L 510 190 L 510 175" fill="none" stroke="#0f172a" stroke-width="1.5"/>
<text x="265" y="208" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="650" fill="#0f172a">Module 7 — plan, parameterize, execute open-loop</text>
<path d="M 535 175 L 535 190 L 663 190 L 663 175" fill="none" stroke="#64748b" stroke-width="1.5"/>
<text x="599" y="208" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" fill="#64748b">Module 8</text>
<text x="340" y="250" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" fill="#64748b">Module 7 never closes a feedback loop and never reasons about forces/torques (no dynamics).</text>
</svg>
