<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs><marker id="c1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
  <marker id="c2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Same word, opposite problems: the description vs the machine</text>
  <line x1="360" y1="44" x2="360" y2="276" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- representation: gimbal -->
  <text x="185" y="62" text-anchor="middle" font-size="13" fill="#6b7280">representation singularity</text>
  <ellipse cx="185" cy="150" rx="62" ry="62" fill="none" stroke="#cbd5e1" stroke-width="3"/>
  <ellipse cx="185" cy="150" rx="62" ry="18" fill="none" stroke="#dc2626" stroke-width="3"/>
  <ellipse cx="185" cy="150" rx="62" ry="18" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="185" y="228" text-anchor="middle" font-size="12.5" fill="#b91c1c" font-weight="600">det B = 0 (rings aligned)</text>
  <text x="185" y="246" text-anchor="middle" font-size="11.5" fill="#6b7280">angles break &#8212; body still free</text>
  <!-- kinematic: straight arm -->
  <text x="540" y="62" text-anchor="middle" font-size="13" fill="#6b7280">kinematic singularity</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="430" y1="160" x2="540" y2="160"/><line x1="540" y1="160" x2="640" y2="160"/></g>
  <circle cx="430" cy="160" r="6" fill="#334155"/><circle cx="540" cy="160" r="5" fill="#334155"/><circle cx="640" cy="160" r="6" fill="#111827"/>
  <!-- both columns collapse onto the vertical line -->
  <line x1="640" y1="160" x2="640" y2="118" stroke="#dc2626" stroke-width="3" marker-end="url(#c1)"/>
  <line x1="640" y1="160" x2="640" y2="128" stroke="#2563eb" stroke-width="3" stroke-dasharray="4 3" marker-end="url(#c2)"/>
  <text x="540" y="228" text-anchor="middle" font-size="12.5" fill="#1d4ed8" font-weight="600">rank J &lt; full (arm straight)</text>
  <text x="540" y="246" text-anchor="middle" font-size="11.5" fill="#6b7280">robot loses a direction &#8212; physical</text>
  <text x="360" y="276" text-anchor="middle" font-size="12" fill="#111827">check det B for the description; check rank J for the machine</text>
</svg>
