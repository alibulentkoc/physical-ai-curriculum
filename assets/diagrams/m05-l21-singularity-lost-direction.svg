<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A nearly-straight two-link arm at a singularity: at the gripper a green double arrow tangent to the reach circle is still possible, while a red radial outward arrow with an X is the lost direction; det J equals L1 L2 sine theta2 equals zero at theta2 zero or 180 degrees.">
<defs><marker id="g1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
<marker id="g2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b91c1c"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">Singularity: a direction of gripper motion is lost</text>
<circle cx="200" cy="180" r="119.0" fill="none" stroke="#e2e8f0" stroke-dasharray="4 4"/><line x1="200.0" y1="180.0" x2="263.9" y2="156.7" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><line x1="263.9" y1="156.7" x2="308.9" y2="132.8" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><circle cx="200.0" cy="180.0" r="5" fill="#334155"/><circle cx="263.9" cy="156.7" r="4" fill="#475569"/><circle cx="308.9" cy="132.8" r="7" fill="#e11d48"/><line x1="326.8" y1="91.5" x2="291.0" y2="174.1" stroke="#15803d" stroke-width="2.5" marker-start="url(#g1)" marker-end="url(#g1)"/><text x="319" y="103" class="b" fill="#15803d">tangential ✓</text><line x1="308.9" y1="132.8" x2="354.8" y2="152.7" stroke="#b91c1c" stroke-width="2.5" stroke-dasharray="4 3" marker-end="url(#g2)"/><text x="346" y="168" class="b" fill="#b91c1c">radial ✗ (lost)</text><text x="320" y="288" text-anchor="middle" class="c">det J = L₁L₂ sin θ₂ = 0 at θ₂ = 0° (straight) or 180° (folded) — the workspace boundaries.</text></svg>
