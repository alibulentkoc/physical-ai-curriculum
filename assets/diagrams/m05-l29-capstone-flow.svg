<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The Reach-the-Fruit capstone as one integrated pipeline from a greenhouse fruit through perceive, place in base frame, reachable check, solve analytic or numeric, filter limits, verify FK, select, to an arm reaching the fruit with a verified configuration; each stage tagged with its source module."><defs><marker id="af" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker></defs>
