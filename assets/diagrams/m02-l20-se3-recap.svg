<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="SE(3) in three panels: build a 4x4 from a 3D rotation and translation, apply it to move a gripper frame rigidly, and invert it to return.">
  <defs>
    <marker id="r6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12.5px;font-weight:700;fill:#334155}.k{font-size:12.5px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="350" y="26" text-anchor="middle" class="t">SE(3): build → apply → invert (in 3D)</text>
  <rect x="30" y="60" width="190" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="125" y="84" text-anchor="middle" class="l">1. build</text>
  <text x="125" y="112" text-anchor="middle" class="c">(R₃ₓ₃, t=(tx,ty,tz))</text>
  <text x="125" y="136" text-anchor="middle" class="c">→ 4×4 matrix</text>
  <text x="125" y="160" text-anchor="middle" class="c">[[R, t],[0, 1]]</text>
  <text x="125" y="186" text-anchor="middle" class="c">6 DOF</text>
  <rect x="255" y="60" width="190" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="350" y="84" text-anchor="middle" class="l">2. apply (rigid)</text>
  <g transform="translate(330,150)">
    <line x1="0" y1="0" x2="22" y2="-6" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="2 2"/>
    <line x1="0" y1="0" x2="10" y2="-20" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="2 2"/>
  </g>
  <g transform="translate(395,150) rotate(-30)">
    <line x1="0" y1="0" x2="22" y2="-6" stroke="#e11d48" stroke-width="2"/>
    <line x1="0" y1="0" x2="10" y2="-20" stroke="#15803d" stroke-width="2"/>
    <line x1="0" y1="0" x2="-16" y2="-10" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="350" y="198" text-anchor="middle" class="c">same size, new pose</text>
  <rect x="480" y="60" width="190" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="575" y="84" text-anchor="middle" class="l">3. invert (go back)</text>
  <path d="M 620 150 Q 545 120 520 160" fill="none" stroke="#0f766e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#r6)"/>
  <text x="575" y="196" text-anchor="middle" class="c">T⁻¹ returns to start</text>
  <line x1="222" y1="135" x2="253" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#r6)"/>
  <line x1="447" y1="135" x2="478" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#r6)"/>
  <text x="350" y="244" text-anchor="middle" class="k">one rigid tool for every pose in space</text>
  <text x="350" y="276" text-anchor="middle" class="c">Next: composition — chaining SE(3) into the camera→robot→world pipeline.</text>
</svg>
