<svg viewBox="0 0 560 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A straight tool path realized with a consistent IK branch gives smooth arm poses while a branch flip at the midpoint makes the arm jump">
<title>A straight tool path realized with a consistent IK branch gives smooth arm poses while a branch flip at the midpoint makes the arm jump</title>
<rect width="560" height="330" fill="white"/>
<text x="280" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="15" font-weight="650" fill="#0f172a">Same straight tool path: branch-consistent vs a branch flip</text>
