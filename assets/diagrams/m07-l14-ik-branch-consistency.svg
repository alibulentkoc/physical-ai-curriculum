<rect x="40" y="58" width="480" height="100" fill="#f8fafc" stroke="#e2e8f0"/>
<line x1="70" y1="150" x2="125" y2="175" stroke="#334155" stroke-width="3"/><line x1="125" y1="175" x2="145" y2="135" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="125" y2="175" stroke="#334155" stroke-width="3"/><line x1="125" y1="175" x2="144" y2="134" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="125" y2="173" stroke="#334155" stroke-width="3"/><line x1="125" y1="173" x2="140" y2="131" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="127" y2="169" stroke="#334155" stroke-width="3"/><line x1="127" y1="169" x2="133" y2="125" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="129" y2="161" stroke="#334155" stroke-width="3"/><line x1="129" y1="161" x2="122" y2="116" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="130" y2="149" stroke="#334155" stroke-width="3"/><line x1="130" y1="149" x2="112" y2="108" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="129" y2="139" stroke="#334155" stroke-width="3"/><line x1="129" y1="139" x2="105" y2="101" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="128" y2="134" stroke="#334155" stroke-width="3"/><line x1="128" y1="134" x2="101" y2="98" stroke="#334155" stroke-width="3"/><line x1="70" y1="150" x2="128" y2="133" stroke="#334155" stroke-width="3"/><line x1="128" y1="133" x2="100" y2="98" stroke="#334155" stroke-width="3"/>
<line x1="145" y1="150" x2="100" y2="112" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="3 3"/>
