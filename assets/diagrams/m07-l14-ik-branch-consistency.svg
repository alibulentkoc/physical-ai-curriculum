<rect x="40" y="188" width="480" height="120" fill="#f8fafc" stroke="#e2e8f0"/>
<line x1="70" y1="290" x2="125" y2="315" stroke="#334155" stroke-width="3"/><line x1="125" y1="315" x2="145" y2="275" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="125" y2="315" stroke="#334155" stroke-width="3"/><line x1="125" y1="315" x2="144" y2="274" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="125" y2="313" stroke="#334155" stroke-width="3"/><line x1="125" y1="313" x2="140" y2="271" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="127" y2="309" stroke="#334155" stroke-width="3"/><line x1="127" y1="309" x2="133" y2="265" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="85" y2="232" stroke="#b91c1c" stroke-width="3"/><line x1="85" y1="232" x2="122" y2="256" stroke="#b91c1c" stroke-width="3"/><line x1="70" y1="290" x2="71" y2="230" stroke="#334155" stroke-width="3"/><line x1="71" y1="230" x2="112" y2="248" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="61" y2="231" stroke="#334155" stroke-width="3"/><line x1="61" y1="231" x2="105" y2="241" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="56" y2="232" stroke="#334155" stroke-width="3"/><line x1="56" y1="232" x2="101" y2="238" stroke="#334155" stroke-width="3"/><line x1="70" y1="290" x2="55" y2="232" stroke="#334155" stroke-width="3"/><line x1="55" y1="232" x2="100" y2="238" stroke="#334155" stroke-width="3"/>
<text x="122.5" y="210" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#b91c1c">flip → joint jump</text>
