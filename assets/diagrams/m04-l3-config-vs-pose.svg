<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Joint space shown as a set of angle dials on the left, task space shown as the gripper pose in the workspace on the right, with a forward kinematics arrow between them, and a faint second arm pose reaching the same point to indicate the map is many to one.">
  <defs>
    <marker id="fk3" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#10b981"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.g{font-size:12px;font-weight:800;fill:#047857}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Configuration (joint space) → pose (task space)</text>
  <!-- joint space -->
  <rect x="30" y="55" width="190" height="150" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="125" y="78" text-anchor="middle" class="b">joint space (n-D)</text>
  <g>
   <circle cx="80" cy="120" r="20" fill="#fff" stroke="#6366f1"/><line x1="80" y1="120" x2="94" y2="108" stroke="#4338ca" stroke-width="2"/><text x="80" y="155" text-anchor="middle" class="c">θ1</text>
   <circle cx="170" cy="120" r="20" fill="#fff" stroke="#6366f1"/><line x1="170" y1="120" x2="158" y2="106" stroke="#4338ca" stroke-width="2"/><text x="170" y="155" text-anchor="middle" class="c">θ2</text>
   <text x="125" y="190" text-anchor="middle" class="c">q = (θ1, θ2, …)</text>
  </g>
  <!-- arrow -->
  <line x1="230" y1="130" x2="300" y2="130" stroke="#10b981" stroke-width="2" marker-end="url(#fk3)"/>
  <text x="265" y="120" text-anchor="middle" class="g">FK</text>
  <!-- task space -->
  <rect x="310" y="55" width="360" height="150" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="490" y="78" text-anchor="middle" class="b">task space (6-D pose)</text>
  <circle cx="360" cy="170" r="5" fill="#0f172a"/>
  <line x1="360" y1="170" x2="430" y2="130" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <line x1="430" y1="130" x2="500" y2="105" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <circle cx="500" cy="105" r="7" fill="#e11d48"/>
  <!-- faint elbow-down alt -->
  <line x1="360" y1="170" x2="445" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="445" y1="165" x2="500" y2="105" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <text x="560" y="120" class="c">gripper pose</text>
  <text x="540" y="188" text-anchor="middle" class="c">many configs → one pose</text>
  <text x="350" y="232" text-anchor="middle" class="c">FK is single-valued forward (q → pose) but many-to-one (different q can share a pose).</text>
</svg>
