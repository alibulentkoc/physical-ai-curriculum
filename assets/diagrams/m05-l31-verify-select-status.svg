<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The pipeline tail: candidates pass through verify by forward kinematics dropping misses, filter by joint limits dropping infeasible, and select minimum cost to produce theta-star ok; with red status branches for unreachable, no solution, verification failed, and no feasible."><defs><marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:9px;fill:#b91c1c}.b{font-size:10.5px;font-weight:700;fill:#334155}</style>
<text x="330" y="22" text-anchor="middle" class="t">Verify → filter → select → θ⋆ (or a clear reason)</text>
<rect x="20" y="64" width="118" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="79.0" y="84" text-anchor="middle" class="b">candidates</text><line x1="138" y1="87" x2="142" y2="87" stroke="#0d9488" stroke-width="1.8" marker-end="url(#av)"/><rect x="148" y="64" width="118" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="207.0" y="84" text-anchor="middle" class="b">verify FK</text><text x="207.0" y="100" text-anchor="middle" fill="#64748b" font-size="9">drop misses</text><line x1="266" y1="87" x2="270" y2="87" stroke="#0d9488" stroke-width="1.8" marker-end="url(#av)"/><line x1="207.0" y1="110" x2="207.0" y2="134" stroke="#fca5a5" stroke-width="1.4" stroke-dasharray="3 2"/><text x="207.0" y="147" text-anchor="middle" class="c">verification_failed</text><rect x="276" y="64" width="118" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="335.0" y="84" text-anchor="middle" class="b">filter limits</text><text x="335.0" y="100" text-anchor="middle" fill="#64748b" font-size="9">drop infeasible</text><line x1="394" y1="87" x2="398" y2="87" stroke="#0d9488" stroke-width="1.8" marker-end="url(#av)"/><line x1="335.0" y1="110" x2="335.0" y2="134" stroke="#fca5a5" stroke-width="1.4" stroke-dasharray="3 2"/><text x="335.0" y="147" text-anchor="middle" class="c">no_feasible</text><rect x="404" y="64" width="118" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="463.0" y="84" text-anchor="middle" class="b">select</text><text x="463.0" y="100" text-anchor="middle" fill="#64748b" font-size="9">min cost</text><line x1="522" y1="87" x2="526" y2="87" stroke="#0d9488" stroke-width="1.8" marker-end="url(#av)"/><rect x="532" y="64" width="118" height="46" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="591.0" y="84" text-anchor="middle" class="b">θ⋆ (ok)</text><text x="330" y="180" text-anchor="middle" fill="#64748b" font-size="10.5">Status: ok / unreachable / no_solution / verification_failed / no_feasible — each actionable.</text><text x="330" y="205" text-anchor="middle" fill="#64748b" font-size="10.5">Return one executable θ⋆ with ok, or None with a reason — never silent, never invalid.</text></svg>
