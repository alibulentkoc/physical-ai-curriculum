<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Faux-3D isometric coordinate axes x, y, z from an origin with a tomato located at a point, dashed drop-lines to the floor plane, and a small right-hand-rule inset.">
  <defs>
    <marker id="ax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:13px;font-weight:700;fill:#334155}.c{font-size:12px;fill:#64748b}.n{font-size:13px;font-weight:700;fill:#0f172a}</style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="t">3D coordinates (isometric): x, y, z</text>
  <!-- origin -->
  <g>
    <!-- x axis (to lower right), y axis (to lower left/back), z axis (up) -->
    <line x1="250" y1="250" x2="470" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#ax)"/>
    <text x="476" y="326" class="l" fill="#0284c7">x</text>
    <line x1="250" y1="250" x2="90" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#ax)"/>
    <text x="74" y="306" class="l" fill="#0f766e">y</text>
    <line x1="250" y1="250" x2="250" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#ax)"/>
    <text x="240" y="84" class="l" fill="#7c3aed">z (up)</text>
    <circle cx="250" cy="250" r="4" fill="#0f172a"/><text x="214" y="268" class="c">origin</text>
  </g>
  <!-- a tomato at (x,y,z): go along x, then y, then up z -->
  <!-- floor point (x,y) -->
  <line x1="250" y1="250" x2="370" y2="288" stroke="#0ea5e9" stroke-width="2.5"/>
  <line x1="370" y1="288" x2="320" y2="303" stroke="#0d9488" stroke-width="2.5"/>
  <!-- up to tomato -->
  <line x1="320" y1="303" x2="320" y2="190" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="5 4"/>
  <circle cx="320" cy="190" r="11" fill="#e11d48"/>
  <text x="334" y="186" class="n">P = (x, y, z)</text>
  <text x="300" y="320" class="c">floor point (x, y)</text>
  <!-- right-hand rule inset -->
  <rect x="450" y="70" width="160" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="530" y="92" text-anchor="middle" class="c">right-hand rule</text>
  <line x1="490" y1="160" x2="560" y2="160" stroke="#0284c7" stroke-width="2.5" marker-end="url(#ax)"/><text x="566" y="164" class="c" fill="#0284c7">x</text>
  <line x1="490" y1="160" x2="490" y2="110" stroke="#0f766e" stroke-width="2.5" marker-end="url(#ax)"/><text x="478" y="108" class="c" fill="#0f766e">y</text>
  <circle cx="490" cy="160" r="5" fill="#7c3aed"/><text x="498" y="150" class="c" fill="#7c3aed">z out</text>
  <text x="320" y="384" text-anchor="middle" class="c">Three perpendicular axes locate any point; height (z) is what a 2D map can't carry.</text>
</svg>
