  <path d="M200,128 L300,92" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="360.0" y="338" text-anchor="middle" class="c">composition of verified operators &#183; Mirror &#183; Simulate &#183; Monitor &#183; Predict &#183; Adapt &#183; no new theory</text>
