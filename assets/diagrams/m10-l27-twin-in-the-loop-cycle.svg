<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#94a3b8}.p{font-size:12px;font-weight:700}.s{font-size:12.5px;font-weight:700;fill:#334155}</style></defs>
  <text x="360.0" y="28" text-anchor="middle" class="t">The Twin-in-the-Loop Cycle</text>
  <text x="360.0" y="46" text-anchor="middle" class="c">monitor → re-sync if drifted → predict → adapt → act, repeated</text>
  <rect x="295" y="160" width="130" height="60" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.2"/>
  <text x="360" y="188" text-anchor="middle" class="p" fill="#7c3aed">twin</text>
  <text x="360" y="206" text-anchor="middle" class="c">advisor</text>
  <rect x="290" y="54" width="140" height="52" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="360" y="78" text-anchor="middle" class="p" fill="#3b82f6">monitor</text>
  <text x="360" y="96" text-anchor="middle" class="c">now</text>
  <rect x="490" y="124" width="140" height="52" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2.2"/>
  <text x="560" y="148" text-anchor="middle" class="p" fill="#ca8a04">re-sync</text>
  <text x="560" y="166" text-anchor="middle" class="c">if drifted</text>
  <rect x="450" y="264" width="140" height="52" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.2"/>
  <text x="520" y="288" text-anchor="middle" class="p" fill="#0d9488">predict</text>
  <text x="520" y="306" text-anchor="middle" class="c">next</text>
  <rect x="130" y="264" width="140" height="52" rx="12" fill="#ecfdf5" stroke="#15803d" stroke-width="2.2"/>
  <text x="200" y="288" text-anchor="middle" class="p" fill="#15803d">adapt</text>
  <text x="200" y="306" text-anchor="middle" class="c">choose</text>
  <rect x="90" y="124" width="140" height="52" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2.2"/>
  <text x="160" y="156" text-anchor="middle" class="p" fill="#ea580c">act</text>
  <path d="M430,86 L495,138" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
  <path d="M540,178 L520,262" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
