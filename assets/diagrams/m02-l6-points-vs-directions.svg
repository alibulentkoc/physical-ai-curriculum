<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Under a translation, a point with w=1 moves to a new location while a direction arrow with w=0 keeps the same heading.">
  <defs>
    <marker id="d1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <marker id="d2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.l{font-size:12.5px;font-weight:700}.c{font-size:11.5px;fill:#64748b}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">Under translation: a point moves, a direction does not</text>
  <!-- point panel -->
  <rect x="40" y="55" width="280" height="220" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="180" y="80" text-anchor="middle" class="l" fill="#e11d48">point (w = 1)</text>
  <circle cx="110" cy="200" r="7" fill="#94a3b8"/><text x="96" y="222" class="c">before</text>
  <line x1="110" y1="200" x2="240" y2="150" stroke="#0f172a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#d1)"/>
  <circle cx="240" cy="150" r="7" fill="#e11d48"/><text x="226" y="140" class="c">after (moved)</text>
  <!-- direction panel -->
  <rect x="360" y="55" width="280" height="220" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="500" y="80" text-anchor="middle" class="l" fill="#7c3aed">direction (w = 0)</text>
  <line x1="430" y1="210" x2="490" y2="150" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#d2)"/><text x="416" y="226" class="c">before</text>
  <line x1="540" y1="210" x2="600" y2="150" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#d2)"/><text x="556" y="226" class="c">after (same heading)</text>
  <text x="340" y="300" text-anchor="middle" class="c">Translation entries are multiplied by w: added for points (w=1), zeroed for directions (w=0).</text>
</svg>
