  <defs><marker id="lp28" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Resolved-rate motion: the open-loop velocity layer</text>
  <rect x="60" y="70" width="150" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/><text x="135" y="92" text-anchor="middle" font-size="12" fill="#1d4ed8">commanded twist</text><text x="135" y="108" text-anchor="middle" font-size="12" fill="#1d4ed8">&#958;_d</text>
  <rect x="260" y="70" width="170" height="46" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/><text x="345" y="92" text-anchor="middle" font-size="12" fill="#3730a3">resolve</text><text x="345" y="108" text-anchor="middle" font-size="11.5" fill="#3730a3">q&#775; = J&#8314;_&#955;(q) &#958;_d</text>
  <rect x="480" y="70" width="160" height="46" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/><text x="560" y="92" text-anchor="middle" font-size="12" fill="#065f46">integrate</text><text x="560" y="108" text-anchor="middle" font-size="11.5" fill="#065f46">q &#8592; q + q&#775; &#916;t</text>
  <line x1="210" y1="93" x2="258" y2="93" stroke="#2563eb" stroke-width="2" marker-end="url(#lp28)"/>
  <line x1="430" y1="93" x2="478" y2="93" stroke="#2563eb" stroke-width="2" marker-end="url(#lp28)"/>
  <path d="M 560 116 L 560 150 L 345 150 L 345 118" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#lp28)"/>
  <text x="452" y="166" text-anchor="middle" font-size="11" fill="#6b7280">recompute J at new pose</text>
  <text x="380" y="210" text-anchor="middle" font-size="12.5" fill="#111827">open-loop &#183; kinematic &#183; the velocity layer Module 7 consumes</text>
  <text x="380" y="232" text-anchor="middle" font-size="11.5" fill="#dc2626">NOT trajectory generation (M7) &#183; NOT feedback control (M8) &#183; NOT dynamics</text>
