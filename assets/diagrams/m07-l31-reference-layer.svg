<svg viewBox="0 0 560 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A validation gate stamping VALID feeds the reference trajectory layer package exposing reference of t and metadata, handed across to Module 8's tracker, bookending the Module 6 velocity layer">
<title>A validation gate stamping VALID feeds the reference trajectory layer package exposing reference of t and metadata, handed across to Module 8's tracker, bookending the Module 6 velocity layer</title>
<rect width="560" height="230" fill="white"/>
<text x="280" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="650" fill="#0f172a">Validate and hand off: the reference trajectory layer</text>
<!-- validate gate -->
<rect x="24" y="54" width="130" height="120" rx="8" fill="#f8fafc" stroke="#10b981" stroke-width="2"/>
<text x="89" y="74" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="650" fill="#10b981">VALIDATE</text>
<text x="89" y="96" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#10b981">✓ endpoints</text><text x="89" y="112" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#10b981">✓ limits</text>
<text x="89" y="128" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#10b981">✓ collision-free</text><text x="89" y="144" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#10b981">✓ reachable</text>
<text x="89" y="164" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="700" fill="#10b981">VALID</text>
<line x1="154" y1="114" x2="180" y2="114" stroke="#64748b" stroke-width="2" marker-end="url(#ah3)"/>
<defs><marker id="ah3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
<!-- package -->
<rect x="184" y="54" width="190" height="120" rx="8" fill="#f8fafc" stroke="#0d9488" stroke-width="2"/>
<text x="279" y="74" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="650" fill="#0d9488">reference trajectory layer</text>
<text x="279" y="96" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#0f172a">reference(t) →</text>
<text x="279" y="112" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#0f172a">(q_d, q̇_d, q̈_d, info)</text>
<text x="279" y="134" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">meta: duration, rate,</text>
<text x="279" y="148" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">validated, metrics</text>
<line x1="374" y1="114" x2="400" y2="114" stroke="#0f172a" stroke-width="2.5"/>
<text x="387" y="130" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#0f172a">→ M8</text>
<!-- M8 -->
<rect x="404" y="54" width="130" height="120" rx="8" fill="white" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
<text x="469" y="74" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="650" fill="#64748b">Module 8</text>
<text x="469" y="98" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">tracker</text>
<text x="469" y="116" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">consumes the</text>
<text x="469" y="130" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">reference</text>
<text x="469" y="154" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#b91c1c">(not built here)</text>
<text x="280" y="196" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">M6 velocity_layer → M7 reference layer → M8 tracker (the bookend)</text>
<text x="280" y="216" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#b91c1c">the layer is the input to the controller, not a controller</text>
</svg>
