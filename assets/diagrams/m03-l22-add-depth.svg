<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The ray with a depth value Z marked along the optical axis selecting the single 3D point P_c equal to Z times the ray direction.">
  <defs>
    <marker id="za" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.g{font-size:12px;font-weight:800;fill:#15803d}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Depth selects the point on the ray</text>
  <circle cx="70" cy="150" r="6" fill="#0f172a"/><text x="70" y="176" text-anchor="middle" class="c">camera center</text>
  <line x1="70" y1="150" x2="640" y2="60" stroke="#f59e0b" stroke-width="2" marker-end="url(#za)"/>
  <!-- depth axis -->
  <line x1="70" y1="210" x2="430" y2="210" stroke="#475569" stroke-width="1.2"/><text x="250" y="228" text-anchor="middle" class="c">depth Z (from sensor)</text>
  <line x1="430" y1="150" x2="430" y2="210" stroke="#475569" stroke-dasharray="3 3"/>
  <!-- chosen point -->
  <circle cx="430" cy="92" r="8" fill="#10b981"/><text x="470" y="86" class="g">P_c = Z·(x_n,y_n,1)</text>
  <text x="350" y="246" text-anchor="middle" class="c">P_c = ((u−c_x)Z/f_x, (v−c_y)Z/f_y, Z). Exact inverse of projection once Z is known.</text>
</svg>
