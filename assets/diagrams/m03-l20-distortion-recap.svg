<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The realistic forward map world to extrinsics to normalized projection to a distortion box to K to pixel, with a dashed return arrow over the distortion box labeled undistortion that restores the ideal pinhole for back-projection.">
  <defs>
    <marker id="ra" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <marker id="rb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}.u{font-size:11px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">The realistic forward map (distortion included)</text>
  <rect x="20" y="80" width="95" height="50" rx="9" fill="#f0fdf4" stroke="#bbf7d0"/><text x="67" y="110" text-anchor="middle" class="b">world</text>
  <rect x="140" y="80" width="110" height="50" rx="9" fill="#eff6ff" stroke="#bfdbfe"/><text x="195" y="103" text-anchor="middle" class="b">extrinsics →</text><text x="195" y="119" text-anchor="middle" class="c">(x_n,y_n)</text>
  <rect x="275" y="80" width="110" height="50" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="330" y="110" text-anchor="middle" class="b">distortion</text>
  <rect x="410" y="80" width="80" height="50" rx="9" fill="#eff6ff" stroke="#bfdbfe"/><text x="450" y="110" text-anchor="middle" class="b">× K</text>
  <rect x="515" y="80" width="110" height="50" rx="9" fill="#0f172a"/><text x="570" y="110" text-anchor="middle" class="b" fill="#fff">pixel</text>
  <line x1="115" y1="105" x2="138" y2="105" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ra)"/>
  <line x1="250" y1="105" x2="273" y2="105" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ra)"/>
  <line x1="385" y1="105" x2="408" y2="105" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ra)"/>
  <line x1="490" y1="105" x2="513" y2="105" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ra)"/>
  <path d="M 405 70 Q 360 45 290 70" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#rb)"/>
  <text x="350" y="48" text-anchor="middle" class="u">undistortion (iterative) — restores ideal pinhole</text>
  <text x="350" y="170" text-anchor="middle" class="c">Distortion sits before K; undistortion reverses it so back-projection (Unit 6) has clean geometry.</text>
</svg>
