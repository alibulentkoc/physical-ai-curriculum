<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Left: several 3D points along one ray all project to the same pixel (forward, depth lost). Right: one pixel back-projects to a ray, and depth picks the point (inverse).">
  <defs>
    <marker id="fa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.bad{font-size:11px;font-weight:700;fill:#b91c1c}.ok{font-size:11px;font-weight:700;fill:#15803d}</style>
  </defs>
  <text x="340" y="24" text-anchor="middle" class="t">Forward loses depth · inverse needs depth</text>
  <!-- forward -->
  <rect x="25" y="50" width="310" height="245" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="180" y="74" text-anchor="middle" class="l">forward: world → pixel</text>
  <circle cx="60" cy="170" r="4" fill="#0f172a"/><text x="42" y="160" class="c">cam</text>
  <circle cx="150" cy="135" r="8" fill="#e11d48"/><circle cx="210" cy="112" r="8" fill="#e11d48"/><circle cx="270" cy="90" r="8" fill="#e11d48"/>
  <line x1="60" y1="170" x2="300" y2="78" stroke="#334155" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="120" y="210" width="120" height="40" rx="4" fill="#0f172a"/>
  <circle cx="150" cy="230" r="7" fill="#e11d48"/>
  <text x="180" y="268" text-anchor="middle" class="bad">3 points on a ray → 1 pixel (depth lost)</text>
  <!-- inverse -->
  <rect x="345" y="50" width="310" height="245" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="500" y="74" text-anchor="middle" class="l">inverse: pixel → ray</text>
  <rect x="360" y="100" width="100" height="36" rx="4" fill="#0f172a"/><circle cx="385" cy="118" r="6" fill="#e11d48"/>
  <text x="410" y="152" text-anchor="middle" class="c">one pixel</text>
  <line x1="470" y1="118" x2="640" y2="200" stroke="#15803d" stroke-width="1.8" marker-end="url(#fa)"/>
  <circle cx="560" cy="158" r="7" fill="#e11d48"/><text x="575" y="150" class="ok">depth picks the point</text>
  <text x="500" y="280" text-anchor="middle" class="ok">a pixel = a ray; add depth → a 3D point</text>
</svg>
