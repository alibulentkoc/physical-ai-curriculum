<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A greenhouse scene with a tomato and the robot's camera; light rays from the tomato enter the camera and produce a 2D pixel image where the tomato appears as a colored blob.">
  <defs>
    <marker id="ry" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f59e0b"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">The camera: a sensor turning a 3D scene into a 2D image</text>
  <!-- scene -->
  <rect x="30" y="55" width="300" height="235" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="180" y="78" text-anchor="middle" class="l">3D scene (greenhouse)</text>
  <line x1="60" y1="270" x2="300" y2="270" stroke="#86efac"/>
  <circle cx="120" cy="150" r="14" fill="#e11d48"/><text x="120" y="135" text-anchor="middle" class="c">tomato</text>
  <!-- camera -->
  <rect x="250" y="160" width="44" height="30" rx="4" fill="#1d4ed822" stroke="#1d4ed8"/><text x="272" y="205" text-anchor="middle" class="c">camera</text>
  <line x1="134" y1="150" x2="250" y2="172" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#ry)"/>
  <line x1="134" y1="156" x2="250" y2="182" stroke="#f59e0b" stroke-width="1.2"/>
  <!-- image grid -->
  <rect x="380" y="80" width="270" height="180" rx="6" fill="#0f172a"/>
  <text x="515" y="74" text-anchor="middle" class="l">2D image (pixels)</text>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="380" y1="120" x2="650" y2="120"/><line x1="380" y1="160" x2="650" y2="160"/><line x1="380" y1="200" x2="650" y2="200"/>
    <line x1="425" y1="80" x2="425" y2="260"/><line x1="470" y1="80" x2="470" y2="260"/><line x1="515" y1="80" x2="515" y2="260"/><line x1="560" y1="80" x2="560" y2="260"/><line x1="605" y1="80" x2="605" y2="260"/>
  </g>
  <circle cx="515" cy="170" r="13" fill="#e11d48"/>
  <text x="515" y="278" text-anchor="middle" class="c" fill="#94a3b8">tomato at a pixel</text>
  <text x="355" y="172" text-anchor="middle" class="c" fill="#f59e0b">light</text>
  <text x="340" y="308" text-anchor="middle" class="c">An image gives a direction (which pixel), not a full 3D position.</text>
</svg>
