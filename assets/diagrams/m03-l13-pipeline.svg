<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A two-stage pipeline: a world point goes through extrinsics (rigid) into the camera frame, then through intrinsics K and divide-by-Z (projection) into a pixel.">
  <defs>
    <marker id="pa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.s1{font-size:11px;font-weight:800;fill:#1d4ed8}.s2{font-size:11px;font-weight:800;fill:#7c3aed}</style>
  </defs>
  <text x="350" y="26" text-anchor="middle" class="t">The full projection pipeline: world → camera → pixel</text>
  <rect x="30" y="80" width="150" height="64" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="105" y="108" text-anchor="middle" class="b">world point</text><text x="105" y="126" text-anchor="middle" class="c">(X_w,Y_w,Z_w)</text>
  <rect x="270" y="80" width="160" height="64" rx="10" fill="#eff6ff" stroke="#bfdbfe"/><text x="350" y="108" text-anchor="middle" class="b">camera-frame point</text><text x="350" y="126" text-anchor="middle" class="c">(X_c,Y_c,Z_c)</text>
  <rect x="540" y="80" width="130" height="64" rx="10" fill="#0f172a"/><text x="605" y="116" text-anchor="middle" class="b" fill="#fff">pixel (u,v)</text>
  <line x1="180" y1="112" x2="268" y2="112" stroke="#0f172a" stroke-width="1.8" marker-end="url(#pa)"/>
  <line x1="430" y1="112" x2="538" y2="112" stroke="#0f172a" stroke-width="1.8" marker-end="url(#pa)"/>
  <text x="224" y="72" text-anchor="middle" class="s1">Stage 1: extrinsics</text><text x="224" y="160" text-anchor="middle" class="c">T(cam←world), rigid (Module 2)</text>
  <text x="484" y="72" text-anchor="middle" class="s2">Stage 2: intrinsics</text><text x="484" y="160" text-anchor="middle" class="c">K, ÷Z (projection)</text>
  <text x="350" y="210" text-anchor="middle" class="c">Stage 1 places the point; Stage 2 images it. Only Stage 2 is non-invertible.</text>
</svg>
