<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#94a3b8}.p{font-size:12px;font-weight:700;fill:#0f172a}</style></defs>
  <text x="360" y="28" text-anchor="middle" class="t">What We Twin: the Module 9 System</text>
  <text x="360" y="46" text-anchor="middle" class="c">wrap, do not redefine &#8212; the twin adds nothing to the robot</text>
  <rect x="60" y="70" width="360" height="250" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.4"/>
  <text x="240" y="96" text-anchor="middle" class="p" fill="#1d4ed8">Module 9 system (the physical asset)</text>
  <rect x="85" y="116" width="140" height="44" rx="9" fill="#fff" stroke="#3b82f6"/><text x="155" y="143" text-anchor="middle" class="p">orchestrator</text>
  <rect x="255" y="116" width="140" height="44" rx="9" fill="#fff" stroke="#3b82f6"/><text x="325" y="143" text-anchor="middle" class="p">world-state</text>
  <rect x="85" y="176" width="140" height="44" rx="9" fill="#fff" stroke="#3b82f6"/><text x="155" y="203" text-anchor="middle" class="p">health signals</text>
  <rect x="255" y="176" width="140" height="44" rx="9" fill="#fff" stroke="#3b82f6"/><text x="325" y="203" text-anchor="middle" class="p">system interface</text>
  <text x="240" y="252" text-anchor="middle" class="c">harvest_row &#183; WorldState &#183; monitor &#183; run_pipeline</text>
  <text x="240" y="298" text-anchor="middle" class="c">already built &#8212; the twin reuses it whole</text>
  <!-- twin wrapper -->
  <rect x="470" y="110" width="200" height="170" rx="14" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.4" stroke-dasharray="7 4"/>
  <text x="570" y="150" text-anchor="middle" class="p" fill="#0d9488">Twin wrapper</text>
  <text x="570" y="174" text-anchor="middle" class="c">reads the four ports</text>
  <text x="570" y="192" text-anchor="middle" class="c">reuses the layers</text>
  <text x="570" y="216" text-anchor="middle" class="c">adds no new</text>
  <text x="570" y="232" text-anchor="middle" class="c">robot behaviour</text>
  <path d="M420,180 L468,180" fill="none" stroke="#0d9488" stroke-width="2.4" marker-end="url(#a)"/>
</svg>
