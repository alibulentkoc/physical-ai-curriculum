<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs><marker id="lx" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#f43f5e"/></marker></defs>
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">A singularity is the ellipsoid going flat &#8212; one direction of motion is lost</text>
  <line x1="253" y1="42" x2="253" y2="280" stroke="#e5e7eb" stroke-width="1.5"/><line x1="507" y1="42" x2="507" y2="280" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- healthy -->
  <text x="127" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">interior: round</text>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><line x1="70" y1="230" x2="120" y2="160"/><line x1="120" y1="160" x2="185" y2="170"/></g>
  <circle cx="185" cy="170" r="4.5" fill="#f1f5f9"/>
  <ellipse cx="185" cy="170" rx="34" ry="26" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="2.4" transform="rotate(-15 185 170)"/>
  <text x="127" y="262" text-anchor="middle" font-size="11.5" fill="#16a34a">both directions easy</text>
  <!-- straining -->
  <text x="380" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">extending: elongating</text>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><line x1="300" y1="210" x2="365" y2="175"/><line x1="365" y1="175" x2="440" y2="160"/></g>
  <circle cx="440" cy="160" r="4.5" fill="#f1f5f9"/>
  <ellipse cx="440" cy="160" rx="46" ry="13" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="2.4" transform="rotate(-12 440 160)"/>
  <text x="380" y="262" text-anchor="middle" font-size="11.5" fill="#ca8a04">one direction getting hard</text>
  <!-- collapsed -->
  <text x="634" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">straight: collapsed</text>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><line x1="555" y1="180" x2="625" y2="170"/><line x1="625" y1="170" x2="695" y2="160"/></g>
  <circle cx="695" cy="160" r="4.5" fill="#f1f5f9"/>
  <line x1="652" y1="165" x2="715" y2="156" stroke="#34d399" stroke-width="3.4"/>
  <line x1="695" y1="160" x2="708" y2="120" stroke="#f43f5e" stroke-width="3" stroke-dasharray="4 3" marker-end="url(#lx)"/>
  <text x="700" y="116" font-size="11" fill="#f43f5e" font-weight="700">lost</text>
  <text x="640" y="150" font-size="11" fill="#16a34a" font-weight="600">available</text>
  <text x="634" y="262" text-anchor="middle" font-size="11.5" fill="#dc2626">short axis &#8594; 0</text>
</svg>
