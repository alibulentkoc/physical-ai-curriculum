<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A target with its two two-link solutions: the elbow-up solution is greyed and marked infeasible because it violates a joint limit, the elbow-down solution is solid and marked feasible; an inset shows joint limits carving a wedge out of the reachable annulus.">
<defs><style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.g{fill:#15803d;font-size:11px;font-weight:700}.r{fill:#b91c1c;font-size:11px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">Joint limits decide which solution is usable</text>
<polyline points="180.0,180.0 232.8,140.4 262.5,180.0" fill="none" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="213" y="130" class="r">elbow-up ✗ (joint limit)</text><polyline points="180.0,180.0 232.8,219.6 262.5,180.0" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="223" y="242" class="g">elbow-down ✓ (feasible)</text><circle cx="180" cy="180" r="5" fill="#334155"/><circle cx="262.5" cy="180.0" r="6" fill="#e11d48"/><circle cx="520" cy="150" r="70" fill="#ecfdf5" stroke="#34d399"/><path d="M 520 150 L 590 150 A 70 70 0 0 0 555.0 89.4 Z" fill="#ffffff" stroke="#fecaca"/><circle cx="520" cy="150" r="4" fill="#334155"/><text x="520" y="238" text-anchor="middle" class="c">effective workspace</text><text x="520" y="252" text-anchor="middle" class="c">(limits remove a wedge)</text><text x="320" y="290" text-anchor="middle" class="c">θᵢ ∈ [min, max] for every joint — one, both, or no solution may survive.</text></svg>
