<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="dp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="ax8" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Validate the Jacobian: perturb a joint, measure the tool, compare</text>
  <line x1="360" y1="44" x2="360" y2="296" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Left: central difference -->
  <text x="185" y="62" text-anchor="middle" font-size="13" fill="#6b7280">central difference of FK</text>
  <!-- three arm poses q-eps (faint), q, q+eps (faint) -->
  <g stroke-linecap="round">
    <line x1="80" y1="250" x2="185" y2="160" stroke="#cbd5e1" stroke-width="5" opacity="0.55"/>
    <line x1="185" y1="160" x2="265" y2="150" stroke="#cbd5e1" stroke-width="5" opacity="0.55"/>
    <line x1="80" y1="250" x2="178" y2="150" stroke="#94a3b8" stroke-width="6"/>
    <line x1="178" y1="150" x2="262" y2="128" stroke="#94a3b8" stroke-width="6"/>
    <line x1="80" y1="250" x2="170" y2="142" stroke="#cbd5e1" stroke-width="5" opacity="0.55"/>
    <line x1="170" y1="142" x2="258" y2="108" stroke="#cbd5e1" stroke-width="5" opacity="0.55"/>
  </g>
  <circle cx="80" cy="250" r="6" fill="#334155"/>
  <circle cx="262" cy="128" r="5" fill="#dc2626"/>
  <line x1="265" y1="150" x2="258" y2="108" stroke="#dc2626" stroke-width="2.6" marker-end="url(#dp)"/>
  <text x="270" y="130" font-size="12" fill="#dc2626">&#916;pose</text>
  <text x="185" y="288" text-anchor="middle" font-size="12.5" fill="#6b7280">J&#7522; &#8776; [FK(q+&#949;e&#7522;) &#8722; FK(q&#8722;&#949;e&#7522;)] / 2&#949;</text>

  <!-- Right: log-log agreement slope 2 -->
  <text x="535" y="62" text-anchor="middle" font-size="13" fill="#6b7280">error vs step size (log&#8211;log)</text>
  <g stroke="#475569" stroke-width="1.6" fill="none">
    <line x1="430" y1="240" x2="640" y2="240" marker-end="url(#ax8)"/>
    <line x1="430" y1="240" x2="430" y2="90" marker-end="url(#ax8)"/>
  </g>
  <text x="650" y="244" font-size="11" fill="#6b7280">&#949;</text>
  <text x="408" y="92" font-size="11" fill="#6b7280">err</text>
  <!-- slope-2 line -->
  <line x1="455" y1="120" x2="610" y2="220" stroke="#2563eb" stroke-width="3"/>
  <circle cx="455" cy="120" r="3.5" fill="#2563eb"/><circle cx="507" cy="153" r="3.5" fill="#2563eb"/>
  <circle cx="558" cy="187" r="3.5" fill="#2563eb"/><circle cx="610" cy="220" r="3.5" fill="#2563eb"/>
  <text x="556" y="150" font-size="12.5" fill="#2563eb" font-weight="600">slope &#8776; 2</text>
  <text x="535" y="288" text-anchor="middle" font-size="12.5" fill="#6b7280">second-order: halve &#949; &#8594; quarter the error</text>
</svg>
