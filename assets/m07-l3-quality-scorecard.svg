<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A two-by-two scorecard showing pass and fail miniatures for the smooth, feasible, safe, and efficient trajectory criteria">
<title>A two-by-two scorecard showing pass and fail miniatures for the smooth, feasible, safe, and efficient trajectory criteria</title>
<rect width="600" height="320" fill="white"/>
<text x="300" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="17" font-weight="650" fill="#0f172a">The four trajectory-quality criteria</text>
<g transform="translate(15,40)">
<rect width="280" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="14" y="22" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Smooth (continuity)</text>
<text x="80" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#10b981">✓ pass</text>
<text x="210" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#b91c1c">✗ fail</text>
<g transform="translate(20,52)"><path d="M0 50 Q 60 0 120 50" fill="none" stroke="#10b981" stroke-width="2.5"/></g>
<g transform="translate(150,52)"><path d="M0 55 L 55 55 L 55 10 L 120 10" fill="none" stroke="#b91c1c" stroke-width="2.5"/></g>
</g>
<g transform="translate(305,40)">
<rect width="280" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="14" y="22" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Feasible (limits)</text>
<text x="80" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#10b981">✓ pass</text>
<text x="210" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#b91c1c">✗ fail</text>
<g transform="translate(20,52)"><line x1="0" y1="12" x2="120" y2="12" stroke="#64748b" stroke-dasharray="4 3"/><path d="M0 55 Q 60 22 120 55" fill="none" stroke="#10b981" stroke-width="2.5"/></g>
<g transform="translate(150,52)"><line x1="0" y1="20" x2="120" y2="20" stroke="#64748b" stroke-dasharray="4 3"/><path d="M0 55 Q 60 -8 120 55" fill="none" stroke="#b91c1c" stroke-width="2.5"/></g>
</g>
<g transform="translate(15,180)">
<rect width="280" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="14" y="22" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Safe (collision-free)</text>
<text x="80" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#10b981">✓ pass</text>
<text x="210" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#b91c1c">✗ fail</text>
<g transform="translate(20,52)"><rect x="48" y="20" width="24" height="24" fill="#334155" opacity="0.5"/><path d="M0 55 Q 40 5 120 12" fill="none" stroke="#10b981" stroke-width="2.5"/></g>
<g transform="translate(150,52)"><rect x="48" y="20" width="24" height="24" fill="#334155" opacity="0.5"/><path d="M0 50 L 120 18" fill="none" stroke="#b91c1c" stroke-width="2.5"/><text x="60" y="36" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" fill="#b91c1c">✕</text></g>
</g>
<g transform="translate(305,180)">
<rect width="280" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="14" y="22" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#0f172a">Efficient (no waste)</text>
<text x="80" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#10b981">✓ pass</text>
<text x="210" y="44" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#b91c1c">✗ fail</text>
<g transform="translate(20,52)"><path d="M0 50 L 120 14" fill="none" stroke="#10b981" stroke-width="2.5"/></g>
<g transform="translate(150,52)"><path d="M0 50 C 30 -10 90 80 120 14" fill="none" stroke="#b91c1c" stroke-width="2.5"/></g>
</g>
</svg>
