<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="An image with the principal point marked slightly off center where the optical axis hits; two cases show a fixed direction landing nearer to the principal point for small focal length and farther for large focal length.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:11.5px;font-weight:700;fill:#334155}</style></defs>
  <text x="340" y="24" text-anchor="middle" class="t">Principal point (≈ center) and focal length as scale</text>
  <rect x="60" y="55" width="240" height="180" rx="6" fill="#0f172a"/>
  <line x1="60" y1="145" x2="300" y2="145" stroke="#334155" stroke-dasharray="3 3"/><line x1="180" y1="55" x2="180" y2="235" stroke="#334155" stroke-dasharray="3 3"/>
  <text x="180" y="48" text-anchor="middle" class="c">geometric center</text>
  <!-- principal point slightly off -->
  <circle cx="192" cy="152" r="5" fill="#10b981"/><text x="240" y="170" class="c" fill="#6ee7b7">principal point</text>
  <text x="180" y="252" text-anchor="middle" class="c">where the optical axis hits</text>
  <!-- right: small vs large f -->
  <text x="500" y="70" text-anchor="middle" class="l">same direction X/Z</text>
  <circle cx="430" cy="150" r="4" fill="#10b981"/><text x="430" y="250" text-anchor="middle" class="c">principal pt</text>
  <circle cx="480" cy="150" r="6" fill="#0ea5e9"/><text x="480" y="125" text-anchor="middle" class="c" fill="#0284c7">small f</text>
  <line x1="434" y1="150" x2="476" y2="150" stroke="#0ea5e9" stroke-dasharray="2 2"/>
  <circle cx="600" cy="150" r="6" fill="#7c3aed"/><text x="600" y="125" text-anchor="middle" class="c" fill="#7c3aed">large f</text>
  <line x1="434" y1="160" x2="596" y2="160" stroke="#7c3aed" stroke-dasharray="2 2"/>
  <text x="340" y="288" text-anchor="middle" class="c">Larger f_x → the same direction lands farther from the principal point. Calibration finds f_x,f_y,c_x,c_y.</text>
</svg>
