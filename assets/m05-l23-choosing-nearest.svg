<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A target with two feasible solutions and a faint current arm pose; the solution near the current pose is highlighted as chosen for least motion, the far solution that would require a big flip is greyed and rejected.">
<defs><style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.g{fill:#15803d;font-size:11px;font-weight:700}.r{fill:#94a3b8;font-size:11px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">Choose the nearest solution: least motion, smooth</text>
<polyline points="200.0,185.0 255.4,217.0 286.3,180.2" fill="none" stroke="#cbd5e1" stroke-width="4" stroke-dasharray="5 4" stroke-linecap="round" stroke-linejoin="round"/><text x="225" y="207" class="c">current pose</text><polyline points="200.0,185.0 251.2,146.6 280.0,185.0" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="241" y="137" class="r">big flip ✗</text><polyline points="200.0,185.0 251.2,223.4 280.0,185.0" fill="none" stroke="#15803d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="247" y="245" class="g">nearest ✓</text><circle cx="200" cy="185" r="5" fill="#334155"/><circle cx="280.0" cy="185.0" r="6" fill="#e11d48"/><text x="320" y="290" text-anchor="middle" class="c">cost = motion to current + limit margin + singularity margin → pick the minimum.</text></svg>
