<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Code structure wiring the DH table and config through dh fk to T 0 3, plus the camera mount and P cam to P base, combined via the inverse pose into the fruit relative to the gripper and a move vector.">
  <defs>
    <marker id="b30" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:10.5px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Assembling the capstone</text>
  <rect x="20" y="50" width="140" height="40" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="90" y="68" text-anchor="middle" class="b">DH table + config</text><text x="90" y="83" text-anchor="middle" class="c">reuse dh_fk (6.3)</text>
  <line x1="160" y1="70" x2="188" y2="70" stroke="#0f172a" stroke-width="1.4" marker-end="url(#b30)"/>
  <rect x="192" y="50" width="80" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="232" y="74" text-anchor="middle" class="b">T₀³</text>
  <rect x="20" y="120" width="140" height="40" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/><text x="90" y="138" text-anchor="middle" class="b">P_cam + mount</text><text x="90" y="153" text-anchor="middle" class="c">reuse SE(3) (M2)</text>
  <line x1="160" y1="140" x2="188" y2="140" stroke="#0f172a" stroke-width="1.4" marker-end="url(#b30)"/>
  <rect x="192" y="120" width="80" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="232" y="144" text-anchor="middle" class="b">P_base</text>
  <line x1="272" y1="70" x2="330" y2="100" stroke="#0f172a" stroke-width="1.4" marker-end="url(#b30)"/>
  <line x1="272" y1="140" x2="330" y2="110" stroke="#0f172a" stroke-width="1.4" marker-end="url(#b30)"/>
  <rect x="335" y="84" width="130" height="46" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="400" y="104" text-anchor="middle" class="b">(T₀³)⁻¹ P_base</text><text x="400" y="122" text-anchor="middle" class="c">fruit rel. gripper</text>
  <line x1="465" y1="107" x2="500" y2="107" stroke="#0f172a" stroke-width="1.4" marker-end="url(#b30)"/>
  <rect x="505" y="84" width="170" height="46" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="590" y="104" text-anchor="middle" class="b">move vector</text><text x="590" y="122" text-anchor="middle" class="c">P_base − gripper pos</text>
  <text x="350" y="205" text-anchor="middle" class="c">All Module 2 SE(3) operations on Module 3–4 data. Build factors as fresh arrays.</text>
</svg>
