<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A faux-3D object spinning about a labeled axis by angle theta, with an inset showing rotations about the x (pitch), y (roll), and z (yaw) axes.">
  <defs>
    <marker id="rax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="cur" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0284c7"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}.ax{font-size:11px;font-weight:700;fill:#7c3aed}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">3D rotation: spin about an axis by an angle</text>
  <!-- main: object + axis -->
  <rect x="40" y="55" width="370" height="250" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <line x1="150" y1="280" x2="300" y2="100" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#rax)"/><text x="304" y="98" class="ax">axis</text>
  <!-- faux-3D box -->
  <polygon points="180,200 250,200 270,175 200,175" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="1.6"/>
  <polygon points="180,200 200,175 200,135 180,160" fill="#8b5cf615" stroke="#8b5cf6" stroke-width="1.2"/>
  <polygon points="250,200 270,175 270,135 250,160" fill="#8b5cf618" stroke="#8b5cf6" stroke-width="1.2"/>
  <!-- curved angle arrow -->
  <path d="M 235 150 a 30 14 0 1 1 -40 6" fill="none" stroke="#0284c7" stroke-width="2" marker-end="url(#cur)"/>
  <text x="250" y="150" class="l" fill="#0284c7">θ</text>
  <text x="225" y="300" text-anchor="middle" class="c">size &amp; handedness preserved</text>
  <!-- inset: three elementary axes -->
  <rect x="430" y="55" width="210" height="250" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="535" y="78" text-anchor="middle" class="l">elementary rotations</text>
  <text x="455" y="115" class="c">Rz — yaw (about z)</text>
  <path d="M560 108 a 14 6 0 1 1 -8 4" fill="none" stroke="#0284c7" stroke-width="1.6" marker-end="url(#cur)"/>
  <text x="455" y="165" class="c">Rx — pitch (about x)</text>
  <path d="M560 158 a 6 14 0 1 1 4 8" fill="none" stroke="#0284c7" stroke-width="1.6" marker-end="url(#cur)"/>
  <text x="455" y="215" class="c">Ry — roll (about y)</text>
  <path d="M560 208 a 12 10 0 1 1 -6 6" fill="none" stroke="#0284c7" stroke-width="1.6" marker-end="url(#cur)"/>
  <text x="535" y="262" text-anchor="middle" class="c">Rz embeds the 2D rotation</text>
  <text x="340" y="328" text-anchor="middle" class="c">Any orientation = a single axis–angle spin, or a product of elementary rotations.</text>
</svg>
