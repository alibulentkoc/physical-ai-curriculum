<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A faux-3D isometric greenhouse: a floor plane with x and y axes, a new vertical z axis, a tomato up in the canopy at (x,y,z), and a robot base reaching up.">
  <defs>
    <marker id="ax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.ax{font-size:12px;font-weight:700;fill:#334155}.new{font-size:12px;font-weight:800;fill:#0d9488}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">From the floor (SE(2)) to space (SE(3))</text>
  <!-- floor parallelogram -->
  <polygon points="120,260 360,260 470,210 230,210" fill="#f1f5f9" stroke="#cbd5e1"/>
  <!-- axes -->
  <line x1="230" y1="240" x2="420" y2="240" stroke="#334155" stroke-width="1.6" marker-end="url(#ax)"/><text x="426" y="244" class="ax">x</text>
  <line x1="230" y1="240" x2="300" y2="208" stroke="#334155" stroke-width="1.6" marker-end="url(#ax)"/><text x="304" y="204" class="ax">y</text>
  <line x1="230" y1="240" x2="230" y2="90" stroke="#0d9488" stroke-width="2" marker-end="url(#ax)"/><text x="236" y="92" class="new">z (height/depth) — new</text>
  <!-- robot base -->
  <rect x="250" y="232" width="40" height="22" rx="4" fill="#1d4ed822" stroke="#1d4ed8"/>
  <line x1="270" y1="232" x2="300" y2="150" stroke="#1d4ed8" stroke-width="3"/>
  <!-- tomato in canopy -->
  <circle cx="320" cy="135" r="11" fill="#e11d48"/>
  <line x1="230" y1="240" x2="320" y2="135" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="332" y="130" class="c">tomato (x, y, z)</text>
  <text x="340" y="318" text-anchor="middle" class="c">3D pose = position (x, y, z) + orientation about three axes; motion is still rotation + translation.</text>
</svg>
