<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Same volume w, different shape &#8212; the condition number &#954; tells them apart</text>
  <line x1="380" y1="42" x2="380" y2="256" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="190" y="62" text-anchor="middle" font-size="12.5" fill="#6b7280">isotropic (healthy)</text>
  <ellipse cx="190" cy="150" rx="50" ry="42" fill="#dcfce7" stroke="#16a34a" stroke-width="2.6"/>
  <text x="190" y="222" text-anchor="middle" font-size="12.5" fill="#16a34a" font-weight="600">&#954; &#8776; 1</text>
  <text x="190" y="242" text-anchor="middle" font-size="11" fill="#6b7280">equal capability all ways</text>
  <text x="570" y="62" text-anchor="middle" font-size="12.5" fill="#6b7280">ill-conditioned (near singular)</text>
  <ellipse cx="570" cy="150" rx="78" ry="27" fill="#fee2e2" stroke="#dc2626" stroke-width="2.6"/>
  <text x="570" y="222" text-anchor="middle" font-size="12.5" fill="#dc2626" font-weight="600">&#954; &#8811; 1</text>
  <text x="570" y="242" text-anchor="middle" font-size="11" fill="#6b7280">fast one way, nearly stuck the other</text>
  <text x="380" y="270" text-anchor="middle" font-size="12" fill="#111827">both have the same area w &#8212; &#954; = &#963;_max/&#963;_min fixes the Yoshikawa blind spot</text>
</svg>
