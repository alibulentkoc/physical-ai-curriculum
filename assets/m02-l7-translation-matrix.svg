<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The 3x3 homogeneous translation matrix with the offset in the last column, sliding a shape across the plane.">
  <defs>
    <marker id="m1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.n{font-size:17px;font-weight:700;fill:#0f172a}.hl{font-size:17px;font-weight:800;fill:#0d9488}.cap{font-size:12px;font-weight:700;fill:#0f766e}</style>
  </defs>
  <text x="340" y="28" text-anchor="middle" class="t">Translation as a 3×3 matrix (offset in the last column)</text>
  <!-- matrix -->
  <text x="120" y="120" class="n">1</text><text x="160" y="120" class="n">0</text><text x="200" y="120" class="hl">tx</text>
  <text x="120" y="155" class="n">0</text><text x="160" y="155" class="n">1</text><text x="200" y="155" class="hl">ty</text>
  <text x="120" y="190" class="n">0</text><text x="160" y="190" class="n">0</text><text x="205" y="190" class="n">1</text>
  <path d="M105 95 v110 M230 95 v110" stroke="#0f172a" stroke-width="2"/>
  <rect x="190" y="100" width="34" height="64" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="207" y="214" text-anchor="middle" class="cap">offset</text>
  <text x="150" y="234" text-anchor="middle" class="c">T(tx, ty); bottom row [0 0 1]</text>
  <!-- effect: slide -->
  <line x1="350" y1="300" x2="650" y2="300" stroke="#cbd5e1"/><line x1="380" y1="90" x2="380" y2="300" stroke="#cbd5e1"/>
  <rect x="400" y="220" width="70" height="50" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <rect x="520" y="160" width="70" height="50" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="2"/>
  <line x1="435" y1="245" x2="555" y2="185" stroke="#0f172a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#m1)"/>
  <text x="470" y="300" text-anchor="middle" class="c">pure slide; direction (w=0) unaffected</text>
  <text x="340" y="322" text-anchor="middle" class="c">T·(x,y,1) = (x+tx, y+ty, 1) — the move no 2×2 matrix could do. Now it composes by multiplication.</text>
</svg>
