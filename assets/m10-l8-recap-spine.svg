    <rect x="150" y="90" width="105" height="56" rx="10" fill="#ecfdf5" stroke="#15803d" stroke-width="2.2"/><text x="202" y="114" text-anchor="middle" class="p" fill="#15803d">Mirror</text><text x="202" y="132" text-anchor="middle" class="c">&#10003; done</text>
