    <rect x="390" y="90" width="105" height="56" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="442" y="118" text-anchor="middle" class="p" fill="#94a3b8">Monitor</text>
    <rect x="510" y="90" width="105" height="56" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="562" y="118" text-anchor="middle" class="p" fill="#94a3b8">Predict</text>
    <rect x="630" y="90" width="105" height="56" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="682" y="118" text-anchor="middle" class="p" fill="#94a3b8">Adapt</text>
