<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A shape mirrored across the vertical axis: same size, flipped handedness. A small R becomes a backwards R to show orientation reversal.">
  <defs><style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:12px;fill:#64748b}.l{font-size:13px;font-weight:700;fill:#334155}.r{font-size:30px;font-weight:800;fill:#0ea5e9}.g{font-size:30px;font-weight:800;fill:#94a3b8}</style></defs>
  <text x="320" y="30" text-anchor="middle" class="t">Reflection: mirror across an axis (handedness flips)</text>
  <!-- mirror axis -->
  <line x1="320" y1="60" x2="320" y2="300" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="320" y="318" text-anchor="middle" class="c">mirror axis</text>
  <!-- original (ghost) shape: an L-ish triangle + R -->
  <polygon points="120,250 230,250 120,150" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="230" class="g">R</text>
  <text x="150" y="270" class="c" fill="#94a3b8">original</text>
  <!-- reflected shape (mirror across x=320) -->
  <polygon points="520,250 410,250 520,150" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="2"/>
  <text x="0" y="0" font-size="30" font-weight="800" fill="#ffffff" transform="translate(500,232) scale(-1,1)">R</text>
  <text x="470" y="270" class="l" fill="#0284c7">reflected</text>
  <text x="320" y="338" text-anchor="middle" class="c">Same size; orientation reversed (det = −1). Reflect twice across the same axis = identity.</text>
</svg>
