<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A six-degree-of-freedom arm with a spherical wrist; the wrist center is highlighted, step one the arm places the wrist center for position, step two the wrist sets orientation in place.">
<defs><marker id="aw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">Decouple: arm sets position, wrist sets orientation</text>
<line x1="90" y1="240" x2="170" y2="150" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><line x1="170" y1="150" x2="270" y2="120" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><line x1="270" y1="120" x2="360" y2="140" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><circle cx="90" cy="240" r="5" fill="#475569"/><circle cx="170" cy="150" r="5" fill="#475569"/><circle cx="270" cy="120" r="5" fill="#475569"/><circle cx="360" cy="140" r="8" fill="#8b5cf6"/><text x="360" y="126" text-anchor="middle" class="b" fill="#8b5cf6">wrist center p_w</text><line x1="360" y1="140" x2="415" y2="110" stroke="#10b981" stroke-width="6" stroke-linecap="round"/><circle cx="415" cy="110" r="6" fill="#e11d48"/><text x="423" y="110" class="c">gripper (offset d₆)</text><circle cx="90" cy="240" r="6" fill="#334155"/><text x="90" y="260" text-anchor="middle" class="c">base</text><text x="150" y="285" class="c">(1) arm places p_w = p_d − d₆ R_d ẑ   (2) wrist sets R₃⁶ = (R₀³)⁻¹R_d in place</text></svg>
