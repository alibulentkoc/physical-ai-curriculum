ejected for rework."}, {"type": "short", "prompt": "Explain Validate-and-Hand-Off with the 'inspect, then package and label the product' analogy.", "model": "A factory doesn't just make a part \u2014 it inspects it (does it pass QC?) and then packages it with a label: part number, spec sheet, a 'passed inspection' stamp, and a clear interface for use. The customer gets a sealed, certified package and doesn't need the manufacturing details. The reference trajectory layer is Module 7's certified product: VALIDATE is the inspection (must pass every check), and packaging wraps the validated trajectory with a clean interface (call reference(t)) and a spec sheet (duration, rate, validated, metrics). A trajectory that fails inspection never ships \u2014 it goes back for rework."}, {"type": "short", "prompt": "Specify what the reference trajectory layer exposes and why it's the bookend to the Module 6 velocity layer.", "model": "It exposes reference(t) \u2192 (q_d, q\u0307_d, q\u0308_d, info) \u2014 the feed-forward triple at any time \u2014 plus metadata: duration, control rate, the validated flag, and quality metrics. It's the bookend to Module 6's velocity layer because the modules chain through clean interfaces: Module 6 ended by handing Module 7 a velocity_layer(q, \u03be_d) \u2192 q\u0307; Module 7 ends by handing Module 8 a reference(t) \u2192 (q_d, q\u0307_d, q\u0308_d). Each module's final artifact is the next module's input, which is what lets them compose into a working system."}, {"type": "short", "prompt": "What does Module 8 have to supply that the reference layer deliberately does not, and why is a crisp contract valuable?", "model": "Module 8 supplies the tracking law: it reads the reference, computes the tracking error against the measured state, applies control gains (and accounts for dynamics), and commands the actuators to follow the reference and reject disturbances. The layer contains none of that \u2014 it's the desired motion only, the input to the controller, not a controller. A crisp contract is valuable because it lets Module 8 be built and tested against a fixed, well-specified reference interface, and lets the same validated reference run in simulation and on hardware without change."}];
