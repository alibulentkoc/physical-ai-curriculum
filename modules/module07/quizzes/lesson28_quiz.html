<script>var questions=[{"type": "mc", "prompt": "A continuous reference is discretized because:", "options": [{"t": "it saves memory", "ok": false}, {"t": "a digital controller updates at a fixed rate, tick by tick", "ok": true}, {"t": "it removes feed-forward", "ok": false}, {"t": "it adds collisions", "ok": false}], "ok": "Correct \u2014 digital controllers step at a fixed rate.", "no": "A digital controller wakes at a fixed control rate and reads the reference each tick."}, {"type": "mc", "prompt": "Sampling the reference too coarsely:", "options": [{"t": "is always fine", "ok": false}, {"t": "misrepresents the motion (time-axis tunneling)", "ok": true}, {"t": "improves fidelity", "ok": false}, {"t": "removes jerk", "ok": false}], "ok": "Correct \u2014 analogous to collision tunneling.", "no": "A coarse rate skips detail between samples \u2014 the time-axis analogue of collision tunneling."}, {"type": "mc", "prompt": "The reference data structure handed to execution contains:", "options": [{"t": "only positions", "ok": false}, {"t": "the feed-forward series plus metadata (duration, rate, validated)", "ok": true}, {"t": "torques", "ok": false}, {"t": "motor commands", "ok": false}], "ok": "Correct.", "no": "Timestamped (q_d, q\u0307_d, q\u0308_d) plus duration, rate, and the validated flag."}, {"type": "mc", "prompt": "Does discretization perform any control?", "options": [{"t": "yes, it tracks", "ok": false}, {"t": "no \u2014 it only represents the reference for a digital consumer", "ok": true}, {"t": "yes, it commands motors", "ok": false}, {"t": "yes, it computes error", "ok": false}], "ok": "Correct \u2014 representation only.", "no": "Discretization only represents the reference; stepping it with error correction is Module 8."}, {"type": "mc", "prompt": "A faithful discrete reference requires the rate to be:", "options": [{"t": "as low as possible", "ok": false}, {"t": "fine enough to capture the motion's fastest variation", "ok": true}, {"t": "exactly 1 Hz", "ok": false}, {"t": "irrelevant", "ok": false}], "ok": "Correct.", "no": "Fine enough that successive samples are close and peaks aren't aliased."}, {"type": "short", "prompt": "Explain discretizing the reference with the 'film frame rate' analogy, including the failure mode.", "model": "A film captures continuous motion as still frames; at enough frames per second it looks smooth, but too few frames give a jerky slideshow that misses what happened between them. A digital controller 'films' the reference, grabbing one frame (the desired position, velocity, acceleration) each control tick. A high enough rate makes the discrete sequence faithfully represent the smooth reference; too coarse a rate is a slideshow that can skip a velocity/acceleration peak \u2014 the time-axis version of collision tunneling. So the rule is to sample fine relative to how fast the motion changes."}, {"type": "short", "prompt": "What does the reference data structure contain, and why does the metadata travel with it?", "model": "It contains the timestamped feed-forward series \u2014 for each tick, the time and the desired position, velocity, and acceleration \u2014 or equivalently a callable that returns those at any time. Alongside the signals it carries metadata: the total duration, the control rate it was sampled at, and the validated flag (and quality metrics). The metadata travels with it because the consumer (execution / Module 8) needs to know how long the motion is, what rate the samples correspond to, and that it passed validation before stepping through it."}, {"type": "short", "prompt": "Why does keeping the reference as a callable function sidestep a rate-mismatch between build and control rates?", "model": "If the reference is stored as a fixed series sampled at one rate but the controller runs at a different rate, replaying the samples directly causes stair-stepping or requires interpolation. Keeping the reference as a callable q_d(t) lets the controller evaluate it at exactly its own tick times, at whatever rate it runs, producing a faithful sample wherever it asks. The continuous function is the source of truth; any discrete series is just one sampling of it, so the callable form removes any dependence on a particular build rate."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
