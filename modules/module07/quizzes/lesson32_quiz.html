<script>var questions=[{"type": "mc", "prompt": "A harvest cycle is:", "options": [{"t": "a single motion", "ok": false}, {"t": "a sequence of motions (reach \u2192 grasp \u2192 retreat), each the full workflow", "ok": true}, {"t": "only planning", "ok": false}, {"t": "only validation", "ok": false}], "ok": "Correct.", "no": "It's a sequence of legs, each running Plan \u2192 Parameterize \u2192 Validate \u2192 Execute."}, {"type": "mc", "prompt": "The legs chain into a continuous cycle because:", "options": [{"t": "they overlap", "ok": false}, {"t": "each leg starts where the last ended, both at rest", "ok": true}, {"t": "they are random", "ok": false}, {"t": "timing is ignored", "ok": false}], "ok": "Correct \u2014 rest joins.", "no": "Legs meet at shared poses at rest (zero velocity/acceleration), so the sequence is continuous."}, {"type": "mc", "prompt": "Module 7's final deliverable for the task is:", "options": [{"t": "the tracked motion", "ok": false}, {"t": "a validated reference (cycle) consumed by Module 8", "ok": true}, {"t": "the motor commands", "ok": false}, {"t": "the control gains", "ok": false}], "ok": "Correct.", "no": "Module 7 delivers the validated reference cycle; Module 8 tracks it."}, {"type": "mc", "prompt": "The bridge to Module 8 is that Module 8 adds:", "options": [{"t": "planning", "ok": false}, {"t": "feedback control, dynamics, and actuator control (to track the reference)", "ok": true}, {"t": "configuration space", "ok": false}, {"t": "collision checking", "ok": false}], "ok": "Correct.", "no": "Module 8 builds the tracker \u2014 feedback, dynamics, actuators \u2014 that follows the reference."}, {"type": "mc", "prompt": "Why replan per leg of the cycle?", "options": [{"t": "for no reason", "ok": false}, {"t": "the scene/payload changes per leg (e.g. fruit held on retreat)", "ok": true}, {"t": "to save time", "ok": false}, {"t": "planning is random", "ok": false}], "ok": "Correct.", "no": "Each leg plans against its own world (the retreat carries the fruit as payload)."}, {"type": "short", "prompt": "Explain the harvest cycle with the 'picking one apple: reach, grasp, pull back' analogy, including how legs chain.", "model": "Picking an apple is a little sequence: reach toward it avoiding branches, close your hand around it, pull back without snagging \u2014 three motions flowing into one action, each planned as you go (the route back with the apple differs from the route in). The harvester does the same explicitly: leg 1 (reach) plans a clear route to a pre-grasp pose, times it, validates; leg 2 (grasp) a short careful move; leg 3 (retreat) plans a route back out with the fruit as payload. Each leg runs the full workflow and produces a validated reference; the legs meet at rest poses so the chained cycle is continuous."}, {"type": "short", "prompt": "Recap the eight units of Module 7 in one line each.", "model": "U1: path vs trajectory and smoothness. U2: polynomial time scaling and the smooth-vs-fast trade. U3: joint-space trajectories (per-joint, synchronized, via-points, splines). U4: Cartesian-space trajectories (straight-line, orientation/SLERP, screw motion). U5: feasibility \u2014 velocity/acceleration limits, time scaling, fastest-feasible timing, whole-trajectory checks. U6: motion planning \u2014 configuration space, collision checking, RRT, smoothing. U7: trajectory quality, validation, tracking prerequisites, reference representation. U8: the capstone workflow (Plan \u2192 Parameterize \u2192 Validate \u2192 Execute) producing the reference trajectory layer."}, {"type": "short", "prompt": "State precisely what Module 7 delivers for the whole cycle and what Module 8 must do that Module 7 does not.", "model": "Module 7 delivers a validated reference for the entire cycle: the chained, continuous sequence of reference layers (reach, grasp, retreat), each giving q_d, q\u0307_d, q\u0308_d, feasible, collision-free, and certified \u2014 an open-loop reference the controller can step through. Module 8 must build the tracker that actually follows this reference on the real arm: computing tracking error, applying feedback control, accounting for the robot's dynamics, and commanding the actuators to reject disturbances. Module 7 decides and certifies the motion; Module 8 executes it under closed-loop control \u2014 none of which (feedback, dynamics, actuators) is in Module 7."}];

questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
