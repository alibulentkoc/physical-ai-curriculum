<script>var questions=[{"type": "mc", "prompt": "A screw motion is:", "options": [{"t": "pure translation", "ok": false}, {"t": "pure rotation", "ok": false}, {"t": "a simultaneous rotation about and translation along one axis (constant twist)", "ok": true}, {"t": "a sequence of joint moves", "ok": false}], "ok": "Correct \u2014 rotate-about and translate-along one axis, like a bolt.", "no": "A screw motion rotates about and translates along one axis at constant twist (Chasles' theorem)."}, {"type": "mc", "prompt": "The screw-interpolation formula is:", "options": [{"t": "T(s)=T0+s(T1\u2212T0)", "ok": false}, {"t": "T(s)=T0 exp(s log(T0\u207b\u00b9T1))", "ok": true}, {"t": "T(s)=T1 exp(s log T0)", "ok": false}, {"t": "T(s)=s T1", "ok": false}], "ok": "Correct \u2014 extract the relative twist, replay a fraction s of it.", "no": "T(s)=T0\u00b7exp(s\u00b7log(T0\u207b\u00b9T1)): the relative twist log(T0\u207b\u00b9T1), replayed a fraction s, anchored at T0."}, {"type": "mc", "prompt": "Screw and decoupled (straight-position + SLERP) interpolation:", "options": [{"t": "are identical everywhere", "ok": false}, {"t": "agree at the endpoints but differ in between", "ok": true}, {"t": "never agree", "ok": false}, {"t": "only agree at the midpoint", "ok": false}], "ok": "Correct \u2014 same endpoints, different mid-paths.", "no": "They agree at the endpoints; in between, the screw's position path curves while decoupled stays straight."}, {"type": "mc", "prompt": "When would you prefer decoupled interpolation over a screw?", "options": [{"t": "never", "ok": false}, {"t": "when the position path must be a literal straight line", "ok": true}, {"t": "when you want minimal computation", "ok": false}, {"t": "when there is no rotation", "ok": false}], "ok": "Correct \u2014 decoupled keeps position dead straight (e.g. sliding in a slot).", "no": "Use decoupled when the position must follow an exact straight line; the screw's position path generally curves."}, {"type": "mc", "prompt": "Chasles' theorem says:", "options": [{"t": "every rotation is a translation", "ok": false}, {"t": "any rigid displacement can be achieved by a single screw motion", "ok": true}, {"t": "screws need two axes", "ok": false}, {"t": "orientation can't be interpolated", "ok": false}], "ok": "Correct \u2014 any rigid displacement is one screw.", "no": "Chasles' theorem: any rigid-body displacement is a single screw (one axis, rotation + translation)."}, {"type": "short", "prompt": "Explain screw interpolation and what each factor of T(s)=T0 exp(s log(T0\u207b\u00b9T1)) does.", "model": "T0\u207b\u00b9T1 is the relative displacement from pose 0 to pose 1. Its matrix logarithm extracts the constant twist (combined linear+angular generator) that produces that displacement. exp(s\u00b7twist) replays a fraction s of that twist \u2014 a partial screw. Pre-multiplying by T0 anchors the motion at the start pose. The result glides from T0 (s=0) to T1 (s=1) at constant twist: rotation and translation advance in fixed proportion along one screw axis."}, {"type": "short", "prompt": "How do decoupled and screw interpolation compare at the endpoints and in between, and what determines the choice?", "model": "Both reproduce the same endpoint poses and both are smooth. In between they differ: decoupled (straight-line position + SLERP orientation on a shared clock) keeps the position path exactly straight, while the screw's position path generally curves because position is coupled to the rotation. Choose decoupled when the position must follow a literal straight line (e.g. sliding along a slot); choose the screw for the most natural, coordinated full-pose motion when the exact position path is flexible."}, {"type": "short", "prompt": "In what sense is a screw motion the 'straight line' between two poses?", "model": "By Chasles' theorem, any rigid displacement between two poses is achieved by exactly one screw \u2014 a single axis, a single amount of rotation, and a single pitch (translation per rotation). Screw interpolation replays that one screw at constant twist, so it is the unique, coordinate-free, minimal motion connecting the poses \u2014 the rigid-body analog of a straight line, which is the minimal path between two points in flat space."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
