<script>var questions=[{"type": "mc", "prompt": "The fastest feasible timing of a move is achieved by:", "options": [{"t": "a quintic with zero-acceleration ends", "ok": false}, {"t": "saturating the limits: accelerate at a_max, cruise at v_max, decelerate at a_max", "ok": true}, {"t": "moving at constant velocity", "ok": false}, {"t": "minimizing jerk", "ok": false}], "ok": "Correct \u2014 that's the trapezoidal profile.", "no": "Run right at the limits \u2014 the trapezoidal profile (ramp at a_max, cruise at v_max, ramp at a_max)."}, {"type": "mc", "prompt": "A move becomes triangular (not trapezoidal) when:", "options": [{"t": "it is very long", "ok": false}, {"t": "it is too short to reach v_max (D < v_max\u00b2/a_max)", "ok": true}, {"t": "a_max is large", "ok": false}, {"t": "v_max is small", "ok": false}], "ok": "Correct \u2014 short moves never reach the cruise speed.", "no": "If D < v_max\u00b2/a_max the joint never reaches v_max: accelerate then decelerate (triangle)."}, {"type": "mc", "prompt": "For the same move and limits, compared to a quintic the trapezoid is:", "options": [{"t": "slower but smoother", "ok": false}, {"t": "faster but jerkier (only C\u00b9)", "ok": true}, {"t": "identical", "ok": false}, {"t": "always triangular", "ok": false}], "ok": "Correct \u2014 fast-vs-smooth trade.", "no": "The trapezoid is faster (saturates limits) but only C\u00b9 (jerk spikes); the quintic is smoother but slower."}, {"type": "mc", "prompt": "A synchronized multi-joint move's duration is set by:", "options": [{"t": "the fastest joint", "ok": false}, {"t": "the slowest joint's minimum time (the bottleneck)", "ok": true}, {"t": "the average", "ok": false}, {"t": "the first joint", "ok": false}], "ok": "Correct \u2014 the bottleneck joint sets the common duration.", "no": "Take the max of the per-joint minimum times; the slowest (bottleneck) joint sets the duration."}, {"type": "mc", "prompt": "'Fastest feasible under simple limits' is:", "options": [{"t": "the same as time-optimal trajectory optimization", "ok": false}, {"t": "a closed-form limit-saturating timing, NOT formal optimization", "ok": true}, {"t": "kinodynamic planning", "ok": false}, {"t": "feedback control", "ok": false}], "ok": "Correct \u2014 it's the simple limit-saturating timing, in scope; optimization is not.", "no": "It's the practical closed-form limit-saturating timing; formal time-optimal optimization/kinodynamics is out of scope."}, {"type": "short", "prompt": "Describe the trapezoidal velocity profile and why it gives the fastest feasible time.", "model": "It has three phases: ramp up at the acceleration limit a_max, cruise at the velocity limit v_max, ramp down at a_max. It is fastest because at every instant it saturates a limit \u2014 acceleration on the ramps, velocity on the cruise \u2014 so no time is wasted moving below the hardware ceilings. The minimum time for a long move is T = D/v_max + v_max/a_max (cruise + ramp). A smoother quintic spends time easing the ends instead of saturating limits, so it's slower."}, {"type": "short", "prompt": "When is a move triangular, and what is its peak speed then?", "model": "A move is triangular when it's too short to reach the cruise speed: D < v_max\u00b2/a_max. The joint accelerates at a_max to a peak v_p = \u221a(a_max\u00b7D), which is below v_max, then immediately decelerates \u2014 no cruise phase. The minimum time is T = 2\u221a(D/a_max). Short repositioning moves are commonly triangular."}, {"type": "short", "prompt": "Contrast 'fastest feasible' timing with time-optimal trajectory optimization, and say which is in Module 7's scope.", "model": "Fastest-feasible (in scope) is the simple, closed-form timing that saturates per-joint velocity and acceleration limits \u2014 the trapezoidal/triangular profile and synchronizing to the bottleneck. Time-optimal trajectory optimization (out of scope) is heavier machinery: optimizing timing along an arbitrary path under coupled constraints, or kinodynamic planning that plans motion and dynamics together. Module 7 deliberately stays with the practical limit-saturating timing and avoids the optimization framework."}];

if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
