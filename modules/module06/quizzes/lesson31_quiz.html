<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}

<script>var questions=[{"type": "mc", "prompt": "The damping λ is scheduled from:", "options": [{"t": "joint angles", "ok": false}, {"t": "σ_min (nearness to singularity)", "ok": true}, {"t": "dt", "ok": false}, {"t": "link mass", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Inside the singular band, scheduled damping makes ‖q̇‖:", "options": [{"t": "blow up", "ok": false}, {"t": "stay bounded", "ok": true}, {"t": "zero", "ok": false}, {"t": "negative", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "A null-space secondary velocity changes:", "options": [{"t": "the tool twist", "ok": false}, {"t": "the joint motion but not the tool twist", "ok": true}, {"t": "nothing", "ok": false}, {"t": "the task command", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "Null-space control requires:", "options": [{"t": "a square Jacobian", "ok": false}, {"t": "redundancy (more joints than task dims)", "ok": true}, {"t": "a singularity", "ok": false}, {"t": "prismatic joints", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "mc", "prompt": "The integration honors the tool command:", "options": [{"t": "exactly always", "ok": false}, {"t": "as closely as the geometry allows (with damping trade-off)", "ok": true}, {"t": "never", "ok": false}, {"t": "only at singularities", "ok": false}], "ok": "Correct.", "no": "Not quite — review the lesson and the answer key."}, {"type": "short", "prompt": "How does σ_min schedule λ, and why?", "model": "λ²=(1−(σ_min/ε)²)λ_max² inside the band (σ_min<ε), else 0 — damping grows smoothly as the arm nears a singularity, bounding joint rates; zero damping far away preserves accuracy."}, {"type": "short", "prompt": "Why does the null-space term leave the tool twist unchanged?", "model": "The null-space projector (I−J⁺J) maps into the Jacobian null space, so J·(null term)=0 — joint self-motion that produces no tool velocity."}, {"type": "short", "prompt": "What does \"honored as closely as geometry allows\" mean near a singularity?", "model": "Damping trades a little tracking accuracy in the dying direction for bounded, feasible joint rates — the command is followed as well as the (near-singular) geometry permits."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
