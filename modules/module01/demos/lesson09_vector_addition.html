<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vector Addition — Lesson 2.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--a:#0ea5e9;--b:#8b5cf6;--r:#0d9488;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 340px;min-width:300px}
  .panel{flex:1 1 240px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px}
  .readout b{font-variant-numeric:tabular-nums}
  .ca{color:#0284c7;font-weight:700}.cb{color:#7c3aed;font-weight:700}.cr{color:#0d9488;font-weight:700}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:10px}
  .btn:hover{background:var(--soft)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 440 400" role="application" aria-label="Drag the blue and violet vector tips; the teal resultant a+b updates tip-to-tail.">
        <defs>
          <marker id="ma" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0ea5e9"/></marker>
          <marker id="mb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/></marker>
          <marker id="mr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
        </defs>
        <line x1="60" y1="340" x2="420" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
        <line x1="60" y1="340" x2="60" y2="30" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="404" y="358" font-size="11" fill="#64748b">right (m)</text>
        <text x="66" y="42" font-size="11" fill="#64748b">up (m)</text>
        <rect x="51" y="331" width="18" height="18" rx="3" fill="#0f172a"/>
        <!-- resultant (drawn first, under) -->
        <line id="res" x1="60" y1="340" x2="60" y2="340" stroke="#0d9488" stroke-width="4" marker-end="url(#mr)"/>
        <!-- a -->
        <line id="lineA" x1="60" y1="340" x2="60" y2="340" stroke="#0ea5e9" stroke-width="3" marker-end="url(#ma)"/>
        <!-- b (tip-to-tail from a) -->
        <line id="lineB" x1="60" y1="340" x2="60" y2="340" stroke="#8b5cf6" stroke-width="3" marker-end="url(#mb)"/>
        <circle id="tipA" r="9" fill="#0ea5e9" stroke="#fff" stroke-width="2" tabindex="0" style="cursor:grab" aria-label="vector a tip"/>
        <circle id="tipB" r="9" fill="#8b5cf6" stroke="#fff" stroke-width="2" tabindex="0" style="cursor:grab" aria-label="vector b tip"/>
      </svg>
      <div class="hint">Drag the <span class="ca">blue</span> tip (vector a) and the <span class="cb">violet</span> tip (vector b). The <span class="cr">teal</span> arrow is a + b.</div>
    </div>
    <div class="panel">
      <div class="readout" aria-live="polite">
        <span class="ca">a</span> = (<b id="ax">0.30</b>, <b id="ay">0.10</b>)<br>
        <span class="cb">b</span> = (<b id="bx">0.10</b>, <b id="by">0.25</b>)<br>
        <span class="cr">a + b</span> = (<b id="rx">0.40</b>, <b id="ry">0.35</b>)<br>
        <span class="cr">|a + b|</span> = <b id="rmag">0.53</b> m
      </div>
      <button id="swap" class="btn">Show b + a (same result)</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var OX=60, OY=340, S=380;            // origin px; px per meter
  var a={x:0.30,y:0.10}, b={x:0.10,y:0.25};
  var order=0; // 0: a then b ; 1: b then a
  var scene=document.getElementById('scene');
  var lineA=document.getElementById('lineA'), lineB=document.getElementById('lineB'), res=document.getElementById('res');
  var tipA=document.getElementById('tipA'), tipB=document.getElementById('tipB');
  var els={ax:'ax',ay:'ay',bx:'bx',by:'by',rx:'rx',ry:'ry',rmag:'rmag'};
  for(var k in els) els[k]=document.getElementById(els[k]);
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  function mx(v){return OX+v*S;} function my(v){return OY-v*S;}

  function render(){
    var first = order? b : a, second = order? a : b;
    var tx=first.x+second.x, ty=first.y+second.y;       // resultant
    // first vector from origin
    lineA.setAttribute('x1',mx(0));lineA.setAttribute('y1',my(0));
    lineA.setAttribute('x2',mx(first.x));lineA.setAttribute('y2',my(first.y));
    lineA.setAttribute('stroke', order? '#8b5cf6':'#0ea5e9');
    lineA.setAttribute('marker-end', order? 'url(#mb)':'url(#ma)');
    // second vector tip-to-tail
    lineB.setAttribute('x1',mx(first.x));lineB.setAttribute('y1',my(first.y));
    lineB.setAttribute('x2',mx(tx));lineB.setAttribute('y2',my(ty));
    lineB.setAttribute('stroke', order? '#0ea5e9':'#8b5cf6');
    lineB.setAttribute('marker-end', order? 'url(#ma)':'url(#mb)');
    // resultant
    res.setAttribute('x2',mx(tx));res.setAttribute('y2',my(ty));
    // handles always show a (blue, from origin) and b tip (violet, tip-to-tail after a) for dragging
    tipA.setAttribute('cx',mx(a.x));tipA.setAttribute('cy',my(a.y));
    tipB.setAttribute('cx',mx(a.x+b.x));tipB.setAttribute('cy',my(a.y+b.y));
    els.ax.textContent=a.x.toFixed(2);els.ay.textContent=a.y.toFixed(2);
    els.bx.textContent=b.x.toFixed(2);els.by.textContent=b.y.toFixed(2);
    els.rx.textContent=(a.x+b.x).toFixed(2);els.ry.textContent=(a.y+b.y).toFixed(2);
    els.rmag.textContent=Math.sqrt((a.x+b.x)**2+(a.y+b.y)**2).toFixed(2);
  }
  function toM(e){var r=scene.getBoundingClientRect();
    return {x:clamp(((e.clientX-r.left)/r.width*440-OX)/S,0,0.92),
            y:clamp((OY-(e.clientY-r.top)/r.height*400)/S,0,0.80)};}
  var drag=null;
  tipA.addEventListener('pointerdown',function(e){drag='a';tipA.style.cursor='grabbing';if(e.cancelable)e.preventDefault();});
  tipB.addEventListener('pointerdown',function(e){drag='b';tipB.style.cursor='grabbing';if(e.cancelable)e.preventDefault();});
  window.addEventListener('pointermove',function(e){
    if(!drag)return; var p=toM(e);
    if(drag==='a'){a=p;}
    else { b={x:clamp(p.x-a.x,-0.92,0.92), y:clamp(p.y-a.y,-0.80,0.80)}; } // b is tip minus a's tip
    render();
  });
  window.addEventListener('pointerup',function(){drag=null;tipA.style.cursor='grab';tipB.style.cursor='grab';});
  function key(el,which){el.addEventListener('keydown',function(e){var s=0.02,m=true;
    var t = which==='a'? a : {x:a.x+b.x,y:a.y+b.y};
    if(e.key==='ArrowRight')t.x+=s;else if(e.key==='ArrowLeft')t.x-=s;else if(e.key==='ArrowUp')t.y+=s;else if(e.key==='ArrowDown')t.y-=s;else m=false;
    if(m){e.preventDefault(); if(which==='a'){a={x:clamp(t.x,0,0.92),y:clamp(t.y,0,0.80)};} else {b={x:clamp(t.x-a.x,-0.92,0.92),y:clamp(t.y-a.y,-0.8,0.8)};} render();}});}
  key(tipA,'a'); key(tipB,'b');
  document.getElementById('swap').addEventListener('click',function(){order=order?0:1;this.textContent=order?'Show a + b (same result)':'Show b + a (same result)';render();});
  document.getElementById('reset').addEventListener('click',function(){a={x:0.30,y:0.10};b={x:0.10,y:0.25};order=0;document.getElementById('swap').textContent='Show b + a (same result)';render();});
  render();
})();
</script>
</body>
</html>
