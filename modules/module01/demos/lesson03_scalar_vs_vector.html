<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Does Direction Matter? — Lesson 1.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{appearance:none;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .chip:hover{background:var(--soft)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:center;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px}
  svg{width:200px;height:170px;background:#fff;border:1px solid var(--line);border-radius:10px;touch-action:none}
  .info{flex:1 1 240px;min-width:220px}
  .kind{display:inline-block;padding:3px 10px;border-radius:999px;font-weight:700;font-size:12.5px;margin-bottom:6px}
  .vec{background:#e0f2fe;color:#0369a1}.sca{background:#dcfce7;color:#15803d}
  .big{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .say{font-size:13.5px;color:var(--ink);margin-top:8px}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
  input[type=range]{width:100%}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="chips" id="chips"></div>
  <div class="stage">
    <svg id="svg" viewBox="0 0 200 170"></svg>
    <div class="info" id="info"></div>
  </div>
  <div class="hint">The test: change the <b>direction</b> and see if the physics changes. If an arrow's heading matters, it's a <b>vector</b>. If a single number already says everything, it's a <b>scalar</b> — there's no direction to turn.</div>
</div>
<script>
(function(){
  // label, isVector, unit, flipText
  var Q = [
    ["Air temperature", false, "°C", ""],
    ["Robot speed", false, " m/s", ""],
    ["The wind", true, "", "flip it and the wind blows the opposite way — plants bend the other direction."],
    ["Battery charge", false, "%", ""],
    ["Gripper push on a stem", true, "", "flip it and a push becomes a pull — the opposite effect on the stem."]
  ];
  var SCAL = [24, 0.30, 0, 80, 0];   // default scalar values
  var chips=document.getElementById("chips"), svg=document.getElementById("svg"), info=document.getElementById("info");
  var sel=2, ang=-30;

  Q.forEach(function(q,i){
    var b=document.createElement("button"); b.className="chip"+(i===sel?" on":""); b.textContent=q[0];
    b.addEventListener("click",function(){ sel=i; ang=-30;
      Array.prototype.forEach.call(chips.children,function(c){c.classList.remove("on");}); b.classList.add("on"); render(); });
    chips.appendChild(b);
  });

  var SVGNS="http://www.w3.org/2000/svg";
  function draw(){
    svg.innerHTML="";
    var cx=100, cy=90, L=58, a=ang*Math.PI/180;
    var hx=cx+L*Math.cos(a), hy=cy+L*Math.sin(a);
    // origin dot
    var o=document.createElementNS(SVGNS,"circle"); o.setAttribute("cx",cx);o.setAttribute("cy",cy);o.setAttribute("r",4);o.setAttribute("fill","#94a3b8"); svg.appendChild(o);
    var defs=document.createElementNS(SVGNS,"defs");
    defs.innerHTML='<marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0d9488"/></marker>';
    svg.appendChild(defs);
    var ln=document.createElementNS(SVGNS,"line"); ln.setAttribute("x1",cx);ln.setAttribute("y1",cy);ln.setAttribute("x2",hx);ln.setAttribute("y2",hy);
    ln.setAttribute("stroke","#0d9488");ln.setAttribute("stroke-width","3.5");ln.setAttribute("marker-end","url(#ah)"); svg.appendChild(ln);
    var h=document.createElementNS(SVGNS,"circle"); h.setAttribute("cx",hx);h.setAttribute("cy",hy);h.setAttribute("r",9);h.setAttribute("fill","#0d9488");h.setAttribute("opacity","0.18");h.style.cursor="grab"; svg.appendChild(h);
    h.addEventListener("pointerdown",function(e){ h.setPointerCapture(e.pointerId);
      function mv(ev){ var r=svg.getBoundingClientRect(); var x=(ev.clientX-r.left)/r.width*200-cx, y=(ev.clientY-r.top)/r.height*170-cy; ang=Math.atan2(y,x)*180/Math.PI; render(); }
      function up(){ svg.removeEventListener("pointermove",mv); }
      svg.addEventListener("pointermove",mv); h.addEventListener("pointerup",up,{once:true});
    });
  }
  function render(){
    var q=Q[sel];
    if(q[1]){
      draw();
      info.innerHTML='<span class="kind vec">vector</span><div class="big">'+q[0]+'</div>'+
        '<div class="say">heading: <b>'+Math.round((ang+360)%360)+'°</b> — drag the arrowhead to turn it.</div>'+
        '<div class="say">Why it\'s a vector: '+q[3]+'</div>';
    }else{
      svg.innerHTML=""; var cx=100,cy=85;
      var t=document.createElementNS(SVGNS,"text"); t.setAttribute("x",cx);t.setAttribute("y",cy);t.setAttribute("text-anchor","middle");
      t.setAttribute("font-size","30");t.setAttribute("font-weight","700");t.setAttribute("fill","#15803d");
      t.textContent=SCAL[sel]+q[2]; svg.appendChild(t);
      var t2=document.createElementNS(SVGNS,"text"); t2.setAttribute("x",cx);t2.setAttribute("y",cy+28);t2.setAttribute("text-anchor","middle");
      t2.setAttribute("font-size","11");t2.setAttribute("fill","#94a3b8"); t2.textContent="(no direction to turn)"; svg.appendChild(t2);
      info.innerHTML='<span class="kind sca">scalar</span><div class="big">'+q[0]+'</div>'+
        '<div class="say">One number — <b>'+SCAL[sel]+q[2]+'</b> — says everything. There is no arrow to rotate, so direction simply doesn\'t apply.</div>'+
        '<label>nudge the value</label><input type="range" id="sl" min="0" max="100" value="'+SCAL[sel]+'">';
      var sl=document.getElementById("sl"); if(sl) sl.addEventListener("input",function(){ SCAL[sel]=+sl.value; render(); });
    }
  }
  render();
})();
</script>
</body>
</html>
