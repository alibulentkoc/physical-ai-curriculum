<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Why Frames Matter — Lesson 3.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 330px;min-width:290px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  .panel{flex:1 1 200px;min-width:190px}
  .seg{display:flex;gap:6px;margin-bottom:10px}
  .seg button{flex:1;appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;font-size:12.5px;font-weight:600;cursor:pointer}
  .seg button.on{color:#fff}
  .seg button.cam.on{background:#7c3aed;border-color:#7c3aed}
  .seg button.rob.on{background:#0d9488;border-color:#0d9488}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px}
  .big{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg id="svg" viewBox="0 0 330 250"></svg>
    <div class="panel">
      <div class="seg">
        <button class="cam on" id="bcam">Camera frame</button>
        <button class="rob" id="brob">Robot frame</button>
      </div>
      <div class="readout" id="out"></div>
      <div class="hint">One tomato, one true position — but its <b>coordinates depend on the frame</b> you measure from. Switch frames and the numbers change though the tomato never moved. That's why every coordinate needs a frame.</div>
    </div>
  </div>
</div>
<script>
(function(){
  var W=330,H=250,s=40;
  var svg=document.getElementById("svg"), out=document.getElementById("out");
  var SVGNS="http://www.w3.org/2000/svg";
  var CAM={o:[0.6,0.6],c:"#7c3aed",name:"camera"}, ROB={o:[4.0,0.6],c:"#0d9488",name:"robot"};
  var tom=[2.4,2.0], frame="cam";
  function el(n,a){ var e=document.createElementNS(SVGNS,n); for(var k in a) e.setAttribute(k,a[k]); return e; }
  function sv(p){ return [30+p[0]*s, 210-p[1]*s]; }
  function frameDot(F){
    var c=sv(F.o);
    svg.appendChild(el("line",{x1:c[0],y1:c[1],x2:c[0]+34,y2:c[1],stroke:F.c,"stroke-width":1.5,opacity:0.6}));
    svg.appendChild(el("line",{x1:c[0],y1:c[1],x2:c[0],y2:c[1]-34,stroke:F.c,"stroke-width":1.5,opacity:0.6}));
    svg.appendChild(el("circle",{cx:c[0],cy:c[1],r:5,fill:F.c}));
    var lb=el("text",{x:c[0]+6,y:c[1]+15,"font-size":10,fill:F.c}); lb.textContent=F.name; svg.appendChild(lb);
  }
  function draw(){
    svg.innerHTML="";
    var defs=el("defs",{}); defs.innerHTML='<marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>'; svg.appendChild(defs);
    frameDot(CAM); frameDot(ROB);
    var F=(frame==="cam")?CAM:ROB, c=sv(F.o), t=sv(tom);
    svg.appendChild(el("line",{x1:c[0],y1:c[1],x2:t[0],y2:t[1],stroke:"#475569","stroke-width":2,"stroke-dasharray":"5 3","marker-end":"url(#ah)"}));
    var dot=el("circle",{cx:t[0],cy:t[1],r:12,fill:"#ef4444"}); dot.style.cursor="grab"; svg.appendChild(dot);
    svg.appendChild(el("circle",{cx:t[0],cy:t[1],r:3,fill:"#fff"}));
    var tl=el("text",{x:t[0]+14,y:t[1]-9,"font-size":11,fill:"#475569"}); tl.textContent="tomato"; svg.appendChild(tl);
    dot.addEventListener("pointerdown",function(e){ dot.setPointerCapture(e.pointerId);
      function mv(ev){ var r=svg.getBoundingClientRect(); var sx=(ev.clientX-r.left)/r.width*W, sy=(ev.clientY-r.top)/r.height*H; tom[0]=Math.max(0.2,Math.min(6.5,(sx-30)/s)); tom[1]=Math.max(0.2,Math.min(4.2,(210-sy)/s)); render(); }
      svg.addEventListener("pointermove",mv); dot.addEventListener("pointerup",function(){ svg.removeEventListener("pointermove",mv); },{once:true});
    });
  }
  function render(){
    draw();
    var F=(frame==="cam")?CAM:ROB;
    var rx=tom[0]-F.o[0], ry=tom[1]-F.o[1];
    out.innerHTML='tomato in the <b style="color:'+F.c+'">'+F.name+' frame</b>:<br><span class="big">['+rx.toFixed(2)+', '+ry.toFixed(2)+']</span>'+
      '<br><br><span style="color:#94a3b8">same tomato, measured from '+F.name+'\'s origin</span>';
  }
  document.getElementById("bcam").addEventListener("click",function(){ frame="cam"; this.classList.add("on"); document.getElementById("brob").classList.remove("on"); render(); });
  document.getElementById("brob").addEventListener("click",function(){ frame="rob"; this.classList.add("on"); document.getElementById("bcam").classList.remove("on"); render(); });
  render();
})();
</script>
</body>
</html>
