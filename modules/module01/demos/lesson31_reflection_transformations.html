<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reflection Transformations — Lesson 4.7</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:260px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 200px;min-width:190px}
  .btns{display:flex;flex-direction:column;gap:8px}
  .btns button{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;font-size:13.5px;font-weight:600;cursor:pointer}
  .btns button:hover{background:var(--soft)}
  .reset{color:var(--muted)}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;margin-top:12px}
  .hand{display:inline-block;padding:2px 9px;border-radius:7px;font-weight:700;font-size:12px}
  .rh{background:#dcfce7;color:#15803d}.lh{background:#fee2e2;color:#b91c1c}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg id="svg" viewBox="0 0 260 260"></svg>
    <div class="panel">
      <div class="btns">
        <button id="rx">Reflect across x-axis</button>
        <button id="ry">Reflect across y-axis</button>
        <button id="reset" class="reset">Reset</button>
      </div>
      <div class="readout" id="out"></div>
      <div class="hint">Reflect the shape across an axis: same size, but the orientation (its "handedness") flips. Reflect across the <b>same</b> axis twice and it returns exactly to where it started.</div>
    </div>
  </div>
</div>
<script>
(function(){
  var W=260,H=260,ox=130,oy=130,s=40;
  var svg=document.getElementById("svg"), out=document.getElementById("out");
  var SVGNS="http://www.w3.org/2000/svg";
  var base=[[0.3,0.3],[1.6,0.3],[1.6,0.7],[0.7,0.7],[0.7,1.6],[0.3,1.6]]; // L
  var M=[1,0,0,1];
  function el(n,a){ var e=document.createElementNS(SVGNS,n); for(var k in a) e.setAttribute(k,a[k]); return e; }
  function mul(A,B){ return [A[0]*B[0]+A[1]*B[2], A[0]*B[1]+A[1]*B[3], A[2]*B[0]+A[3]*B[2], A[2]*B[1]+A[3]*B[3]]; }
  function ap(m,p){ return [m[0]*p[0]+m[1]*p[1], m[2]*p[0]+m[3]*p[1]]; }
  function sv(p){ return [ox+p[0]*s, oy-p[1]*s]; }
  function det(m){ return m[0]*m[3]-m[1]*m[2]; }
  function render(){
    svg.innerHTML="";
    for(var g=-2;g<=2;g++){ if(g===0)continue;
      svg.appendChild(el("line",{x1:ox+g*s,y1:8,x2:ox+g*s,y2:H-8,stroke:"#eef2f7","stroke-width":1}));
      svg.appendChild(el("line",{x1:8,y1:oy+g*s,x2:W-8,y2:oy+g*s,stroke:"#eef2f7","stroke-width":1})); }
    svg.appendChild(el("line",{x1:8,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.3}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.3}));
    var op=base.map(function(p){var c=sv(p);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:op,fill:"none",stroke:"#cbd5e1","stroke-width":1.2,"stroke-dasharray":"4 3"}));
    var tp=base.map(function(p){var c=sv(ap(M,p));return c[0]+","+c[1];}).join(" ");
    var flipped=det(M)<0;
    svg.appendChild(el("polygon",{points:tp,fill:flipped?"#fee2e233":"#0d948822",stroke:flipped?"#b91c1c":"#0d9488","stroke-width":2}));
    // corner marker to show orientation
    var c0=sv(ap(M,base[0]));
    svg.appendChild(el("circle",{cx:c0[0],cy:c0[1],r:4,fill:flipped?"#b91c1c":"#0d9488"}));
    out.innerHTML='orientation: <span class="hand '+(flipped?"lh":"rh")+'">'+(flipped?"flipped (mirrored)":"original")+'</span>'+
      '<br><span style="color:#64748b">det = '+det(M).toFixed(0)+' &nbsp;(−1 means handedness reversed)</span>';
  }
  document.getElementById("rx").addEventListener("click",function(){ M=mul([1,0,0,-1],M); render(); });
  document.getElementById("ry").addEventListener("click",function(){ M=mul([-1,0,0,1],M); render(); });
  document.getElementById("reset").addEventListener("click",function(){ M=[1,0,0,1]; render(); });
  render();
})();
</script>
</body>
</html>
