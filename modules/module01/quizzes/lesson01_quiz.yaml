# Lesson 1.1 — Knowledge Check

> Formative. Take it as many times as you like; it does not affect your grade. Use it to check your understanding before moving on.

questions:

  - id: 1.1-q1
    type: short_answer
    prompt: In your own words, what distinguishes Physical AI from software-only AI?

  - id: 1.1-q2
    type: multiple_choice
    prompt: Which ordering correctly describes the robot's core loop?
    options:
      - A. Action → Perception → Reasoning
      - B. Perception → Reasoning → Action
      - C. Reasoning → Action → Perception
      - D. Perception → Action → Reasoning

  - id: 1.1-q3
    type: matching
    prompt: Match each loop stage to the "language" (data type) it works in for the greenhouse robot.
    left:
      - Perceive
      - Reason
      - Act
    right:
      - pixels
      - meters / frames
      - joint angles

  - id: 1.1-q4
    type: short_answer
    prompt: Why can't the robot use the tomato's camera-frame position directly to command its arm?

  - id: 1.1-q5
    type: multiple_choice
    prompt: The chain "pixels → camera frame → robot frame → joint angles → motion" mostly describes what kind of work?
    options:
      - A. Translating between different spatial representations
      - B. Storing data in a database
      - C. Training a language model
      - D. Compressing images

  - id: 1.1-q6
    type: true_false
    prompt: "True or False: In Physical AI, a small error in estimating position has no real-world cost."

# End of knowledge check. See the lesson's §10 for the open-ended Challenge Problem,
# which is assessed separately (transfer / engineering reasoning) and uses a rubric in coaches/.
