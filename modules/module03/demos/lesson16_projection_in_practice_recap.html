<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projection in Practice — Lesson 4.4</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .banner{background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px;padding:9px 12px;font-size:12.5px;color:#155e63;margin-bottom:10px;line-height:1.55}
  .stage{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:280px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:14px}
  .panel{flex:1 1 210px;min-width:200px}
  label{font-size:11.5px;color:var(--muted);display:block;margin:7px 0 3px} input[type=range]{width:100%}
  .steps{font-size:11.5px;font-variant-numeric:tabular-nums;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}
  .steps div{margin:3px 0}.arrow{color:#94a3b8}
  .hint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}
</style></head><body>
<div class="wrap">
  <div class="banner"><b>Move the 3D point and intrinsics</b> and watch the full pipeline run: 3D point → divide by Z → apply K → pixel. The midpoint checkpoint of Module 3.</div>
  <div class="stage">
  <svg id="svg" viewBox="0 0 280 230"></svg>
  <div class="panel">
    <label>X</label><input type="range" id="X" min="-0.4" max="0.4" step="0.01" value="0.15">
    <label>Y</label><input type="range" id="Y" min="-0.3" max="0.3" step="0.01" value="-0.08">
    <label>Z</label><input type="range" id="Z" min="0.2" max="1.2" step="0.01" value="0.5">
    <label>fₓ</label><input type="range" id="fl" min="400" max="1000" step="10" value="800">
    <div class="steps" id="steps"></div>
    <div class="hint">Half-way through Module 3: a 3D point becomes a pixel through normalize-then-K. Next come lens distortion and the reverse trip, pixel back to a 3D ray.</div>
  </div>
</div></div>
<script>(function(){
  var W=280,H=230,MX=14,MY=20,sc=0.40,IW=640,IH=480,cx=320,cy=240;
  var svg=document.getElementById("svg"),steps=document.getElementById("steps"),NS="http://www.w3.org/2000/svg";
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function px(u,v){return [MX+u*sc, MY+v*sc];}
  function render(){
    var X=+document.getElementById("X").value,Y=+document.getElementById("Y").value,Z=+document.getElementById("Z").value,fl=+document.getElementById("fl").value;
    var xn=X/Z,yn=Y/Z; var u=fl*xn+cx,v=fl*yn+cy;
    svg.innerHTML="";
    var o=px(0,0),e=px(IW,IH);
    svg.appendChild(el("rect",{x:o[0],y:o[1],width:e[0]-o[0],height:e[1]-o[1],fill:"#fff",stroke:"#94a3b8","stroke-width":1.5}));
    var lab=el("text",{x:o[0]+2,y:o[1]-5,"font-size":10,fill:"#94a3b8"});lab.textContent="image (640×480 px)";svg.appendChild(lab);
    var pp=px(cx,cy);
    svg.appendChild(el("line",{x1:pp[0]-6,y1:pp[1],x2:pp[0]+6,y2:pp[1],stroke:"#0369a1","stroke-width":1.3}));
    svg.appendChild(el("line",{x1:pp[0],y1:pp[1]-6,x2:pp[0],y2:pp[1]+6,stroke:"#0369a1","stroke-width":1.3}));
    var pt=px(Math.max(0,Math.min(IW,u)),Math.max(0,Math.min(IH,v)));
    svg.appendChild(el("circle",{cx:pt[0],cy:pt[1],r:7,fill:"#ef4444"}));
    var f2=function(x){return (Math.round(x*1000)/1000).toFixed(3);};
    steps.innerHTML='<div>point = ('+X+', '+Y+', '+Z+')</div>'+
      '<div class="arrow">↓ divide by Z</div>'+
      '<div>normalized = ('+f2(xn)+', '+f2(yn)+')</div>'+
      '<div class="arrow">↓ apply K</div>'+
      '<div style="color:#0d9488;font-weight:700">pixel = ('+Math.round(u)+', '+Math.round(v)+')</div>';
  }
  ["X","Y","Z","fl"].forEach(function(id){document.getElementById(id).addEventListener("input",render);});
  render();
})();</script></body></html>
