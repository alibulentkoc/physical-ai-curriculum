<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lens Distortion — Lesson 5.4</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .banner{background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px;padding:9px 12px;font-size:12.5px;color:#155e63;margin-bottom:10px;line-height:1.55}
  .stage{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start}
  svg{flex:1 1 280px;min-width:260px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:14px}
  .panel{flex:1 1 200px;min-width:190px}
  label{font-size:12px;color:var(--muted);display:block;margin:8px 0 5px} input[type=range]{width:100%}
  .seg{display:flex;gap:6px;margin-top:8px}
  .seg button{flex:1;appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .hint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}
</style></head><body>
<div class="wrap">
  <div class="banner"><b>The full round trip.</b> Set k₁, then switch between the raw <b>distorted</b> image and the <b>undistorted</b> (corrected) one — straight lines come back.</div>
  <div class="stage">
  <svg id="svg" viewBox="0 0 260 260"></svg>
  <div class="panel">
    <label>lens distortion k₁</label><input type="range" id="k1" min="-0.35" max="0.35" step="0.01" value="-0.25">
    <div class="seg"><button id="d" class="on">distorted</button><button id="u">undistorted</button></div>
    <div class="hint">Unit 5 in one tool: a lens bends straight lines by (1 + k₁·r²); undistortion inverts it so the geometry is trustworthy again. The centre stays fixed both ways.</div>
  </div>
</div></div>
<script>(function(){
  var W=260,H=260,C=130,sc=95,NS="http://www.w3.org/2000/svg",mode="d";
  var svg=document.getElementById("svg");
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(x,y){return [C+x*sc, C-y*sc];}
  function distort(x,y,k1){var r2=x*x+y*y,f=1+k1*r2;return [x*f,y*f];}
  function undistort(x,y,k1){var ux=x,uy=y;for(var i=0;i<8;i++){var r2=ux*ux+uy*uy,f=1+k1*r2;ux=x/f;uy=y/f;}return [ux,uy];}
  function render(){
    var k1=+document.getElementById("k1").value;
    svg.innerHTML="";
    var g=[-1,-0.6,-0.2,0.2,0.6,1];
    function map(x,y){ if(mode==="d") return distort(x,y,k1); else { var d=distort(x,y,k1); return undistort(d[0],d[1],k1); } }
    g.forEach(function(gx){var pts=[];for(var t=-1;t<=1.001;t+=0.1){var d=map(gx,t);var p=sv(d[0],d[1]);pts.push(p[0].toFixed(1)+","+p[1].toFixed(1));}
      svg.appendChild(el("polyline",{points:pts.join(" "),fill:"none",stroke:"#0d9488","stroke-width":1.6}));});
    g.forEach(function(gy){var pts=[];for(var t=-1;t<=1.001;t+=0.1){var d=map(t,gy);var p=sv(d[0],d[1]);pts.push(p[0].toFixed(1)+","+p[1].toFixed(1));}
      svg.appendChild(el("polyline",{points:pts.join(" "),fill:"none",stroke:"#94a3b8","stroke-width":1.4}));});
    svg.appendChild(el("circle",{cx:C,cy:C,r:3,fill:"#b91c1c"}));
    var lab=el("text",{x:C-sc+4,y:C-sc+14,"font-size":10,fill:mode==="d"?"#b91c1c":"#15803d"});lab.textContent=mode==="d"?"distorted":"undistorted (straight)";svg.appendChild(lab);
  }
  document.getElementById("d").addEventListener("click",function(){mode="d";this.classList.add("on");document.getElementById("u").classList.remove("on");render();});
  document.getElementById("u").addEventListener("click",function(){mode="u";this.classList.add("on");document.getElementById("d").classList.remove("on");render();});
  document.getElementById("k1").addEventListener("input",render);
  render();
})();</script></body></html>
