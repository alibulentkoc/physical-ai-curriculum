<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>See the Fruit, Place It in the World — Module 3 Capstone</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--ray:#f59e0b;--pt:#10b981;--world:#1d4ed8;--fruit:#e11d48;--ok:#15803d;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:820px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 380px;min-width:320px}
  .panel{flex:1 1 240px;min-width:240px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.55}
  .checks{margin-top:10px;font-size:12.5px;line-height:1.7}
  .badge{display:inline-block;font-weight:800;padding:1px 7px;border-radius:6px;margin-right:4px}
  .pass{color:var(--ok);background:#dcfce7}
  .fail{color:var(--bad);background:#fee2e2}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .pw{font-weight:800;color:var(--world)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 440 300" role="img" aria-label="A camera center on the left projects a ray through a detected pixel to a fruit at the measured depth, giving a camera-frame point that is then transformed to a world-frame position shown near the robot base.">
        <line x1="40" y1="270" x2="420" y2="270" stroke="#cbd5e1"/>
        <text x="230" y="288" text-anchor="middle" fill="#94a3b8" font-size="11">depth →</text>
        <circle cx="55" cy="150" r="6" fill="#0f172a"/>
        <text x="55" y="172" text-anchor="middle" fill="#64748b" font-size="11">camera</text>
        <line id="plane" x1="100" y1="70" x2="100" y2="230" stroke="#1d4ed8" stroke-width="2"/>
        <rect id="pix" x="94" y="144" width="12" height="12" fill="#e11d48"/>
        <line id="ray" x1="55" y1="150" x2="420" y2="100" stroke="#f59e0b" stroke-width="2"/>
        <circle id="fruit" cx="240" cy="120" r="9" fill="#e11d48"/>
        <!-- world frame triad -->
        <g id="worldframe" transform="translate(360,210)">
          <line x1="0" y1="0" x2="34" y2="0" stroke="#1d4ed8" stroke-width="2.4"/>
          <line x1="0" y1="0" x2="0" y2="-30" stroke="#7c3aed" stroke-width="2.4"/>
          <circle cx="0" cy="0" r="3.5" fill="#0f172a"/>
          <text x="0" y="18" text-anchor="middle" fill="#64748b" font-size="10">world</text>
        </g>
      </svg>
      <div class="hint">A detection becomes a verified world position. Move the sliders: the fruit slides along the ray (depth), and the world position updates. Toggle the frame error to see a check fail.</div>
    </div>
    <div class="panel">
      <label>Pixel u: <span id="uV">480</span></label><input id="u" type="range" min="0" max="640" step="1" value="480">
      <label>Pixel v: <span id="vV">160</span></label><input id="v" type="range" min="0" max="480" step="1" value="160">
      <label>Depth Z: <span id="zV">0.30</span> m</label><input id="z" type="range" min="0.1" max="1.0" step="0.01" value="0.30">
      <label><input id="frameErr" type="checkbox"> hand P_c to arm without transforming (frame bug)</label>
      <div class="readout" aria-live="polite" id="msg"></div>
      <div class="checks" id="checks"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var fx=800, fy=800, cx=320, cy=240;
  var t_wc=[1.0,0.5,0.1];           // world<-cam translation (identity rotation)
  var workspace=1.6;
  function val(id){return +document.getElementById(id).value;}
  function norm(a){return Math.sqrt(a[0]*a[0]+a[1]*a[1]+a[2]*a[2]);}
  function draw(){
    var u=val('u'), v=val('v'), Z=val('z');
    var bug=document.getElementById('frameErr').checked;
    document.getElementById('uV').textContent=u;
    document.getElementById('vV').textContent=v;
    document.getElementById('zV').textContent=Z.toFixed(2);
    var xn=(u-cx)/fx, yn=(v-cy)/fy;
    var Pc=[xn*Z, yn*Z, Z];
    var Pw = bug ? Pc.slice() : [Pc[0]+t_wc[0], Pc[1]+t_wc[1], Pc[2]+t_wc[2]];
    // checks
    // re-projection: invert transform then project
    var Pc_back = bug ? Pw.slice() : [Pw[0]-t_wc[0],Pw[1]-t_wc[1],Pw[2]-t_wc[2]];
    var ru = fx*Pc_back[0]/Pc_back[2]+cx, rv = fy*Pc_back[1]/Pc_back[2]+cy;
    var reprojErr = Math.hypot(ru-u, rv-v);
    var reprojOk = reprojErr < 1.0;
    // distance preservation: ||Pc|| vs ||Pw - t||
    var pwMinusT = [Pw[0]-t_wc[0],Pw[1]-t_wc[1],Pw[2]-t_wc[2]];
    var distOk = Math.abs(norm(Pc)-norm(pwMinusT)) < 1e-6;
    var wsOk = norm(Pw) < workspace;
    // ---- scene ----
    var camX=55,camY=150;
    function sx(Zd){return 100 + (Zd-0.1)/(1.0-0.1)*(420-100);}
    var farX=420, farY=camY + (farX-camX)/(420-camX)*(yn*-260);
    farY=Math.max(40,Math.min(260,farY));
    var ray=document.getElementById('ray');
    ray.setAttribute('x2',farX); ray.setAttribute('y2',farY);
    var fX=sx(Z), fY=camY+(fX-camX)/(420-camX)*(yn*-260); fY=Math.max(40,Math.min(260,fY));
    var fr=document.getElementById('fruit'); fr.setAttribute('cx',fX); fr.setAttribute('cy',fY);
    // pixel marker stays on plane (direction-based, amplified for visibility)
    var pixY=camY + (100-camX)/(420-camX)*(yn*-260*4); pixY=Math.max(70,Math.min(230,pixY));
    document.getElementById('pix').setAttribute('y',pixY-6);
    document.getElementById('msg').innerHTML =
      'P_c (camera) = ('+Pc[0].toFixed(3)+', '+Pc[1].toFixed(3)+', '+Pc[2].toFixed(2)+')<br>'+
      'P_w (world) = (<span class="pw">'+Pw[0].toFixed(3)+', '+Pw[1].toFixed(3)+', '+Pw[2].toFixed(2)+'</span>)';
    function badge(ok){return '<span class="badge '+(ok?'pass':'fail')+'">'+(ok?'PASS':'FAIL')+'</span>';}
    document.getElementById('checks').innerHTML =
      badge(reprojOk)+'re-projection ('+reprojErr.toFixed(2)+' px)<br>'+
      badge(distOk)+'distance preserved<br>'+
      badge(wsOk)+'within workspace';
  }
  ['u','v','z'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('frameErr').addEventListener('change',draw);
  document.getElementById('reset').addEventListener('click',function(){
    document.getElementById('u').value=480; document.getElementById('v').value=160;
    document.getElementById('z').value=0.30; document.getElementById('frameErr').checked=false; draw();
  });
  draw();
})();
</script>
</body>
</html>
