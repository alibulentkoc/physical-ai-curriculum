<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "A stable response has an envelope that:", "options": [{"t": "grows", "ok": false}, {"t": "decays to a constant (settles)", "ok": true}, {"t": "stays constant forever", "ok": false}, {"t": "is random", "ok": false}], "ok": "Correct.", "no": "Stable: oscillation envelope decays; the response converges."}, {"type": "mc", "prompt": "A marginally stable response:", "options": [{"t": "settles quickly", "ok": false}, {"t": "oscillates at roughly constant amplitude forever", "ok": true}, {"t": "diverges", "ok": false}, {"t": "never moves", "ok": false}], "ok": "Correct.", "no": "Marginal: sustained, non-decaying ringing \u2014 the boundary case."}, {"type": "mc", "prompt": "An unstable response:", "options": [{"t": "settles", "ok": false}, {"t": "rings at constant amplitude", "ok": true}, {"t": "grows/diverges", "ok": false}, {"t": "has zero error", "ok": false}], "ok": "Correct.", "no": "Unstable: the envelope grows, the response diverges."}, {"type": "mc", "prompt": "Which is NOT one of the three things that tip a loop toward instability?", "options": [{"t": "too much gain", "ok": false}, {"t": "too little damping", "ok": false}, {"t": "too much delay", "ok": false}, {"t": "too little gain", "ok": true}], "ok": "Correct \u2014 too little gain makes it sluggish, not unstable.", "no": "The three destabilisers are too much gain, too little damping, too much delay."}, {"type": "mc", "prompt": "Why is latency as dangerous as excessive gain?", "options": [{"t": "it isn't", "ok": false}, {"t": "stale measurements make corrections arrive in the wrong direction, adding energy", "ok": true}, {"t": "it lowers the gain", "ok": false}, {"t": "it removes damping intentionally", "ok": false}], "ok": "Correct.", "no": "Delay makes the correction mistimed, so it can amplify the motion \u2014 like pushing a swing a beat late."}, {"type": "short", "prompt": "Define stable, marginal, and unstable by the response envelope, and give the everyday consequence of each.", "model": "Stable: the oscillation envelope decays and the response settles to a constant \u2014 the joint reaches and holds the target (the normal, desired case). Marginal: the envelope is constant, so the response rings at fixed amplitude indefinitely \u2014 the joint never settles, buzzing about the target (usable for nothing precise, and right at the edge). Unstable: the envelope grows, each swing larger than the last, and the response diverges \u2014 on hardware the joint slams its limits, strips gears, or throws the payload. Stability is the safety property: stable is fine, marginal is the cliff edge, unstable is the crash."}, {"type": "short", "prompt": "Name the three causes of instability and explain why delay belongs among them.", "model": "The three are too much gain, too little damping, and too much delay. Too much gain injects large corrections that, without enough damping to remove the energy, build into growing swings. Too little damping removes the mechanism (derivative action, friction) that bleeds energy out of fast motion, so oscillations persist or grow. Delay belongs because a controller acting on stale measurements computes its correction for a past state; by the time it's applied the joint has moved, so the correction can push in the wrong direction and add energy. Enough delay destabilises even a modest, well-damped loop \u2014 which is why loop timing matters as much as the gains."}, {"type": "short", "prompt": "A robot loop was stable, then went unstable after a sensor was swapped for a slower one, with no gains changed. Diagnose it.", "model": "The slower sensor added latency to the feedback path. Even though the gains were untouched, the controller is now acting on older measurements, so its corrections are mistimed \u2014 applied after the joint has already moved past where they were computed for. That mistiming turns corrections that used to damp the motion into ones that reinforce it, growing the oscillation into divergence. The fix isn't necessarily lower gains: reduce the delay (faster sensor, less filtering, tighter loop timing) or add damping/derivative to widen the stability margin. This is the classic 'it started oscillating after we changed the hardware' delay-induced instability."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
