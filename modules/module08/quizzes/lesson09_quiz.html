<script>var questions=[{"type": "mc", "prompt": "As a controller's corrective strength rises from very low to very high, the behaviour goes:", "options": [{"t": "always smoother", "ok": false}, {"t": "sluggish \u2192 clean \u2192 overshoot \u2192 oscillation \u2192 runaway", "ok": true}, {"t": "runaway \u2192 clean", "ok": false}, {"t": "unchanged", "ok": false}], "ok": "Correct \u2014 that's the spectrum.", "no": "Increasing strength walks the loop from sluggish through clean to overshoot, oscillation, and finally runaway."}, {"type": "mc", "prompt": "A too-weak controller looks like:", "options": [{"t": "fast with big overshoot", "ok": false}, {"t": "slow, lagging, settling short of target", "ok": true}, {"t": "sustained oscillation", "ok": false}, {"t": "divergence", "ok": false}], "ok": "Correct.", "no": "Weak correction under-pushes: slow approach and a residual offset (sags short)."}, {"type": "mc", "prompt": "A too-strong controller (no delay) typically shows:", "options": [{"t": "a steady offset", "ok": false}, {"t": "overshoot and ringing", "ok": true}, {"t": "perfect tracking", "ok": false}, {"t": "no motion", "ok": false}], "ok": "Correct.", "no": "Excess strength carries the joint past the target \u2014 overshoot and ringing."}, {"type": "mc", "prompt": "Adding delay (latency) to the feedback can:", "options": [{"t": "only slow it down", "ok": false}, {"t": "turn an otherwise-fine loop into a growing, runaway oscillation", "ok": true}, {"t": "remove overshoot", "ok": false}, {"t": "have no effect", "ok": false}], "ok": "Correct.", "no": "Stale measurements make corrections arrive in the wrong direction \u2014 latency can cause divergence."}, {"type": "mc", "prompt": "The right goal for corrective strength is:", "options": [{"t": "as much as possible", "ok": false}, {"t": "a balance \u2014 enough to be responsive, not so much it oscillates", "ok": true}, {"t": "as little as possible", "ok": false}, {"t": "exactly zero", "ok": false}], "ok": "Correct.", "no": "Good control is a balance; the spectrum ends in runaway, so 'maximum' is wrong."}, {"type": "short", "prompt": "Describe, in behaviour terms, what happens to a joint's step response as corrective strength increases from too weak to runaway.", "model": "Too weak: the joint approaches the target slowly and settles short, under-correcting (a visible offset, sluggish). As strength increases it reaches a good regime: brisk, smooth arrival on target. Push further and it overshoots \u2014 sailing past the target and ringing back. Stronger still (or with damping removed) it oscillates with sustained, non-decaying swings. Beyond that, or with delay in the loop, the swings grow instead of shrinking and the joint runs away \u2014 divergence. Same joint and target; the entire character is set by how hard it corrects."}, {"type": "short", "prompt": "Explain how loop delay can destabilise a controller whose gains are otherwise fine.", "model": "Delay means the controller acts on a measurement from the past \u2014 it corrects for where the joint was, not where it is now. By the time the correction is applied, the joint has moved on, so the correction can be in the wrong direction, adding energy to the motion instead of removing it. With enough delay, each swing is reinforced rather than damped, and the oscillation grows into divergence \u2014 even though the gains were sensible. This is the swing pushed a beat late: same push strength, but mistimed, so the arc grows. It's why latency, not just gain, is a leading cause of runaway."}, {"type": "short", "prompt": "Why is 'maximum correction' the wrong objective for a controller?", "model": "Because the behaviour spectrum ends in runaway. Increasing corrective strength helps only up to a point: it sharpens tracking and shrinks offset, but past the balance point it causes overshoot, then sustained oscillation, then divergence that can damage hardware. Maximum correction sits at the dangerous end of the spectrum. The goal is balance \u2014 enough strength to be responsive and accurate, with enough damping and margin that the loop stays comfortably stable as the payload, wear, and delay vary. Good control optimises for a well-shaped, safely-stable response, not for the largest possible gain."}];
