"short", "prompt": "Explain why proportional control leaves a steady-state offset under a constant load.", "model": "With u = Kp\u00b7e, the command is proportional to the error. To hold the joint against a constant load, the controller must produce a constant nonzero command. But the only way Kp\u00b7e is nonzero is if e itself is nonzero. So at equilibrium the error settles to exactly the value whose proportional command balances the load: e_ss \u2248 load/Kp. If the error reached zero, the command would vanish and the load would push the joint back, recreating an error \u2014 so a residual offset is structurally required by proportional-only control."}, {"type": "short", "prompt": "Describe the trade-off in choosing Kp.", "model": "Larger Kp makes the controller respond harder to a given error: the response is faster and the steady-state offset (\u2248 load/Kp) is smaller. But too large a Kp makes the loop overshoot and oscillate, and on a lightly-damped plant it drives the response toward marginal stability (sustained ringing) or instability. Smaller Kp is gentle and stable but slow with a large offset. So Kp is a balance: enough to be responsive and keep the offset small, not so much that the system rings or goes unstable \u2014 which is exactly why integral and derivative terms are added rather than just cranking Kp."}, {"type": "short", "prompt": "A joint under load = 2 with P-only control settles at q = 0.8 for a target of 1.0. Estimate Kp and explain.", "model": "The steady-state error is e_ss = q_d \u2212 q = 1.0 \u2212 0.8 = 0.2. For proportional-only control under a constant load, e_ss \u2248 load/Kp, so 0.2 \u2248 2/Kp, giving Kp \u2248 10. The reasoning: at equilibrium the proportional command Kp\u00b7e_ss must balance the load, so Kp\u00b70.2 = 2 \u2192 Kp = 10. This also shows how to shrink the offset \u2014 doubling Kp to 20 would roughly halve the offset to 0.1 \u2014 though raising Kp indefinitely eventually causes overshoot, which is why integral
