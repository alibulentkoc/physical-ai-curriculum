<script>var questions=[{"type": "mc", "prompt": "Feedforward cannot reject a disturbance because:", "options": [{"t": "it's too slow", "ok": false}, {"t": "the disturbance enters the plant, not the reference, so feedforward never sees it", "ok": true}, {"t": "it has no gain", "ok": false}, {"t": "the model is perfect", "ok": false}], "ok": "Correct.", "no": "Feedforward is computed from the reference + model; a disturbance isn't in either."}, {"type": "mc", "prompt": "Feedback can reject a disturbance it was never told about because:", "options": [{"t": "it predicts it", "ok": false}, {"t": "it acts on the measured error the disturbance creates", "ok": true}, {"t": "it ignores the plant", "ok": false}, {"t": "it uses q\u0308_d", "ok": false}], "ok": "Correct.", "no": "The disturbance changes q, which changes the error, which feedback corrects."}, {"type": "mc", "prompt": "The complete joint tracker is:", "options": [{"t": "feedforward only", "ok": false}, {"t": "feedback only", "ok": false}, {"t": "feedforward (known) + feedback (unknown)", "ok": true}, {"t": "open-loop", "ok": false}], "ok": "Correct.", "no": "u = m\u00b7q\u0308_d + b\u00b7q\u0307_d + \u2113 + PID(q_d \u2212 q), one per joint."}, {"type": "mc", "prompt": "A disturbance enters the control diagram at the:", "options": [{"t": "reference", "ok": false}, {"t": "controller", "ok": false}, {"t": "plant (perturbing its output)", "ok": true}, {"t": "summing junction", "ok": false}], "ok": "Correct.", "no": "Disturbances act on the plant \u2014 which is why feedback (plant-based) sees them and feedforward (reference-based) doesn't."}, {"type": "mc", "prompt": "The tracker's interface to Module 9 is:", "options": [{"t": "q_d only", "ok": false}, {"t": "tracking_controller(reference, measured_state) \u2192 actuator_command", "ok": true}, {"t": "an image", "ok": false}, {"t": "a mass matrix", "ok": false}], "ok": "Correct.", "no": "It consumes the M7 reference and the measured state and outputs the actuator command."}, {"type": "short", "prompt": "Explain why feedforward is structurally blind to disturbances while feedback rejects them.", "model": "Feedforward is computed from the reference and the model only: u_ff = m\u00b7q\u0308_d + b\u00b7q\u0307_d + \u2113_nominal. A disturbance \u2014 an unmodelled load, a bump, changed friction \u2014 enters the plant, not the reference, so it never appears in anything feedforward uses. Feedforward therefore issues exactly the command it would have with no disturbance and cannot respond; the disturbance leaves a persistent error. Feedback, by contrast, is computed from the measured error: the disturbance changes the actual position q, which changes the error, which drives the feedback command to oppose it. Feedback doesn't need to know the disturbance exists or what caused it \u2014 it only needs to see its effect on q. That's why disturbance rejection is feedback's job alone."}, {"type": "short", "prompt": "State the complete joint tracker and explain why this combined controller \u2014 not either part alone \u2014 is the right thing to hand to Module 9.", "model": "The complete tracker is u = m\u00b7q\u0308_d + b\u00b7q\u0307_d + \u2113 + PID(q_d \u2212 q), run once per joint, taking Module 7's reference and the measured state and producing an actuator command. It's the right deliverable because Module 9 integrates a system that must run in the real world: it needs both performance and robustness. Feedforward alone gives performance (lag-free tracking of the plan) but is fragile \u2014 any disturbance or model error leaves a persistent error. Feedback alone is robust but lags moving references. Only the combination delivers accurate tracking of the planned motion and rejection of the unplanned disturbances reality throws at it. That is the controller a real greenhouse arm needs, so it's the interface \u2014 tracking_controller(reference, measured_state) \u2192 actuator_command \u2014 Module 8 hands forward."}, {"type": "short", "prompt": "Connect this lesson back to Unit 1's open-loop drift: how is 'feedforward-only can't reject a disturbance' the same lesson at full strength?", "model": "Unit 1 showed that open-loop execution drifts because it never measures the result, so any load, friction, or disturbance accumulates uncorrected. Feedforward-only is exactly that situation in sophisticated form: it computes a smart command from the plan and model, but like open-loop it never looks at the actual output, so a disturbance it didn't plan for produces an error it can't see or fix. The drift is the same failure \u2014 no feedback means no correction of the unexpected. Feedback was the cure in Unit 1 and is the cure here: by measuring q and acting on the error, it rejects whatever reality does that the plan omitted. The module's first lesson and its last are the same truth: you cannot ship without feedback."}];

if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}

root.appendChild(card);});
