<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Limit of a 2×2 — Lesson 1.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 280px;min-width:260px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 210px;min-width:200px}
  .mat{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-width:160px}
  .mat input{width:100%;font-size:15px;padding:6px;border:1px solid var(--line);border-radius:8px;text-align:center;font-variant-numeric:tabular-nums}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px} input[type=range]{width:100%}
  .note{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:10px;padding:11px;font-size:13px;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 260 260"></svg>
  <div class="panel">
    <label>2×2 matrix — rotate, scale, shear all you like</label>
    <div class="mat"><input id="a" type="number" step="any" value="0.7"><input id="b" type="number" step="any" value="-0.7">
      <input id="c" type="number" step="any" value="0.7"><input id="d" type="number" step="any" value="0.7"></div>
    <label>try to translate (slide it sideways)</label><input type="range" id="tx" min="0" max="2" step="0.05" value="0">
    <div class="note" id="note"></div>
    <div class="hint">A 2×2 maps the origin to itself — no matter the entries, the corner pinned at (0,0) <b>cannot move</b>. The translate slider has nowhere to put the offset. That's the wall Module 1 hit; Unit 2's extra coordinate fixes it.</div>
  </div>
</div></div>
<script>(function(){
  var W=260,H=260,ox=80,oy=180,s=46,svg=document.getElementById("svg"),NS="http://www.w3.org/2000/svg";
  var shape=[[0,0],[1.4,0],[1.4,0.5],[0.5,0.5],[0.5,1.4],[0,1.4]];
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function ap(m,p){return [m[0]*p[0]+m[1]*p[1],m[2]*p[0]+m[3]*p[1]];}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function render(){
    var m=[+document.getElementById("a").value||0,+document.getElementById("b").value||0,+document.getElementById("c").value||0,+document.getElementById("d").value||0];
    var tx=+document.getElementById("tx").value;
    svg.innerHTML="";
    svg.appendChild(el("line",{x1:10,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.2}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.2}));
    var op=shape.map(function(p){var c=sv(p);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:op,fill:"none",stroke:"#cbd5e1","stroke-width":1.2,"stroke-dasharray":"4 3"}));
    // 2x2 cannot translate: origin always maps to origin (tx has no effect on the math)
    var tp=shape.map(function(p){var q=ap(m,p);var c=sv(q);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:tp,fill:"#0d948822",stroke:"#0d9488","stroke-width":2}));
    // show the pinned origin
    var o=sv(ap(m,[0,0]));
    svg.appendChild(el("circle",{cx:o[0],cy:o[1],r:6,fill:"#b91c1c"}));
    svg.appendChild(el("text",{x:o[0]+9,y:o[1]+4,"font-size":10,fill:"#b91c1c"})).textContent="origin pinned";
    // ghost of where translation WOULD put it (unreachable by 2x2)
    if(tx>0.02){ var gp=shape.map(function(p){var q=ap(m,p);var c=sv([q[0]+tx,q[1]]);return c[0]+","+c[1];}).join(" ");
      svg.appendChild(el("polygon",{points:gp,fill:"none",stroke:"#b91c1c","stroke-width":1.5,"stroke-dasharray":"3 3",opacity:.7})); }
    document.getElementById("note").innerHTML = tx>0.02
      ? 'A 2×2 can\'t produce that red target — translation is impossible for it.'
      : 'Origin maps to origin: a 2×2 can rotate, scale, shear — but never move the origin.';
  }
  ["a","b","c","d","tx"].forEach(function(id){document.getElementById(id).addEventListener("input",render);});
  render();
})();</script></body></html>
