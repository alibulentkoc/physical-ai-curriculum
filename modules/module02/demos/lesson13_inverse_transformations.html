<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inverse Transformations — Lesson 3.4</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:270px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 200px;min-width:190px}
  label{font-size:12px;color:var(--muted);display:block;margin:9px 0 4px} input[type=range]{width:100%}
  .steps{display:flex;gap:6px;margin-top:10px}
  .steps button{flex:1;appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer}
  .steps button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:13px;margin-top:10px;font-variant-numeric:tabular-nums}
  .ok{color:#15803d;font-weight:700}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 300 250"></svg>
  <div class="panel">
    <label>θ</label><input type="range" id="th" min="0" max="180" step="1" value="60">
    <label>t_x</label><input type="range" id="tx" min="0" max="3" step="0.05" value="1.5">
    <div class="steps"><button data-s="0" class="on">start</button><button data-s="1">apply T</button><button data-s="2">then T⁻¹</button></div>
    <div class="readout" id="out"></div>
    <div class="hint">T rotates then slides. Its inverse is the return trip: undo the <b>slide first</b>, then the <b>turn</b>, with reversed values. Step through and watch T⁻¹ land the shape exactly back on the dashed original.</div>
  </div>
</div></div>
<script>(function(){
  var W=300,H=250,ox=70,oy=170,s=42,svg=document.getElementById("svg"),out=document.getElementById("out"),NS="http://www.w3.org/2000/svg";
  var shape=[[0,0],[1.2,0],[1.2,0.4],[0.4,0.4],[0.4,1.1],[0,1.1]],step=0;
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function applyT(p,th,tx){var c=Math.cos(th),sn=Math.sin(th);return [c*p[0]-sn*p[1]+tx, sn*p[0]+c*p[1]];}
  function applyInv(p,th,tx){var c=Math.cos(th),sn=Math.sin(th);var x=p[0]-tx,y=p[1];return [c*x+sn*y, -sn*x+c*y];}
  function render(){
    var th=+document.getElementById("th").value*Math.PI/180,tx=+document.getElementById("tx").value;
    svg.innerHTML="";
    svg.appendChild(el("line",{x1:10,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.2}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.2}));
    var op=shape.map(function(p){var c=sv(p);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:op,fill:"none",stroke:"#cbd5e1","stroke-width":1.3,"stroke-dasharray":"4 3"}));
    var pts=shape, col="#0d9488", msg="";
    if(step===1){ pts=shape.map(function(p){return applyT(p,th,tx);}); msg="moved by T (rotate "+Math.round(th*180/Math.PI)+"°, slide "+tx.toFixed(2)+")"; }
    else if(step===2){ pts=shape.map(function(p){return applyInv(applyT(p,th,tx),th,tx);}); col="#15803d"; msg='<span class="ok">✓ back to start — T then T⁻¹ is identity</span>'; }
    else msg="the original shape";
    var tp=pts.map(function(p){var c=sv(p);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:tp,fill:col+"22",stroke:col,"stroke-width":2}));
    out.innerHTML=msg;
  }
  document.querySelectorAll(".steps button").forEach(function(b){b.addEventListener("click",function(){step=+b.dataset.s;document.querySelectorAll(".steps button").forEach(function(x){x.classList.remove("on");});b.classList.add("on");render();});});
  document.getElementById("th").addEventListener("input",render);document.getElementById("tx").addEventListener("input",render);
  render();
})();</script></body></html>
