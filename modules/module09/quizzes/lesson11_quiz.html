<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Knowledge Check — Lesson 3.3</title>
<script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]]}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}
textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:9px;padding:8px;font-family:inherit;font-size:14px;resize:vertical}
.btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:8px}.btn:hover{background:var(--soft)}
.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "The wired Understand → Plan chain is:", "options": [{"t": "plan → perceive → understand → IK", "ok": false}, {"t": "perceive → understand → to_configuration → plan_reference", "ok": true}, {"t": "understand → plan → perceive → IK", "ok": false}, {"t": "IK → perceive → plan → understand", "ok": false}], "ok": "Right.", "no": "Perceive, understand (commit target), to_configuration (IK), plan_reference (M7)."}, {"type": "mc", "prompt": "A correct end-to-end run satisfies a three-link chain ending in:", "options": [{"t": "the camera image", "ok": false}, {"t": "a validated reference whose endpoint's FK reaches the target", "ok": true}, {"t": "a tuned PID gain", "ok": false}, {"t": "a detection list", "ok": false}], "ok": "Right.", "no": "Link 3: the plan is validated and FK(reference(duration)) lands on the target pose."}, {"type": "mc", "prompt": "The run returns None at the IK link. This localises the fault to:", "options": [{"t": "the planner", "ok": false}, {"t": "reachability — the target is outside the workspace", "ok": true}, {"t": "the controller", "ok": false}, {"t": "perception confidence", "ok": false}], "ok": "Right.", "no": "A None at IK means the committed target is unreachable; the chain correctly stops before Plan."}, {"type": "mc", "prompt": "For a SECOND pick right after the first, the second plan's q_start should be:", "options": [{"t": "the home configuration", "ok": false}, {"t": "where the arm ended up (the first plan's q_goal)", "ok": true}, {"t": "always zero", "ok": false}, {"t": "the camera origin", "ok": false}], "ok": "Right.", "no": "Sequential picks thread q_start from the previous plan's endpoint, not from home."}, {"type": "tf", "prompt": "A validated=False with a good, FK-verified q_goal points to a Plan (trajectory) problem, not an IK or perception problem.", "answer": true, "ok": "Correct.", "no": "True — if links 1 and 2 passed, the goal is fine; a failed validation is about the trajectory between start and goal (timing/limits/path)."}, {"type": "short", "prompt": "The end-to-end run breaks with validated=False, though IK succeeded and FK confirmed q_goal. Where is the fault and whose decision is the fix?", "model": "The fault is in Plan, not IK or perception: links 1 and 2 passed, so the target is reachable and q_goal is a valid configuration FK confirms. A failed validation with a good goal means the trajectory between start and goal failed its checks — e.g. a velocity/acceleration limit at the requested timing, or no collision-free path with an obstacle. The fix is a Plan/Recover decision: relax the timing, replan, or re-select a target. The trace localises it without opening the planner."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise();}
</script></body></html>
