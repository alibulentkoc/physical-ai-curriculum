<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "The row harvest is:", "options": [{"t": "a single pick", "ok": false}, {"t": "the pick cycle iterated under a ledger of harvested/skipped fruit", "ok": true}, {"t": "a new planner", "ok": false}, {"t": "perception only", "ok": false}], "ok": "Right.", "no": "harvest_row loops the full pick cycle, tracking a ledger so each fruit is attempted once."}, {"type": "mc", "prompt": "The ledger (H ∪ S) guarantees:", "options": [{"t": "every fruit is picked", "ok": false}, {"t": "termination and progress — each fruit decided once, the row completes", "ok": true}, {"t": "optimal ordering", "ok": false}, {"t": "root-cause diagnosis", "ok": false}], "ok": "Right.", "no": "The ledger forbids revisiting a decided fruit, so the loop must finish."}, {"type": "mc", "prompt": "A TRANSIENT injected fault on one fruit results in:", "options": [{"t": "the whole row stalling", "ok": false}, {"t": "that fruit recovering (harvested, recovered=True), the row still finishing", "ok": true}, {"t": "every fruit skipped", "ok": false}, {"t": "a crash", "ok": false}], "ok": "Right.", "no": "A transient fault is retried successfully — the fruit is harvested and the row completes."}, {"type": "mc", "prompt": "A DETERMINISTIC injected fault (e.g. blocking obstacle) on one fruit results in:", "options": [{"t": "the row stalling", "ok": false}, {"t": "that fruit skipped-with-reason, the rest harvested", "ok": true}, {"t": "all fruit recovered", "ok": false}, {"t": "infinite retries", "ok": false}], "ok": "Right.", "no": "A deterministic fault is skipped (e.g. PLAN_INVALID); one stubborn fruit never stalls the row."}, {"type": "tf", "prompt": "Graceful degradation means the system finishes the row with a definite outcome per fruit, never stalling.", "answer": true, "ok": "Correct.", "no": "True — recover what it can, skip what it can't, finish the row."}, {"type": "short", "prompt": "A PERSISTENT disturbance is injected on one fruit (budget 3). Predict the harvest and ledger.", "model": "The targeted fruit fails TRACKING_FAILURE on every attempt; since the fault is retryable but persistent, Recover exhausts the budget and escalates (retry-budget-exhausted) after 3 attempts — the fruit lands in the skipped set. Every other fruit harvests normally. So the ledger reads all-but-one harvested, one skipped (TRACKING_FAILURE, budget-exhausted), complete=True. The row still finishes; the persistent fault costs three attempts and a skip, not a stall — the retry budget bounds the effort on a hopeless fruit."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
