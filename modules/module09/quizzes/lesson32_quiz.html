<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Module 9 turned eight layers into:", "options": [{"t": "eight separate demos", "ok": false}, {"t": "one self-healing harvester — a six-stage pick cycle looped across a row", "ok": true}, {"t": "a fleet of robots", "ok": false}, {"t": "a new control theory", "ok": false}], "ok": "Right.", "no": "The deliverable is the integrated, self-healing system — not a pile of parts."}, {"type": "mc", "prompt": "The integration discipline that held across the module was:", "options": [{"t": "rewrite every layer", "ok": false}, {"t": "wrap don't redefine, coordinate don't re-theorise, make seams explicit", "ok": true}, {"t": "add new theory each unit", "ok": false}, {"t": "skip the seams", "ok": false}], "ok": "Right.", "no": "Every stage wraps a real layer; detection and recovery are reading and control flow over existing outputs."}, {"type": "mc", "prompt": "The whole module runs in one call:", "options": [{"t": "model_perception", "ok": false}, {"t": "harvest_row — perception to recovery to row orchestration", "ok": true}, {"t": "control_layer", "ok": false}, {"t": "to_configuration", "ok": false}], "ok": "Right.", "no": "harvest_row exercises all eight units, the most concrete proof of integration."}, {"type": "mc", "prompt": "Module 10 (the Digital Twin Capstone) takes this system and:", "options": [{"t": "adds a fleet of robots", "ok": false}, {"t": "mirrors it for simulation, visualisation, and validation (single robot)", "ok": true}, {"t": "replaces the control layer", "ok": false}, {"t": "discards recovery", "ok": false}], "ok": "Right.", "no": "The twin is the validation rig around the same single-robot system."}, {"type": "tf", "prompt": "Module 9 added no new estimation, planning, or control theory — the intelligence is in the composition.", "answer": true, "ok": "Correct.", "no": "True — integration was the lesson: wrap, coordinate, explicit seams."}, {"type": "short", "prompt": "In one sentence each, what did each pair of units contribute to the finished harvester?", "model": "Units 1–2 (Perceive → Understand): turn raw detections into a committed, deduplicated target. Units 3–4 (Plan, Execute): turn that target into a validated reference and drive it into tracked motion. Units 5–6 (Track, Detect): judge the motion and detect-and-localise any failure from existing signals. Units 7–8 (Recover, Integrate): respond to faults by targeted bounded recovery and loop the whole cycle across a row with graceful degradation. Eight units, four contributions, one self-healing system."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
