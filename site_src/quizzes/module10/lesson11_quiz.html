<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}

<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "Determinism means:", "options": [{"t": "runs always vary", "ok": false}, {"t": "same world + same seed → identical outcome", "ok": true}, {"t": "the twin learns", "ok": false}, {"t": "outcomes are random", "ok": false}], "ok": "Right.", "no": "Identical inputs give identical results — a function of its inputs."}, {"type": "mc", "prompt": "Reproducibility lets you:", "options": [{"t": "ignore the seed", "ok": false}, {"t": "replay a harvest and run controlled comparisons", "ok": true}, {"t": "skip simulation", "ok": false}, {"t": "deploy to a fleet", "ok": false}], "ok": "Right.", "no": "Replay to inspect; hold everything fixed but one change to attribute effects."}, {"type": "mc", "prompt": "A controlled comparison holds the seed fixed and:", "options": [{"t": "changes everything", "ok": false}, {"t": "changes exactly one thing, so any difference is attributable to it", "ok": true}, {"t": "uses a different world", "ok": false}, {"t": "randomizes inputs", "ok": false}], "ok": "Right.", "no": "One change → one attributable difference; that's the experiment."}, {"type": "mc", "prompt": "Determinism in the twin is:", "options": [{"t": "a new algorithm", "ok": false}, {"t": "inherited from Module 9's seeded execution", "ok": true}, {"t": "impossible", "ok": false}, {"t": "from the cloud", "ok": false}], "ok": "Right.", "no": "M9 draws from a seeded generator, so same world+seed reproduces exactly."}, {"type": "tf", "prompt": "A difference between two runs with identical world and seed means an input actually changed.", "answer": true, "ok": "Correct.", "no": "True — deterministic execution can't differ unless something varied (a leak, a stray injection)."}, {"type": "short", "prompt": "Two simulations with the same world and seed give different harvested sets. What does this tell you before investigating?", "model": "With a fixed world and fixed seed, M9's seeded execution is deterministic, so identical inputs must give identical outcomes. A difference therefore means an input was not actually identical — something varied (a different seed, a mutated world, a stray injection, leaked state). The discrepancy is a signal to find the hidden variation, not evidence of inherent randomness. 'If it differs, something changed' is exactly the diagnostic power determinism buys."}];

if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;

else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
