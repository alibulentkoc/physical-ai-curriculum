"ok": true}, {"t": "the only way to do pub/sub", "ok": false}, {"t": "unrelated to topics", "ok": false}], "ok": "Correct.", "no": "The pattern is nodes/topics/messages; ROS 2 implements it with real machinery."}, {"type": "short", "prompt": "Define node, topic, and message, and state the verbs of the pattern.", "model": "A node is an independent unit of computation (e.g., a sensor driver, a controller, an actuator driver). A topic is a named channel. A message is the typed data sent on a topic. The two verbs are publish(topic, message), which sends data on a topic, and subscribe(topic, callback), which registers interest so the callback runs on each new message. The defining property is decoupling: a publisher names only the topic, never its subscribers, and vice versa."}, {"type": "short", "prompt": "Why does decoupling help a robot scale?", "model": "Because producers and consumers never reference each other, you can add, remove, or change a node without touching the others — only the shared topic names matter. A new logger, safety monitor, or second consumer just subscribes to an existing topic; a new sensor just publishes a new topic. In a point-to-point design where the controller calls the sensor directly, every such change means rewiring, and the number of connections grows explosively. Pub/sub keeps the system loosely coupled, so it can grow from one joint to a whole robot without becoming a tangle."}, {"type": "short", "prompt": "Why is it correct to call pub/sub a 'pattern', and what does ROS 2 add on top of it?", "model": "Pub/sub is a pattern because it describes a shape — nodes, named topics, messages, decoupled publish and subscribe — that can be implemented many ways (a tiny in-process bus, MQTT, DDS, ROS 2). The shape is what you learn and reuse; the implementation is a detail. ROS 2 (Unit 8) is one implementation that adds real networking and node discovery, typed message definitions, quality-of-service policies (reliability, history), and tooling
