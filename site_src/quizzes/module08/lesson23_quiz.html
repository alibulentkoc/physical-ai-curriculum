"t": "remove the sensor", "ok": false}, {"t": "raise the gains", "ok": false}], "ok": "Correct.", "no": "Fix the timing, not the controller; that's what real-time execution provides."}, {"type": "short", "prompt": "Why is communication-induced instability the same phenomenon as Unit 3's delay-driven instability?", "model": "In Unit 3 we inserted a delay by hand and showed that, at fixed gains, enough of it turns corrective action into the thing that drives the oscillation, marching the loop stable → marginal → unstable. Here the delay isn't artificial — it's the unavoidable cost of real communication (message latency) plus a finite control rate (acting on stale information, holding commands between updates). The mechanism is identical: the correction is based on old information and arrives late, so it lags the true state and can reinforce rather than damp the swing. Unit 6 simply supplies the physical source of the delay Unit 3 treated abstractly."}, {"type": "short", "prompt": "A loop becomes unstable after moving onto a shared computer that lowers the control rate and adds message jitter. Separate the two contributions.", "model": "Two distinct effects raise the loop delay. The added message jitter/latency means each measurement reaches the controller later and more variably, so corrections lag the true state. The lowered control rate means the controller updates less often, acting on staler information and holding its last command longer between updates, which adds roughly half an update period of delay and spaces corrections further apart. Both push the effective loop delay up; at the unchanged gains, their combined delay crosses the stability boundary. The fixes target each: a faster/dedicated bus for latency, and a higher, more predictable update rate (an isolated real-time control task) for the control rate."}, {"type": "short", "prompt": "Why does this lesson motivate real-time execution (Unit 7)?", "model": "Because once you accept that communication delay
