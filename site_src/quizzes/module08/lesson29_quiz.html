<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>

<script>var questions=[{"type": "mc", "prompt": "The closed-loop control stack is expressed as a:", "options": [{"t": "Single function call", "ok": false}, {"t": "ROS 2 node/topic graph", "ok": true}, {"t": "Spreadsheet", "ok": false}, {"t": "Database query", "ok": false}], "ok": "ROS 2 node/topic graph", "no": "Sensor, controller, and actuator nodes communicate over topics."}, {"type": "mc", "prompt": "Which two topics carry the closed loop?", "options": [{"t": "joint/log and joint/debug", "ok": false}, {"t": "joint/state and joint/command", "ok": true}, {"t": "cmd/vel and odom", "ok": false}, {"t": "input and output", "ok": false}], "ok": "joint/state and joint/command", "no": "The sensor publishes joint/state; the controller publishes joint/command."}, {"type": "mc", "prompt": "The controller node (the tracker) does what?", "options": [{"t": "Only logs data", "ok": false}, {"t": "Subscribes to state + reference, computes the command, publishes it", "ok": true}, {"t": "Drives the motor directly with no computation", "ok": false}, {"t": "Plans the path", "ok": false}], "ok": "Subscribes to state + reference, computes the command, publishes it", "no": "It carries the feedforward + PID law and the actuator pipeline."}, {"type": "mc", "prompt": "Where does the inner loop's real-time requirement live in this graph?", "options": [{"t": "In every node equally", "ok": false}, {"t": "In the controller node", "ok": true}, {"t": "In the topic names", "ok": false}, {"t": "Nowhere", "ok": false}], "ok": "In the controller node", "no": "The controller node carries the latency-critical inner loop (Unit 7)."}, {"type": "mc", "prompt": "How does decoupling help you add a logger or safety monitor?", "options": [{"t": "It doesn't", "ok": false}, {"t": "You subscribe to existing topics without rewiring the controller", "ok": true}, {"t": "You must edit the controller", "ok": false}, {"t": "You must restart the robot", "ok": false}], "ok": "You subscribe to existing topics without rewiring the controller", "no": "Pub/sub decoupling (6.2) lets new subscribers tap topics non-invasively."}, {"type": "short", "prompt": "Name the three nodes of the stack and what each publishes or subscribes to.", "model": "Sensor node: publishes joint/state (measured state, with the reference sample). Controller node (tracker): subscribes to joint/state, publishes joint/command. Actuator node: subscribes to joint/command and drives the plant. The motion is sensed again, closing the loop."}, {"type": "short", "prompt": "Explain how the loop latency arises in this stack and why the real-time target keeps it small.", "model": "Each communication hop (sensor→controller, controller→actuator) adds delay; the loop latency is the sum of the hops (Unit 6). The real-time target keeps the controller node's period deterministic and the hops small, so the total loop delay stays within the stable region."}, {"type": "short", "prompt": "What about ROS 2 have we modelled, and what have we not?", "model": "We modelled the pattern — nodes, topics, messages, publish/subscribe — using an in-process bus. We did not build the production implementation (DDS middleware, rclpy, executors, QoS), which is out of scope; the transferable idea is the node/topic structure."}];

questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});

</script></body></html>
