<script>var questions=[{"type": "mc", "prompt": "The PID control law is:", "options": [{"t": "u = Kp\u00b7e only", "ok": false}, {"t": "u = Kp\u00b7e + Ki\u00b7\u222be + Kd\u00b7\u0117", "ok": true}, {"t": "u = Ki\u00b7\u222be + Kd\u00b7\u0117", "ok": false}, {"t": "u = q_d \u2212 q", "ok": false}], "ok": "Correct.", "no": "PID sums proportional, integral, and derivative actions on the error."}, {"type": "mc", "prompt": "In PID, the three terms respectively:", "options": [{"t": "damp, push, erase-offset", "ok": false}, {"t": "push (P), erase offset (I), damp (D)", "ok": true}, {"t": "plan, time, validate", "ok": false}, {"t": "sense, compare, actuate", "ok": false}], "ok": "Correct.", "no": "P pushes proportional to error, I erases steady-state offset, D damps overshoot."}, {"type": "mc", "prompt": "Good PID tuning aims to:", "options": [{"t": "maximize every gain", "ok": false}, {"t": "balance the three terms for fast, stable, accurate tracking", "ok": true}, {"t": "set Ki = 0", "ok": false}, {"t": "remove the reference", "ok": false}], "ok": "Correct.", "no": "PID is a balance among responsiveness, offset removal, and damping \u2014 not maximizing any one."}, {"type": "mc", "prompt": "Going P \u2192 PI \u2192 PID typically:", "options": [{"t": "adds offset then removes damping", "ok": false}, {"t": "removes the offset (I) then damps the overshoot (D)", "ok": true}, {"t": "slows everything down", "ok": false}, {"t": "has no visible effect", "ok": false}], "ok": "Correct.", "no": "I erases the P offset; D then damps the overshoot that P/I introduce."}, {"type": "mc", "prompt": "Tracking an M7 reference, PID best uses the feedforward q\u0307_d, q\u0308_d to:", "options": [{"t": "replace feedback", "ok": false}, {"t": "lead the motion so feedback only corrects the small residual", "ok": true}, {"t": "compute the error", "ok": false}, {"t": "increase noise", "ok": false}], "ok": "Correct.", "no": "Feedforward leads; feedback (PID) cleans up the residual \u2014 the M7\u2192M8 continuity theme."}, {"type": "short", "prompt": "State the PID control law and the role of each term.", "model": "The law is u = Kp\u00b7e + Ki\u00b7\u222be + Kd\u00b7\u0117, where e = q_d \u2212 q. The proportional term Kp\u00b7e pushes in proportion to the current error \u2014 the main corrective effort, but it leaves a steady-state offset under load. The integral term Ki\u00b7\u222be accumulates past error and supplies the standing command that erases that offset, since its only equilibrium is e = 0. The derivative term Kd\u00b7\u0117 responds to how fast the error is changing and acts as a brake, damping overshoot and allowing higher P/I gains. Summed, they give a fast, accurate, well-damped single-joint tracker."}, {"type": "short", "prompt": "Explain the P \u2192 PI \u2192 PID progression on a step response.", "model": "P alone moves the joint toward the target but settles short by an offset \u2248 load/Kp. Adding I gives PI: the integrator accumulates the persistent error and drives it to zero, erasing the offset \u2014 but integral lag makes the response overshoot and ring. Adding D gives PID: the derivative term brakes the fast approach, damping that overshoot into a clean, quick settle. So the progression is: P establishes the correction, I removes the steady-state offset, D damps the resulting overshoot \u2014 each term fixing the deficiency the previous one left, yielding accurate and well-behaved tracking."}, {"type": "short", "prompt": "How does a PID tracker use Module 7's feedforward, and why does that improve tracking?", "model": "Module 7 supplies not just q_d but the feedforward derivatives q\u0307_d and q\u0308_d. The tracker uses these to compute, in advance, most of the command needed to follow the planned motion \u2014 leading the reference rather than waiting for an error to build. The PID feedback term then only has to correct the small residual error from disturbances and model mismatch, instead of generating the entire command reactively. The result is much smaller tracking error, especially during fast motion, because the controller isn't perpetually chasing the reference from behind \u2014 feedforward does the bulk of the work and feedback cleans up what's left. This feedforward-plus-feedback combination is the central continuity theme from Module 7 into Module 8."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);

sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
