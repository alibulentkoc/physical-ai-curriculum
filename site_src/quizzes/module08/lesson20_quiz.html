<script>var questions=[{"type": "mc", "prompt": "The command pipeline, in order, is:", "options": [{"t": "controller → reference → actuator → motion", "ok": false}, {"t": "reference → controller → requested command → actuator → delivered effort → motion", "ok": true}, {"t": "actuator → controller → reference → motion", "ok": false}, {"t": "reference → actuator → controller → motion", "ok": false}], "ok": "Correct.", "no": "The reference drives the controller, which requests a command the actuator delivers as effort that moves the joint."}, {"type": "mc", "prompt": "The feasibility envelope is:", "options": [{"t": "the controller's gain range", "ok": false}, {"t": "the effort and rate the actuator can actually deliver (plus the deadband floor)", "ok": true}, {"t": "the reference's position range", "ok": false}, {"t": "the sensor's resolution", "ok": false}], "ok": "Correct.", "no": "It is |u| ≤ u_max, |du/dt| ≤ r_max, plus the deadband floor."}, {"type": "mc", "prompt": "A better-tuned controller still can't track a trajectory beyond the envelope because:", "options": [{"t": "the gains are wrong", "ok": false}, {"t": "the missing effort is physically unavailable — the actuator can't deliver it", "ok": true}, {"t": "the reference is noisy", "ok": false}, {"t": "the integrator is too small", "ok": false}], "ok": "Correct.", "no": "No gain conjures effort the actuator cannot produce."}, {"type": "mc", "prompt": "The right fix for an over-aggressive trajectory that clips is:", "options": [{"t": "raise the gains", "ok": false}, {"t": "re-plan the trajectory to fit inside the envelope (e.g., slow it)", "ok": true}, {"t": "remove the feedback", "ok": false}, {"t": "ignore the rate limit", "ok": false}], "ok": "Correct.", "no": "Re-plan within the envelope; the controller was never the problem."}, {"type": "mc", "prompt": "This lesson connects to Module 7 by:", "options": [{"t": "replacing trajectory generation", "ok": false}, {"t": "grounding trajectory feasibility in the actuator's hardware limits", "ok": true}, {"t": "removing velocity limits", "ok": false}, {"t": "adding a new sensor model", "ok": false}], "ok": "Correct.", "no": "Module 7's feasibility (velocity/acceleration limits) ultimately comes from the actuator envelope."}, {"type": "short", "prompt": "Define the feasibility envelope and explain what makes a trajectory trackable.", "model": "The feasibility envelope is the set of efforts and rates the actuator can actually deliver: the delivered effort is bounded by ±u_max, its rate of change by ±r_max, and there is a deadband floor below which nothing is delivered. A trajectory is trackable only if the effort the controller must request to follow it stays inside these bounds for the whole motion. When it does, delivered ≈ requested everywhere and tracking is tight; when the demand exceeds the envelope, the actuator clips and/or slews, the delivered effort falls short, and a tracking error opens that no gain can close."}, {"type": "short", "prompt": "The same 0→1.2 move is tracked gently (no clipping, RMS ≈ 0) and aggressively (≈60% clipped, RMS ≈ 0.29). What does the comparison show?", "model": "The controller, target, and actuator are identical; only the trajectory's aggressiveness changed. The gentle version stays inside the envelope, so it's delivered faithfully and tracked almost perfectly. The aggressive version demands more effort than u_max can deliver, so the actuator clips most of the run and the trajectory is missed. The envelope — not the controller — drew the line between trackable and not, which is the unit's thesis: the boundary of achievable motion belongs to the actuator."}, {"type": "short", "prompt": "Why is re-planning the right fix for an over-aggressive trajectory rather than re-tuning the controller?", "model": "When the actuator clips, the controller is already requesting more than the hardware can deliver; the missing effort is physically unavailable, so increasing the gains just requests even more impossible effort and changes nothing about what's delivered. The only way to make the motion trackable is to lower its demand until it fits the envelope — exactly Module 7's feasibility re-planning (slow the move, smooth it, reduce peak acceleration). The alternative is bigger hardware (a larger envelope), but re-planning is usually the cheaper, principled fix."}];

else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
