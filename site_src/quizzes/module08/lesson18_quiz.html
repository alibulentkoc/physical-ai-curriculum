<script>var questions=[{"type": "mc", "prompt": "Saturation is:", "options": [{"t": "the actuator's effort ceiling; commands above it are discarded", "ok": true}, {"t": "the actuator's dead zone", "ok": false}, {"t": "the controller's derivative term", "ok": false}, {"t": "a communication delay", "ok": false}], "ok": "Correct.", "no": "Saturation caps the delivered effort at ±u_max."}, {"type": "mc", "prompt": "Integral windup happens because, while the actuator is saturated:", "options": [{"t": "the derivative term grows", "ok": false}, {"t": "the persistent error keeps the integrator accumulating command the actuator can't use", "ok": true}, {"t": "the deadband widens", "ok": false}, {"t": "the reference changes", "ok": false}], "ok": "Correct.", "no": "The error stays large because the hardware is maxed, so the integrator banks unusable command."}, {"type": "mc", "prompt": "A wound-up integrator causes:", "options": [{"t": "a steady-state offset", "ok": false}, {"t": "a large overshoot once the joint reaches the target", "ok": true}, {"t": "no effect", "ok": false}, {"t": "a faster rise with no downside", "ok": false}], "ok": "Correct.", "no": "The banked integral keeps the command saturated past the target, so the joint overshoots."}, {"type": "mc", "prompt": "The anti-windup clamp cures windup by:", "options": [{"t": "raising the saturation ceiling", "ok": false}, {"t": "bounding the integrator so it can't bank command the actuator can't deliver", "ok": true}, {"t": "removing the integral term entirely", "ok": false}, {"t": "speeding up the controller", "ok": false}], "ok": "Correct.", "no": "It changes the controller (bounds e_i), not the actuator's physics."}, {"type": "mc", "prompt": "Even without windup, saturation alone:", "options": [{"t": "improves tracking", "ok": false}, {"t": "degrades tracking on demanding moves because the needed effort can't be delivered", "ok": true}, {"t": "has no effect on tracking", "ok": false}, {"t": "only affects steady state", "ok": false}], "ok": "Correct.", "no": "If the move needs more effort than u_max, the actuator clips and the joint falls behind."}, {"type": "short", "prompt": "Explain, step by step, how saturation causes the integrator to wind up.", "model": "On a large move the proportional command alone exceeds u_max, so the actuator is pinned at the ceiling and the joint climbs slowly. Because the joint can't keep up, the error stays positive for a long time, and the integrator — whose rule is to accumulate persistent error — keeps growing even though the extra command it produces is discarded by the saturated actuator. By the time the joint finally reaches the target, the integrator has banked a large value; with the error now near zero the banked integral keeps the command saturated, driving the joint past the target. That overshoot is the wound-up integral being honoured."}, {"type": "short", "prompt": "Why does the anti-windup clamp fix windup without changing the actuator's physics?", "model": "Windup is a controller problem, not an actuator problem: the actuator's ceiling is fixed, but the integrator was banking command the actuator could never deliver. The anti-windup clamp simply bounds the integrator (|e_i| ≤ clamp), sized near the steady command the joint actually needs, so it can't accumulate unusable command during saturation. The ceiling is unchanged; what changes is that the controller stops making the ceiling's consequences worse, so the joint settles near the target instead of overshooting."}, {"type": "short", "prompt": "On a far step with a tight ceiling, a plain integrator overshoots about 69% while the anti-windup clamp overshoots about 18% with the same gains. Interpret this result.", "model": "The gains and the saturation ceiling are identical in both runs, so neither the controller's aggressiveness nor the actuator's limit explains the difference — only the windup does. The plain integrator banks a large value during the long saturated climb and then overshoots far past the target (≈69%). The clamped integrator can't bank that unusable command, so it settles with a much smaller overshoot (≈18%). The lesson: the cure for saturation-driven overshoot is anti-windup, not detuning the gains."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);

if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
