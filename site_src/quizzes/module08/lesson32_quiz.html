*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}

<script>var questions=[{"type": "mc", "prompt": "The capstone runs the closed-loop control layer on:", "options": [{"t": "A single joint only", "ok": false}, {"t": "The planar 2-link greenhouse arm", "ok": true}, {"t": "A wheeled robot", "ok": false}, {"t": "No system", "ok": false}], "ok": "The planar 2-link greenhouse arm", "no": "Per-joint control layers track a Module 7 reference on the arm."}, {"type": "mc", "prompt": "With no disturbance, the arm tracked the reference to overall RMS:", "options": [{"t": "≈ 0.5", "ok": false}, {"t": "≈ 0.0000 (essentially perfect)", "ok": true}, {"t": "≈ 2.0", "ok": false}, {"t": "that grew over time", "ok": false}], "ok": "≈ 0.0000 (essentially perfect)", "no": "The closed loop follows the plan almost exactly."}, {"type": "mc", "prompt": "After a mid-trajectory kick on joint 0, feedforward + feedback gave a final error:", "options": [{"t": "≈ 4.9 (large)", "ok": false}, {"t": "≈ 0.012 (near zero — rejected)", "ok": true}, {"t": "that diverged", "ok": false}, {"t": "equal to feedforward-only", "ok": false}], "ok": "≈ 0.012 (near zero — rejected)", "no": "Feedback drove the error back toward zero."}, {"type": "mc", "prompt": "With feedforward ONLY (feedback gains zeroed), the same kick left a final error:", "options": [{"t": "≈ 0 (rejected)", "ok": false}, {"t": "≈ 4.9 (large permanent miss)", "ok": true}, {"t": "slightly smaller than ff+fb", "ok": false}, {"t": "negative", "ok": false}], "ok": "≈ 4.9 (large permanent miss)", "no": "Open-loop feedforward cannot see or correct a disturbance."}, {"type": "mc", "prompt": "The artifact the capstone produces is:", "options": [{"t": "A trajectory", "ok": false}, {"t": "The control layer (the Module 9 handoff)", "ok": true}, {"t": "A perception system", "ok": false}, {"t": "A map", "ok": false}], "ok": "The control layer (the Module 9 handoff)", "no": "tracking_controller(reference, measured_state) → actuator_command for Module 9."}, {"type": "short", "prompt": "Why does feedback reject the disturbance while feedforward alone cannot?", "model": "Feedforward only knows the plan (the reference's velocity/acceleration); it is open-loop and blind to a disturbance, so a kick pushes the joint off and it stays off. Feedback sees the resulting tracking error and pushes back until the error returns to zero — so only the closed loop rejects the disturbance."}, {"type": "short", "prompt": "Summarise the module's arc from open-loop drift to a real-time control stack.", "model": "Open-loop execution drifts (U1); PID feedback corrects error (U2); stability/tuning make it well-behaved (U3); feedforward + feedback track the whole arm (U4); the actuator imposes real limits (U5); the loop runs as messages with latency (U6); it must execute periodically in real time (U7); and it is assembled as a ROS 2 control stack (U8), packaged as the control layer."}, {"type": "short", "prompt": "What does the capstone hand to Module 9, and what does Module 9 do with it?", "model": "It hands Module 9 the verified control layer — tracking_controller(reference, measured_state) → actuator_command. Module 9 integrates it into a full autonomous system: perception-driven planning that supplies references, coordination of subsystems, and task supervision — all built on top of the control layer, which Module 8 deliberately left to Module 9."}];

else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
