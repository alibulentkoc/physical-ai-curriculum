<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

<script>var questions=[{"type": "mc", "prompt": "Jitter in a periodic loop is:", "options": [{"t": "The period varying cycle to cycle", "ok": true}, {"t": "A constant delay", "ok": false}, {"t": "A faster average rate", "ok": false}, {"t": "A larger control gain", "ok": false}], "ok": "The period varying cycle to cycle", "no": "Jitter is variation in the actual interval between updates."}, {"type": "mc", "prompt": "A missed deadline causes the loop to:", "options": [{"t": "Skip the update and hold the previous command", "ok": true}, {"t": "Run twice as fast", "ok": false}, {"t": "Reset the integral", "ok": false}, {"t": "Increase the gain", "ok": false}], "ok": "Skip the update and hold the previous command", "no": "The scheduled update is skipped, so a stale command is held another period."}, {"type": "mc", "prompt": "Jitter, overruns, and missed deadlines all damage the loop by:", "options": [{"t": "Reducing the gain", "ok": false}, {"t": "Adding loop delay", "ok": true}, {"t": "Increasing the mass", "ok": false}, {"t": "Removing feedforward", "ok": false}], "ok": "Adding loop delay", "no": "All three increase the effective sense-to-act delay — the Unit-6 destabiliser."}, {"type": "mc", "prompt": "In the verified results, compared to a stable deterministic loop, adding enough jitter made the loop:", "options": [{"t": "More stable", "ok": false}, {"t": "Unchanged", "ok": false}, {"t": "Unstable", "ok": true}, {"t": "Faster", "ok": false}], "ok": "Unstable", "no": "Same gains and plant — only the timing changed, and it crossed into instability."}, {"type": "mc", "prompt": "The correct fix for timing-induced instability is to make the timing:", "options": [{"t": "Faster on average", "ok": false}, {"t": "Predictable (deterministic, low-jitter)", "ok": true}, {"t": "Slower", "ok": false}, {"t": "Random", "ok": false}], "ok": "Predictable (deterministic, low-jitter)", "no": "Predictability, not raw speed, is what restores the bounded delay the loop needs."}, {"type": "short", "prompt": "Define jitter, overrun, and missed deadline for a periodic loop.", "model": "Jitter: the period varies cycle to cycle (the next update lands late by a varying amount). Overrun: the cycle's work exceeds the period, violating the budget. Missed deadline: the consequence — the update is skipped and the previous command is held another period."}, {"type": "short", "prompt": "Explain why all three hazards produce the same stability consequence as Unit 6's delay sweep.", "model": "Each increases the effective loop delay between sensing and acting (a late or skipped update holds a stale command). Unit 6 showed that at fixed gains, increasing delay marches the loop stable → marginal → unstable, so these hazards inherit exactly that boundary."}, {"type": "short", "prompt": "Why is buying a faster-average CPU not necessarily the fix?", "model": "A faster-on-average CPU can still jitter and overrun (e.g., under OS preemption or contention), so its worst-case timing may remain unbounded. The loop needs predictable, bounded timing; the fix is a real-time target that protects the loop's timing, not just more average speed."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
