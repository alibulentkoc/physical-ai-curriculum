<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Open-loop execution means the robot:", "options": [{"t": "measures its output and corrects", "ok": false}, {"t": "commands the motion from the plan with no feedback correction", "ok": true}, {"t": "ignores the reference", "ok": false}, {"t": "uses a PID controller", "ok": false}], "ok": "Correct \u2014 open-loop never looks at what actually happened.", "no": "Open-loop drives from the plan/feedforward alone; it never measures the result to correct it."}, {"type": "mc", "prompt": "Why does open-loop execution drift from the reference?", "options": [{"t": "the reference is wrong", "ok": false}, {"t": "unmodeled disturbances, load, friction, and model error are never corrected", "ok": true}, {"t": "the math is wrong", "ok": false}, {"t": "the clock is too fast", "ok": false}], "ok": "Correct \u2014 nothing closes the gap.", "no": "Real plants face load, friction, and model mismatch; with no feedback, those errors accumulate uncorrected."}, {"type": "mc", "prompt": "The growing gap between q_d(t) and the actual q(t) is:", "options": [{"t": "the velocity", "ok": false}, {"t": "the tracking error", "ok": true}, {"t": "the acceleration", "ok": false}, {"t": "the setpoint", "ok": false}], "ok": "Correct.", "no": "The reference-vs-reality gap q_d \u2212 q is exactly the tracking error."}, {"type": "mc", "prompt": "What does closing the loop add that open-loop lacks?", "options": [{"t": "a faster plan", "ok": false}, {"t": "measurement of the actual output and correction of the error", "ok": true}, {"t": "a smoother reference", "ok": false}, {"t": "more actuators", "ok": false}], "ok": "Correct.", "no": "Feedback measures the real output and continuously corrects the error \u2014 the thing open-loop cannot do."}, {"type": "mc", "prompt": "Module 8 consumes, from Module 7:", "options": [{"t": "motor torques", "ok": false}, {"t": "the reference q_d, q\u0307_d, q\u0308_d", "ok": true}, {"t": "the camera image", "ok": false}, {"t": "the URDF", "ok": false}], "ok": "Correct \u2014 the validated reference is the input to control.", "no": "Module 7's reference layer (q_d and the feedforward q\u0307_d, q\u0308_d) is what Module 8 tracks."}, {"type": "short", "prompt": "Explain, with a real-world analogy, why open-loop control isn't enough on a real machine.", "model": "Open-loop is like driving with your eyes closed after memorizing the road: you execute the planned steering, but you can't see or correct for anything unexpected \u2014 a gust of wind, a slope, a heavier load \u2014 so you drift off course and the error grows. A real robot joint faces gravity-like load, friction, payload changes, and model error; with no feedback it never notices or corrects the resulting gap, so the actual motion diverges from the reference. Feedback (eyes open) is what lets it measure the real position and steer back onto the reference."}, {"type": "short", "prompt": "State precisely what Module 7 hands to Module 8 and what Module 8 does with it.", "model": "Module 7 hands Module 8 the validated reference trajectory: the desired position q_d(t) plus the feedforward derivatives q\u0307_d(t) and q\u0308_d(t), continuous and feasible. Module 8 treats q_d as the target to track and uses the feedforward terms to lead the motion, then adds feedback correction (comparing measured q to q_d) to reject disturbances and follow the reference on the real arm. Module 8 does not re-plan the motion \u2014 it makes the robot actually follow the motion Module 7 already decided."}, {"type": "short", "prompt": "Describe the reference-vs-reality gap and why it motivates the whole module.", "model": "The reference q_d(t) is where the robot should be at each instant; the reality q(t) is where it actually is. On a real plant these differ \u2014 the actual motion drifts from the plan because of load, friction, and model error that open-loop execution never corrects. That growing gap is the tracking error, and eliminating it is the entire job of feedback control. The module exists to build the controller that measures this gap and continuously drives it toward zero, turning a planned reference into faithfully executed motion."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
