<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "One RRT iteration, in order, is:", "options": [{"t": "goal, steer, sample, check", "ok": false}, {"t": "sample a random config, find nearest tree node, steer a step, collision-check, try to connect to goal", "ok": true}, {"t": "check, connect, sample", "ok": false}, {"t": "grid, search, smooth", "ok": false}], "ok": "Correct.", "no": "Sample \u2192 nearest \u2192 steer a small step \u2192 collision-check the edge \u2192 try to connect to the goal."}, {"type": "mc", "prompt": "The goal bias in RRT:", "options": [{"t": "slows the planner", "ok": false}, {"t": "occasionally samples the goal to pull the tree toward finishing", "ok": true}, {"t": "guarantees optimality", "ok": false}, {"t": "removes collisions", "ok": false}], "ok": "Correct.", "no": "With small probability it samples the goal directly, biasing growth toward connecting."}, {"type": "mc", "prompt": "Sampling-based planning scales where gridding C-space does not because:", "options": [{"t": "it builds the whole C-obstacle", "ok": false}, {"t": "it probes free space with samples instead of enumerating it", "ok": true}, {"t": "it ignores collisions", "ok": false}, {"t": "it uses fewer joints", "ok": false}], "ok": "Correct \u2014 it never enumerates the high-dimensional space.", "no": "It probes free space with random samples + cheap collision checks, never enumerating the (huge) space."}, {"type": "mc", "prompt": "The raw path an RRT returns is:", "options": [{"t": "the shortest path", "ok": false}, {"t": "a jagged, feasible (collision-free) path", "ok": true}, {"t": "always straight", "ok": false}, {"t": "optimal and smooth", "ok": false}], "ok": "Correct \u2014 feasible but jagged; smoothing comes next.", "no": "RRT returns a feasible but jagged path (not shortest/smoothest); it's smoothed in 6.4."}, {"type": "mc", "prompt": "If RRT doesn't find a path in N iterations, it means:", "options": [{"t": "no path exists", "ok": false}, {"t": "not found yet \u2014 basic RRT can't prove infeasibility", "ok": true}, {"t": "the goal is wrong", "ok": false}, {"t": "the obstacle moved", "ok": false}], "ok": "Correct \u2014 failure isn't proof of impossibility.", "no": "Basic RRT is probabilistically complete; 'not found' isn't 'impossible'."}, {"type": "short", "prompt": "Walk through the RRT loop using the 'explore a dark cluttered room with small hops' picture.", "model": "From the doorway you repeatedly: pick a random spot in the room (sample), walk from your nearest already-explored point a short step toward it (nearest + steer), and if the step doesn't hit furniture keep it (collision-check). Your explored tree grows outward, bending around furniture because you can't step through it. Every so often you aim at the far corner (goal bias); once you're close and the way is clear, you connect and trace your hops back to the door for a route. That's RRT: sample, nearest, step, check, connect."}, {"type": "short", "prompt": "Why does sampling-based planning scale to high-DOF arms where grid search fails?", "model": "A 6- or 7-joint arm has a 6- or 7-dimensional configuration space; gridding it (or building the full C-obstacle) needs exponentially many cells \u2014 hopeless. Sampling-based planners never enumerate the space: they draw random configurations, call the cheap collision check only where they look, and connect the safe ones into a tree (or roadmap) reaching from start to goal. They discover free space by probing it, so cost scales with problem difficulty, not with the dimension's exponential volume."}, {"type": "short", "prompt": "RRT is probabilistically complete but struggles with narrow corridors. Explain why, and one practical remedy (no optimization).", "model": "A narrow corridor of free space is a small target: the chance that a random sample plus a step lands inside it (and the connecting edge stays collision-free) is low, so the tree rarely grows through it and planning takes many iterations. Probabilistic completeness guarantees it's found eventually, just slowly. Practical remedies without invoking optimization: more samples / iterations, a smaller step size near clutter, or biasing samples toward the corridor or goal region. (If no path exists, basic RRT simply never returns one \u2014 it can't prove infeasibility.)"}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
