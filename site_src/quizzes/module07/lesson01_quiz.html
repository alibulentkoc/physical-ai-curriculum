<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}
textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:9px;padding:8px;font-family:inherit;font-size:14px;resize:vertical}
.btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:8px}.btn:hover{background:var(--soft)}
.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Two motions reach the same final pose. What can we conclude about their quality?", "options": [{"t": "They are equally good", "ok": false}, {"t": "Nothing \u2014 quality is about the journey, not just the endpoint", "ok": true}, {"t": "The faster one is always better", "ok": false}, {"t": "The shorter one is always smoother", "ok": false}], "ok": "Correct. Reaching the pose says nothing about how the motion got there.", "no": "Reaching the same pose says nothing about smoothness, safety, or efficiency along the way."}, {"type": "mc", "prompt": "Which trio are the three motion-quality goals of Module 7?", "options": [{"t": "fast, strong, precise", "ok": false}, {"t": "smooth, safe, efficient", "ok": true}, {"t": "stable, observable, controllable", "ok": false}, {"t": "linear, continuous, bounded", "ok": false}], "ok": "Correct.", "no": "The three goals are smooth, safe, and efficient."}, {"type": "mc", "prompt": "In the greenhouse, jerky motion most directly causes which two failures?", "options": [{"t": "lower battery life and noise", "ok": false}, {"t": "bruised fruit and mechanism wear", "ok": true}, {"t": "loss of network and sensor drift", "ok": false}, {"t": "longer cycle time only", "ok": false}], "ok": "Correct \u2014 abrupt acceleration bruises fruit and shock-loads the drivetrain.", "no": "Jerky motion bruises fruit (at contact/stopping) and wears the mechanism (shock loads)."}, {"type": "mc", "prompt": "'Smoothness is about the timing of speed, not the route.' This means:", "options": [{"t": "a smoother route is always shorter", "ok": false}, {"t": "the same path can be moved gently or violently depending on how speed changes", "ok": true}, {"t": "smoothness requires changing the path", "ok": false}, {"t": "smooth motion is always slow", "ok": false}], "ok": "Correct.", "no": "Smoothness constrains how speed changes over time, independent of the geometric route."}, {"type": "mc", "prompt": "Does the Module 6 velocity layer automatically make a commanded motion smooth?", "options": [{"t": "Yes, it filters bad commands", "ok": false}, {"t": "No \u2014 it faithfully executes whatever twist it is given, including a violent one", "ok": true}, {"t": "Yes, it adds feedback", "ok": false}, {"t": "No, because it only works near singularities", "ok": false}], "ok": "Correct. Smoothing the command is Module 7's job, not the velocity layer's.", "no": "The velocity layer executes any commanded twist faithfully; it does not smooth a bad command."}, {"type": "short", "prompt": "Explain, using the carried-coffee analogy, why two motions reaching the same place can differ in quality.", "model": "Carrying coffee, you can lurch and spill or ease in and out and keep it steady \u2014 same start, same end, same route across the floor. The difference is entirely the timing of speed (how fast you accelerate and decelerate). A robot's payload and gears similarly feel the changes in motion, not the endpoint, so the same destination admits gentle or violent motions."}, {"type": "short", "prompt": "Name the three motion-quality goals and give one greenhouse failure each prevents.", "model": "Smooth \u2014 prevents bruised fruit and drivetrain shock (jolts). Safe \u2014 prevents collisions with stems/canopy and loss of control near singularities. Efficient \u2014 prevents wasted time, distance, and strain. All three together define a good harvest motion."}, {"type": "short", "prompt": "A grower says the arm 'reaches every tomato but keeps snapping belts.' Which goal is most implicated and why?", "model": "Smoothness (and feasibility). Snapping belts indicates repeated shock loads from abrupt acceleration/jerk \u2014 a smoothness failure that the correct final pose hides. The fix lives in the motion command's timing, not in the target."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});

</script></body></html>
