<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}
.note{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;margin:6px 0;font-size:14px;cursor:pointer}
.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}
.fb{font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none}.fb.show{display:block}.fb.ok{background:var(--greenbg);color:var(--green)}.fb.no{background:var(--redbg);color:var(--red)}.fb.info{background:#eff6ff;color:#1d4ed8}

.model{display:none;font-size:13px;margin-top:8px;padding:8px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.model.show{display:block}
</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "The three phases of a trapezoidal velocity profile are:", "options": [{"t": "jerk-up, jerk-hold, jerk-down", "ok": false}, {"t": "accelerate at a_max, coast at v_max, decelerate at a_max", "ok": true}, {"t": "plan, parameterize, execute", "ok": false}, {"t": "slow, medium, fast", "ok": false}], "ok": "Correct.", "no": "Accelerate at a_max \u2192 coast at v_max \u2192 decelerate at a_max."}, {"type": "mc", "prompt": "The trapezoidal profile is only C\u00b9 because:", "options": [{"t": "its position jumps", "ok": false}, {"t": "its acceleration is piecewise-constant and steps at the phase boundaries (jerk spikes)", "ok": true}, {"t": "it never reaches v_max", "ok": false}, {"t": "it has no coast phase", "ok": false}], "ok": "Correct.", "no": "Stepped (piecewise-constant) acceleration is discontinuous \u2192 C\u00b9, with jerk spikes at the corners."}, {"type": "mc", "prompt": "An S-curve profile adds which limit, and what continuity does it buy?", "options": [{"t": "a position limit; C\u2070", "ok": false}, {"t": "a jerk limit; C\u00b2 (continuous acceleration)", "ok": true}, {"t": "a torque limit; C\u00b3", "ok": false}, {"t": "no new limit; same as trapezoid", "ok": false}], "ok": "Correct.", "no": "Bounding jerk makes acceleration continuous \u2192 C\u00b2, for a small time penalty."}, {"type": "mc", "prompt": "For a short move distance, the trapezoidal profile becomes:", "options": [{"t": "a square wave", "ok": false}, {"t": "a triangle (it never reaches v_max)", "ok": true}, {"t": "an S-curve", "ok": false}, {"t": "impossible", "ok": false}], "ok": "Correct \u2014 if 2\u00b7d_acc > D, cruise is never reached and the profile is triangular.", "no": "For short moves v_max is never reached and the profile is triangular."}, {"type": "mc", "prompt": "Which is true of the trapezoid vs the S-curve for the same v_max, a_max?", "options": [{"t": "the S-curve is faster", "ok": false}, {"t": "the trapezoid is time-optimal; the S-curve is slightly slower but smoother (C\u00b2)", "ok": true}, {"t": "they take the same time", "ok": false}, {"t": "the trapezoid is smoother", "ok": false}], "ok": "Correct.", "no": "The trapezoid is time-optimal under the limits; the S-curve trades a little time for C\u00b2 smoothness."}, {"type": "short", "prompt": "Why is a trapezoidal profile time-optimal but not smooth?", "model": "It uses the maximum allowed acceleration and velocity the whole time, so no profile obeying the same limits can finish sooner \u2014 time-optimal. But its acceleration is piecewise-constant and steps at the phase boundaries, so it is only C\u00b9 and produces jerk spikes (not smooth)."}, {"type": "short", "prompt": "What does an S-curve change about the trapezoid, and at what cost?", "model": "It bounds jerk, so acceleration must ramp rather than step \u2014 the velocity corners round into S-shapes and acceleration becomes continuous (C\u00b2). The cost is time: the jerk-limited ramps take longer than instantaneous steps, so the S-curve finishes a bit later than the trapezoid."}, {"type": "short", "prompt": "A move of distance D must finish in a fixed time T with jerk \u2264 j_max. What fails if D/T exceeds what even a trapezoid at v_max can deliver?", "model": "If the required average speed D/T is too high, no profile within v_max can cover D in time T \u2014 feasibility fails. Something must give: raise v_max/a_max (if the hardware allows), relax T, or shorten D (path). You cannot keep all of D, T, and the limits simultaneously; this is the converse of Unit 5's time-scaling, where we slow down to gain feasibility."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});

</script></body></html>
