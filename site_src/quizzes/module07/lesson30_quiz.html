<script>var questions=[{"type": "mc", "prompt": "PLAN answers, and PARAMETERIZE answers:", "options": [{"t": "how fast?; what route?", "ok": false}, {"t": "what route? (geometry); how fast along it? (timing)", "ok": true}, {"t": "both timing", "ok": false}, {"t": "both geometry", "ok": false}], "ok": "Correct.", "no": "PLAN = what route (geometry); PARAMETERIZE = how fast along the fixed route (timing)."}, {"type": "mc", "prompt": "PLAN is implemented with, and PARAMETERIZE with:", "options": [{"t": "validation; smoothing", "ok": false}, {"t": "RRT + smoothing; time scaling + polynomial/spline timing", "ok": true}, {"t": "IK only; RRT", "ok": false}, {"t": "time scaling; RRT", "ok": false}], "ok": "Correct.", "no": "PLAN = RRT + smoothing (Unit 6); PARAMETERIZE = time scaling + polynomial/spline timing (Units 2-5)."}, {"type": "mc", "prompt": "Keeping planning and parameterization separate (plan-then-time):", "options": [{"t": "is harder", "ok": false}, {"t": "keeps each step tractable and reusable", "ok": true}, {"t": "requires dynamics", "ok": false}, {"t": "needs feedback", "ok": false}], "ok": "Correct.", "no": "Plan-then-time keeps geometry and timing as separate, simpler, reusable problems."}, {"type": "mc", "prompt": "Fusing path and timing together is:", "options": [{"t": "plan-then-time", "ok": false}, {"t": "kinodynamic planning (harder, out of scope)", "ok": true}, {"t": "validation", "ok": false}, {"t": "smoothing", "ok": false}], "ok": "Correct \u2014 out of Module 7's scope.", "no": "Planning path + velocities/accelerations jointly is kinodynamic planning, out of scope."}, {"type": "mc", "prompt": "Re-parameterizing the same path with a longer duration:", "options": [{"t": "changes the path", "ok": false}, {"t": "leaves the path unchanged and lowers the peaks", "ok": true}, {"t": "adds collisions", "ok": false}, {"t": "requires re-planning", "ok": false}], "ok": "Correct \u2014 only the schedule changes.", "no": "The route is fixed; longer durations only lower the velocity/acceleration peaks."}, {"type": "short", "prompt": "Explain PLAN and PARAMETERIZE with the 'road trip: trace the route, then schedule speeds' analogy.", "model": "First, with a map, you trace the route \u2014 which roads and turns, avoiding the closed bridge \u2014 pure geometry, no speeds yet (PLAN: RRT finds a collision-free path, smoothing straightens it). Then you schedule it \u2014 decide how fast to drive each segment so you don't speed or dawdle (PARAMETERIZE: time each segment to the velocity/acceleration limits with a polynomial/spline timing). Route first, schedule second. You'd never compute the exact speed for every meter while still discovering the route; separating them keeps each manageable."}, {"type": "short", "prompt": "Why is plan-then-time decoupling preferred, and what is the harder alternative?", "model": "Decoupling lets the planner solve a pure geometry problem (no derivatives, no limits) and the parameterizer solve a closed-form timing problem on a fixed curve \u2014 each simple, well-understood, and independently swappable, and the same path can be re-timed without replanning. The harder alternative is kinodynamic planning, which searches over path and velocities/accelerations jointly under coupled constraints; it's heavier and reserved for cases that truly need it. Module 7 deliberately uses plan-then-time and keeps kinodynamic planning out of scope."}, {"type": "short", "prompt": "You've planned a clear path; how do you parameterize it differently for a gentle loaded grasp vs a fast empty reposition, and when must you go back to PLAN?", "model": "Same path, different timing. For the gentle loaded grasp, parameterize with a smooth profile and longer segment durations to minimize jerk and keep accelerations low. For the fast empty reposition, parameterize with the fastest-feasible (trapezoidal) timing to minimize duration, accepting higher jerk \u2014 both stay within the limits. You only go back to PLAN if no timing can make the path feasible \u2014 i.e. a geometric problem like an unreachable point or a collision (which timing can't fix); a mere too-fast trajectory is a parameterize fix (slow down), not a re-plan."}];

questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";

if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
