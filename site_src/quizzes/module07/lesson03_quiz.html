<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--greenbg:#dcfce7;--red:#b91c1c;--redbg:#fee2e2;--accent:#0d9488;}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
.wrap{max-width:760px;margin:0 auto;padding:6px}

.q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#fff}
.qhead{font-weight:600;font-size:14.5px;margin-bottom:10px}.qnum{display:inline-block;min-width:22px;color:var(--accent);font-weight:700}

.opt:hover{background:var(--soft)}.opt.correct{background:var(--greenbg);border-color:#86efac;color:var(--green);font-weight:600}.opt.wrong{background:var(--redbg);border-color:#fecaca;color:var(--red)}

</style></head><body><div class="wrap">
<div class="note">Formative — unlimited attempts, immediate feedback. This does <b>not</b> affect your grade.</div>
<div id="quiz"></div></div>
<script>var questions=[{"type": "mc", "prompt": "Which set lists the four trajectory-quality criteria?", "options": [{"t": "fast, strong, precise, cheap", "ok": false}, {"t": "smooth, feasible, safe, efficient", "ok": true}, {"t": "linear, bounded, stable, observable", "ok": false}, {"t": "short, quiet, warm, dry", "ok": false}], "ok": "Correct.", "no": "The four criteria are smooth, feasible, safe, efficient."}, {"type": "mc", "prompt": "C\u00b2 continuity of a motion guarantees that:", "options": [{"t": "position never moves", "ok": false}, {"t": "velocity is zero", "ok": false}, {"t": "acceleration is continuous, so force has no jumps (no shock loads)", "ok": true}, {"t": "jerk is exactly zero", "ok": false}], "ok": "Correct \u2014 continuous acceleration means continuous force (F\u221da), so no shock loads.", "no": "C\u00b2 means continuous acceleration; since force tracks acceleration, force has no jumps."}, {"type": "mc", "prompt": "A motion is perfectly smooth but commands a joint above its top speed. Which criterion fails?", "options": [{"t": "smoothness", "ok": false}, {"t": "feasibility", "ok": true}, {"t": "safety", "ok": false}, {"t": "efficiency", "ok": false}], "ok": "Correct \u2014 exceeding a joint limit is a feasibility failure.", "no": "Exceeding velocity/acceleration limits is a feasibility failure, regardless of smoothness."}, {"type": "mc", "prompt": "Why must the safety check cover the whole path, not just the endpoints?", "options": [{"t": "endpoints are always safe", "ok": false}, {"t": "collisions and limit violations happen in the middle of the motion, not only at the ends", "ok": true}, {"t": "the middle is never reachable", "ok": false}, {"t": "safety only applies to the start", "ok": false}], "ok": "Correct.", "no": "Collisions and saturations occur along the motion; checking only endpoints misses them."}, {"type": "mc", "prompt": "The continuity ladder, from least to most smooth, is:", "options": [{"t": "C\u00b2 < C\u00b9 < C\u2070", "ok": false}, {"t": "C\u2070 < C\u00b9 < C\u00b2 < bounded jerk", "ok": true}, {"t": "bounded jerk < C\u2070 < C\u00b9", "ok": false}, {"t": "C\u00b9 < C\u2070 < C\u00b2", "ok": false}], "ok": "Correct.", "no": "Position (C\u2070) < velocity (C\u00b9) < acceleration (C\u00b2) < bounded jerk."}, {"type": "short", "prompt": "Why does C\u00b2 continuity prevent shock loads, in terms of force and acceleration?", "model": "Force is proportional to acceleration (F=ma). If acceleration jumps, force jumps instantly \u2014 a shock load. C\u00b2 continuity means acceleration is continuous, so force changes continuously and no shock (step in force) ever occurs."}, {"type": "short", "prompt": "Give a motion that is C\u00b2 but still feels abrupt, and name the culprit.", "model": "A C\u00b2 motion whose acceleration ramps up very quickly has large (but finite) jerk. It has no force jumps, yet the fast onset of force is felt as a snap. The culprit is unbounded jerk; bounding jerk is the separate finishing requirement on top of C\u00b2."}, {"type": "short", "prompt": "A trajectory passes smoothness and feasibility but lingers near a singular configuration without colliding. Is it 'safe'? Argue both sides.", "model": "Arguable. Against: it never collides, so geometrically it's clear. For rejection: near a singularity the arm loses motion authority in some direction and following the path may demand very large joint rates (a latent feasibility problem) and poor conditioning \u2014 risky if anything perturbs it. Many reviewers reject sustained near-singular passes; rerouting the path to keep \u03c3_min above a band resolves it cleanly."}];
var root=document.getElementById("quiz");
questions.forEach(function(q,i){var card=document.createElement("div");card.className="q";
var head=document.createElement("div");head.className="qhead";head.innerHTML='<span class="qnum">'+(i+1)+'.</span> '+q.prompt;card.appendChild(head);
var fb=document.createElement("div");fb.className="fb";
if(q.type==="mc"||q.type==="tf"){var opts=q.type==="tf"?[{t:"True",ok:q.answer===true},{t:"False",ok:q.answer===false}]:q.options;
opts.forEach(function(o){var b=document.createElement("button");b.className="opt";b.type="button";b.innerHTML=o.t;
b.addEventListener("click",function(){Array.prototype.forEach.call(card.querySelectorAll(".opt"),function(el){el.classList.remove("correct","wrong");});
if(o.ok){b.classList.add("correct");fb.className="fb show ok";fb.innerHTML=q.ok;}else{b.classList.add("wrong");fb.className="fb show no";fb.innerHTML=q.no;}});card.appendChild(b);});card.appendChild(fb);}
else if(q.type==="short"){var ta=document.createElement("textarea");ta.placeholder="Type your answer, then reveal the model answer to self-check…";card.appendChild(ta);
var sh=document.createElement("button");sh.className="btn";sh.type="button";sh.textContent="Show model answer";var md=document.createElement("div");md.className="model";md.innerHTML=q.model;
sh.addEventListener("click",function(){md.classList.toggle("show");sh.textContent=md.classList.contains("show")?"Hide model answer":"Show model answer";});card.appendChild(sh);card.appendChild(md);}
root.appendChild(card);});
