<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Back-Projection: A Pixel Is a Ray — Lesson 6.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--ray:#f59e0b;--pt:#10b981;--cam:#1d4ed8;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:780px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 360px;min-width:300px}
  .panel{flex:1 1 220px;min-width:220px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.5}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .tag{font-weight:800;color:var(--pt)}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 420 300" role="img" aria-label="A camera center on the left with a ray through a chosen image pixel into the scene. A depth slider moves a point along the ray. The pixel stays fixed because every point on the ray projects to the same pixel.">
        <!-- depth axis ticks -->
        <line x1="60" y1="270" x2="400" y2="270" stroke="#cbd5e1"/>
        <text x="230" y="288" text-anchor="middle" fill="#94a3b8" font-size="11">depth Z (m) →</text>
        <!-- image plane -->
        <line id="plane" x1="110" y1="60" x2="110" y2="240" stroke="#1d4ed8" stroke-width="2"/>
        <text x="110" y="54" text-anchor="middle" fill="#1d4ed8" font-size="11">image plane</text>
        <!-- camera center -->
        <circle cx="60" cy="150" r="6" fill="#0f172a"/>
        <text x="60" y="172" text-anchor="middle" fill="#64748b" font-size="11">camera</text>
        <!-- pixel -->
        <rect id="pix" x="104" y="144" width="12" height="12" fill="#e11d48"/>
        <!-- ray -->
        <line id="ray" x1="60" y1="150" x2="400" y2="100" stroke="#f59e0b" stroke-width="2"/>
        <!-- point on ray -->
        <circle id="pt" cx="200" cy="128" r="8" fill="#10b981"/>
      </svg>
      <div class="hint">Move the depth slider: the green point slides along the ray, but the red pixel never moves — every point on the ray images to the same pixel. Depth is the missing piece.</div>
    </div>
    <div class="panel">
      <label>Pixel u: <span id="uV">480</span></label><input id="u" type="range" min="0" max="640" step="1" value="480">
      <label>Pixel v: <span id="vV">160</span></label><input id="v" type="range" min="0" max="480" step="1" value="160">
      <label>Depth Z: <span id="zV">0.30</span> m</label><input id="z" type="range" min="0.1" max="1.0" step="0.01" value="0.30">
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var fx=800, fy=800, cx=320, cy=240;        // K
  function val(id){return +document.getElementById(id).value;}
  function draw(){
    var u=val('u'), v=val('v'), Z=val('z');
    document.getElementById('uV').textContent=u;
    document.getElementById('vV').textContent=v;
    document.getElementById('zV').textContent=Z.toFixed(2);
    // direction
    var xn=(u-cx)/fx, yn=(v-cy)/fy;
    // 3D point
    var X=xn*Z, Y=yn*Z;
    // ---- scene mapping (schematic) ----
    // camera at svg (60,150); depth Z in [0.1,1.0] maps to svg x in [110,400]
    var camX=60, camY=150;
    function sx(Zd){return 110 + (Zd-0.1)/(1.0-0.1)*(400-110);}
    function syFor(Zd){ // vertical position from yn (image y up is +; svg y down)
      var px=sx(Zd);
      var t=(px-camX)/(400-camX);
      return camY + t*(yn* -260); // scale for visibility
    }
    // pixel position on plane (fixed regardless of Z): plane at svg x=110
    var planeY = camY + (sx(0.1)-camX)/(400-camX) * (yn*-260);
    // actually compute pixel marker via direction at the plane
    var pxPlane = 110;
    var tPlane=(pxPlane-camX)/(400-camX);
    var pixY = camY + tPlane*(yn*-260*4); // amplify near plane for visibility
    // clamp
    pixY=Math.max(60,Math.min(240,pixY));
    document.getElementById('pix').setAttribute('y', pixY-6);
    // ray endpoint at far right
    var farX=400, tFar=(farX-camX)/(400-camX), farY=camY + tFar*(yn*-260);
    farY=Math.max(40,Math.min(260,farY));
    var ray=document.getElementById('ray');
    ray.setAttribute('x1',camX); ray.setAttribute('y1',camY);
    ray.setAttribute('x2',farX); ray.setAttribute('y2',farY);
    // point at depth Z
    var ptX=sx(Z), ptY=camY + (ptX-camX)/(400-camX)*(yn*-260);
    ptY=Math.max(40,Math.min(260,ptY));
    var pt=document.getElementById('pt');
    pt.setAttribute('cx',ptX); pt.setAttribute('cy',ptY);
    document.getElementById('msg').innerHTML =
      'direction (x_n, y_n, 1) = ('+xn.toFixed(3)+', '+yn.toFixed(3)+', 1)<br>'+
      'P_c = Z·(x_n,y_n,1) = (<span class="tag">'+X.toFixed(3)+', '+Y.toFixed(3)+', '+Z.toFixed(2)+'</span>)<br>'+
      'pixel stays at ('+u+', '+v+') for every Z on the ray.';
  }
  ['u','v','z'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('reset').addEventListener('click',function(){
    document.getElementById('u').value=480;
    document.getElementById('v').value=160;
    document.getElementById('z').value=0.30; draw();
  });
  draw();
})();
</script>
</body>
</html>
