<div id="jce-root">
<style>
  #jce-root{--bg:#0f172a;--panel:#13203a;--ink:#e2e8f0;--muted:#94a3b8;--link:#94a3b8;
    --j1:#f87171;--j2:#60a5fa;--j3:#34d399;--sum:#fbbf24;--warn:#fb7185;--grid:#1e293b;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);
    background:var(--bg);border-radius:12px;padding:16px;max-width:760px;box-sizing:border-box}
  #jce-root *{box-sizing:border-box}
  #jce-root h3{margin:0 0 2px;font-size:16px;font-weight:650}
  #jce-root .sub{color:var(--muted);font-size:12.5px;margin-bottom:12px}
  #jce-wrap{display:flex;gap:16px;flex-wrap:wrap}
  #jce-canvas{background:var(--panel);border-radius:10px;flex:1 1 440px;min-width:300px;touch-action:none}
  #jce-side{flex:1 1 220px;min-width:210px;display:flex;flex-direction:column;gap:10px}
  #jce-root .ctl{display:flex;align-items:center;gap:8px;font-size:13px}
  #jce-root .ctl label{width:34px;color:var(--muted)}
  #jce-root input[type=range]{flex:1}
  #jce-root .val{width:52px;text-align:right;font-variant-numeric:tabular-nums;font-family:ui-monospace,Menlo,Consolas,monospace}
  #jce-root .row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
  #jce-root .mat{background:var(--panel);border-radius:8px;padding:10px 12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6}
  #jce-root .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:baseline}
  #jce-root .legend{font-size:12px;color:var(--muted);line-height:1.7}
  #jce-root button{background:#1e293b;color:var(--ink);border:1px solid #334155;border-radius:7px;
    padding:6px 10px;font-size:12.5px;cursor:pointer}
  #jce-root button[aria-pressed=true]{background:#334155;border-color:#475569}
  #jce-warn{color:var(--warn);font-size:12.5px;min-height:18px;font-weight:600}
</style>

  <h3>Jacobian Column Explorer</h3>
  <div class="sub">Each colored arrow is one column of <b>J<sub>v</sub></b> — the tool velocity that joint
  produces at unit rate. The amber arrow is the rate-weighted sum, ξ = J q̇. Drag the canvas or use the sliders.</div>

  <div id="jce-wrap">
    <canvas id="jce-canvas" width="460" height="380" aria-label="Planar robot arm with Jacobian column vectors"></canvas>
    <div id="jce-side">
      <div class="row">
        <span>Joints:</span>
        <span>
          <button id="jce-2r" aria-pressed="true">2R</button>
          <button id="jce-3r" aria-pressed="false">3R</button>
        </span>
      </div>
      <div class="ctl"><label>θ₁</label><input id="t0" type="range" min="-180" max="180" value="35"><span class="val" id="t0v"></span></div>
      <div class="ctl"><label>θ₂</label><input id="t1" type="range" min="-180" max="180" value="60"><span class="val" id="t1v"></span></div>
      <div class="ctl" id="t2row"><label>θ₃</label><input id="t2" type="range" min="-180" max="180" value="40"><span class="val" id="t2v"></span></div>
      <hr style="border:none;border-top:1px solid #1e293b;margin:2px 0">
      <div class="ctl"><label>q̇₁</label><input id="d0" type="range" min="-100" max="100" value="60"><span class="val" id="d0v"></span></div>
      <div class="ctl"><label>q̇₂</label><input id="d1" type="range" min="-100" max="100" value="-40"><span class="val" id="d1v"></span></div>
      <div class="ctl" id="d2row"><label>q̇₃</label><input id="d2" type="range" min="-100" max="100" value="0"><span class="val" id="d2v"></span></div>
      <div class="mat" id="jmat"></div>
      <div class="legend">
        <span class="swatch" style="background:var(--j1)"></span>column 1 &nbsp;
        <span class="swatch" style="background:var(--j2)"></span>column 2 &nbsp;
        <span class="swatch" style="background:var(--j3)"></span>column 3<br>
        <span class="swatch" style="background:var(--sum)"></span>ξ = J q̇ (summed tool twist)
      </div>
      <div id="jce-warn"></div>
    </div>
  </div>

<script>
(function(){
  var root=document.getElementById('jce-root');
  var cv=document.getElementById('jce-canvas'), ctx=cv.getContext('2d');
  var L=[1,1,0.8], COL=['#f87171','#60a5fa','#34d399'], SUM='#fbbf24';
  var n=2;
  var ids=['t0','t1','t2'], dids=['d0','d1','d2'];
  function deg(id){return +document.getElementById(id).value;}
  function rad(id){return deg(id)*Math.PI/180;}

  // forward kinematics: joint positions o_0..o_n in arm units
  function joints(){
    var ang=0, x=0, y=0, pts=[{x:0,y:0}];
    for(var i=0;i<n;i++){ ang+=rad(ids[i]); x+=L[i]*Math.cos(ang); y+=L[i]*Math.sin(ang); pts.push({x:x,y:y}); }
    return pts;
  }
  // planar geometric Jacobian linear part: col i = z x (o_n - o_{i-1}) = [-(yn-y_{i-1}); (xn-x_{i-1})]
  function jac(pts){
    var on=pts[n], J=[];
    for(var i=0;i<n;i++){ var o=pts[i]; J.push([-(on.y-o.y),(on.x-o.x)]); }
    return J;
  }

  function draw(){
    var W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
    // grid
    ctx.strokeStyle='#1e293b'; ctx.lineWidth=1;
    for(var gx=0;gx<=W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<=H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
    var ox=W*0.42, oy=H*0.6, s=78;                 // origin + scale (px per arm unit)
    var pts=joints();
    function px(p){return {x:ox+p.x*s, y:oy-p.y*s};}
    // links
    ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle='#94a3b8';
    for(var i=0;i<n;i++){var a=px(pts[i]),b=px(pts[i+1]);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    // joints
    for(var i=0;i<=n;i++){var p=px(pts[i]);ctx.fillStyle=(i===n)?'#f1f5f9':'#cbd5e1';ctx.beginPath();ctx.arc(p.x,p.y,(i===n)?6:5,0,7);ctx.fill();}
    var tool=px(pts[n]);
    // column arrows (unit-rate pushes), scaled for visibility
    var J=jac(pts), vs=46;
    for(var i=0;i<n;i++){ arrow(tool.x,tool.y, tool.x+J[i][0]*vs, tool.y-J[i][1]*vs, COL[i], 3); }
    // summed twist
    var dq=[]; for(var i=0;i<n;i++) dq.push(deg(dids[i])/100);
    var vx=0,vy=0; for(var i=0;i<n;i++){vx+=J[i][0]*dq[i];vy+=J[i][1]*dq[i];}
    arrow(tool.x,tool.y, tool.x+vx*vs, tool.y-vy*vs, SUM, 4);
    // numeric + singularity hint
    showMatrix(J,dq,[vx,vy]);
    singularHint(J);
  }
  function arrow(x1,y1,x2,y2,c,w){
    ctx.strokeStyle=c; ctx.fillStyle=c; ctx.lineWidth=w; ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    var a=Math.atan2(y2-y1,x2-x1),h=8;
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-h*Math.cos(a-0.4),y2-h*Math.sin(a-0.4));
    ctx.lineTo(x2-h*Math.cos(a+0.4),y2-h*Math.sin(a+0.4));
    ctx.closePath();ctx.fill();
  }
  function f(x){return (x>=0?' ':'') + x.toFixed(2);}
  function showMatrix(J,dq,v){
    var h='J<sub>v</sub> = [ ';
    for(var i=0;i<n;i++) h+='<span style="color:'+COL[i]+'">['+f(J[i][0])+', '+f(J[i][1])+']</span> ';
    h+=']<br>q̇ = ['+dq.map(function(d){return f(d);}).join(', ')+']<br>';
    h+='<span style="color:'+SUM+'">ξ = J q̇ = ['+f(v[0])+', '+f(v[1])+']</span>';
    document.getElementById('jmat').innerHTML=h;
  }
  function singularHint(J){
    // 2D: near-singular when first two columns are nearly parallel (arm straight)
    var w=document.getElementById('jce-warn');
    var c0=J[0],c1=J[1];
    var cross=Math.abs(c0[0]*c1[1]-c0[1]*c1[0]);
    var mag=Math.hypot(c0[0],c0[1])*Math.hypot(c1[0],c1[1])+1e-9;
    var sinang=cross/mag;
    if(sinang<0.12){ w.textContent='Near singular: columns nearly parallel — the tool loses a direction of motion (preview of Unit 5).'; }
    else { w.textContent=''; }
  }

  // dragging the canvas sets the tool toward the pointer via simple 2-joint reach (2R only)
  var dragging=false;
  function setFromPointer(ev){
    var r=cv.getBoundingClientRect();
    var mx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
    var my=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;
    var ox=cv.width*0.42, oy=cv.height*0.6, s=78;
    var x=(mx-ox)/s, y=(oy-my)/s;
    if(n===2){ // analytic 2R IK (reach toward pointer, clamp)
      var l1=L[0],l2=L[1], d=Math.hypot(x,y); d=Math.min(d,l1+l2-1e-3); d=Math.max(d,Math.abs(l1-l2)+1e-3);
      var ux=x/Math.hypot(x,y), uy=y/Math.hypot(x,y);
      var c2=(d*d-l1*l1-l2*l2)/(2*l1*l2); c2=Math.max(-1,Math.min(1,c2));
      var th2=Math.acos(c2);
      var k1=l1+l2*Math.cos(th2), k2=l2*Math.sin(th2);
      var th1=Math.atan2(uy,ux)-Math.atan2(k2,k1);
      document.getElementById('t0').value=Math.round(th1*180/Math.PI);
      document.getElementById('t1').value=Math.round(th2*180/Math.PI);
      sync();
    }
  }
  cv.addEventListener('mousedown',function(e){if(n===2){dragging=true;setFromPointer(e);}});
  window.addEventListener('mousemove',function(e){if(dragging)setFromPointer(e);});
  window.addEventListener('mouseup',function(){dragging=false;});
  cv.addEventListener('touchstart',function(e){if(n===2){dragging=true;setFromPointer(e);e.preventDefault();}},{passive:false});
  cv.addEventListener('touchmove',function(e){if(dragging){setFromPointer(e);e.preventDefault();}},{passive:false});
  cv.addEventListener('touchend',function(){dragging=false;});

  function sync(){
    for(var i=0;i<3;i++){
      document.getElementById(ids[i]+'v').textContent=deg(ids[i])+'°';
      document.getElementById(dids[i]+'v').textContent=(deg(dids[i])/100).toFixed(2);
    }
    draw();
  }
  ['t0','t1','t2','d0','d1','d2'].forEach(function(id){document.getElementById(id).addEventListener('input',sync);});

  function setN(k){
    n=k;
    document.getElementById('jce-2r').setAttribute('aria-pressed',k===2);
    document.getElementById('jce-3r').setAttribute('aria-pressed',k===3);
    document.getElementById('t2row').style.display=k===3?'flex':'none';
    document.getElementById('d2row').style.display=k===3?'flex':'none';
    sync();
  }
  document.getElementById('jce-2r').addEventListener('click',function(){setN(2);});
  document.getElementById('jce-3r').addEventListener('click',function(){setN(3);});

  setN(2);
})();
</script>
</div>
