<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>From 2D to 3D — Lesson 4.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;--vio:#7c3aed;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:270px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 200px;min-width:190px}
  label{font-size:12px;color:var(--muted);display:block;margin:9px 0 4px} input[type=range]{width:100%}
  .tog{font-size:13px;display:flex;gap:7px;align-items:center;margin-top:8px;cursor:pointer}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:12.5px;margin-top:10px}
  .readout div{margin:3px 0;font-variant-numeric:tabular-nums}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 300 250"></svg>
  <div class="panel">
    <label>height z (reach up)</label><input type="range" id="z" min="0" max="0.5" step="0.01" value="0.25">
    <label class="tog"><input type="checkbox" id="flat"> see only the flat map (z hidden)</label>
    <div class="readout" id="out"></div>
    <div class="hint">A floor pose has 3 numbers (x, y, heading). A real 3D pose needs <b>6</b>: three to place it (x, y, z) and three to orient it (roll, pitch, yaw). Hide z and reaching up, tilted fruit, and a slanted camera all collapse to the same flat dot.</div>
  </div>
</div></div>
<script>(function(){
  var W=300,H=250,ox=150,oy=185,s=150,C=Math.cos(Math.PI/6),S=Math.sin(Math.PI/6);
  var svg=document.getElementById("svg"),out=document.getElementById("out"),NS="http://www.w3.org/2000/svg";
  var tx=0.4,ty=0.3,tz=0.25;
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function iso(x,y,z){return [ox+(x-y)*C*s, oy-(x+y)*S*s-z*s];}
  function render(){
    var flat=document.getElementById("flat").checked, z=flat?0:tz;
    svg.innerHTML="";
    for(var g=0;g<=0.6;g+=0.2){var a=iso(g,0,0),b=iso(g,0.6,0);svg.appendChild(el("line",{x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke:"#e2e8f0","stroke-width":1}));
      var cc=iso(0,g,0),d=iso(0.6,g,0);svg.appendChild(el("line",{x1:cc[0],y1:cc[1],x2:d[0],y2:d[1],stroke:"#e2e8f0","stroke-width":1}));}
    var o=iso(0,0,0),ax=iso(0.65,0,0),ay=iso(0,0.65,0),az=iso(0,0,0.55);
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:ax[0],y2:ax[1],stroke:"#94a3b8","stroke-width":1.5}));
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:ay[0],y2:ay[1],stroke:"#94a3b8","stroke-width":1.5}));
    if(!flat) svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:az[0],y2:az[1],stroke:"#7c3aed","stroke-width":1.5}));
    svg.appendChild(el("text",{x:az[0]-4,y:az[1]-5,"font-size":11,fill:flat?"#cbd5e1":"#7c3aed"})).textContent="z";
    var floor=iso(tx,ty,0),top=iso(tx,ty,z);
    svg.appendChild(el("circle",{cx:floor[0],cy:floor[1],r:4,fill:"#cbd5e1"}));
    if(!flat&&z>0.01) svg.appendChild(el("line",{x1:floor[0],y1:floor[1],x2:top[0],y2:top[1],stroke:"#7c3aed","stroke-width":1.3,"stroke-dasharray":"4 3"}));
    svg.appendChild(el("circle",{cx:top[0],cy:top[1],r:11,fill:"#ef4444"}));
    svg.appendChild(el("circle",{cx:top[0],cy:top[1],r:3,fill:"#fff"}));
    out.innerHTML= flat
      ? '<div><b>flat map:</b> ('+tx.toFixed(2)+', '+ty.toFixed(2)+') + heading</div><div style="color:#b91c1c">height &amp; tilt are invisible here — 3 numbers only.</div>'
      : '<div>position: ('+tx.toFixed(2)+', '+ty.toFixed(2)+', <span style="color:#7c3aed">'+tz.toFixed(2)+'</span>) — <b>3</b></div><div>orientation: roll, pitch, yaw — <b>3</b></div><div><b>6 DOF</b> total for a full 3D pose.</div>';
  }
  document.getElementById("z").addEventListener("input",function(e){tz=+e.target.value;render();});
  document.getElementById("flat").addEventListener("change",render);
  render();
})();</script></body></html>
