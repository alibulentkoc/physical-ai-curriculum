<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Singularity Visualizer — Lesson 6.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--arm:#1d4ed8;--joint:#10b981;--grip:#e11d48;--ok:#15803d;--okbg:#dcfce7;--bad:#b91c1c;--badbg:#fee2e2;--warn:#b45309;--warnbg:#fef3c7;--good:#15803d;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:820px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 380px;min-width:300px}
  .panel{flex:1 1 250px;min-width:240px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.7}
  .state{display:inline-block;padding:2px 9px;border-radius:999px;font-weight:700;font-size:12px}
  .state.ok{background:var(--okbg);color:var(--ok)}
  .state.warn{background:var(--warnbg);color:var(--warn)}
  .state.sing{background:var(--badbg);color:var(--bad)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .btn:hover{background:var(--soft)}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 380 320" role="img" aria-label="A two-link arm based at the center. A green double-arrow at the gripper shows the still-possible tangential motion; a red arrow shows the radial direction that is lost as the arm approaches a singularity. Sweep the elbow angle to watch the determinant of the Jacobian go to zero at zero and 180 degrees.">
        <circle cx="150" cy="160" r="140" fill="#ffffff" stroke="var(--line)" stroke-dasharray="3 4"/>
        <polyline id="arm" fill="none" stroke="var(--arm)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle id="elbow" r="4.5" fill="#475569"/>
        <!-- motion arrows -->
        <line id="tang" stroke="var(--good)" stroke-width="2.5" marker-start="url(#g)" marker-end="url(#g)"/>
        <line id="radial" stroke="var(--bad)" stroke-width="2.5" stroke-dasharray="4 3" marker-end="url(#r)"/>
        <defs>
          <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="var(--good)"/></marker>
          <marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="var(--bad)"/></marker>
        </defs>
        <circle cx="150" cy="160" r="6" fill="var(--joint)"/>
        <text x="150" y="181" text-anchor="middle" fill="var(--muted)" font-size="11">base</text>
        <circle id="grip" r="6.5" fill="var(--grip)"/>
      </svg>
      <div class="hint">Sweep the elbow angle θ₂. As θ₂ → 0° (straight) or 180° (folded), <b>det J → 0</b>: the two motion directions collapse and the <b style="color:var(--bad)">radial</b> direction is lost — only the <b style="color:var(--good)">tangential</b> motion survives. These are the workspace boundaries.</div>
    </div>
    <div class="panel">
      <label>shoulder θ₁: <span id="t1V">35</span>°</label><input id="t1" type="range" min="-180" max="180" step="1" value="35">
      <label>elbow θ₂: <span id="t2V">90</span>°</label><input id="t2" type="range" min="0" max="180" step="1" value="90">
      <div class="readout" aria-live="polite" id="msg"></div>
      <div class="readout" id="plot" style="padding:8px"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var L1=0.4, L2=0.3, S=140/0.75, bx=150, by=160;
  var el=function(id){return document.getElementById(id);};
  function rad(d){return d*Math.PI/180;} function deg(r){return r*180/Math.PI;}
  function fk(t1,t2){return [L1*Math.cos(t1)+L2*Math.cos(t1+t2), L1*Math.sin(t1)+L2*Math.sin(t1+t2)];}
  function jac(t1,t2){var s1=Math.sin(t1),s12=Math.sin(t1+t2),c1=Math.cos(t1),c12=Math.cos(t1+t2);
    return [[-L1*s1-L2*s12,-L2*s12],[L1*c1+L2*c12,L2*c12]];}
  function det(t1,t2){return L1*L2*Math.sin(t2);}
  function toPx(p){return [bx+p[0]*S, by-p[1]*S];}

  function draw(){
    var t1=rad(parseFloat(el('t1').value)), t2=rad(parseFloat(el('t2').value));
    el('t1V').textContent=el('t1').value; el('t2V').textContent=el('t2').value;
    var e0=[L1*Math.cos(t1),L1*Math.sin(t1)], g=fk(t1,t2);
    var pe=toPx([0,0]), pel=toPx(e0), pg=toPx(g);
    el('arm').setAttribute('points', [pe,pel,pg].map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '));
    el('elbow').setAttribute('cx',pel[0]); el('elbow').setAttribute('cy',pel[1]);
    el('grip').setAttribute('cx',pg[0]); el('grip').setAttribute('cy',pg[1]);
    // radial direction = outward from base through gripper; tangential = perpendicular
    var ang=Math.atan2(g[1],g[0]); var dJ=det(t1,t2); var dmax=L1*L2;
    var manip=Math.abs(dJ)/dmax; // 0 at singularity, 1 at best
    var rl=18+34*manip;          // radial arrow length grows with conditioning
    var tl=52;                   // tangential always available
    // tangential (perpendicular to radial)
    var ta=ang+Math.PI/2;
    el('tang').setAttribute('x1',(pg[0]+tl*Math.cos(ta)).toFixed(1)); el('tang').setAttribute('y1',(pg[1]-tl*Math.sin(ta)).toFixed(1));
    el('tang').setAttribute('x2',(pg[0]-tl*Math.cos(ta)).toFixed(1)); el('tang').setAttribute('y2',(pg[1]+tl*Math.sin(ta)).toFixed(1));
    // radial outward
    el('radial').setAttribute('x1',pg[0]); el('radial').setAttribute('y1',pg[1]);
    el('radial').setAttribute('x2',(pg[0]+rl*Math.cos(ang)).toFixed(1)); el('radial').setAttribute('y2',(pg[1]-rl*Math.sin(ang)).toFixed(1));
    el('radial').setAttribute('opacity', (0.25+0.75*manip).toFixed(2));
    var badge = manip<0.02 ? '<span class="state sing">singular (det J ≈ 0)</span>'
              : manip<0.18 ? '<span class="state warn">near-singular</span>'
              : '<span class="state ok">well-conditioned</span>';
    el('msg').innerHTML = badge +
      '<br>det J = L₁L₂ sin θ₂ = <b>'+dJ.toFixed(4)+'</b>'+
      '<br>|sin θ₂| = <b>'+Math.abs(Math.sin(t2)).toFixed(3)+'</b>'+
      '<br><span style="color:var(--bad)">radial</span> motion '+(manip<0.02?'<b>lost</b>':'shrinking')+', <span style="color:var(--good)">tangential</span> ok';
    drawPlot(t2);
  }
  function drawPlot(t2cur){
    var w=210,h=70,pad=6; var pts=[];
    for(var d=0; d<=180; d+=3){ var v=Math.abs(Math.sin(rad(d)))*L1*L2; var x=pad+(d/180)*(w-2*pad); var y=h-pad-(v/(L1*L2))*(h-2*pad); pts.push(x.toFixed(1)+','+y.toFixed(1)); }
    var cx=pad+(deg(t2cur)/180)*(w-2*pad);
    el('plot').innerHTML='<div style="font-size:11px;color:var(--muted);margin-bottom:3px">|det J| across θ₂ (0°…180°)</div>'+
      '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="70" role="img" aria-label="The magnitude of the determinant of J as a function of the elbow angle, peaking at 90 degrees and falling to zero at 0 and 180 degrees.">'+
      '<polyline fill="none" stroke="var(--arm)" stroke-width="2" points="'+pts.join(' ')+'"/>'+
      '<line x1="'+cx.toFixed(1)+'" y1="'+pad+'" x2="'+cx.toFixed(1)+'" y2="'+(h-pad)+'" stroke="var(--grip)" stroke-width="1.5" stroke-dasharray="3 2"/>'+
      '<text x="'+pad+'" y="'+(h-1)+'" font-size="8" fill="var(--muted)">0°</text>'+
      '<text x="'+(w-pad-14)+'" y="'+(h-1)+'" font-size="8" fill="var(--muted)">180°</text>'+
      '</svg>';
  }
  ['t1','t2'].forEach(function(id){el(id).addEventListener('input',draw);});
  el('reset').addEventListener('click',function(){el('t1').value=35; el('t2').value=90; draw();});
  draw();
})();
</script>
</body>
</html>
