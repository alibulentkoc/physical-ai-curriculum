<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accuracy vs Precision — Lesson 1.5</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start}
  .board{flex:1 1 300px;min-width:280px}
  .panel{flex:1 1 240px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:13px;color:var(--muted);display:block;margin:12px 0 4px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;margin-top:8px}
  .readout b{font-variant-numeric:tabular-nums}
  .tag{display:inline-block;padding:3px 10px;border-radius:999px;font-weight:700;font-size:12.5px;margin-top:6px}
  .hi{background:#dcfce7;color:#15803d}.lo{background:#fee2e2;color:#b91c1c}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:12px}
  .btn:hover{background:var(--soft)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="board">
      <svg id="board" viewBox="0 0 320 320" role="img" aria-label="A dartboard. Bias moves the cluster off the bullseye (accuracy); scatter spreads the darts (precision).">
        <circle cx="160" cy="160" r="150" fill="#fff" stroke="#cbd5e1"/>
        <circle cx="160" cy="160" r="100" fill="none" stroke="#e2e8f0"/>
        <circle cx="160" cy="160" r="50"  fill="#f1f5f9" stroke="#cbd5e1"/>
        <circle cx="160" cy="160" r="6" fill="#0f172a"/>
        <text x="160" y="305" text-anchor="middle" font-size="11" fill="#64748b">bullseye = true value</text>
        <g id="darts"></g>
      </svg>
      <div class="hint">Adjust the sliders and watch accuracy (bias) and precision (spread) change independently.</div>
    </div>
    <div class="panel">
      <label for="bias">Bias (lowers accuracy): <span id="biasVal">0.40</span></label>
      <input id="bias" type="range" min="0" max="0.9" step="0.01" value="0.40">
      <label for="scatter">Scatter (lowers precision): <span id="scatVal">0.06</span></label>
      <input id="scatter" type="range" min="0.02" max="0.5" step="0.01" value="0.06">
      <div class="readout" aria-live="polite">
        Accuracy: <span id="accTag" class="tag hi">high</span><br>
        Precision: <span id="precTag" class="tag hi">high</span><br>
        <div id="verdict" style="margin-top:8px"></div>
      </div>
      <button id="calib" class="btn">Calibrate (remove bias)</button>
      <button id="reroll" class="btn">Re-throw darts</button>
    </div>
  </div>
</div>
<script>
(function(){
  var CX=160, CY=160, R=150;
  var bias=0.40, scatter=0.06;
  var dartsG=document.getElementById('darts');
  var biasS=document.getElementById('bias'), scatS=document.getElementById('scatter');
  var biasVal=document.getElementById('biasVal'), scatVal=document.getElementById('scatVal');
  var accTag=document.getElementById('accTag'), precTag=document.getElementById('precTag'), verdict=document.getElementById('verdict');
  var seedDarts=[];
  function reseed(){ seedDarts=[]; for(var i=0;i<10;i++){ seedDarts.push([gauss(), gauss()]); } }
  function gauss(){ return (Math.random()+Math.random()+Math.random()+Math.random()-2)/2; } // ~N(0,~0.3)
  function render(){
    biasVal.textContent=bias.toFixed(2); scatVal.textContent=scatter.toFixed(2);
    while(dartsG.firstChild) dartsG.removeChild(dartsG.firstChild);
    // bias offset direction: up-right
    var bx=CX + bias*R*0.6, by=CY - bias*R*0.6;
    seedDarts.forEach(function(d){
      var x=bx + d[0]*scatter*R, y=by + d[1]*scatter*R;
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',4); c.setAttribute('fill','#0f172a');
      dartsG.appendChild(c);
    });
    var accurate = bias < 0.18;
    var precise = scatter < 0.14;
    accTag.textContent=accurate?'high':'low'; accTag.className='tag '+(accurate?'hi':'lo');
    precTag.textContent=precise?'high':'low'; precTag.className='tag '+(precise?'hi':'lo');
    var v;
    if(accurate&&precise) v='Accurate & precise — the goal.';
    else if(!accurate&&precise) v='Precise but not accurate — calibrate out the bias.';
    else if(accurate&&!precise) v='Accurate but not precise — average many readings.';
    else v='Neither — scattered and off.';
    verdict.textContent=v;
  }
  biasS.addEventListener('input',function(){bias=parseFloat(this.value);render();});
  scatS.addEventListener('input',function(){scatter=parseFloat(this.value);render();});
  document.getElementById('calib').addEventListener('click',function(){bias=0.05;biasS.value='0.05';render();});
  document.getElementById('reroll').addEventListener('click',function(){reseed();render();});
  reseed(); render();
})();
</script>
</body>
</html>
