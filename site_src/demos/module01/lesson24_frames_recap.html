<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frames & Coordinates Playground — Lesson 3.8</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 320px;min-width:280px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  .panel{flex:1 1 200px;min-width:190px}
  .seg{display:flex;gap:6px;margin-bottom:10px}
  .seg button{flex:1;appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;font-size:12.5px;font-weight:600;cursor:pointer}
  .seg button.on{color:#fff}
  .seg button.w.on{background:#475569;border-color:#475569}
  .seg button.r.on{background:#0d9488;border-color:#0d9488}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px}
  .readout div{margin:3px 0;font-variant-numeric:tabular-nums}
  .big{font-size:18px;font-weight:700}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg id="svg" viewBox="0 0 320 250"></svg>
    <div class="panel">
      <div class="seg"><button class="w on" id="bw">World frame</button><button class="r" id="br">Robot frame</button></div>
      <div class="readout" id="out"></div>
      <div class="hint">Everything from Unit 3 at once: drag the tomato, switch the <b>frame</b> you read it in, and watch the <b>coordinates</b>, the <b>quadrant</b>, and the <b>distance</b> update — same point, frame-dependent numbers.</div>
    </div>
  </div>
</div>
<script>
(function(){
  var W=320,H=250,s=40;
  var svg=document.getElementById("svg"), out=document.getElementById("out");
  var SVGNS="http://www.w3.org/2000/svg";
  var WF={o:[1.0,0.6],c:"#475569",name:"world"}, RF={o:[4.3,1.9],c:"#0d9488",name:"robot"};
  var tom=[2.6,2.6], frame="w";
  function el(n,a){ var e=document.createElementNS(SVGNS,n); for(var k in a) e.setAttribute(k,a[k]); return e; }
  function sv(p){ return [30+p[0]*s, 215-p[1]*s]; }
  function frameMark(F){
    var c=sv(F.o);
    svg.appendChild(el("line",{x1:c[0],y1:c[1],x2:c[0]+30,y2:c[1],stroke:F.c,"stroke-width":1.5,opacity:0.55}));
    svg.appendChild(el("line",{x1:c[0],y1:c[1],x2:c[0],y2:c[1]-30,stroke:F.c,"stroke-width":1.5,opacity:0.55}));
    svg.appendChild(el("circle",{cx:c[0],cy:c[1],r:5,fill:F.c}));
    var l=el("text",{x:c[0]+6,y:c[1]+14,"font-size":10,fill:F.c}); l.textContent=F.name; svg.appendChild(l);
  }
  function draw(){
    svg.innerHTML="";
    var defs=el("defs",{}); defs.innerHTML='<marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>'; svg.appendChild(defs);
    frameMark(WF); frameMark(RF);
    var F=(frame==="w")?WF:RF, c=sv(F.o), t=sv(tom);
    svg.appendChild(el("line",{x1:c[0],y1:c[1],x2:t[0],y2:t[1],stroke:"#475569","stroke-width":2,"stroke-dasharray":"5 3","marker-end":"url(#ah)"}));
    var dot=el("circle",{cx:t[0],cy:t[1],r:12,fill:"#ef4444"}); dot.style.cursor="grab"; svg.appendChild(dot);
    svg.appendChild(el("circle",{cx:t[0],cy:t[1],r:3,fill:"#fff"}));
    dot.addEventListener("pointerdown",function(e){ dot.setPointerCapture(e.pointerId);
      function mv(ev){ var r=svg.getBoundingClientRect(); var sx=(ev.clientX-r.left)/r.width*W, sy=(ev.clientY-r.top)/r.height*H; tom[0]=Math.max(0.2,Math.min(6.8,(sx-30)/s)); tom[1]=Math.max(0.2,Math.min(4.6,(215-sy)/s)); render(); }
      svg.addEventListener("pointermove",mv); dot.addEventListener("pointerup",function(){ svg.removeEventListener("pointermove",mv); },{once:true});
    });
  }
  function render(){
    draw();
    var F=(frame==="w")?WF:RF, rx=tom[0]-F.o[0], ry=tom[1]-F.o[1];
    var quad = (Math.abs(rx)<0.05||Math.abs(ry)<0.05)?"on an axis":((rx>0?(ry>0?"I":"IV"):(ry>0?"II":"III")));
    var d=Math.sqrt(rx*rx+ry*ry);
    out.innerHTML='<div class="big" style="color:'+F.c+'">in the '+F.name+' frame</div>'+
      '<div>coordinates: <b>('+rx.toFixed(2)+', '+ry.toFixed(2)+')</b></div>'+
      '<div>quadrant: <b>'+quad+'</b></div>'+
      '<div>distance from origin: <b>'+d.toFixed(2)+'</b></div>';
  }
  document.getElementById("bw").addEventListener("click",function(){ frame="w"; this.classList.add("on"); document.getElementById("br").classList.remove("on"); render(); });
  document.getElementById("br").addEventListener("click",function(){ frame="r"; this.classList.add("on"); document.getElementById("bw").classList.remove("on"); render(); });
  render();
})();
</script>
</body>
</html>
