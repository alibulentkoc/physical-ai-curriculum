<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frame Viewpoint Switcher — Lesson 3.5</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;
        --world:#0d9488;--robot:#1d4ed8;--camera:#8b5cf6;--fruit:#e11d48;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 340px;min-width:300px}
  .panel{flex:1 1 240px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  .tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .tab{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 6px;font-size:13px;font-weight:700;cursor:pointer}
  .tab.world.active{background:#ccfbf1;border-color:#5eead4;color:#0f766e}
  .tab.robot.active{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
  .tab.camera.active{background:#ede9fe;border-color:#c4b5fd;color:#7c3aed}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;margin-top:8px}
  .readout b{font-variant-numeric:tabular-nums}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:10px}
  .btn:hover{background:var(--soft)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .key{font-size:13px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 380 360" role="application" aria-label="A fixed tomato in a greenhouse. Switch the active frame (world, robot, camera) to see its coordinates change while it stays put. Drag the robot to move the local frames.">
        <rect x="8" y="8" width="364" height="344" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
        <!-- world frame axes (fixed at bottom-left corner) -->
        <g id="gWorld">
          <line x1="40" y1="320" x2="150" y2="320" stroke="#0d9488" stroke-width="2"/>
          <line x1="40" y1="320" x2="40" y2="210" stroke="#0d9488" stroke-width="2"/>
          <text x="44" y="338" font-size="11" fill="#0f766e">world</text>
        </g>
        <!-- robot (draggable) with robot + camera frames -->
        <g id="gRobot">
          <line id="rax" x1="0" y1="0" x2="0" y2="0" stroke="#1d4ed8" stroke-width="2"/>
          <line id="ray" x1="0" y1="0" x2="0" y2="0" stroke="#1d4ed8" stroke-width="2"/>
          <rect id="robotBody" x="0" y="0" width="20" height="20" rx="4" fill="#1d4ed8" style="cursor:grab" tabindex="0" aria-label="robot, draggable"/>
          <text id="robotLbl" x="0" y="0" font-size="11" fill="#1d4ed8">robot</text>
          <line id="cax" x1="0" y1="0" x2="0" y2="0" stroke="#8b5cf6" stroke-width="2"/>
          <line id="cay" x1="0" y1="0" x2="0" y2="0" stroke="#8b5cf6" stroke-width="2"/>
          <rect id="camBody" x="0" y="0" width="13" height="13" rx="2" fill="#8b5cf6"/>
          <text id="camLbl" x="0" y="0" font-size="11" fill="#7c3aed">camera</text>
        </g>
        <!-- the tomato (FIXED in the world) -->
        <circle id="tomato" cx="280" cy="150" r="12" fill="#e11d48"/>
        <text x="280" y="134" text-anchor="middle" font-size="11" fill="#64748b">tomato (fixed)</text>
        <!-- active-frame origin highlight ring -->
        <circle id="ring" cx="0" cy="0" r="0" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="3 3"/>
      </svg>
      <div class="hint">Switch the frame to re-read the tomato. Drag the robot — the world reading never changes.</div>
    </div>
    <div class="panel">
      <div class="tabs">
        <button class="tab world active" data-f="world">World</button>
        <button class="tab robot" data-f="robot">Robot</button>
        <button class="tab camera" data-f="camera">Camera</button>
      </div>
      <div class="readout" aria-live="polite">
        Tomato in <span id="fname" class="key" style="color:#0f766e">world</span> frame:<br>
        <b id="coords" style="font-size:18px">(2.00, 1.50)</b> m
        <div id="note" class="hint" style="margin-top:8px">The tomato has not moved — only the frame you're reading from changed.</div>
      </div>
      <button id="reset" class="btn">Reset robot position</button>
    </div>
  </div>
</div>
<script>
(function(){
  // pixel scale: 100 px = 1.0 m; world origin at pixel (40,320)
  var WOX=40, WOY=320, S=100;
  function toM(px,py){ return [ (px-WOX)/S, (WOY-py)/S ]; }   // pixel -> world meters
  function toPx(mx,my){ return [ WOX+mx*S, WOY-my*S ]; }       // world meters -> pixel
  // tomato fixed in world (pixels)
  var tomatoPx=[280,150];
  // robot position in pixels (its origin)
  var robotPx=[170,300];
  // camera mounted offset from robot (pixels): a little up and right
  var camOffset=[28,-40];
  var active='world';

  var scene=document.getElementById('scene');
  var rb=document.getElementById('robotBody'), rlbl=document.getElementById('robotLbl');
  var rax=document.getElementById('rax'), ray=document.getElementById('ray');
  var cb=document.getElementById('camBody'), clbl=document.getElementById('camLbl');
  var cax=document.getElementById('cax'), cay=document.getElementById('cay');
  var ring=document.getElementById('ring');
  var fname=document.getElementById('fname'), coords=document.getElementById('coords');
  var colors={world:'#0f766e',robot:'#1d4ed8',camera:'#7c3aed'};

  function render(){
    // robot frame visuals
    var rx=robotPx[0], ry=robotPx[1];
    rb.setAttribute('x',rx-10); rb.setAttribute('y',ry-10);
    rlbl.setAttribute('x',rx-12); rlbl.setAttribute('y',ry+26);
    rax.setAttribute('x1',rx);rax.setAttribute('y1',ry);rax.setAttribute('x2',rx+70);rax.setAttribute('y2',ry);
    ray.setAttribute('x1',rx);ray.setAttribute('y1',ry);ray.setAttribute('x2',rx);ray.setAttribute('y2',ry-70);
    // camera frame visuals (offset on robot)
    var cx=rx+camOffset[0], cy=ry+camOffset[1];
    cb.setAttribute('x',cx-6); cb.setAttribute('y',cy-6);
    clbl.setAttribute('x',cx-8); clbl.setAttribute('y',cy-12);
    cax.setAttribute('x1',cx);cax.setAttribute('y1',cy);cax.setAttribute('x2',cx+55);cax.setAttribute('y2',cy-8);
    cay.setAttribute('x1',cx);cay.setAttribute('y1',cy);cay.setAttribute('x2',cx+10);cay.setAttribute('y2',cy-52);
    // coordinates of tomato in the active frame
    var origin = active==='world'? [WOX,WOY] : active==='robot'? [rx,ry] : [cx,cy];
    var c = [ (tomatoPx[0]-origin[0])/S, (origin[1]-tomatoPx[1])/S ];
    fname.textContent=active; fname.style.color=colors[active];
    coords.textContent='('+c[0].toFixed(2)+', '+c[1].toFixed(2)+')';
    coords.style.color=colors[active];
    ring.setAttribute('cx',origin[0]);ring.setAttribute('cy',origin[1]);ring.setAttribute('r',16);
    ring.setAttribute('stroke',colors[active]);
  }
  // tabs
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(t){
    t.addEventListener('click',function(){
      active=t.dataset.f;
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      t.classList.add('active'); render();
    });
  });
  // drag robot
  var drag=false;
  function pt(e){var r=scene.getBoundingClientRect();return [ (e.clientX-r.left)/r.width*380, (e.clientY-r.top)/r.height*360 ];}
  rb.addEventListener('pointerdown',function(e){drag=true;rb.style.cursor='grabbing';if(e.cancelable)e.preventDefault();});
  window.addEventListener('pointermove',function(e){ if(!drag)return; var p=pt(e);
    robotPx=[Math.max(60,Math.min(300,p[0])), Math.max(120,Math.min(320,p[1]))]; render(); });
  window.addEventListener('pointerup',function(){drag=false;rb.style.cursor='grab';});
  rb.addEventListener('keydown',function(e){var s=8,m=true;
    if(e.key==='ArrowLeft')robotPx[0]-=s;else if(e.key==='ArrowRight')robotPx[0]+=s;
    else if(e.key==='ArrowUp')robotPx[1]-=s;else if(e.key==='ArrowDown')robotPx[1]+=s;else m=false;
    if(m){e.preventDefault();robotPx=[Math.max(60,Math.min(300,robotPx[0])),Math.max(120,Math.min(320,robotPx[1]))];render();}});
  document.getElementById('reset').addEventListener('click',function(){robotPx=[170,300];render();});
  render();
})();
</script>
</body>
</html>
