<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#94a3b8}.p{font-size:12px;font-weight:700}.s{font-size:12.5px;font-weight:700;fill:#334155}</style></defs>
  <text x="360.0" y="28" text-anchor="middle" class="t">Pre-Validating Actions in the Twin</text>
  <text x="360.0" y="46" text-anchor="middle" class="c">rehearse the action in the twin before committing it</text>
  <rect x="30" y="92" width="150" height="70" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="105" y="122" text-anchor="middle" class="p" fill="#1d4ed8">candidate</text>
  <text x="105" y="140" text-anchor="middle" class="p" fill="#1d4ed8">action</text>
  <rect x="215" y="92" width="170" height="70" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.2" stroke-dasharray="7 4"/>
  <text x="300" y="120" text-anchor="middle" class="p" fill="#0d9488">rehearse in twin</text>
  <text x="300" y="140" text-anchor="middle" class="c">run-ahead</text>
  <rect x="420" y="92" width="150" height="70" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2.2"/>
  <text x="495" y="120" text-anchor="middle" class="p" fill="#a16207">predicted</text>
  <text x="495" y="140" text-anchor="middle" class="p" fill="#a16207">outcome</text>
  <rect x="605" y="72" width="90" height="50" rx="12" fill="#ecfdf5" stroke="#15803d" stroke-width="2.2"/>
  <text x="650" y="102" text-anchor="middle" class="p" fill="#15803d">accept →</text>
  <text x="650" y="118" text-anchor="middle" class="c">reality</text>
  <rect x="605" y="138" width="90" height="50" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.2"/>
  <text x="650" y="168" text-anchor="middle" class="p" fill="#dc2626">reject →</text>
  <text x="650" y="184" text-anchor="middle" class="c">stop</text>
  <path d="M180,127 L213,127" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
  <path d="M385,127 L418,127" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
  <path d="M570,112 L603,100" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
  <path d="M570,142 L603,160" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="360.0" y="232" text-anchor="middle" class="c">a forecast + a stated accept/reject rule &#183; reuses simulate &#183; not learning, not optimization</text>
  <text x="360.0" y="260" text-anchor="middle" class="c" fill="#b45309">the real robot performs only accepted actions</text>
</svg>
