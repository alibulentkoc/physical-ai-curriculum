<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A 3-DOF arm with a base swivel and two in-plane revolute joints, frames assigned, and the resulting three-row DH table beside it.">
  <defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}.m{font-family:monospace;font-size:11.5px;fill:#0f172a}.z{font-size:11px;font-weight:800;fill:#0d9488}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Reading a 3-DOF arm into a DH table</text>
  <!-- base swivel about vertical -->
  <line x1="120" y1="240" x2="120" y2="150" stroke="#0d9488" stroke-width="2.5"/><text x="100" y="150" class="z">z0</text>
  <ellipse cx="120" cy="240" rx="36" ry="12" fill="none" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <text x="120" y="262" text-anchor="middle" class="c">base swivel θ1 (α1=90°)</text>
  <!-- riser d1 -->
  <line x1="120" y1="150" x2="120" y2="135" stroke="#7c3aed" stroke-width="3"/><text x="130" y="142" class="c">d1=0.1</text>
  <!-- shoulder + elbow in plane -->
  <circle cx="120" cy="135" r="5" fill="#10b981"/>
  <line x1="120" y1="135" x2="210" y2="95" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/><text x="150" y="105" class="c">a2=0.4</text>
  <circle cx="210" cy="95" r="5" fill="#10b981"/>
  <line x1="210" y1="95" x2="280" y2="70" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/><text x="240" y="72" class="c">a3=0.3</text>
  <circle cx="280" cy="70" r="6" fill="#e11d48"/>
  <!-- table -->
  <rect x="380" y="70" width="290" height="120" rx="9" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="525" y="92" text-anchor="middle" class="b">DH table (standard)</text>
  <text x="400" y="116" class="m">i   θ     d     a     α</text>
  <text x="400" y="138" class="m">1   θ1   0.1    0    90°</text>
  <text x="400" y="158" class="m">2   θ2    0    0.4    0</text>
  <text x="400" y="178" class="m">3   θ3    0    0.3    0</text>
  <text x="350" y="252" text-anchor="middle" class="c">Joint axes → z; links → x (a=length); perpendicular base axis → α=90°; parallel planar axes → α=0.</text>
</svg>
