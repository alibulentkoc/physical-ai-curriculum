<svg viewBox="0 0 640 234" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The complete robotics workflow as the artifact chain Goal, Path, Trajectory, Validation, Execution, with the four actions Plan, Parameterize, Validate, Execute labeled beneath their arrows, each stage labeled with its output and source unit, Execution handing an open-loop reference to Module 8">
<title>The complete robotics workflow as the artifact chain Goal, Path, Trajectory, Validation, Execution, with the four actions Plan, Parameterize, Validate, Execute labeled beneath their arrows, each stage labeled with its output and source unit, Execution handing an open-loop reference to Module 8</title>
<rect width="640" height="234" fill="white"/><text x="320" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="650" fill="#0f172a">The complete robotics workflow: Goal → Path → Trajectory → Validation → Execution</text><rect x="18.0" y="58" width="104" height="70" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/><text x="70.0" y="84" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="650" fill="#64748b">Goal</text><text x="70.0" y="104" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">the task</text><line x1="125.0" y1="93" x2="140.0" y2="93" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/><rect x="143.0" y="58" width="104" height="70" rx="8" fill="#f8fafc" stroke="#0ea5e9" stroke-width="2"/><text x="195.0" y="84" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="650" fill="#0ea5e9">Path</text><text x="195.0" y="104" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">collision-free (U6)</text><line x1="250.0" y1="93" x2="265.0" y2="93" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/><rect x="268.0" y="58" width="104" height="70" rx="8" fill="#f8fafc" stroke="#0d9488" stroke-width="2"/><text x="320.0" y="84" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="650" fill="#0d9488">Trajectory</text><text x="320.0" y="104" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">timed (U2-5)</text><line x1="375.0" y1="93" x2="390.0" y2="93" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/><rect x="393.0" y="58" width="104" height="70" rx="8" fill="#f8fafc" stroke="#10b981" stroke-width="2"/><text x="445.0" y="84" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="650" fill="#10b981">Validation</text><text x="445.0" y="104" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">checklist (U7)</text><line x1="500.0" y1="93" x2="515.0" y2="93" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/><rect x="518.0" y="58" width="104" height="70" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/><text x="570.0" y="84" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="650" fill="#8b5cf6">Execution</text><text x="570.0" y="104" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">reference → M8</text><defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs><text x="132.5" y="150" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="650" fill="#0ea5e9">PLAN</text><line x1="132.5" y1="130" x2="132.5" y2="138" stroke="#0ea5e9" stroke-width="1.2"/><text x="257.5" y="150" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="650" fill="#0d9488">PARAMETERIZE</text><line x1="257.5" y1="130" x2="257.5" y2="138" stroke="#0d9488" stroke-width="1.2"/><text x="382.5" y="150" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="650" fill="#10b981">VALIDATE</text><line x1="382.5" y1="130" x2="382.5" y2="138" stroke="#10b981" stroke-width="1.2"/><text x="507.5" y="150" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="650" fill="#8b5cf6">EXECUTE</text><line x1="507.5" y1="130" x2="507.5" y2="138" stroke="#8b5cf6" stroke-width="1.2"/><text x="320" y="178" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9.5" font-weight="400" fill="#64748b">boxes = artifacts · labels below = the four actions that produce them · each stage = an earlier unit</text><text x="320" y="200" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#b91c1c">Execute = open-loop reference handoff; tracking is Module 8</text>
</svg>
