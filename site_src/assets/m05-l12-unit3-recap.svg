<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A one-panel Unit 3 summary: a closed-form pipeline target to theta2 to theta1 to two solutions, a spherical-wrist decoupling branch, and a dashed gate marking where arbitrary or redundant arms require numerical methods in Unit 4.">
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b5cf6"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">Unit 3: the analytical toolkit and its boundary</text>
<rect x="30" y="60" width="110" height="44" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="85" y="86" text-anchor="middle" class="b">target</text>
<line x1="142" y1="82" x2="172" y2="82" stroke="#0d9488" stroke-width="2" marker-end="url(#ar)"/>
<rect x="174" y="60" width="150" height="44" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="249" y="80" text-anchor="middle" class="b">law of cosines</text><text x="249" y="96" text-anchor="middle" class="c">θ₂ (±)</text>
<line x1="326" y1="82" x2="356" y2="82" stroke="#0d9488" stroke-width="2" marker-end="url(#ar)"/>
<rect x="358" y="60" width="120" height="44" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="418" y="80" text-anchor="middle" class="b">atan2</text><text x="418" y="96" text-anchor="middle" class="c">θ₁</text>
<line x1="480" y1="82" x2="510" y2="82" stroke="#0d9488" stroke-width="2" marker-end="url(#ar)"/>
<text x="560" y="78" text-anchor="middle" class="b">two</text><text x="560" y="94" text-anchor="middle" class="b">solutions</text>
<rect x="174" y="130" width="220" height="40" rx="9" fill="#faf5ff" stroke="#e9d5ff"/><text x="284" y="155" text-anchor="middle" class="b" fill="#8b5cf6">spherical wrist → position then orientation</text>
<line x1="249" y1="106" x2="249" y2="128" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3 3"/>
<rect x="150" y="200" width="360" height="42" rx="9" fill="#fff7ed" stroke="#fed7aa" stroke-dasharray="6 4"/>
<text x="330" y="226" text-anchor="middle" class="b" fill="#b45309">arbitrary / redundant arm → numerical methods (Unit 4)</text>
</svg>
