<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three stacked panels sharing a time axis: top, a step response where a plain integrator winds up and overshoots far past the target while an anti-windup clamp settles near the target; middle, the integrator value ballooning for the plain case and bounded under the clamp; bottom, the delivered effort pinned flat at the saturation ceiling during the climb">
