<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A faux-3D scene with a world frame, a gripper with its own coordinate frame, and a tomato with its own frame; each little frame is one SE(3) pose.">
  <defs>
    <marker id="pa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.l{font-size:12px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">A pose = position + orientation = one little frame</text>
  <polygon points="60,270 360,270 470,225 170,225" fill="#f1f5f9" stroke="#cbd5e1"/>
  <!-- world frame -->
  <g transform="translate(120,250)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#e11d48" stroke-width="2" marker-end="url(#pa)"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#1d4ed8" stroke-width="2" marker-end="url(#pa)"/>
    <circle r="3" fill="#0f172a"/>
  </g>
  <text x="120" y="290" text-anchor="middle" class="c">world frame</text>
  <!-- gripper frame -->
  <g transform="translate(330,170) rotate(-30)">
    <line x1="0" y1="0" x2="26" y2="0" stroke="#e11d48" stroke-width="2.5" marker-end="url(#pa)"/>
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#pa)"/>
    <circle r="3.5" fill="#0f172a"/>
  </g>
  <text x="330" y="150" text-anchor="middle" class="l">gripper pose</text>
  <!-- tomato frame -->
  <circle cx="470" cy="190" r="11" fill="#e11d48"/>
  <g transform="translate(470,190) rotate(40)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#pa)"/>
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#0d9488" stroke-width="2.2" marker-end="url(#pa)"/>
  </g>
  <text x="500" y="175" text-anchor="middle" class="l">tomato pose</text>
  <text x="340" y="316" text-anchor="middle" class="c">Each object's pose is one SE(3) element: where it is (origin) + which way it faces (axes).</text>
</svg>
