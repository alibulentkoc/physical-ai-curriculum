<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">w = ellipsoid volume: one number for overall freedom (with a blind spot)</text>
  <line x1="507" y1="42" x2="507" y2="280" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- three ellipses -->
  <text x="253" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">three ellipses, three w</text>
  <circle cx="110" cy="160" r="40" fill="#dcfce7" stroke="#16a34a" stroke-width="2.4"/><text x="110" y="222" text-anchor="middle" font-size="11.5" fill="#16a34a">large w (round)</text>
  <ellipse cx="253" cy="160" rx="52" ry="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.4"/><text x="253" y="222" text-anchor="middle" font-size="11.5" fill="#ca8a04">smaller w</text>
  <ellipse cx="400" cy="160" rx="58" ry="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2.4"/><text x="400" y="222" text-anchor="middle" font-size="11.5" fill="#dc2626">w &#8594; 0 (near singular)</text>
  <!-- heatmap idea -->
  <text x="634" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">w across the workspace</text>
  <defs><linearGradient id="hm" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1e3a8a"/><stop offset="0.5" stop-color="#22c55e"/><stop offset="1" stop-color="#1e3a8a"/></linearGradient></defs>
  <path d="M 560 200 A 75 75 0 0 1 710 200 Z" fill="url(#hm)" opacity="0.85"/>
  <text x="634" y="222" text-anchor="middle" font-size="11" fill="#6b7280">dark = low w (near singular loci)</text>
  <text x="634" y="252" text-anchor="middle" font-size="11" fill="#6b7280">w can't tell round from thin (use condition number, L6.3)</text>
  <text x="253" y="252" text-anchor="middle" font-size="11" fill="#6b7280">middle &amp; this could share equal w &#8212; shape differs</text>
</svg>
