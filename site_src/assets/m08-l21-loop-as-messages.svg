<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The feedback loop redrawn as three separate subsystems, a sensor node, a controller node, and an actuator node, connected by labelled message arrows joint slash state and joint slash command, each tagged with a per-hop time and a clock; a running total of the loop latency as the sum of hops; and a faint human nervous-system silhouette beside it as the analogy with a note that it is an analogy not a model">
<title>The feedback loop redrawn as three separate subsystems, a sensor node, a controller node, and an actuator node, connected by labelled message arrows joint slash state and joint slash command, each tagged with a per-hop time and a clock; a running total of the loop latency as the sum of hops; and a faint human nervous-system silhouette beside it as the analogy with a note that it is an analogy not a model</title>
<rect width="680" height="380" fill="white"/>
<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker><marker id="ahs" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#0ea5e9"/></marker><marker id="ahe" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#10b981"/></marker></defs>
<text x="230" y="24" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="15" font-weight="650" fill="#0f172a">The loop as messages: each arrow takes time</text>
<rect x="32" y="116" width="116" height="68" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
<text x="90" y="146" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Sensor</text>
<text x="90" y="161" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">node</text>
<rect x="242" y="116" width="116" height="68" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
<text x="300" y="146" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Controller</text>
<text x="300" y="161" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">node</text>
<rect x="452" y="116" width="116" height="68" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
<text x="510" y="146" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Actuator</text>
<text x="510" y="161" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#0f172a">node</text>
<line x1="148" y1="150" x2="242" y2="150" stroke="#0ea5e9" stroke-width="2.0" marker-end="url(#ahs)"/>
<text x="195" y="140" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0ea5e9">joint/state</text>
<text x="195" y="166" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#d97706">h₁</text>
<line x1="358" y1="150" x2="452" y2="150" stroke="#0ea5e9" stroke-width="2.0" marker-end="url(#ahs)"/>
<text x="405" y="140" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0ea5e9">joint/command</text>
<text x="405" y="166" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#d97706">h₂</text>
<path d="M510,184 C510,260 90,260 90,184" fill="none" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ah)"/>
<text x="300" y="255" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#0d9488">joint moves → sensed again (h₃)</text>
<circle cx="195" cy="180" r="7" fill="white" stroke="#d97706" stroke-width="1.4"/>
<line x1="195" y1="180" x2="195" y2="175" stroke="#d97706" stroke-width="1.3"/>
<line x1="195" y1="180" x2="199" y2="180" stroke="#d97706" stroke-width="1.3"/>
<circle cx="405" cy="180" r="7" fill="white" stroke="#d97706" stroke-width="1.4"/>
<line x1="405" y1="180" x2="405" y2="175" stroke="#d97706" stroke-width="1.3"/>
<line x1="405" y1="180" x2="409" y2="180" stroke="#d97706" stroke-width="1.3"/>
<rect x="250" y="300" width="330" height="40" rx="8" fill="#f1f5f9" stroke="#0f172a" stroke-width="1.4"/>
<text x="415" y="325" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#0f172a">loop latency  τ_loop = h₁ + h₂ + h₃  (physical source of latency)</text>
<circle cx="600" cy="70" r="12" fill="white" stroke="#64748b" stroke-width="1.4"/>
<text x="600" y="74" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="7" font-weight="400" fill="#64748b">ear</text>
<line x1="600" y1="82" x2="600" y2="110" stroke="#64748b" stroke-width="1.4" stroke-dasharray="3 3"/>
<rect x="584" y="110" width="32" height="24" rx="6" fill="white" stroke="#64748b" stroke-width="1.4"/>
<text x="600" y="126" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="8" font-weight="400" fill="#64748b">brain</text>
<line x1="600" y1="134" x2="600" y2="160" stroke="#64748b" stroke-width="1.4" stroke-dasharray="3 3"/>
<circle cx="600" cy="172" r="11" fill="white" stroke="#64748b" stroke-width="1.4"/>
<text x="600" y="176" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="7" font-weight="400" fill="#64748b">muscle</text>
<text x="600" y="200" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="600" fill="#64748b">analogy,</text>
<text x="600" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">not a model</text>
</svg>
