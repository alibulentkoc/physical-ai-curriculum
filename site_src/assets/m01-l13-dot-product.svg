<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The dot product measures alignment: large and positive when vectors point the same way, zero when perpendicular, negative when opposed.">
  <defs>
    <marker id="d1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0ea5e9"/></marker>
    <marker id="d2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b5cf6"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.h{font-size:13px;font-weight:700;fill:#0f172a}.c{font-size:12px;fill:#64748b}</style>
  </defs>
  <text x="350" y="28" text-anchor="middle" class="t">Dot product = alignment</text>
  <!-- aligned -->
  <text x="120" y="70" text-anchor="middle" class="h">aligned (θ≈0)</text>
  <line x1="60" y1="170" x2="180" y2="150" stroke="#0ea5e9" stroke-width="3" marker-end="url(#d1)"/>
  <line x1="60" y1="180" x2="175" y2="165" stroke="#8b5cf6" stroke-width="3" marker-end="url(#d2)"/>
  <text x="120" y="230" text-anchor="middle" class="c">a·b large +</text>
  <text x="120" y="248" text-anchor="middle" class="c">gripper faces fruit</text>
  <!-- perpendicular -->
  <text x="350" y="70" text-anchor="middle" class="h">perpendicular (θ=90°)</text>
  <line x1="350" y1="190" x2="350" y2="90" stroke="#0ea5e9" stroke-width="3" marker-end="url(#d1)"/>
  <line x1="300" y1="190" x2="420" y2="190" stroke="#8b5cf6" stroke-width="3" marker-end="url(#d2)"/>
  <text x="350" y="230" text-anchor="middle" class="c">a·b = 0</text>
  <text x="350" y="248" text-anchor="middle" class="c">facing across</text>
  <!-- opposed -->
  <text x="580" y="70" text-anchor="middle" class="h">opposed (θ≈180°)</text>
  <line x1="520" y1="160" x2="640" y2="150" stroke="#0ea5e9" stroke-width="3" marker-end="url(#d1)"/>
  <line x1="640" y1="180" x2="520" y2="172" stroke="#8b5cf6" stroke-width="3" marker-end="url(#d2)"/>
  <text x="580" y="230" text-anchor="middle" class="c">a·b negative −</text>
  <text x="580" y="248" text-anchor="middle" class="c">facing away</text>
  <text x="350" y="294" text-anchor="middle" class="c">a·b = |a||b|cos θ = aₓbₓ + a_yb_y. Sign and size tell you how aligned two directions are.</text>
</svg>
