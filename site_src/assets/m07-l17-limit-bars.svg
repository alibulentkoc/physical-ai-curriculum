<svg viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Peak speed and acceleration bars against limit lines: feasible at a long duration, infeasible at a short duration">
<title>Peak speed and acceleration bars against limit lines: feasible at a long duration, infeasible at a short duration</title>
<rect width="420" height="260" fill="white"/>
<text x="210" y="26" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="650" fill="#0f172a">Feasibility: peaks vs limits (shrink T → peaks grow)</text>
<text x="80" y="52" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#10b981">long T: feasible</text><rect x="28" y="147" width="50" height="65" fill="#10b981"/><line x1="16" y1="140" x2="90" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/><text x="53" y="227" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">speed</text><text x="53" y="141.2" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#10b981">0.90</text><rect x="102" y="172" width="50" height="40" fill="#10b981"/><line x1="90" y1="140" x2="164" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/><text x="127" y="227" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">accel</text><text x="127" y="166.09354939361307" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#10b981">1.11</text><text x="160" y="136.0" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">limit</text><line x1="16" y1="212" x2="164" y2="212" stroke="#e2e8f0"/>
<text x="290" y="52" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="650" fill="#b91c1c">short T: infeasible</text><rect x="238" y="92" width="50" height="120" fill="#b91c1c"/><line x1="226" y1="140" x2="300" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/><text x="263" y="227" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">speed</text><text x="263" y="86" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#b91c1c">2.25</text><rect x="312" y="92" width="50" height="120" fill="#b91c1c"/><line x1="300" y1="140" x2="374" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/><text x="337" y="227" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#64748b">accel</text><text x="337" y="86" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" fill="#b91c1c">6.93</text><text x="370" y="136.0" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="9" font-weight="400" fill="#64748b">limit</text><line x1="226" y1="212" x2="374" y2="212" stroke="#e2e8f0"/>
<text x="105" y="238" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#10b981">both bars under limits</text>
<text x="315" y="238" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#b91c1c">bars cross limits (v∝1/T, a∝1/T²)</text>
</svg>
