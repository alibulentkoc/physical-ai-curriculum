<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 270" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A practical numerical inverse-kinematics solver as one loop: measure error, choose step rule Newton or damped least squares by conditioning, adapt step size by line search, step, check tolerance and iteration cap, with a status output of converged, max-iterations, or diverged.">
<defs><marker id="al" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10.5px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">A dependable numerical solver: one loop, three choices</text>
<rect x="40" y="55" width="150" height="50" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="115" y="78" text-anchor="middle" class="b">measure e</text><text x="115" y="96" text-anchor="middle" class="c">e = p_target − f(θ)</text>
<rect x="220" y="55" width="180" height="50" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="310" y="78" text-anchor="middle" class="b">choose step</text><text x="310" y="96" text-anchor="middle" class="c">Newton ⇄ DLS (conditioning)</text>
<rect x="430" y="55" width="190" height="50" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="525" y="78" text-anchor="middle" class="b">adapt α (line search)</text><text x="525" y="96" text-anchor="middle" class="c">then θ ← θ + αΔθ</text>
<line x1="192" y1="80" x2="218" y2="80" stroke="#0d9488" stroke-width="2" marker-end="url(#al)"/>
<line x1="402" y1="80" x2="428" y2="80" stroke="#0d9488" stroke-width="2" marker-end="url(#al)"/>
<rect x="220" y="140" width="180" height="46" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="310" y="162" text-anchor="middle" class="b">check tol / max_iter</text><text x="310" y="179" text-anchor="middle" class="c">loop back or stop</text>
<line x1="525" y1="106" x2="525" y2="163" stroke="#94a3b8" stroke-width="1.5"/><line x1="525" y1="163" x2="402" y2="163" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#al)"/>
<line x1="310" y1="138" x2="310" y2="107" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#al)"/>
<rect x="430" y="150" width="190" height="40" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="525" y="175" text-anchor="middle" class="b">status: converged / max_iter / diverged</text>
<text x="330" y="220" text-anchor="middle" class="c">The Jacobian (local linear map) powers every step rule.</text>
</svg>
