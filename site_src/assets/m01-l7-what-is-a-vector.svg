<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A vector drawn as an arrow from the gripper to a tomato, carrying both a length (magnitude) and a heading (direction).">
  <defs><marker id="av7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:14px;font-weight:600;fill:#334155}.c{font-size:12px;fill:#64748b}</style></defs>
  <text x="310" y="30" text-anchor="middle" class="t">A vector = magnitude + direction</text>
  <line x1="70" y1="300" x2="560" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="70" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="548" y="320" class="c">right (m)</text><text x="78" y="72" class="c">up (m)</text>
  <rect x="61" y="291" width="18" height="18" rx="3" fill="#0f172a"/><text x="44" y="332" class="c">gripper (origin)</text>
  <circle cx="430" cy="140" r="13" fill="#e11d48"/><text x="450" y="144" class="l">tomato</text>
  <line x1="70" y1="300" x2="418" y2="150" stroke="#0d9488" stroke-width="3" marker-end="url(#av7)"/>
  <text x="225" y="210" class="l" fill="#0d9488" transform="rotate(-23 225 210)">the vector (an arrow)</text>
  <text x="300" y="250" class="c">length = magnitude ("how far") · heading = direction ("which way")</text>
  <text x="310" y="344" text-anchor="middle" class="c">Reverse the arrow and it points the other way — that is why direction is part of the quantity.</text>
</svg>
