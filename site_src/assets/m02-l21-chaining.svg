<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Three frames camera, arm, world linked by transforms T1 and T2, collapsing into one combined matrix T2 times T1 applied to a tomato in one step.">
  <defs>
    <marker id="c1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:17px;font-weight:700;fill:#0f172a}.c{font-size:11.5px;fill:#64748b}.l{font-size:12.5px;font-weight:700}.k{font-size:12.5px;font-weight:800;fill:#0f766e}</style>
  </defs>
  <text x="340" y="26" text-anchor="middle" class="t">Chaining transforms: a path collapses into one matrix</text>
  <!-- frames -->
  <rect x="40" y="70" width="140" height="56" rx="9" fill="#8b5cf622" stroke="#8b5cf6"/><text x="110" y="103" text-anchor="middle" class="l" fill="#7c3aed">camera</text>
  <rect x="270" y="70" width="140" height="56" rx="9" fill="#1d4ed822" stroke="#1d4ed8"/><text x="340" y="103" text-anchor="middle" class="l" fill="#1d4ed8">arm</text>
  <rect x="500" y="70" width="140" height="56" rx="9" fill="#0d948822" stroke="#0d9488"/><text x="570" y="103" text-anchor="middle" class="l" fill="#0f766e">world</text>
  <line x1="180" y1="98" x2="268" y2="98" stroke="#0f172a" stroke-width="1.8" marker-end="url(#c1)"/><text x="224" y="88" text-anchor="middle" class="c">T1</text>
  <line x1="410" y1="98" x2="498" y2="98" stroke="#0f172a" stroke-width="1.8" marker-end="url(#c1)"/><text x="454" y="88" text-anchor="middle" class="c">T2</text>
  <circle cx="110" cy="150" r="9" fill="#e11d48"/><text x="110" y="172" text-anchor="middle" class="c">tomato (camera)</text>
  <!-- collapsed -->
  <rect x="200" y="210" width="280" height="50" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <text x="340" y="240" text-anchor="middle" class="k">combined = T2 · T1 (apply T1 first)</text>
  <line x1="120" y1="160" x2="200" y2="230" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#c1)"/>
  <line x1="480" y1="235" x2="560" y2="160" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#c1)"/>
  <text x="570" y="172" text-anchor="middle" class="c">tomato (world)</text>
  <text x="340" y="296" text-anchor="middle" class="c">Compute the product once; apply the single matrix to every detected point.</text>
</svg>
