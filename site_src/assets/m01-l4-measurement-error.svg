<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Error is the gap between measured and true value. Systematic error is a consistent shift; random error is scatter around the true value.">
  <defs>
    <style>
      .t{font-size:18px;font-weight:700;fill:#0f172a}
      .h{font-size:14px;font-weight:700;fill:#0f172a}
      .l{font-size:13px;fill:#334155}
      .c{font-size:12px;fill:#64748b}
      .axis{stroke:#94a3b8;stroke-width:1.5}
      .panel{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5;rx:12}
    </style>
  </defs>
  <text x="380" y="30" text-anchor="middle" class="t">Error = measured &#8722; true, and it comes in two kinds</text>

  <!-- top: number line gap -->
  <line class="axis" x1="60" y1="80" x2="700" y2="80"/>
  <circle cx="360" cy="80" r="6" fill="#0f172a"/><text x="345" y="68" class="l">true</text>
  <circle cx="300" cy="80" r="6" fill="#0ea5e9"/><text x="262" y="68" class="l">measured</text>
  <line x1="300" y1="80" x2="360" y2="80" stroke="#e11d48" stroke-width="3"/>
  <text x="312" y="102" class="c" fill="#b91c1c">absolute error</text>

  <!-- systematic -->
  <rect class="panel" x="60" y="130" width="300" height="180" rx="12"/>
  <text x="80" y="158" class="h">Systematic &#8212; a consistent shift</text>
  <line class="axis" x1="80" y1="270" x2="340" y2="270"/>
  <line x1="250" y1="180" x2="250" y2="270" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="240" y="290" class="c">true</text>
  <circle cx="150" cy="210" r="5" fill="#0ea5e9"/><circle cx="158" cy="225" r="5" fill="#0ea5e9"/>
  <circle cx="145" cy="240" r="5" fill="#0ea5e9"/><circle cx="160" cy="200" r="5" fill="#0ea5e9"/>
  <circle cx="152" cy="218" r="5" fill="#0ea5e9"/>
  <text x="80" y="300" class="c">Tight cluster, off to one side &#8594; fix by calibration.</text>

  <!-- random -->
  <rect class="panel" x="400" y="130" width="300" height="180" rx="12"/>
  <text x="420" y="158" class="h">Random &#8212; scatter</text>
  <line class="axis" x1="420" y1="270" x2="680" y2="270"/>
  <line x1="550" y1="180" x2="550" y2="270" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="540" y="290" class="c">true</text>
  <circle cx="500" cy="205" r="5" fill="#8b5cf6"/><circle cx="600" cy="230" r="5" fill="#8b5cf6"/>
  <circle cx="540" cy="245" r="5" fill="#8b5cf6"/><circle cx="585" cy="200" r="5" fill="#8b5cf6"/>
  <circle cx="520" cy="235" r="5" fill="#8b5cf6"/><circle cx="565" cy="215" r="5" fill="#8b5cf6"/>
  <text x="420" y="300" class="c">Centered on true but spread &#8594; reduce by averaging.</text>
</svg>
