<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Three inverse-kinematics step rules compared near an ill-conditioned target: the pseudoinverse step is a long overshooting arrow, the Jacobian-transpose step is a short safe arrow, and the damped least squares step is a moderate bounded arrow aimed at the target.">
<defs><marker id="p1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b91c1c"/></marker>
<marker id="p2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
<marker id="p3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">Three step rules near an ill-conditioned pose</text>
<circle cx="200" cy="170" r="7" fill="#e11d48"/><text x="156" y="176" class="c">gripper</text><circle cx="300" cy="120" r="6" fill="#0f172a"/><text x="310" y="120" class="c">target</text><line x1="200" y1="170" x2="430" y2="40" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#p1)"/><text x="350" y="60" class="b" fill="#b91c1c">J⁺e: fast but unbounded</text><line x1="200" y1="170" x2="240" y2="146" stroke="#64748b" stroke-width="2.5" marker-end="url(#p2)"/><text x="210" y="194" class="b" fill="#64748b">Jᵀe: safe, slow</text><line x1="200" y1="170" x2="294" y2="124" stroke="#0d9488" stroke-width="2.5" marker-end="url(#p3)"/><text x="230" y="120" class="b" fill="#0d9488">Jᵀ(JJᵀ+λ²I)⁻¹e: bounded</text><text x="320" y="278" text-anchor="middle" class="c">λ→0 recovers the pseudoinverse (fast); large λ acts like the transpose (gentle).</text></svg>
