<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The inverse pipeline: pixel to undistort to K inverse ray to plus depth to camera-frame point, with a dashed forward arrow to the world frame in Unit 7.">
  <defs>
    <marker id="ia2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <marker id="wa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:10.5px;font-weight:700;fill:#334155}.w{font-size:11px;font-weight:800;fill:#1d4ed8}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">Back-projection: pixel → camera-frame 3D point</text>
  <rect x="20" y="80" width="80" height="48" rx="9" fill="#0f172a"/><text x="60" y="108" text-anchor="middle" class="b" fill="#fff">pixel</text>
  <rect x="120" y="80" width="100" height="48" rx="9" fill="#f5f3ff" stroke="#ddd6fe"/><text x="170" y="108" text-anchor="middle" class="b">undistort</text>
  <rect x="240" y="80" width="110" height="48" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="295" y="103" text-anchor="middle" class="b">K⁻¹ → ray</text><text x="295" y="119" text-anchor="middle" class="c">(x_n,y_n,1)</text>
  <rect x="370" y="80" width="90" height="48" rx="9" fill="#fff7ed" stroke="#fed7aa"/><text x="415" y="108" text-anchor="middle" class="b">+ depth Z</text>
  <rect x="480" y="80" width="120" height="48" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="540" y="103" text-anchor="middle" class="b">P_c (camera)</text><text x="540" y="119" text-anchor="middle" class="c">Z·(x_n,y_n,1)</text>
  <line x1="100" y1="104" x2="118" y2="104" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ia2)"/>
  <line x1="220" y1="104" x2="238" y2="104" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ia2)"/>
  <line x1="350" y1="104" x2="368" y2="104" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ia2)"/>
  <line x1="460" y1="104" x2="478" y2="104" stroke="#0f172a" stroke-width="1.5" marker-end="url(#ia2)"/>
  <path d="M 600 104 Q 645 104 645 140 Q 645 170 350 175 Q 120 178 90 150" fill="none" stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#wa)"/>
  <text x="350" y="200" text-anchor="middle" class="w">Unit 7: × T(world←cam) → fruit world position</text>
</svg>
