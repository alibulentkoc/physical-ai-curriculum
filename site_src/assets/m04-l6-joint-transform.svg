<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="One joint transform decomposed into a variable rotation or translation that depends on the joint variable, followed by a fixed link transform G to the next frame.">
  <defs>
    <marker id="j6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:11.5px;font-weight:700;fill:#334155}.v{font-size:11px;font-weight:800;fill:#7c3aed}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">A joint transform = variable motion ∘ fixed link geometry</text>
  <rect x="30" y="80" width="110" height="56" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="85" y="113" text-anchor="middle" class="b">frame i−1</text>
  <rect x="200" y="80" width="170" height="56" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/><text x="285" y="103" text-anchor="middle" class="v">variable motion</text><text x="285" y="121" text-anchor="middle" class="c">R_z(θ) or Trans_z(d)</text>
  <rect x="420" y="80" width="150" height="56" rx="10" fill="#fff7ed" stroke="#fed7aa"/><text x="495" y="103" text-anchor="middle" class="b">fixed link G_i</text><text x="495" y="121" text-anchor="middle" class="c">rigid geometry</text>
  <rect x="620" y="80" width="60" height="56" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/><text x="650" y="113" text-anchor="middle" class="b">i</text>
  <line x1="140" y1="108" x2="198" y2="108" stroke="#0f172a" stroke-width="1.6" marker-end="url(#j6)"/>
  <line x1="370" y1="108" x2="418" y2="108" stroke="#0f172a" stroke-width="1.6" marker-end="url(#j6)"/>
  <line x1="570" y1="108" x2="618" y2="108" stroke="#0f172a" stroke-width="1.6" marker-end="url(#j6)"/>
  <text x="350" y="172" text-anchor="middle" class="c">T(i−1→i) = (variable, one joint variable) · (fixed link). DH parameterizes this (Units 5–6).</text>
</svg>
