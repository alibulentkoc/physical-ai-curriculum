<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A one-panel summary of Unit 1: the two-link reach annulus split into zones with zero, one, or many solutions, under the banner solve T0n of theta equals T desired.">
<defs><style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<rect x="0" y="0" width="600" height="40" fill="#f0fdfa"/>
<text x="300" y="26" text-anchor="middle" class="t">Inverse kinematics: solve T₀ⁿ(θ) = T_desired</text>
<circle cx="200" cy="185" r="112.0" fill="#ecfdf5" stroke="#34d399"/><circle cx="200" cy="185" r="5" fill="#334155"/><text x="200" y="155" text-anchor="middle" class="b">inside: many</text><text x="200" y="287" text-anchor="middle" class="b">boundary: 1</text><circle cx="342" cy="185" r="6" fill="#fecaca" stroke="#b91c1c"/><text x="354" y="189" class="c">outside: 0</text><line x1="312" y1="225" x2="430" y2="225" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#au)"/><defs><marker id="au" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/></marker></defs><text x="470" y="229" text-anchor="middle" class="b">Unit 2: start solving</text><text x="300" y="292" text-anchor="middle" class="c">Where the target sits decides 0 / 1 / many. Reachability is checked first.</text></svg>
