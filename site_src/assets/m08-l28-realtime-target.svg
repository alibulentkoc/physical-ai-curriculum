<svg viewBox='0 0 760 420' xmlns='http://www.w3.org/2000/svg' role='img' aria-label="Running the inner loop on a real-time target: the latency-critical inner loop runs on a protected real-time target (stable), while the latency-tolerant outer layers run best-effort; placing the inner loop best-effort makes it jitter and oscillate."><title>Running the inner loop on a real-time target: the latency-critical inner loop runs on a protected real-time target (stable), while the latency-tolerant outer layers run best-effort; placing the inner loop best-effort makes it jitter and oscillate.</title><rect x='0' y='0' width='760' height='420' fill='white'/><defs><marker id='ar' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f172a'/></marker><marker id='arT' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0d9488'/></marker></defs><text x='30' y='34' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='17' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='start'>Running the inner loop on a real-time target</text><rect x='40' y='56' width='470' height='96' rx='12' fill='#f8fafc' stroke='#64748b' stroke-width='1.5' stroke-dasharray='6 4'/><text x='54' y='76' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#64748b' font-weight='700' font-style='normal' text-anchor='start'>best-effort target — general-purpose computer (loose timing OK)</text><rect x='60' y='88' width='130' height='38' rx='8' fill='#f1f5f9' stroke='#64748b' stroke-width='1.5'/><text x='72' y='111' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>planner</text><rect x='210' y='88' width='130' height='38' rx='8' fill='#f1f5f9' stroke='#64748b' stroke-width='1.5'/><text x='222' y='111' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>perception</text><rect x='360' y='88' width='130' height='38' rx='8' fill='#f1f5f9' stroke='#64748b' stroke-width='1.5'/><text x='372' y='111' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>supervisor</text><text x='54' y='146' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#64748b' font-weight='400' font-style='italic' text-anchor='start'>latency-tolerant</text><line x1='270' y1='152' x2='270' y2='196' stroke='#0f172a' stroke-width='2.5' marker-end='url(#ar)'/><text x='284' y='180' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>reference q_d, q̇_d, q̈_d (slow updates)</text><rect x='40' y='200' width='470' height='96' rx='12' fill='#f8fafc' stroke='#0d9488' stroke-width='2'/><text x='54' y='220' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0d9488' font-weight='700' font-style='normal' text-anchor='start'>real-time target — microcontroller / RT thread (protected)</text><rect x='60' y='232' width='130' height='38' rx='8' fill='white' stroke='#0ea5e9' stroke-width='1.5'/><text x='74' y='255' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>sensor</text><rect x='210' y='232' width='130' height='38' rx='8' fill='white' stroke='#0d9488' stroke-width='1.5'/><text x='224' y='255' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>controller</text><rect x='360' y='232' width='130' height='38' rx='8' fill='white' stroke='#10b981' stroke-width='1.5'/><text x='374' y='255' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>actuator</text><line x1='190' y1='251' x2='210' y2='251' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><line x1='340' y1='251' x2='360' y2='251' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><text x='54' y='290' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0d9488' font-weight='400' font-style='italic' text-anchor='start'>low-jitter periodic loop → stable</text><rect x='540' y='200' width='190' height='150' rx='12' fill='#fde0e6' stroke='#e11d48' stroke-width='2'/><text x='556' y='222' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#e11d48' font-weight='700' font-style='normal' text-anchor='start'>WRONG placement</text><text x='556' y='240' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#e11d48' font-weight='400' font-style='normal' text-anchor='start'>inner loop on best-effort</text><polyline points='556,300 576,300 586,280 600,320 616,266 632,330 648,256 664,344 700,250' fill='none' stroke='#e11d48' stroke-width='2.2'/><text x='556' y='366' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#e11d48' font-weight='700' font-style='normal' text-anchor='start'>→ jitter → unstable</text><text x='40' y='392' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='13' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>placement rule: latency-critical → real-time target;  latency-tolerant → best-effort</text></svg>