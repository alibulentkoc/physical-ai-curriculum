<svg viewBox='0 0 760 420' xmlns='http://www.w3.org/2000/svg' role='img' aria-label="The closed-loop control stack as a ROS 2 node/topic graph: a sensor node publishes joint/state, a controller node (the tracker) publishes joint/command, and an actuator node drives the joint, closing the loop."><title>The closed-loop control stack as a ROS 2 node/topic graph: a sensor node publishes joint/state, a controller node (the tracker) publishes joint/command, and an actuator node drives the joint, closing the loop.</title><rect x='0' y='0' width='760' height='420' fill='white'/><defs><marker id='ar' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f172a'/></marker></defs><text x='30' y='34' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='17' fill='#0f172a' font-weight='700' font-style='normal' text-anchor='start'>The closed-loop control stack in ROS 2</text><rect x='20' y='130' width='118' height='60' rx='12' fill='#f8fafc' stroke='#0f172a' stroke-width='2'/><text x='79' y='158' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>sensor</text><text x='79' y='174' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>node</text><rect x='285' y='130' width='150' height='60' rx='12' fill='#f8fafc' stroke='#0d9488' stroke-width='2'/><text x='360' y='156' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>controller node</text><text x='360' y='174' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0d9488' font-weight='600' font-style='normal' text-anchor='middle'>(tracker)</text><rect x='615' y='130' width='125' height='60' rx='12' fill='#f8fafc' stroke='#10b981' stroke-width='2'/><text x='677' y='158' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>actuator</text><text x='677' y='174' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>node</text><rect x='285' y='88' width='150' height='28' rx='8' fill='#fdebc8' stroke='#d97706' stroke-width='1.5'/><text x='360' y='107' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='10.5' fill='#d97706' font-weight='700' font-style='normal' text-anchor='middle'>real-time target (U7)</text><text x='360' y='208' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='10' fill='#64748b' font-weight='400' font-style='normal' text-anchor='middle'>feedforward + PID → actuator</text><line x1='138' y1='160' x2='168' y2='160' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><rect x='152.0' y='147' width='118' height='26' rx='13' fill='white' stroke='#0d9488' stroke-width='1.8'/><text x='211' y='165' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0d9488' font-weight='700' font-style='normal' text-anchor='middle'>joint/state</text><line x1='254' y1='160' x2='283' y2='160' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><line x1='435' y1='160' x2='468' y2='160' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><rect x='466.0' y='147' width='118' height='26' rx='13' fill='white' stroke='#0d9488' stroke-width='1.8'/><text x='525' y='165' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#0d9488' font-weight='700' font-style='normal' text-anchor='middle'>joint/command</text><line x1='584' y1='160' x2='613' y2='160' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><rect x='615' y='250' width='125' height='46' rx='12' fill='#f8fafc' stroke='#64748b' stroke-width='2'/><text x='677' y='278' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='middle'>plant / joint</text><line x1='677' y1='190' x2='677' y2='250' stroke='#0f172a' stroke-width='2' marker-end='url(#ar)'/><line x1='615' y1='273' x2='79' y2='273' stroke='#10b981' stroke-width='2.5' marker-end='url(#ar)'/><line x1='79' y1='273' x2='79' y2='190' stroke='#10b981' stroke-width='2.5' marker-end='url(#ar)'/><text x='90' y='308' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#10b981' font-weight='700' font-style='normal' text-anchor='start'>motion sensed → loop closed</text><rect x='152' y='330' width='150' height='32' rx='8' fill='#f1f5f9' stroke='#64748b' stroke-width='1.5' stroke-dasharray='5 3'/><text x='227' y='351' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#64748b' font-weight='600' font-style='normal' text-anchor='middle'>logger (extra sub)</text><line x1='211' y1='190' x2='211' y2='330' stroke='#64748b' stroke-width='1.4' stroke-dasharray='4 3' marker-end='url(#ar)'/><text x='320' y='351' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='11' fill='#64748b' font-weight='400' font-style='italic' text-anchor='start'>decoupled: add consumers freely</text><text x='30' y='396' font-family='system-ui,-apple-system,Segoe UI,Roboto,sans-serif' font-size='12' fill='#0f172a' font-weight='600' font-style='normal' text-anchor='start'>ROS 2 (conceptual): nodes + topics + messages — the bus stands in for the middleware</text></svg>