<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two vectors placed tip-to-tail and the resultant arrow from the start of the first to the tip of the second.">
  <defs>
    <marker id="aA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0ea5e9"/></marker>
    <marker id="aB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/></marker>
    <marker id="aR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/></marker>
    <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:14px;font-weight:700}.c{font-size:12px;fill:#64748b}</style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="t">Vector addition: tip-to-tail</text>
  <line x1="80" y1="300" x2="560" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="80" y1="300" x2="80" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- a -->
  <line x1="80" y1="300" x2="300" y2="220" stroke="#0ea5e9" stroke-width="3" marker-end="url(#aA)"/>
  <text x="160" y="248" class="l" fill="#0284c7">a</text>
  <!-- b from tip of a -->
  <line x1="300" y1="220" x2="430" y2="110" stroke="#8b5cf6" stroke-width="3" marker-end="url(#aB)"/>
  <text x="378" y="158" class="l" fill="#7c3aed">b</text>
  <!-- resultant -->
  <line x1="80" y1="300" x2="430" y2="110" stroke="#0d9488" stroke-width="3.5" marker-end="url(#aR)"/>
  <text x="250" y="180" class="l" fill="#0d9488">a + b (resultant)</text>
  <text x="320" y="344" text-anchor="middle" class="c">Walk along a, then b; the resultant is the single move from start to finish. Order doesn't matter.</text>
</svg>
