<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Two 2x2 matrices added entry by entry to form a result, with a caution that addition is not composition.">
  <defs><style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:12px;fill:#64748b}.n{font-size:20px;font-weight:700;fill:#0f172a}.op{font-size:26px;font-weight:700;fill:#334155}.cau{font-size:12px;font-weight:700;fill:#b91c1c}</style></defs>
  <text x="320" y="32" text-anchor="middle" class="t">Matrix addition: entry by entry</text>
  <!-- A -->
  <text x="70" y="120" class="n">1</text><text x="120" y="120" class="n">2</text><text x="70" y="165" class="n">0</text><text x="120" y="165" class="n">1</text>
  <path d="M55 95 v85 M140 95 v85" stroke="#0f172a" stroke-width="2"/>
  <text x="170" y="148" class="op">+</text>
  <!-- B -->
  <text x="215" y="120" class="n">0</text><text x="265" y="120" class="n">1</text><text x="215" y="165" class="n">3</text><text x="265" y="165" class="n">2</text>
  <path d="M200 95 v85 M285 95 v85" stroke="#0f172a" stroke-width="2"/>
  <text x="315" y="148" class="op">=</text>
  <!-- result -->
  <text x="360" y="120" class="n">1</text><text x="415" y="120" class="n">3</text><text x="360" y="165" class="n">3</text><text x="415" y="165" class="n">3</text>
  <path d="M345 95 v85 M435 95 v85" stroke="#0d9488" stroke-width="2"/>
  <text x="120" y="200" class="c">A</text><text x="265" y="200" class="c">B</text><text x="400" y="200" class="c" fill="#0f766e">A + B</text>
  <!-- caution -->
  <rect x="470" y="95" width="150" height="90" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="545" y="125" text-anchor="middle" class="cau">addition ≠</text>
  <text x="545" y="145" text-anchor="middle" class="cau">apply-then-apply</text>
  <text x="545" y="167" text-anchor="middle" class="c">(that's multiplication)</text>
  <text x="320" y="240" text-anchor="middle" class="c">Add each cell to its partner. Commutative (A+B = B+A). It blends matrices; it does not chain actions.</text>
</svg>
