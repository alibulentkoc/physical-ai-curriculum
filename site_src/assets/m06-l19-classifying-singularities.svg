<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Three nameable singular postures (6-DOF arm, spherical wrist)</text>
  <line x1="253" y1="42" x2="253" y2="280" stroke="#e5e7eb" stroke-width="1.5"/><line x1="507" y1="42" x2="507" y2="280" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- elbow -->
  <text x="127" y="58" text-anchor="middle" font-size="13" fill="#6b7280" font-weight="600">elbow (extended)</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="60" y1="200" x2="130" y2="150"/><line x1="130" y1="150" x2="210" y2="150"/></g>
  <circle cx="60" cy="200" r="5" fill="#334155"/><circle cx="210" cy="150" r="5" fill="#dc2626"/>
  <line x1="210" y1="150" x2="240" y2="150" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="4 3"/>
  <text x="127" y="245" text-anchor="middle" font-size="11" fill="#dc2626">lost: position (can't extend)</text>
  <!-- shoulder -->
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#6b7280" font-weight="600">shoulder (over base axis)</text>
  <line x1="380" y1="100" x2="380" y2="230" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="386" y="108" font-size="10" fill="#7c3aed">base axis</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="380" y1="220" x2="340" y2="160"/><line x1="340" y1="160" x2="380" y2="130"/></g>
  <circle cx="380" cy="220" r="5" fill="#334155"/><circle cx="380" cy="130" r="5" fill="#dc2626"/>
  <text x="380" y="250" text-anchor="middle" font-size="11" fill="#dc2626">wrist center on the axis</text>
  <!-- wrist -->
  <text x="634" y="58" text-anchor="middle" font-size="13" fill="#6b7280" font-weight="600">wrist (axes aligned)</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="560" y1="210" x2="620" y2="160"/></g>
  <line x1="620" y1="120" x2="620" y2="200" stroke="#dc2626" stroke-width="3"/>
  <line x1="628" y1="120" x2="628" y2="200" stroke="#16a34a" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="634" y="232" text-anchor="middle" font-size="11" fill="#dc2626">two axes collinear</text>
  <text x="634" y="248" text-anchor="middle" font-size="11" fill="#dc2626">lost: orientation</text>
  <text x="380" y="276" text-anchor="middle" font-size="11.5" fill="#111827">det J = det J&#8321;&#8321; &#183; det J&#8322;&#8322;  (arm &#215; wrist, decoupled)</text>
</svg>
