<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="z2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="v2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="sl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
  </defs>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Two joint types, two column shapes</text>
  <line x1="360" y1="44" x2="360" y2="290" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Revolute panel -->
  <text x="185" y="62" text-anchor="middle" font-size="13.5" fill="#6b7280" font-weight="600">revolute: rotate</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="110" y1="240" x2="240" y2="160"/></g>
  <circle cx="110" cy="240" r="6" fill="#7c3aed"/><circle cx="240" cy="160" r="6" fill="#dc2626"/>
  <line x1="110" y1="240" x2="110" y2="160" stroke="#7c3aed" stroke-width="3" marker-end="url(#z2)"/>
  <text x="116" y="158" font-size="13" fill="#7c3aed" font-weight="700">z</text>
  <line x1="240" y1="160" x2="285" y2="200" stroke="#dc2626" stroke-width="3" marker-end="url(#v2)"/>
  <text x="250" y="214" font-size="12" fill="#dc2626">z &#215; (o&#8345;&#8722;o)</text>
  <text x="185" y="280" text-anchor="middle" font-size="13" fill="#111827">J = [ z &#215; (o&#8345;&#8722;o) ; <tspan fill="#7c3aed" font-weight="700">z</tspan> ]</text>

  <!-- Prismatic panel -->
  <text x="535" y="62" text-anchor="middle" font-size="13.5" fill="#6b7280" font-weight="600">prismatic: slide</text>
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><line x1="450" y1="220" x2="560" y2="170"/></g>
  <rect x="556" y="160" width="26" height="22" rx="3" fill="#0d9488" transform="rotate(-24 569 171)"/>
  <circle cx="450" cy="220" r="6" fill="#334155"/>
  <!-- slide direction = z; tool translates along it, no rotation -->
  <line x1="569" y1="171" x2="624" y2="146" stroke="#0d9488" stroke-width="3.2" marker-end="url(#sl)"/>
  <text x="600" y="138" font-size="13" fill="#0d9488" font-weight="700">z (slide)</text>
  <text x="535" y="262" text-anchor="middle" font-size="13" fill="#111827">J = [ <tspan fill="#0d9488" font-weight="700">z</tspan> ; <tspan fill="#9ca3af">0</tspan> ]</text>
  <text x="535" y="282" text-anchor="middle" font-size="12" fill="#6b7280">no rotation &#8594; zero angular part</text>
</svg>
