<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A two-link arm's reachable annulus with three targets: one outside with zero solutions, one on the outer boundary with one straight-arm solution, and one inside with two elbow-up and elbow-down solutions.">
<defs><style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.g{fill:#15803d;font-size:11px;font-weight:700}.r{fill:#b91c1c;font-size:11px;font-weight:700}.a{fill:#f59e0b;font-size:11px;font-weight:700}</style></defs>
<text x="320" y="24" text-anchor="middle" class="t">How many solutions depends on where the target is</text>
<circle cx="200" cy="180" r="120.0" fill="#ecfdf5" stroke="#a7f3d0"/><text x="200" y="318" text-anchor="middle" class="c">reachable annulus (outer L₁+L₂)</text><polyline points="200.0,180.0 253.9,206.3 245.0,147.0" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/><polyline points="200.0,180.0 191.1,120.7 245.0,147.0" fill="none" stroke="#0d9488" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/><circle cx="200" cy="180" r="5" fill="#334155"/><circle cx="245.0" cy="147.0" r="6" fill="#e11d48"/><text x="255" y="139" class="g">2 (elbow-up / down)</text><circle cx="320.0" cy="180.0" r="6" fill="#e11d48"/><line x1="200" y1="180" x2="320.0" y2="180.0" stroke="#f59e0b" stroke-width="3" stroke-dasharray="4 3"/><text x="300" y="168" class="a">1 (boundary)</text><circle cx="342.5" cy="97.5" r="6" fill="#fecaca" stroke="#b91c1c"/><text x="350" y="92" class="r">0 (unreachable)</text><text x="320" y="290" text-anchor="middle" class="c">Outside: 0. On the boundary: 1 (arm straight). Inside: 2.</text></svg>
