<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The full perceive-to-reach pipeline as a left-to-right chain: perceive, place in base frame, reachability gate, solve, filter joint limits, verify with forward kinematics, select, and output a configuration; with downward failure exits for no detection, unreachable, no feasible solution, and all rejected."><defs><marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<style>.t{font-size:14px;font-weight:700;fill:#0f172a}.c{font-size:9px;fill:#b91c1c}.b{font-size:9.5px;font-weight:700;fill:#334155}</style>
<text x="340" y="22" text-anchor="middle" class="t">Perceive → place → solve → verify → select</text>
<rect x="12" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="51.0" y="82" text-anchor="middle" class="b">perceive</text><text x="51.0" y="98" text-anchor="middle" fill="#64748b" font-size="8.5">p_cam</text><line x1="90" y1="85" x2="94" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><line x1="51.0" y1="108" x2="51.0" y2="130" stroke="#fca5a5" stroke-width="1.4" stroke-dasharray="3 2"/><text x="51.0" y="143" text-anchor="middle" class="c">no detection</text><rect x="96" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="135.0" y="82" text-anchor="middle" class="b">place</text><text x="135.0" y="98" text-anchor="middle" fill="#64748b" font-size="8.5">base frame</text><line x1="174" y1="85" x2="178" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><rect x="180" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="219.0" y="82" text-anchor="middle" class="b">reachable?</text><line x1="258" y1="85" x2="262" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><line x1="219.0" y1="108" x2="219.0" y2="130" stroke="#fca5a5" stroke-width="1.4" stroke-dasharray="3 2"/><text x="219.0" y="143" text-anchor="middle" class="c">unreachable</text><rect x="264" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="303.0" y="82" text-anchor="middle" class="b">solve</text><text x="303.0" y="98" text-anchor="middle" fill="#64748b" font-size="8.5">analytic∥numeric</text><line x1="342" y1="85" x2="346" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><line x1="303.0" y1="108" x2="303.0" y2="130" stroke="#fca5a5" stroke-width="1.4" stroke-dasharray="3 2"/><text x="303.0" y="143" text-anchor="middle" class="c">no solution</text><rect x="348" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="387.0" y="82" text-anchor="middle" class="b">filter</text><text x="387.0" y="98" text-anchor="middle" fill="#64748b" font-size="8.5">limits</text><line x1="426" y1="85" x2="430" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><rect x="432" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="471.0" y="82" text-anchor="middle" class="b">verify</text><text x="471.0" y="98" text-anchor="middle" fill="#64748b" font-size="8.5">FK</text><line x1="510" y1="85" x2="514" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><line x1="471.0" y1="108" x2="471.0" y2="130" stroke="#fca5a5" stroke-width="1.4" stroke-dasharray="3 2"/><text x="471.0" y="143" text-anchor="middle" class="c">all rejected</text><rect x="516" y="62" width="78" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/><text x="555.0" y="82" text-anchor="middle" class="b">select</text><text x="555.0" y="98" text-anchor="middle" fill="#64748b" font-size="8.5">min cost</text><line x1="594" y1="85" x2="598" y2="85" stroke="#0d9488" stroke-width="1.8" marker-end="url(#ap)"/><rect x="600" y="62" width="78" height="46" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="639.0" y="82" text-anchor="middle" class="b">config ✓</text><text x="340" y="190" text-anchor="middle" fill="#64748b" font-size="11">Each gate can fail cleanly with a reason — nothing unverified or infeasible passes.</text></svg>
