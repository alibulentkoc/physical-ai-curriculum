#f8fafc" stroke="#e2e8f0"/><text x="56" y="177" text-anchor="start" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="400" fill="#0f172a">collision-free</text><text x="372" y="177" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="700" fill="#b91c1c">✗</text><text x="330" y="177" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="400" fill="#b91c1c">→ re-plan</text><rect x="40" y="190" width="350" height="26" rx="6" fill="#f8fafc" stroke="#e2e8f0"/><text x="56" y="207" text-anchor="start" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="400" fill="#0f172a">reachable</text><text x="372" y="207" text-anchor="end" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="700" fill="#10b981">✓</text><rect x="40" y="244" width="350" height="28" rx="6" fill="#b91c1c"/><text x="215" y="263" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="white">INVALID — collision-free failed → re-plan</text>
