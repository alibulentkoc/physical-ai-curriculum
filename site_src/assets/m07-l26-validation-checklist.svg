<svg viewBox="0 0 430 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A validation checklist where endpoints, velocity, acceleration, continuity and reachability pass but collision-free fails, giving an overall INVALID verdict with a re-plan remedy">
<title>A validation checklist where endpoints, velocity, acceleration, continuity and reachability pass but collision-free fails, giving an overall INVALID verdict with a re-plan remedy</title>
