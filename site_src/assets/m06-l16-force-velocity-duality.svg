<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Force ellipsoid = velocity ellipsoid with reciprocal axes  (&#964; = J&#7488;F)</text>
  <line x1="380" y1="42" x2="380" y2="280" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="190" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">velocity ellipsoid</text>
  <ellipse cx="190" cy="160" rx="70" ry="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2.4" transform="rotate(-22 190 160)"/>
  <text x="250" y="120" font-size="11.5" fill="#1d4ed8" font-weight="600">long = easy move</text>
  <text x="120" y="210" font-size="11.5" fill="#1d4ed8" font-weight="600">short = hard move</text>
  <text x="570" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">force ellipsoid</text>
  <ellipse cx="570" cy="160" rx="24" ry="70" fill="#ffedd5" stroke="# ea580c" stroke-width="2.4" transform="rotate(-22 570 160)"/>
  <ellipse cx="570" cy="160" rx="24" ry="70" fill="#ffedd5" stroke="#ea580c" stroke-width="2.4" transform="rotate(-22 570 160)"/>
  <text x="624" y="120" font-size="11.5" fill="#c2410c" font-weight="600">short = weak push</text>
  <text x="486" y="210" font-size="11.5" fill="#c2410c" font-weight="600">long = strong push</text>
  <text x="380" y="276" text-anchor="middle" font-size="12.5" fill="#111827">easy-to-move direction = weak-to-push direction (axes 1/&#963;)</text>
</svg>
