<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two stacked stability sweeps at fixed gains: the top latency sweep shows step responses at increasing communication delay progressing from a clean settle to a sustained oscillation to a growing divergence, each tagged stable marginal or unstable; the bottom control-rate sweep shows the same progression as the update period grows with a visible stair-stepped held command; a note says gains unchanged only the timing moved and an arrow points to why we need real-time in Unit 7">
