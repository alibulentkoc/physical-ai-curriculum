<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="One tomato measured by two observers — a person at the world corner and a robot — giving two different but equally correct coordinate readouts. The point has not moved.">
  <defs><style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:13px;font-weight:600;fill:#334155}.c{font-size:12px;fill:#64748b}.rd{font-size:13px;font-weight:700}</style></defs>
  <text x="360" y="30" text-anchor="middle" class="t">One tomato, two observers, two coordinate readings</text>
  <!-- the tomato (fixed) -->
  <circle cx="360" cy="190" r="14" fill="#e11d48"/>
  <text x="360" y="158" text-anchor="middle" class="l">the same tomato (fixed)</text>
  <!-- Observer A: world corner -->
  <rect x="70" y="300" width="16" height="16" rx="2" fill="#0d9488"/>
  <line x1="78" y1="308" x2="180" y2="308" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="78" y1="308" x2="78" y2="220" stroke="#0d9488" stroke-width="1.5"/>
  <text x="60" y="334" class="c" fill="#0f766e">observer A: world corner</text>
  <line x1="78" y1="308" x2="348" y2="198" stroke="#0d9488" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="120" y="232" width="150" height="24" rx="12" fill="#ccfbf1"/>
  <text x="132" y="249" class="rd" fill="#0f766e">A says: (2.0, 1.5)</text>
  <!-- Observer B: robot -->
  <rect x="600" y="300" width="16" height="16" rx="2" fill="#1d4ed8"/>
  <line x1="608" y1="308" x2="520" y2="308" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="608" y1="308" x2="608" y2="220" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="540" y="334" class="c" fill="#1d4ed8">observer B: robot</text>
  <line x1="608" y1="308" x2="372" y2="198" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="450" y="232" width="150" height="24" rx="12" fill="#dbeafe"/>
  <text x="462" y="249" class="rd" fill="#1d4ed8">B says: (0.6, 0.2)</text>
  <text x="360" y="362" text-anchor="middle" class="c">Both are correct. The tomato has not moved — only the observer (frame) changed.</text>
</svg>
