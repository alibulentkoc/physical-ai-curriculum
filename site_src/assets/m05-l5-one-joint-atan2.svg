<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 290" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A one-joint arm pointing at a target on its radius-L circle with the angle theta equals atan2 of y and x marked, and a second off-circle target marked unreachable.">
<defs><marker id="o5" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e11d48"/></marker>
<style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}.r{fill:#b91c1c;font-size:11px;font-weight:700}</style></defs>
<text x="300" y="24" text-anchor="middle" class="t">One joint: point the link at the target</text>
<circle cx="230" cy="160" r="90.0" fill="none" stroke="#cbd5e1" stroke-dasharray="5 4"/><line x1="230" y1="160" x2="280" y2="160" stroke="#94a3b8" stroke-width="1"/><path d="M 270 160 A 40 40 0 0 0 255.7 129.4" fill="none" stroke="#475569" stroke-width="1.5"/><text x="282" y="142" class="c">θ</text><line x1="230" y1="160" x2="287.9" y2="91.1" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><text x="241" y="120" class="c">L</text><circle cx="230" cy="160" r="5" fill="#10b981"/><text x="230" y="178" text-anchor="middle" class="c">joint</text><circle cx="287.9" cy="91.1" r="7" fill="#e11d48"/><text x="298" y="83" class="b">target on circle ✓</text><circle cx="293.0" cy="115.0" r="6" fill="#fecaca" stroke="#b91c1c"/><text x="301" y="131" class="r">off circle ✗</text><text x="300" y="278" text-anchor="middle" class="c">θ = atan2(y, x), valid only when √(x²+y²) = L.</text></svg>
