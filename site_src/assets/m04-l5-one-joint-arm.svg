<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A one-joint arm like a clock hand at angle theta, the gripper tracing a dashed circle of radius L, with the gripper position L cos theta, L sin theta and an orientation arrow.">
  <defs>
    <marker id="o5" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e11d48"/></marker>
    <style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style>
  </defs>
  <text x="350" y="22" text-anchor="middle" class="t">One-joint arm: the gripper traces a circle of radius L</text>
  <!-- center / joint -->
  <circle cx="250" cy="150" r="6" fill="#10b981"/><text x="250" y="172" text-anchor="middle" class="c">joint</text>
  <!-- circle -->
  <circle cx="250" cy="150" r="90" fill="none" stroke="#cbd5e1" stroke-dasharray="5 4"/>
  <!-- link at 45deg (up-right; svg y down so use -) -->
  <line x1="250" y1="150" x2="314" y2="86" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <text x="270" y="115" class="c">L</text>
  <!-- angle arc -->
  <path d="M 300 150 A 50 50 0 0 0 285 115" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="312" y="140" class="c">θ</text>
  <!-- gripper + orientation -->
  <circle cx="314" cy="86" r="7" fill="#e11d48"/>
  <line x1="314" y1="86" x2="345" y2="55" stroke="#e11d48" stroke-width="2" marker-end="url(#o5)"/>
  <text x="430" y="90" class="b">gripper (L cos θ, L sin θ)</text>
  <text x="430" y="112" class="c">orientation rotates by θ</text>
  <text x="350" y="240" text-anchor="middle" class="c">T₀¹(θ): rotation block R(θ) + translation (L cos θ, L sin θ).</text>
</svg>
