<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A two-link arm at a sample pose with two small arrows at the gripper: one showing the gripper motion from a small change in joint one, one from joint two, labeled as the two columns of the Jacobian, with the relation delta p approximately equals J delta theta.">
<defs><marker id="j1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<marker id="j2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b5cf6"/></marker>
<style>.t{font-size:16px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#64748b}.b{font-size:12px;font-weight:700;fill:#334155}</style></defs>
<text x="310" y="24" text-anchor="middle" class="t">The Jacobian: each column is a joint's gripper motion</text>
<line x1="180.0" y1="200.0" x2="252.7" y2="158.0" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><line x1="252.7" y1="158.0" x2="252.7" y2="95.0" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/><circle cx="180.0" cy="200.0" r="5" fill="#334155"/><circle cx="252.7" cy="158.0" r="4" fill="#475569"/><circle cx="252.7" cy="95.0" r="7" fill="#e11d48"/><line x1="252.7" y1="95.0" x2="225.2" y2="75.9" stroke="#0d9488" stroke-width="2.5" marker-end="url(#j1)"/><line x1="252.7" y1="95.0" x2="236.2" y2="95.0" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#j2)"/><text x="263" y="55" class="b" fill="#0d9488">∂p/∂θ₁ (col 1)</text><text x="263" y="115" class="b" fill="#8b5cf6">∂p/∂θ₂ (col 2)</text><text x="170" y="220" class="c">base</text><text x="310" y="288" text-anchor="middle" class="c">Δp ≈ J Δθ — the local linear map (valid for small moves; the solver re-evaluates J each step).</text></svg>
