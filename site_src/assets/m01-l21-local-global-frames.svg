<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="The same tomato read in three frames. A legend lists the world, robot, and camera coordinate readings; below, each frame's axes are drawn — world fixed at the room corner, robot at the base, camera offset on the robot.">
  <defs><style>.t{font-size:18px;font-weight:700;fill:#0f172a}.l{font-size:12.5px;font-weight:700}.c{font-size:11.5px;fill:#64748b}.rd{font-size:13px;font-weight:700}</style></defs>
  <text x="360" y="28" text-anchor="middle" class="t">Same tomato — three frames, three readings</text>
  <rect x="40" y="50" width="640" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- tomato fixed (right side, clear of legend) -->
  <circle cx="500" cy="150" r="13" fill="#e11d48"/>
  <text x="500" y="132" text-anchor="middle" class="c">the tomato (never moves)</text>

  <!-- legend of the three readings, top-left, clear of everything -->
  <text x="70" y="86" class="c">this one tomato, read three ways:</text>
  <circle cx="78" cy="108" r="5" fill="#0d9488"/><text x="92" y="112" class="rd" fill="#0f766e">world:  (2.0, 1.5)</text>
  <circle cx="78" cy="134" r="5" fill="#1d4ed8"/><text x="92" y="138" class="rd" fill="#1d4ed8">robot:  (0.6, 0.2)</text>
  <circle cx="78" cy="160" r="5" fill="#8b5cf6"/><text x="92" y="164" class="rd" fill="#7c3aed">camera: (0.3, -0.1)</text>

  <!-- world frame axes (fixed, room corner) -->
  <line x1="90" y1="312" x2="190" y2="312" stroke="#0d9488" stroke-width="2"/>
  <line x1="90" y1="312" x2="90" y2="232" stroke="#0d9488" stroke-width="2"/>
  <text x="78" y="332" class="l" fill="#0f766e">world (global, fixed)</text>

  <!-- robot frame axes (at base) -->
  <rect x="332" y="303" width="16" height="16" rx="3" fill="#1d4ed8"/>
  <line x1="340" y1="311" x2="430" y2="311" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="340" y1="311" x2="340" y2="236" stroke="#1d4ed8" stroke-width="2"/>
  <text x="332" y="334" class="l" fill="#1d4ed8">robot (local)</text>

  <!-- camera frame axes (offset/tilted on robot) -->
  <rect x="372" y="262" width="13" height="13" rx="2" fill="#8b5cf6"/>
  <line x1="378" y1="268" x2="445" y2="256" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="378" y1="268" x2="392" y2="212" stroke="#8b5cf6" stroke-width="2"/>
  <text x="392" y="288" class="l" fill="#7c3aed">camera (local)</text>

  <text x="360" y="378" text-anchor="middle" class="c">World is fixed to the room; the robot and camera frames travel with the robot.</text>
</svg>
