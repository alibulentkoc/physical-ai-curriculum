<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs><marker id="sm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Redundancy: same tool, many postures &#8212; spend the spare freedom</text>
  <line x1="380" y1="42" x2="380" y2="256" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="190" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">same tool, two postures</text>
  <g stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"><line x1="100" y1="210" x2="150" y2="150"/><line x1="150" y1="150" x2="210" y2="170"/><line x1="210" y1="170" x2="280" y2="140"/></g>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><line x1="100" y1="210" x2="140" y2="140"/><line x1="140" y1="140" x2="205" y2="160"/><line x1="205" y1="160" x2="280" y2="140"/></g>
  <circle cx="100" cy="210" r="5" fill="#334155"/><circle cx="280" cy="140" r="6" fill="#0d9488"/>
  <path d="M 165 150 q 12 -20 30 -2" stroke="#7c3aed" stroke-width="2.2" fill="none" marker-end="url(#sm)"/>
  <text x="190" y="240" text-anchor="middle" font-size="11" fill="#7c3aed">null-space self-motion (tool fixed)</text>
  <text x="575" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">the solution</text>
  <text x="575" y="120" text-anchor="middle" font-size="13" fill="#111827">q&#775; = J&#8314;&#958;_d  +  (I &#8722; J&#8314;J) z</text>
  <text x="500" y="150" font-size="11" fill="#0d9488">min-norm (does the task)</text>
  <text x="560" y="172" font-size="11" fill="#7c3aed">null-space (secondary goal)</text>
  <text x="575" y="210" text-anchor="middle" font-size="11.5" fill="#6b7280">second term: zero tool motion</text>
  <text x="575" y="230" text-anchor="middle" font-size="11.5" fill="#6b7280">&#8594; posture, joint limits, obstacles</text>
</svg>
