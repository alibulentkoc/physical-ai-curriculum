<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs><marker id="big" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L5,3 L0,6 Z" fill="#dc2626"/></marker>
  <marker id="sml" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L5,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Near a singularity: damping bounds the joint rates</text>
  <line x1="380" y1="42" x2="380" y2="246" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="190" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">pseudoinverse</text>
  <circle cx="150" cy="160" r="5" fill="#334155"/>
  <line x1="150" y1="160" x2="150" y2="70" stroke="#dc2626" stroke-width="4" marker-end="url(#big)"/>
  <text x="190" y="120" font-size="12" fill="#dc2626" font-weight="600">||q&#775;|| huge (unsafe)</text>
  <text x="190" y="210" text-anchor="middle" font-size="11" fill="#6b7280">exact tracking, infinite rates</text>
  <text x="575" y="58" text-anchor="middle" font-size="12.5" fill="#6b7280">damped least squares</text>
  <circle cx="540" cy="160" r="5" fill="#334155"/>
  <line x1="540" y1="160" x2="540" y2="120" stroke="#2563eb" stroke-width="4" marker-end="url(#sml)"/>
  <text x="575" y="135" font-size="12" fill="#2563eb" font-weight="600">||q&#775;|| modest (safe)</text>
  <text x="575" y="210" text-anchor="middle" font-size="11" fill="#6b7280">small error in the lost direction</text>
  <text x="380" y="262" text-anchor="middle" font-size="12" fill="#111827">q&#775; = J&#8314;_&#955; &#958;_d  &#8212; bounded everywhere (kinematic trade-off, not feedback)</text>
</svg>
