<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="A Unit 6 decision pipeline after numerical solving: recognize singularity and damp, filter by joint limits to a feasible set discarding infeasible solutions, choose the nearest safe solution, then command the move.">
<defs><marker id="aq" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.c{font-size:10px;fill:#64748b}.b{font-size:11px;font-weight:700;fill:#334155}</style></defs>
<text x="330" y="24" text-anchor="middle" class="t">From a solution to the right solution</text>
<rect x="18" y="70" width="112" height="54" rx="9" fill="#f8fafc" stroke="#e2e8f0"/><text x="74" y="94" text-anchor="middle" class="b">numerical solve</text><text x="74" y="111" text-anchor="middle" class="c">(Unit 5)</text><line x1="130" y1="97" x2="146" y2="97" stroke="#0d9488" stroke-width="2" marker-end="url(#aq)"/><rect x="146" y="70" width="112" height="54" rx="9" fill="#faf5ff" stroke="#e9d5ff"/><text x="202" y="94" text-anchor="middle" class="b">recognize singularity</text><text x="202" y="111" text-anchor="middle" class="c">det J→0: damp</text><line x1="258" y1="97" x2="274" y2="97" stroke="#0d9488" stroke-width="2" marker-end="url(#aq)"/><rect x="274" y="70" width="112" height="54" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="330" y="94" text-anchor="middle" class="b">filter joint limits</text><text x="330" y="111" text-anchor="middle" class="c">feasible set</text><line x1="386" y1="97" x2="402" y2="97" stroke="#0d9488" stroke-width="2" marker-end="url(#aq)"/><rect x="402" y="70" width="112" height="54" rx="9" fill="#f0fdfa" stroke="#99f6e4"/><text x="458" y="94" text-anchor="middle" class="b">choose</text><text x="458" y="111" text-anchor="middle" class="c">nearest / smooth / safe</text><line x1="514" y1="97" x2="530" y2="97" stroke="#0d9488" stroke-width="2" marker-end="url(#aq)"/><rect x="530" y="70" width="112" height="54" rx="9" fill="#ecfdf5" stroke="#a7f3d0"/><text x="586" y="94" text-anchor="middle" class="b">command move</text><text x="274" y="150" text-anchor="middle" class="c">✗ infeasible solutions discarded</text><text x="330" y="195" text-anchor="middle" class="c">Robust stepping (Unit 5) + recognition, filtering, selection (Unit 6) = a deployable solver.</text></svg>
