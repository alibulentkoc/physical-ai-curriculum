<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/></marker>
  <style>.t{font-size:18px;font-weight:700;fill:#0f172a}.c{font-size:11px;fill:#94a3b8}.f{font-size:12px;font-weight:700;fill:#0f172a}</style></defs>
  <text x="360" y="28" text-anchor="middle" class="t">The Twin's State: Mirroring the World-State</text>
  <text x="360" y="46" text-anchor="middle" class="c">same representation &#183; copyable &#183; reported-only</text>
  <!-- real robot -->
  <rect x="40" y="120" width="150" height="110" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="115" y="180" text-anchor="middle" class="f" fill="#1d4ed8">Real robot</text>
  <text x="115" y="200" text-anchor="middle" class="c">reports state</text>
  <!-- snapshot frame -->
  <rect x="250" y="80" width="220" height="190" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="104" text-anchor="middle" class="f">snapshot frame</text>
  <rect x="268" y="116" width="184" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="360" y="134" text-anchor="middle" class="c">q (joint configuration)</text>
  <rect x="268" y="146" width="184" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="360" y="164" text-anchor="middle" class="c">tool_xy (tool position)</text>
  <rect x="268" y="176" width="184" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="360" y="194" text-anchor="middle" class="c">fruit {ripe, picked}</text>
  <rect x="268" y="206" width="184" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="360" y="224" text-anchor="middle" class="c">health signals</text>
  <rect x="268" y="236" width="184" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="360" y="254" text-anchor="middle" class="c">stage</text>
  <!-- twin -->
  <rect x="530" y="120" width="150" height="110" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.2" stroke-dasharray="7 4"/>
  <text x="605" y="180" text-anchor="middle" class="f" fill="#0d9488">Twin state</text>
  <text x="605" y="200" text-anchor="middle" class="c">holds the copy</text>
  <path d="M192,175 L248,175" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#a)"/>
  <path d="M472,175 L528,175" fill="none" stroke="#0d9488" stroke-width="2.2" marker-end="url(#a)"/>
</svg>
