<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capstone: From Joints to the Fruit — Lesson 8.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--link:#1d4ed8;--joint:#10b981;--grip:#e11d48;--fruit:#dc2626;--reach:#0d9488;--ok:#047857;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:800px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 380px;min-width:320px}
  .panel{flex:1 1 230px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:12px;color:var(--muted);display:block;margin-top:9px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.6}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .ok{color:var(--ok);font-weight:800}.bad{color:var(--bad);font-weight:800}
  .lbl{font-size:11px;fill:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 400 340" role="img" aria-label="A side view of a 3-DOF arm in its working plane reaching toward a perceived fruit; sliders set the joint angles and the fruit height; the gripper position, fruit position, reachability, and move vector update live.">
        <!-- ground + reach shell (annulus cross-section in the working plane) -->
        <line x1="20" y1="300" x2="380" y2="300" stroke="#e2e8f0"/>
        <path id="reachOuter" d="" fill="none" stroke="#99f6e4" stroke-dasharray="4 4"/>
        <path id="reachInner" d="" fill="none" stroke="#99f6e4" stroke-dasharray="2 4"/>
        <!-- base riser -->
        <line id="riser" x1="90" y1="300" x2="90" y2="280" stroke="#7c3aed" stroke-width="4"/>
        <circle cx="90" cy="300" r="6" fill="#10b981"/>
        <text x="90" y="318" text-anchor="middle" class="lbl">base</text>
        <!-- links -->
        <line id="link2" x1="90" y1="280" x2="180" y2="240" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
        <circle id="elbow" cx="180" cy="240" r="5" fill="#10b981"/>
        <line id="link3" x1="180" y1="240" x2="250" y2="210" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
        <circle id="grip" cx="250" cy="210" r="8" fill="#e11d48"/>
        <!-- move vector -->
        <line id="move" x1="250" y1="210" x2="250" y2="210" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="3 3"/>
        <!-- fruit -->
        <circle id="fruit" cx="300" cy="160" r="9" fill="#fee2e2" stroke="#dc2626"/>
        <circle id="fruitc" cx="300" cy="160" r="4" fill="#dc2626"/>
        <text id="fruitlbl" x="312" y="162" class="lbl">fruit</text>
      </svg>
      <div class="hint">Side view of the arm's working plane (base swivel θ₁ rotates this plane about vertical; here we view it edge-on). The dashed shell is the reachable annulus. The amber dashed line is the move vector from gripper to fruit.</div>
    </div>
    <div class="panel">
      <label>θ₂ (shoulder): <span id="t2V">30</span>°</label><input id="t2" type="range" min="0" max="150" step="1" value="30">
      <label>θ₃ (elbow): <span id="t3V">60</span>°</label><input id="t3" type="range" min="-120" max="120" step="1" value="60">
      <label>fruit reach r (m from base axis): <span id="frV">0.55</span></label><input id="fr" type="range" min="0.0" max="0.85" step="0.01" value="0.55">
      <label>fruit height h (m): <span id="fhV">0.55</span></label><input id="fh" type="range" min="0.0" max="0.95" step="0.01" value="0.55">
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  // geometry: planar 2-link (L2,L3) in the working plane, raised by riser d1.
  var L2=0.4, L3=0.3, d1=0.1, Lmax=L2+L3, Lmin=Math.abs(L2-L3);
  var bx=90, by=300, scale=300; // px per metre; base pivot is at the top of the riser
  var py0=by - d1*scale;         // shoulder pivot y
  function val(id){return +document.getElementById(id).value;}
  // map (horizontal r, height h-from-shoulder) to screen
  function sx(r){return bx + r*scale;}
  function sy(z){return by - z*scale;}
  function draw(){
    var d2=val('t2'), d3=val('t3'), fr=val('fr'), fh=val('fh');
    var t2=d2*Math.PI/180, acc=(d2+d3)*Math.PI/180;
    document.getElementById('t2V').textContent=d2;
    document.getElementById('t3V').textContent=d3;
    document.getElementById('frV').textContent=fr.toFixed(2);
    document.getElementById('fhV').textContent=fh.toFixed(2);
    // riser
    document.getElementById('riser').setAttribute('y1',by);
    document.getElementById('riser').setAttribute('y2',py0);
    // shoulder at (0, d1); links measured in the vertical working plane (r horizontal, z up)
    var ex=L2*Math.cos(t2), ez=d1+L2*Math.sin(t2);
    var gx=ex+L3*Math.cos(acc), gz=ez+L3*Math.sin(acc);
    document.getElementById('link2').setAttribute('x1',bx); document.getElementById('link2').setAttribute('y1',py0);
    document.getElementById('link2').setAttribute('x2',sx(ex)); document.getElementById('link2').setAttribute('y2',sy(ez));
    var el=document.getElementById('elbow'); el.setAttribute('cx',sx(ex)); el.setAttribute('cy',sy(ez));
    var l3=document.getElementById('link3'); l3.setAttribute('x1',sx(ex)); l3.setAttribute('y1',sy(ez)); l3.setAttribute('x2',sx(gx)); l3.setAttribute('y2',sy(gz));
    var g=document.getElementById('grip'); g.setAttribute('cx',sx(gx)); g.setAttribute('cy',sy(gz));
    // fruit
    var fx=sx(fr), fy=sy(fh);
    document.getElementById('fruit').setAttribute('cx',fx); document.getElementById('fruit').setAttribute('cy',fy);
    document.getElementById('fruitc').setAttribute('cx',fx); document.getElementById('fruitc').setAttribute('cy',fy);
    document.getElementById('fruitlbl').setAttribute('x',fx+12); document.getElementById('fruitlbl').setAttribute('y',fy+2);
    // move vector gripper -> fruit
    var mv=document.getElementById('move'); mv.setAttribute('x1',sx(gx)); mv.setAttribute('y1',sy(gz)); mv.setAttribute('x2',fx); mv.setAttribute('y2',fy);
    // reach shell (centred at shoulder pivot): outer/inner circle arcs in this plane
    function circle(rad){
      var cx=bx, cy=py0, R=rad*scale;
      return 'M '+(cx-R)+' '+cy+' A '+R+' '+R+' 0 1 1 '+(cx+R)+' '+cy+' A '+R+' '+R+' 0 1 1 '+(cx-R)+' '+cy;
    }
    document.getElementById('reachOuter').setAttribute('d',circle(Lmax));
    document.getElementById('reachInner').setAttribute('d',circle(Lmin));
    // reachability: distance of fruit from shoulder pivot
    var dr=Math.hypot(fr-0, fh-d1);
    var reachable = dr>=Lmin-1e-9 && dr<=Lmax+1e-9;
    var moveR=(fr-gx), moveZ=(fh-gz);
    document.getElementById('msg').innerHTML =
      'gripper = (r '+gx.toFixed(3)+', z '+gz.toFixed(3)+') m<br>'+
      'fruit = (r '+fr.toFixed(2)+', z '+fh.toFixed(2)+') m<br>'+
      'reachable: '+(reachable?'<span class="ok">yes</span>':'<span class="bad">no (outside shell)</span>')+'<br>'+
      'move vector = ('+moveR.toFixed(3)+', '+moveZ.toFixed(3)+') m';
  }
  ['t2','t3','fr','fh'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('reset').addEventListener('click',function(){
    document.getElementById('t2').value=30;document.getElementById('t3').value=60;
    document.getElementById('fr').value=0.55;document.getElementById('fh').value=0.55;draw();
  });
  draw();
})();
</script>
</body>
</html>
