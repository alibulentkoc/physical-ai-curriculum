<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One-Joint Arm: Angle → Pose — Lesson 2.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--link:#1d4ed8;--joint:#10b981;--grip:#e11d48;--orient:#7c3aed;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 340px;min-width:300px}
  .panel{flex:1 1 220px;min-width:220px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.55}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .pos{font-weight:800;color:var(--grip)}
  .ori{font-weight:800;color:var(--orient)}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 360 320" role="img" aria-label="A one-joint arm rooted at the center; a slider changes the joint angle, the link rotates, and the gripper traces a circle. The gripper position and orientation update live.">
        <circle cx="180" cy="170" r="100" fill="none" stroke="#cbd5e1" stroke-dasharray="5 4"/>
        <!-- axes -->
        <line x1="60" y1="170" x2="300" y2="170" stroke="#e2e8f0"/>
        <line x1="180" y1="50" x2="180" y2="290" stroke="#e2e8f0"/>
        <line id="link" x1="180" y1="170" x2="280" y2="170" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
        <circle cx="180" cy="170" r="7" fill="#10b981"/>
        <circle id="grip" cx="280" cy="170" r="8" fill="#e11d48"/>
        <line id="orient" x1="280" y1="170" x2="312" y2="170" stroke="#7c3aed" stroke-width="2.5"/>
        <text x="180" y="192" text-anchor="middle" fill="#64748b" font-size="11">joint</text>
      </svg>
      <div class="hint">The single joint angle θ sets the entire pose: the gripper position (L·cosθ, L·sinθ) on a circle of radius L, and the orientation (purple) equal to θ.</div>
    </div>
    <div class="panel">
      <label>Joint angle θ: <span id="tV">0</span>°</label><input id="t" type="range" min="0" max="360" step="1" value="0">
      <label>Link length L: <span id="lV">0.50</span> m</label><input id="l" type="range" min="0.2" max="0.7" step="0.01" value="0.50">
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var cx=180, cy=170, scale=160; // px per meter (visual)
  function val(id){return +document.getElementById(id).value;}
  function draw(){
    var deg=val('t'), L=val('l'), th=deg*Math.PI/180;
    document.getElementById('tV').textContent=deg;
    document.getElementById('lV').textContent=L.toFixed(2);
    var x=L*Math.cos(th), y=L*Math.sin(th);
    // svg: y up -> subtract
    var gx=cx + x*scale, gy=cy - y*scale;
    document.getElementById('link').setAttribute('x2',gx);
    document.getElementById('link').setAttribute('y2',gy);
    var g=document.getElementById('grip'); g.setAttribute('cx',gx); g.setAttribute('cy',gy);
    // orientation arrow: along the link direction, fixed visual length
    var ox=gx + 34*Math.cos(th), oy=gy - 34*Math.sin(th);
    var o=document.getElementById('orient'); o.setAttribute('x1',gx); o.setAttribute('y1',gy); o.setAttribute('x2',ox); o.setAttribute('y2',oy);
    document.getElementById('msg').innerHTML =
      'position = (L·cosθ, L·sinθ) = (<span class="pos">'+x.toFixed(3)+', '+y.toFixed(3)+'</span>) m<br>'+
      'orientation = <span class="ori">'+deg+'°</span><br>'+
      'T₀¹(θ): rotation block R('+deg+'°) + translation above';
  }
  ['t','l'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('reset').addEventListener('click',function(){
    document.getElementById('t').value=0; document.getElementById('l').value=0.50; draw();
  });
  draw();
})();
</script>
</body>
</html>
