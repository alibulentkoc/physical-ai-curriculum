<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Two-Link Arm: Forward Kinematics — Lesson 3.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--link:#1d4ed8;--joint:#10b981;--grip:#e11d48;--orient:#7c3aed;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:780px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 360px;min-width:300px}
  .panel{flex:1 1 220px;min-width:220px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.6}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .pos{font-weight:800;color:var(--grip)}.ori{font-weight:800;color:var(--orient)}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 380 340" role="img" aria-label="A planar two-link arm rooted at the base; two sliders set the joint angles, the links update, and the gripper position and orientation (the accumulated angle) are read out live.">
        <line x1="40" y1="250" x2="360" y2="250" stroke="#e2e8f0"/>
        <line x1="70" y1="40" x2="70" y2="300" stroke="#e2e8f0"/>
        <circle id="reach" cx="70" cy="250" r="0" fill="none" stroke="#eef2ff" stroke-dasharray="4 4"/>
        <line id="link1" x1="70" y1="250" x2="170" y2="250" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
        <line id="link2" x1="170" y1="250" x2="250" y2="250" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
        <circle cx="70" cy="250" r="6" fill="#10b981"/>
        <circle id="elbow" cx="170" cy="250" r="5" fill="#10b981"/>
        <circle id="grip" cx="250" cy="250" r="8" fill="#e11d48"/>
        <line id="orient" x1="250" y1="250" x2="282" y2="250" stroke="#7c3aed" stroke-width="2.5"/>
        <text x="70" y="272" text-anchor="middle" fill="#64748b" font-size="11">base</text>
      </svg>
      <div class="hint">θ₁ swings the whole arm; θ₂ is measured relative to link 1. The gripper uses the accumulated angle θ₁+θ₂ — drag the sliders and watch the position formula update.</div>
    </div>
    <div class="panel">
      <label>θ₁ (shoulder): <span id="aV">30</span>°</label><input id="a" type="range" min="0" max="180" step="1" value="30">
      <label>θ₂ (elbow, relative): <span id="bV">60</span>°</label><input id="b" type="range" min="-150" max="150" step="1" value="60">
      <label>L₁: <span id="l1V">0.40</span> m</label><input id="l1" type="range" min="0.2" max="0.5" step="0.01" value="0.40">
      <label>L₂: <span id="l2V">0.30</span> m</label><input id="l2" type="range" min="0.15" max="0.4" step="0.01" value="0.30">
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var bx=70, by=250, scale=210; // px per meter
  function val(id){return +document.getElementById(id).value;}
  function draw(){
    var d1=val('a'), d2=val('b'), L1=val('l1'), L2=val('l2');
    var t1=d1*Math.PI/180, acc=(d1+d2)*Math.PI/180;
    document.getElementById('aV').textContent=d1;
    document.getElementById('bV').textContent=d2;
    document.getElementById('l1V').textContent=L1.toFixed(2);
    document.getElementById('l2V').textContent=L2.toFixed(2);
    var ex=bx + L1*Math.cos(t1)*scale, ey=by - L1*Math.sin(t1)*scale;
    var gx=ex + L2*Math.cos(acc)*scale, gy=ey - L2*Math.sin(acc)*scale;
    document.getElementById('link1').setAttribute('x2',ex);
    document.getElementById('link1').setAttribute('y2',ey);
    var el=document.getElementById('elbow'); el.setAttribute('cx',ex); el.setAttribute('cy',ey);
    var l2=document.getElementById('link2'); l2.setAttribute('x1',ex); l2.setAttribute('y1',ey); l2.setAttribute('x2',gx); l2.setAttribute('y2',gy);
    var g=document.getElementById('grip'); g.setAttribute('cx',gx); g.setAttribute('cy',gy);
    var ox=gx + 34*Math.cos(acc), oy=gy - 34*Math.sin(acc);
    var o=document.getElementById('orient'); o.setAttribute('x1',gx); o.setAttribute('y1',gy); o.setAttribute('x2',ox); o.setAttribute('y2',oy);
    var rc=document.getElementById('reach'); rc.setAttribute('r',(L1+L2)*scale);
    var X=L1*Math.cos(t1)+L2*Math.cos(acc), Y=L1*Math.sin(t1)+L2*Math.sin(acc);
    var ori=((d1+d2)%360+360)%360;
    document.getElementById('msg').innerHTML =
      'elbow = (L₁cosθ₁, L₁sinθ₁)<br>'+
      'gripper = (<span class="pos">'+X.toFixed(3)+', '+Y.toFixed(3)+'</span>) m<br>'+
      'orientation = θ₁+θ₂ = <span class="ori">'+ori.toFixed(0)+'°</span>';
  }
  ['a','b','l1','l2'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('reset').addEventListener('click',function(){
    document.getElementById('a').value=30;document.getElementById('b').value=60;
    document.getElementById('l1').value=0.40;document.getElementById('l2').value=0.30;draw();
  });
  draw();
})();
</script>
</body>
</html>
