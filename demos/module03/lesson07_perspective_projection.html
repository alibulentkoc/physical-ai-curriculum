<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perspective Projection — Lesson 2.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--fruit:#e11d48;--ray:#f59e0b;--teal:#0d9488;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 360px;min-width:300px}
  .panel{flex:1 1 240px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:12.5px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-top:10px;font-variant-numeric:tabular-nums}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 380 300" role="img" aria-label="A side view of a pinhole camera: a tomato at depth Z and height X sends a ray through the center of projection to an image plane at focal length f. Sliders set X, Z, and f; the projected image position x = fX/Z updates live.">
        <!-- optical axis -->
        <line x1="40" y1="150" x2="360" y2="150" stroke="#cbd5e1" stroke-dasharray="4 3"/>
        <text x="350" y="144" font-size="10" fill="#64748b">Z (optical axis)</text>
        <!-- center of projection -->
        <circle cx="70" cy="150" r="4" fill="#0f172a"/><text x="46" y="140" font-size="10" fill="#64748b">C</text>
        <!-- image plane -->
        <line id="plane" x1="130" y1="60" x2="130" y2="240" stroke="#94a3b8" stroke-width="2"/>
        <text id="planeLbl" x="130" y="255" font-size="10" fill="#64748b" text-anchor="middle">image plane (f)</text>
        <!-- ray -->
        <line id="ray" x1="70" y1="150" x2="300" y2="90" stroke="#f59e0b" stroke-width="1.6"/>
        <!-- tomato -->
        <circle id="fruit" cx="300" cy="90" r="10" fill="#e11d48"/>
        <!-- image point -->
        <circle id="imgpt" cx="130" cy="135" r="5" fill="#0d9488"/>
      </svg>
      <div class="hint">Side view (X up, Z right). The ray from the tomato through C hits the image plane at x = f·X/Z.</div>
    </div>
    <div class="panel">
      <label>X (height/offset): <span id="xV">0.06</span> m</label><input id="x" type="range" min="-0.12" max="0.12" step="0.005" value="0.06">
      <label>Z (depth): <span id="zV">0.30</span> m</label><input id="z" type="range" min="0.15" max="0.9" step="0.01" value="0.30">
      <label>f (focal length): <span id="fV">800</span> px</label><input id="f" type="range" min="300" max="1400" step="10" value="800">
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var CX=70, CY=150;       // center of projection on screen
  var planeX=130;          // image plane screen x (fixed position; f shown numerically + plane scaled)
  var sceneZpx=230;        // screen distance for the tomato along Z
  function draw(){
    var X=+document.getElementById('x').value;
    var Z=+document.getElementById('z').value;
    var f=+document.getElementById('f').value;
    document.getElementById('xV').textContent=X.toFixed(3);
    document.getElementById('zV').textContent=Z.toFixed(2);
    document.getElementById('fV').textContent=f;
    // place tomato on screen: depth maps to screen x, X maps to screen y (up = negative)
    var fruitScreenX = CX + sceneZpx*(Z/0.9);
    var fruitScreenY = CY - X*700;     // visual scale
    document.getElementById('fruit').setAttribute('cx',fruitScreenX);
    document.getElementById('fruit').setAttribute('cy',fruitScreenY);
    document.getElementById('ray').setAttribute('x2',fruitScreenX);
    document.getElementById('ray').setAttribute('y2',fruitScreenY);
    // image point: x = f X / Z (image-plane coordinate), draw on the plane line
    var ximg = f*X/Z;                  // in pixels
    var imgScreenY = CY - ximg*0.18;   // visual scale to fit
    document.getElementById('imgpt').setAttribute('cx',planeX);
    document.getElementById('imgpt').setAttribute('cy',imgScreenY);
    document.getElementById('msg').innerHTML =
      'x = f·X/Z = '+f+'·'+X.toFixed(3)+'/'+Z.toFixed(2)+' = <b>'+(ximg).toFixed(1)+' px</b>'+
      '<br><span style="color:#64748b">double Z → half x (1/Z); double f → double x.</span>';
  }
  ['x','z','f'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('reset').addEventListener('click',function(){
    document.getElementById('x').value=0.06;document.getElementById('z').value=0.30;document.getElementById('f').value=800;draw();
  });
  draw();
})();
</script>
</body>
</html>
