<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vector Playground — Lesson 2.10</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 320px;min-width:280px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  .panel{flex:1 1 210px;min-width:200px}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px}
  .readout div{margin:4px 0;font-variant-numeric:tabular-nums}
  .k{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg id="svg" viewBox="0 0 300 250"></svg>
    <div class="panel">
      <div class="readout" id="out"></div>
      <div class="hint">Everything from Unit 2 in one arrow. Drag the head: the <b>components</b> are the dashed axis shares, the <b>magnitude</b> is the length, the <b>direction</b> is the angle, and the <span style="color:#b45309">unit vector</span> is the pure-direction version with length 1.</div>
    </div>
  </div>
</div>
<script>
(function(){
  var W=300,H=250,ox=55,oy=190,s=44;
  var svg=document.getElementById("svg"), out=document.getElementById("out");
  var SVGNS="http://www.w3.org/2000/svg";
  var vx=2.2, vy=1.5;
  function el(n,a){ var e=document.createElementNS(SVGNS,n); for(var k in a) e.setAttribute(k,a[k]); return e; }
  function draw(){
    svg.innerHTML="";
    var defs=el("defs",{}); defs.innerHTML=
      '<marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#0d9488"/></marker>'+
      '<marker id="au" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b45309"/></marker>';
    svg.appendChild(defs);
    svg.appendChild(el("line",{x1:18,y1:oy,x2:W-12,y2:oy,stroke:"#cbd5e1","stroke-width":1}));
    svg.appendChild(el("line",{x1:ox,y1:H-10,x2:ox,y2:12,stroke:"#cbd5e1","stroke-width":1}));
    var hx=ox+vx*s, hy=oy-vy*s;
    svg.appendChild(el("line",{x1:hx,y1:hy,x2:hx,y2:oy,stroke:"#b45309","stroke-width":1.3,"stroke-dasharray":"4 3"}));
    svg.appendChild(el("line",{x1:hx,y1:hy,x2:ox,y2:hy,stroke:"#0369a1","stroke-width":1.3,"stroke-dasharray":"4 3"}));
    var mag=Math.sqrt(vx*vx+vy*vy)||1e-6;
    var upx=ox+vx/mag*s, upy=oy-vy/mag*s;
    svg.appendChild(el("line",{x1:ox,y1:oy,x2:upx,y2:upy,stroke:"#b45309","stroke-width":2.5,"marker-end":"url(#au)"}));
    svg.appendChild(el("line",{x1:ox,y1:oy,x2:hx,y2:hy,stroke:"#0d9488","stroke-width":3.5,"marker-end":"url(#ah)"}));
    svg.appendChild(el("circle",{cx:ox,cy:oy,r:4,fill:"#475569"}));
    var hd=el("circle",{cx:hx,cy:hy,r:11,fill:"#0d9488",opacity:0.2}); hd.style.cursor="grab"; svg.appendChild(hd);
    svg.appendChild(el("circle",{cx:hx,cy:hy,r:4,fill:"#0d9488"}));
    hd.addEventListener("pointerdown",function(e){ hd.setPointerCapture(e.pointerId);
      function mv(ev){ var r=svg.getBoundingClientRect(); var sx=(ev.clientX-r.left)/r.width*W, sy=(ev.clientY-r.top)/r.height*H; vx=Math.max(-0.5,Math.min(5,(sx-ox)/s)); vy=Math.max(-0.5,Math.min(3,(oy-sy)/s)); render(); }
      svg.addEventListener("pointermove",mv); hd.addEventListener("pointerup",function(){ svg.removeEventListener("pointermove",mv); },{once:true});
    });
  }
  function render(){
    draw();
    var mag=Math.sqrt(vx*vx+vy*vy)||1e-6, ang=Math.atan2(vy,vx)*180/Math.PI;
    out.innerHTML=
      '<div><span class="k" style="background:#0d9488"></span>vector: <b>['+vx.toFixed(2)+', '+vy.toFixed(2)+']</b></div>'+
      '<div><span class="k" style="background:#0369a1"></span>components: x='+vx.toFixed(2)+', y='+vy.toFixed(2)+'</div>'+
      '<div>magnitude: <b>'+mag.toFixed(2)+'</b></div>'+
      '<div>direction: <b>'+ang.toFixed(0)+'°</b></div>'+
      '<div><span class="k" style="background:#b45309"></span>unit: ['+(vx/mag).toFixed(2)+', '+(vy/mag).toFixed(2)+']</div>';
  }
  render();
})();
</script>
</body>
</html>
