<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transformation Playground — Lesson 4.9</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px}
  .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:260px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 210px;min-width:200px}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
  input[type=range]{width:100%}
  .row{display:flex;gap:8px;margin-top:10px}
  .row button{flex:1;appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer}
  .row button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12.5px;margin-top:10px;font-variant-numeric:tabular-nums}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg id="svg" viewBox="0 0 260 260"></svg>
    <div class="panel">
      <label>rotate θ</label><input type="range" id="rot" min="0" max="360" step="1" value="30">
      <label>scale</label><input type="range" id="scl" min="0.3" max="2.2" step="0.05" value="1.2">
      <div class="row"><button id="fx">reflect x</button><button id="fy">reflect y</button></div>
      <div class="readout" id="out"></div>
      <div class="hint">The whole unit composed into one operator: rotate, scale, and reflect the shape and watch the single combined matrix M update. Every move is one matrix multiply applied to the shape.</div>
    </div>
  </div>
</div>
<script>
(function(){
  var W=260,H=260,ox=130,oy=130,s=38;
  var svg=document.getElementById("svg"), out=document.getElementById("out");
  var SVGNS="http://www.w3.org/2000/svg";
  var shape=[[0.2,0.2],[1.5,0.2],[1.5,0.6],[0.6,0.6],[0.6,1.5],[0.2,1.5]];
  var fx=false, fy=false;
  function el(n,a){ var e=document.createElementNS(SVGNS,n); for(var k in a) e.setAttribute(k,a[k]); return e; }
  function mul(A,B){ return [A[0]*B[0]+A[1]*B[2], A[0]*B[1]+A[1]*B[3], A[2]*B[0]+A[3]*B[2], A[2]*B[1]+A[3]*B[3]]; }
  function ap(m,p){ return [m[0]*p[0]+m[1]*p[1], m[2]*p[0]+m[3]*p[1]]; }
  function sv(p){ return [ox+p[0]*s, oy-p[1]*s]; }
  function render(){
    var th=+document.getElementById("rot").value*Math.PI/180, k=+document.getElementById("scl").value;
    var M=[1,0,0,1];
    M=mul([k,0,0,k],M);
    if(fx) M=mul([1,0,0,-1],M);
    if(fy) M=mul([-1,0,0,1],M);
    M=mul([Math.cos(th),-Math.sin(th),Math.sin(th),Math.cos(th)],M);
    svg.innerHTML="";
    for(var g=-2;g<=2;g++){ if(g===0)continue;
      svg.appendChild(el("line",{x1:ox+g*s,y1:8,x2:ox+g*s,y2:H-8,stroke:"#eef2f7","stroke-width":1}));
      svg.appendChild(el("line",{x1:8,y1:oy+g*s,x2:W-8,y2:oy+g*s,stroke:"#eef2f7","stroke-width":1})); }
    svg.appendChild(el("line",{x1:8,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.3}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.3}));
    var op=shape.map(function(p){var c=sv(p);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:op,fill:"none",stroke:"#cbd5e1","stroke-width":1.2,"stroke-dasharray":"4 3"}));
    var tp=shape.map(function(p){var c=sv(ap(M,p));return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:tp,fill:"#0d948822",stroke:"#0d9488","stroke-width":2}));
    var f=function(x){return (Math.round(x*100)/100).toFixed(2);};
    out.innerHTML='combined M = [['+f(M[0])+', '+f(M[1])+'],<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;['+f(M[2])+', '+f(M[3])+']]';
  }
  document.getElementById("rot").addEventListener("input",render);
  document.getElementById("scl").addEventListener("input",render);
  document.getElementById("fx").addEventListener("click",function(){ fx=!fx; this.classList.toggle("on"); render(); });
  document.getElementById("fy").addEventListener("click",function(){ fy=!fy; this.classList.toggle("on"); render(); });
  render();
})();
</script>
</body>
</html>
