<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Convergence Stepper — Lesson 5.1</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--arm:#1d4ed8;--seed:#94a3b8;--joint:#10b981;--grip:#e11d48;--ok:#15803d;--okbg:#dcfce7;--bad:#b91c1c;--badbg:#fee2e2;--info:#1d4ed8;--infobg:#eff6ff;--err:#e11d48;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:820px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 380px;min-width:300px}
  .panel{flex:1 1 250px;min-width:240px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.7}
  .state{display:inline-block;padding:2px 9px;border-radius:999px;font-weight:700;font-size:12px}
  .state.run{background:var(--infobg);color:var(--info)}
  .state.ok{background:var(--okbg);color:var(--ok)}
  .state.bad{background:var(--badbg);color:var(--bad)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .btn:hover{background:var(--soft)}
  .btn.primary{background:var(--info);color:#fff;border-color:var(--info)}
  .btn.primary:hover{filter:brightness(1.05)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 380 320" role="img" aria-label="A two-link arm based at the center reaching toward a red target. The faint grey arm is the seed configuration; the blue arm is the current Newton iterate. A red dashed error arrow runs from the gripper to the target and shrinks as you step the iteration.">
        <circle cx="150" cy="170" r="140" fill="#ffffff" stroke="var(--line)" stroke-dasharray="3 4"/>
        <!-- seed arm (faint) -->
        <polyline id="armSeed" fill="none" stroke="var(--seed)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 4" opacity="0.7"/>
        <!-- current arm -->
        <polyline id="arm" fill="none" stroke="var(--arm)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle id="elbow" r="4.5" fill="#475569"/>
        <!-- error vector -->
        <line id="errvec" stroke="var(--err)" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ah)"/>
        <defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="var(--err)"/></marker></defs>
        <!-- base + gripper + target -->
        <circle cx="150" cy="170" r="6" fill="var(--joint)"/>
        <text x="150" y="191" text-anchor="middle" fill="var(--muted)" font-size="11">base</text>
        <circle id="grip" r="6" fill="var(--grip)"/>
        <circle id="target" cx="270" cy="130" r="8" fill="none" stroke="var(--grip)" stroke-width="2.5"/>
      </svg>
      <div class="hint">Set a target, seed, and gain α, then press <b>Step</b> to advance one Newton iteration: θ ← θ + α·J⁺·e. Watch the error norm and the arm. Try a large α (overshoot) or a target near the dashed edge (ill-conditioned, sluggish).</div>
    </div>
    <div class="panel">
      <label>target x: <span id="txV">0.50</span> m</label><input id="tx" type="range" min="-0.65" max="0.65" step="0.01" value="0.50">
      <label>target y: <span id="tyV">0.20</span> m</label><input id="ty" type="range" min="-0.65" max="0.65" step="0.01" value="0.20">
      <label>seed θ₁: <span id="s1V">10</span>°</label><input id="s1" type="range" min="-180" max="180" step="1" value="10">
      <label>seed θ₂: <span id="s2V">20</span>°</label><input id="s2" type="range" min="-180" max="180" step="1" value="20">
      <label>gain α: <span id="aV">1.00</span></label><input id="a" type="range" min="0.1" max="2.5" step="0.05" value="1.0">
      <div class="row">
        <button id="step" class="btn primary">Step ▶</button>
        <button id="run" class="btn">Run to converge</button>
        <button id="reset" class="btn">Reset</button>
      </div>
      <div class="readout" aria-live="polite" id="msg"></div>
      <div class="readout" id="plot" style="padding:8px"></div>
    </div>
  </div>
</div>
<script>
(function(){
  var L1=0.4, L2=0.3, S=140/0.75; // px per metre (workspace radius 0.7 -> ~130px)
  var bx=150, by=170;
  var el=function(id){return document.getElementById(id);};
  var theta=[rad(10),rad(20)], seed=[rad(10),rad(20)], iter=0, hist=[], status="run";
  function rad(d){return d*Math.PI/180;}
  function deg(r){return r*180/Math.PI;}
  function fk(t){return [L1*Math.cos(t[0])+L2*Math.cos(t[0]+t[1]), L1*Math.sin(t[0])+L2*Math.sin(t[0]+t[1])];}
  function jac(t){var s1=Math.sin(t[0]),s12=Math.sin(t[0]+t[1]),c1=Math.cos(t[0]),c12=Math.cos(t[0]+t[1]);
    return [[-L1*s1-L2*s12, -L2*s12],[L1*c1+L2*c12, L2*c12]];}
  function solve2(J,e){ // 2x2 solve J x = e (pseudoinverse = inverse when nonsingular; damped fallback)
    var a=J[0][0],b=J[0][1],c=J[1][0],d=J[1][1], det=a*d-b*c;
    if(Math.abs(det)<1e-6){ // damped least squares fallback near singularity
      var lam=0.08; // (JᵀJ+λ²I)⁻¹Jᵀ e
      var JT=[[a,c],[b,d]];
      var M=[[a*a+c*c+lam*lam, a*b+c*d],[a*b+c*d, b*b+d*d+lam*lam]];
      var dt=M[0][0]*M[1][1]-M[0][1]*M[1][0];
      var rhs=[JT[0][0]*e[0]+JT[0][1]*e[1], JT[1][0]*e[0]+JT[1][1]*e[1]];
      return [( M[1][1]*rhs[0]-M[0][1]*rhs[1])/dt, (-M[1][0]*rhs[0]+M[0][0]*rhs[1])/dt];
    }
    return [(d*e[0]-b*e[1])/det, (-c*e[0]+a*e[1])/det];
  }
  function tgt(){return [parseFloat(el('tx').value), parseFloat(el('ty').value)];}
  function toPx(p){return [bx+p[0]*S, by-p[1]*S];}
  function armPts(t){var e0=[L1*Math.cos(t[0]),L1*Math.sin(t[0])]; var g=fk(t); return [[0,0],e0,g];}
  function setPoly(id,t){var pts=armPts(t).map(toPx); el(id).setAttribute('points',pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ')); return pts;}
  function reachable(p){var r=Math.hypot(p[0],p[1]); return r<=L1+L2+1e-9 && r>=Math.abs(L1-L2)-1e-9;}

  function resetAll(){ seed=[rad(parseFloat(el('s1').value)), rad(parseFloat(el('s2').value))];
    theta=seed.slice(); iter=0; hist=[]; status="run";
    var e=sub(tgt(),fk(theta)); hist.push(norm(e)); draw(); }
  function sub(a,b){return [a[0]-b[0],a[1]-b[1]];}
  function norm(v){return Math.hypot(v[0],v[1]);}

  function stepOnce(){
    if(status!=="run") return;
    var p=tgt(); var e=sub(p,fk(theta)); var en=norm(e);
    if(en<1e-4){ status="ok"; draw(); return; }
    if(iter>=60){ status="bad"; draw(); return; }
    var J=jac(theta); var a=parseFloat(el('a').value);
    var dth=solve2(J,e); theta=[theta[0]+a*dth[0], theta[1]+a*dth[1]];
    iter++; var e2=sub(p,fk(theta)); hist.push(norm(e2));
    if(norm(e2)<1e-4) status="ok";
    else if(iter>=60) status="bad";
    draw();
  }
  function runAll(){ var guard=0; while(status==="run" && guard<200){ stepOnce(); guard++; } }

  function draw(){
    el('txV').textContent=tgt()[0].toFixed(2); el('tyV').textContent=tgt()[1].toFixed(2);
    el('s1V').textContent=el('s1').value; el('s2V').textContent=el('s2').value; el('aV').textContent=parseFloat(el('a').value).toFixed(2);
    setPoly('armSeed',seed); var pts=setPoly('arm',theta);
    el('elbow').setAttribute('cx',pts[1][0]); el('elbow').setAttribute('cy',pts[1][1]);
    var gpx=pts[2]; el('grip').setAttribute('cx',gpx[0]); el('grip').setAttribute('cy',gpx[1]);
    var tp=toPx(tgt()); el('target').setAttribute('cx',tp[0]); el('target').setAttribute('cy',tp[1]);
    el('errvec').setAttribute('x1',gpx[0]); el('errvec').setAttribute('y1',gpx[1]);
    el('errvec').setAttribute('x2',tp[0]); el('errvec').setAttribute('y2',tp[1]);
    var e=norm(sub(tgt(),fk(theta)));
    var badge = status==="ok" ? '<span class="state ok">converged</span>'
              : status==="bad" ? '<span class="state bad">max iterations</span>'
              : '<span class="state run">iterating</span>';
    var reach = reachable(tgt()) ? '' : ' &nbsp;<span class="state bad">target unreachable</span>';
    el('msg').innerHTML = badge + reach +
      '<br>iteration: <b>'+iter+'</b>'+
      '<br>error |e|: <b>'+e.toFixed(5)+'</b> m'+
      '<br>θ = ('+deg(theta[0]).toFixed(1)+'°, '+deg(theta[1]).toFixed(1)+'°)';
    drawPlot();
  }
  function drawPlot(){
    var w=210,h=70,pad=4; var n=hist.length;
    var max=Math.max.apply(null,hist.concat([1e-4]));
    var pts=hist.map(function(v,i){var x=pad+(n<=1?0:i/(n-1))*(w-2*pad); var y=h-pad-(v/max)*(h-2*pad); return x.toFixed(1)+','+y.toFixed(1);});
    el('plot').innerHTML='<div style="font-size:11px;color:var(--muted);margin-bottom:3px">error vs iteration</div>'+
      '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="70" role="img" aria-label="Error norm versus iteration, decreasing toward zero as the solver converges.">'+
      '<polyline fill="none" stroke="var(--info)" stroke-width="2" points="'+pts.join(' ')+'"/>'+
      (n?'<circle cx="'+pts[n-1].split(',')[0]+'" cy="'+pts[n-1].split(',')[1]+'" r="3" fill="var(--info)"/>':'')+
      '</svg>';
  }

  ['tx','ty','s1','s2'].forEach(function(id){el(id).addEventListener('input',resetAll);});
  el('a').addEventListener('input',draw);
  el('step').addEventListener('click',stepOnce);
  el('run').addEventListener('click',runAll);
  el('reset').addEventListener('click',resetAll);
  resetAll();
})();
</script>
</body>
</html>
