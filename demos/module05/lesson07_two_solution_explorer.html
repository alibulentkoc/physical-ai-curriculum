<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Two-Solution Explorer — Lesson 2.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--up:#0d9488;--down:#1d4ed8;--joint:#10b981;--grip:#e11d48;--ok:#15803d;--okbg:#dcfce7;--bad:#b91c1c;--badbg:#fee2e2;--bound:#b45309;--boundbg:#fef3c7;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:780px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 360px;min-width:300px}
  .panel{flex:1 1 230px;min-width:230px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px;touch-action:none}
  #target{cursor:grab}
  #target:active{cursor:grabbing}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.6}
  .state{display:inline-block;padding:2px 9px;border-radius:999px;font-weight:700;font-size:12px}
  .state.two{background:var(--okbg);color:var(--ok)}
  .state.one{background:var(--boundbg);color:var(--bound)}
  .state.zero{background:var(--badbg);color:var(--bad)}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .up{color:var(--up);font-weight:700}.down{color:var(--down);font-weight:700}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
  .btn:hover{background:var(--soft)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 380 340" role="img" aria-label="A two-link arm based at the center. Drag the red target inside the reachable ring to see two arm configurations, elbow-up in teal and elbow-down in blue, both reaching it. On the boundary they merge; outside the ring the target is unreachable.">
        <!-- annulus -->
        <circle id="outer" cx="150" cy="180" r="140" fill="#ecfdf5" stroke="#34d399"/>
        <circle id="inner" cx="150" cy="180" r="20" fill="#ffffff" stroke="#34d399"/>
        <!-- elbow-up arm (teal) -->
        <polyline id="armUp" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle id="elbowUp" r="4.5" fill="#0d9488"/>
        <!-- elbow-down arm (blue) -->
        <polyline id="armDown" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
        <circle id="elbowDown" r="4.5" fill="#1d4ed8"/>
        <!-- base -->
        <circle cx="150" cy="180" r="6" fill="#10b981"/>
        <text x="150" y="201" text-anchor="middle" fill="#64748b" font-size="11">base</text>
        <!-- target (draggable) -->
        <circle id="target" cx="270" cy="180" r="9" fill="#e11d48" stroke="#fff" stroke-width="2" tabindex="0" role="slider" aria-label="Target position. Use arrow keys to move." aria-valuetext="target"/>
      </svg>
      <div class="hint">Drag the red target (or focus it and use arrow keys). Inside the green ring there are <b>two</b> solutions; on the ring they <b>merge</b>; outside, the target is <b>unreachable</b>.</div>
    </div>
    <div class="panel">
      <label>L₁ (shoulder→elbow): <span id="l1V">0.40</span> m</label><input id="l1" type="range" min="0.20" max="0.50" step="0.01" value="0.40">
      <label>L₂ (elbow→gripper): <span id="l2V">0.30</span> m</label><input id="l2" type="range" min="0.15" max="0.40" step="0.01" value="0.30">
      <label>target x: <span id="txV">0.40</span> m</label><input id="tx" type="range" min="-0.80" max="0.80" step="0.01" value="0.40">
      <label>target y: <span id="tyV">0.00</span> m</label><input id="ty" type="range" min="-0.80" max="0.80" step="0.01" value="0.00">
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var bx=150, by=180, scale=200; // px per metre; base at (bx,by)
  var ids=['l1','l2','tx','ty'];
  function val(id){return +document.getElementById(id).value;}
  function setV(id,v){document.getElementById(id).value=v;}

  function ik(x,y,L1,L2){ // return list of [t1,t2]; merge tol matches notebooks
    var r2=x*x+y*y, c2=(r2-L1*L1-L2*L2)/(2*L1*L2);
    if(c2<-1-1e-9||c2>1+1e-9) return [];
    c2=Math.max(-1,Math.min(1,c2));
    var out=[];
    var signs=[1,-1];
    for(var i=0;i<signs.length;i++){
      var t2=signs[i]*Math.acos(c2);
      var t1=Math.atan2(y,x)-Math.atan2(L2*Math.sin(t2),L1+L2*Math.cos(t2));
      out.push([t1,t2]);
      if(Math.abs(Math.sin(t2))<1e-6) break; // boundary: solutions coincide
    }
    return out;
  }
  function pts(t1,t2,L1,L2){
    var ex=bx+scale*L1*Math.cos(t1), ey=by-scale*L1*Math.sin(t1);
    var gx=ex+scale*L2*Math.cos(t1+t2), gy=ey-scale*L2*Math.sin(t1+t2);
    return [[bx,by],[ex,ey],[gx,gy]];
  }
  function deg(r){return (r*180/Math.PI);}

  function draw(){
    var L1=val('l1'), L2=val('l2'), x=val('tx'), y=val('ty');
    document.getElementById('l1V').textContent=L1.toFixed(2);
    document.getElementById('l2V').textContent=L2.toFixed(2);
    document.getElementById('txV').textContent=x.toFixed(2);
    document.getElementById('tyV').textContent=y.toFixed(2);
    document.getElementById('outer').setAttribute('r',(L1+L2)*scale);
    document.getElementById('inner').setAttribute('r',Math.abs(L1-L2)*scale);
    // place target marker
    var px=bx+scale*x, py=by-scale*y;
    var tg=document.getElementById('target'); tg.setAttribute('cx',px); tg.setAttribute('cy',py);

    var sols=ik(x,y,L1,L2);
    var armUp=document.getElementById('armUp'), armDown=document.getElementById('armDown');
    var eUp=document.getElementById('elbowUp'), eDown=document.getElementById('elbowDown');
    function hide(){armUp.setAttribute('points','');armDown.setAttribute('points','');eUp.setAttribute('r',0);eDown.setAttribute('r',0);}
    var r=Math.hypot(x,y), msg=document.getElementById('msg'), state, body;

    if(sols.length===0){
      hide();
      state='<span class="state zero">0 — unreachable</span>';
      body='r = '+r.toFixed(3)+' m is outside the annulus ['+Math.abs(L1-L2).toFixed(2)+', '+(L1+L2).toFixed(2)+'].<br>No joint angles reach this target.';
    } else if(sols.length===1){
      var P=pts(sols[0][0],sols[0][1],L1,L2);
      armDown.setAttribute('points',P.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '));
      eDown.setAttribute('cx',P[1][0]);eDown.setAttribute('cy',P[1][1]);eDown.setAttribute('r',4.5);
      armUp.setAttribute('points','');eUp.setAttribute('r',0);
      state='<span class="state one">1 — boundary (merged)</span>';
      body='r = '+r.toFixed(3)+' m is on a boundary, so elbow-up and elbow-down coincide.<br>θ = ('+deg(sols[0][0]).toFixed(1)+'°, '+deg(sols[0][1]).toFixed(1)+'°)';
    } else {
      var Pd=pts(sols[0][0],sols[0][1],L1,L2); // +acos -> elbow-down
      var Pu=pts(sols[1][0],sols[1][1],L1,L2); // -acos -> elbow-up
      armDown.setAttribute('points',Pd.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '));
      armUp.setAttribute('points',Pu.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '));
      eDown.setAttribute('cx',Pd[1][0]);eDown.setAttribute('cy',Pd[1][1]);eDown.setAttribute('r',4.5);
      eUp.setAttribute('cx',Pu[1][0]);eUp.setAttribute('cy',Pu[1][1]);eUp.setAttribute('r',4.5);
      state='<span class="state two">2 — elbow-up &amp; elbow-down</span>';
      body='<span class="down">■ elbow-down</span> θ = ('+deg(sols[0][0]).toFixed(1)+'°, '+deg(sols[0][1]).toFixed(1)+'°)<br>'+
           '<span class="up">■ elbow-up</span> θ = ('+deg(sols[1][0]).toFixed(1)+'°, '+deg(sols[1][1]).toFixed(1)+'°)';
    }
    tg.setAttribute('aria-valuetext','target ('+x.toFixed(2)+', '+y.toFixed(2)+'), '+sols.length+' solution'+(sols.length===1?'':'s'));
    msg.innerHTML='<div style="margin-bottom:6px">'+state+'</div>'+body;
  }

  // pointer drag on the target
  var svg=document.getElementById('scene'), tg=document.getElementById('target'), dragging=false;
  function toModel(evt){
    var pt=svg.createSVGPoint(); pt.x=evt.clientX; pt.y=evt.clientY;
    var m=svg.getScreenCTM().inverse(); var p=pt.matrixTransform(m);
    var x=(p.x-bx)/scale, y=(by-p.y)/scale;
    x=Math.max(-0.80,Math.min(0.80,x)); y=Math.max(-0.80,Math.min(0.80,y));
    setV('tx',x.toFixed(2)); setV('ty',y.toFixed(2)); draw();
  }
  tg.addEventListener('pointerdown',function(e){dragging=true;tg.setPointerCapture(e.pointerId);});
  tg.addEventListener('pointermove',function(e){if(dragging)toModel(e);});
  tg.addEventListener('pointerup',function(e){dragging=false;});
  // keyboard accessibility on the target
  tg.addEventListener('keydown',function(e){
    var step=e.shiftKey?0.05:0.01, x=val('tx'), y=val('ty'), used=true;
    if(e.key==='ArrowRight')x+=step; else if(e.key==='ArrowLeft')x-=step;
    else if(e.key==='ArrowUp')y+=step; else if(e.key==='ArrowDown')y-=step; else used=false;
    if(used){e.preventDefault();setV('tx',Math.max(-0.8,Math.min(0.8,x)).toFixed(2));setV('ty',Math.max(-0.8,Math.min(0.8,y)).toFixed(2));draw();}
  });
  ids.forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  document.getElementById('reset').addEventListener('click',function(){
    setV('l1',0.40);setV('l2',0.30);setV('tx',0.40);setV('ty',0.00);draw();
  });
  draw();
})();
</script>
</body>
</html>
