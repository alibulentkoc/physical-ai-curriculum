<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>The SE(2) Transformation — Lesson 3.2</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 280px;min-width:260px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 220px;min-width:210px}
  label{font-size:12px;color:var(--muted);display:block;margin:9px 0 4px} input[type=range]{width:100%}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:10px}
  .cell{height:32px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:6px;font-size:13px;font-variant-numeric:tabular-nums}
  .R{background:#e0f2fe;border-color:#bae6fd}.T{background:#dcfce7;border-color:#bbf7d0}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 280 250"></svg>
  <div class="panel">
    <label>θ (heading)</label><input type="range" id="th" min="0" max="360" step="1" value="90">
    <label>t_x</label><input type="range" id="tx" min="-1" max="3" step="0.05" value="2">
    <label>t_y</label><input type="range" id="ty" min="-1" max="3" step="0.05" value="1">
    <div class="grid" id="grid"></div>
    <div class="hint">SE(2) = a 3×3: the <span style="color:#0369a1">blue rotation block</span> sets heading, the <span style="color:#15803d">green column</span> sets position. Move the sliders and watch both the matrix and the robot frame update together.</div>
  </div>
</div></div>
<script>(function(){
  var W=280,H=250,ox=50,oy=180,s=42,svg=document.getElementById("svg"),NS="http://www.w3.org/2000/svg";
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function render(){
    var th=+document.getElementById("th").value*Math.PI/180,tx=+document.getElementById("tx").value,ty=+document.getElementById("ty").value;
    var c=Math.cos(th),sn=Math.sin(th);
    var M=[c,-sn,tx, sn,c,ty, 0,0,1],cls=["R","R","T","R","R","T","","",""];
    var g=document.getElementById("grid");g.innerHTML="";
    M.forEach(function(v,i){var d=document.createElement("div");d.className="cell "+cls[i];d.textContent=(Math.round(v*100)/100).toFixed(2);g.appendChild(d);});
    svg.innerHTML="";
    var defs=el("defs",{});defs.innerHTML='<marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0d9488"/></marker>';svg.appendChild(defs);
    svg.appendChild(el("line",{x1:10,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.2}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.2}));
    // robot frame at (tx,ty), heading th
    var o=sv([tx,ty]);
    var xa=[o[0]+34*c,o[1]-34*sn], ya=[o[0]-34*sn,o[1]-34*c];
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:xa[0],y2:xa[1],stroke:"#0d9488","stroke-width":3,"marker-end":"url(#ah)"}));
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:ya[0],y2:ya[1],stroke:"#b45309","stroke-width":2.5}));
    svg.appendChild(el("circle",{cx:o[0],cy:o[1],r:5,fill:"#475569"}));
    svg.appendChild(el("text",{x:xa[0]+3,y:xa[1],"font-size":10,fill:"#0d9488"})).textContent="heading";
  }
  ["th","tx","ty"].forEach(function(id){document.getElementById(id).addEventListener("input",render);});
  render();
})();</script></body></html>
