<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Extrinsics — Lesson 7.2</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;--vio:#7c3aed;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:270px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 200px;min-width:190px}
  label{font-size:12px;color:var(--muted);display:block;margin:9px 0 4px} input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px;font-variant-numeric:tabular-nums}
  .readout div{margin:3px 0} .arm{color:#0d9488;font-weight:700}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 300 250"></svg>
  <div class="panel">
    <label>mount offset along wrist</label><input type="range" id="off" min="0" max="0.4" step="0.01" value="0.1"/>
    <label>camera tilt (extrinsic R)</label><input type="range" id="tilt" min="-50" max="50" step="1" value="0"/>
    <div class="readout" id="out"></div>
    <div class="hint">The <b>extrinsics</b> pose says where the camera sits relative to the arm — a mount offset plus an orientation. A detection 0.30 m ahead lands in the arm frame through that pose; the offset and tilt both shape the answer.</div>
  </div>
</div></div>
<script>(function(){
  var W=300,H=250,ox=60,oy=140,s=160,svg=document.getElementById("svg"),out=document.getElementById("out"),NS="http://www.w3.org/2000/svg";
  var det=[0.3,0];
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function applyPose(P,l){var c=Math.cos(P.th),sn=Math.sin(P.th);return [P.x+c*l[0]-sn*l[1], P.y+sn*l[0]+c*l[1]];}
  function render(){
    var off=+document.getElementById("off").value, tilt=+document.getElementById("tilt").value*Math.PI/180;
    var ext={x:off,y:0,th:tilt}; // camera in arm frame
    var armPt=applyPose(ext,det);
    svg.innerHTML="";
    var defs=el("defs",{});defs.innerHTML='<marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7c3aed"/></marker>';svg.appendChild(defs);
    var o=sv([0,0]);
    // arm frame axes
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:o[0]+50,y2:o[1],stroke:"#0d9488","stroke-width":2}));
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:o[0],y2:o[1]-50,stroke:"#0d9488","stroke-width":1.6,opacity:.6}));
    svg.appendChild(el("circle",{cx:o[0],cy:o[1],r:5,fill:"#0d9488"}));
    svg.appendChild(el("text",{x:o[0]+3,y:o[1]+16,"font-size":10,fill:"#0d9488"})).textContent="arm (wrist)";
    // camera at ext
    var co=sv([ext.x,ext.y]),c=Math.cos(tilt),sn=Math.sin(tilt);
    svg.appendChild(el("line",{x1:co[0],y1:co[1],x2:co[0]+30*c,y2:co[1]-30*sn,stroke:"#7c3aed","stroke-width":2.5,"marker-end":"url(#ah)"}));
    svg.appendChild(el("rect",{x:co[0]-6,y:co[1]-6,width:12,height:12,rx:2,fill:"#7c3aed"}));
    svg.appendChild(el("text",{x:co[0]-4,y:co[1]-12,"font-size":9,fill:"#7c3aed"})).textContent="cam";
    var ap=sv(armPt);
    svg.appendChild(el("line",{x1:co[0],y1:co[1],x2:ap[0],y2:ap[1],stroke:"#cbd5e1","stroke-width":1.2,"stroke-dasharray":"3 3"}));
    svg.appendChild(el("circle",{cx:ap[0],cy:ap[1],r:9,fill:"#ef4444"}));
    var f=function(x){return (Math.round(x*100)/100).toFixed(2);};
    out.innerHTML='<div>extrinsics: offset '+f(off)+' m, tilt '+Math.round(tilt*180/Math.PI)+'°</div>'+
      '<div style="color:#7c3aed">detection in camera: (0.30, 0.00)</div>'+
      '<div class="arm">detection in arm: ('+f(armPt[0])+', '+f(armPt[1])+')</div>';
  }
  ["off","tilt"].forEach(function(id){document.getElementById(id).addEventListener("input",render);});
  render();
})();</script></body></html>
