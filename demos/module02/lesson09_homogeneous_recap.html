<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homogeneous Coordinates Playground — Lesson 2.5</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:270px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 210px;min-width:200px}
  label{font-size:12px;color:var(--muted);display:block;margin:9px 0 4px} input[type=range]{width:100%}
  .tog{font-size:13px;display:flex;gap:7px;align-items:center;margin-top:8px;cursor:pointer}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12.5px;margin-top:10px;font-variant-numeric:tabular-nums}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 300 250"></svg>
  <div class="panel">
    <label>rotation θ</label><input type="range" id="th" min="0" max="360" step="1" value="35">
    <label>translate tx</label><input type="range" id="tx" min="-1" max="3" step="0.05" value="1">
    <label>translate ty</label><input type="range" id="ty" min="-1" max="2" step="0.05" value="0.5">
    <label class="tog"><input type="checkbox" id="dir"> treat as a direction (w=0)</label>
    <div class="readout" id="out"></div>
    <div class="hint">The whole unit: a single 3×3 homogeneous transform carries rotation + translation. Flip the w-tag and the same transform translates a point but leaves a direction's heading untouched.</div>
  </div>
</div></div>
<script>(function(){
  var W=300,H=250,ox=110,oy=150,s=40,svg=document.getElementById("svg"),out=document.getElementById("out"),NS="http://www.w3.org/2000/svg";
  var shape=[[0,0],[1.2,0],[1.2,0.4],[0.4,0.4],[0.4,1.2],[0,1.2]];
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function render(){
    var th=+document.getElementById("th").value*Math.PI/180,tx=+document.getElementById("tx").value,ty=+document.getElementById("ty").value;
    var w=document.getElementById("dir").checked?0:1;
    var M=[Math.cos(th),-Math.sin(th),tx*w, Math.sin(th),Math.cos(th),ty*w, 0,0,1];
    function ap(p){return [M[0]*p[0]+M[1]*p[1]+M[2], M[3]*p[0]+M[4]*p[1]+M[5]];}
    svg.innerHTML="";
    svg.appendChild(el("line",{x1:10,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.2}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.2}));
    var op=shape.map(function(p){var c=sv(p);return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:op,fill:"none",stroke:"#cbd5e1","stroke-width":1.2,"stroke-dasharray":"4 3"}));
    var tp=shape.map(function(p){var c=sv(ap(p));return c[0]+","+c[1];}).join(" ");
    svg.appendChild(el("polygon",{points:tp,fill:"#0d948822",stroke:"#0d9488","stroke-width":2}));
    var f=function(x){return (Math.round(x*100)/100).toFixed(2);};
    out.innerHTML='w-tag: <b>'+w+'</b> ('+(w?"point — translates":"direction — translation ignored")+')<br>'+
      'translation column used: ('+f(tx*w)+', '+f(ty*w)+')';
  }
  ["th","tx","ty"].forEach(function(id){document.getElementById(id).addEventListener("input",render);});
  document.getElementById("dir").addEventListener("change",render);
  render();
})();</script></body></html>
