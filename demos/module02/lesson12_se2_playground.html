<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SE(2) Playground — Lesson 3.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--accent:#0ea5e9;--teal:#0d9488;--p:#8b5cf6;--ok:#15803d;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 340px;min-width:300px}
  .panel{flex:1 1 250px;min-width:240px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:13px;color:var(--muted);display:block;margin-top:11px}
  input[type=range]{width:100%}
  .mtx{display:inline-grid;grid-template-columns:auto auto auto;gap:3px 12px;border-left:2px solid var(--ink);border-right:2px solid var(--ink);padding:6px 10px;font-variant-numeric:tabular-nums;font-weight:700;margin-top:10px;font-size:13px}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-top:10px}
  .tag{display:inline-block;padding:3px 10px;border-radius:999px;font-weight:700;font-size:12.5px}
  .ok{background:#dcfce7;color:#15803d}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:13.5px;font-weight:700;cursor:pointer;margin-top:10px}
  .btn.primary{background:#0f172a;color:#fff;border-color:#0f172a}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 360 320" role="img" aria-label="A greenhouse-object outline transformed by an SE(2) matrix set with rotation and translation sliders, with an inverse button that returns it to the start. A ghost shows the original.">
        <line x1="20" y1="230" x2="345" y2="230" stroke="#e2e8f0"/>
        <line x1="90" y1="20" x2="90" y2="300" stroke="#e2e8f0"/>
        <circle cx="90" cy="230" r="3.5" fill="#0f172a"/><text x="66" y="246" font-size="10" fill="#64748b">origin</text>
        <polygon id="ghost" points="" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
        <polygon id="shape" points="" fill="#0ea5e933" stroke="#0ea5e9" stroke-width="2"/>
        <line id="edge" x1="0" y1="0" x2="0" y2="0" stroke="#15803d" stroke-width="3"/>
      </svg>
      <div class="hint">Set rotation and translation, then use <b>Apply inverse</b> to send the shape back to the dashed original.</div>
    </div>
    <div class="panel">
      <label for="th">Rotation θ: <span id="thV">35</span>°</label>
      <input id="th" type="range" min="0" max="360" step="1" value="35">
      <label for="tx">Translate x: <span id="txV">1.5</span></label>
      <input id="tx" type="range" min="-2" max="2.5" step="0.1" value="1.5">
      <label for="ty">Translate y: <span id="tyV">0.8</span></label>
      <input id="ty" type="range" min="-1.5" max="1.5" step="0.1" value="0.8">
      <div>T = <span class="mtx" id="mtx"></span></div>
      <div class="readout" aria-live="polite">
        tracked edge length: <b id="edgelen">—</b><br>
        <span class="tag ok" id="rigidtag">rigid: length preserved</span>
      </div>
      <button id="apply" class="btn primary">Apply T</button>
      <button id="inv" class="btn">Apply inverse</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  var OX=90, OY=230, S=55;
  var base=[[0.2,0.2],[1.4,0.2],[1.5,1.0],[0.8,1.4],[0.1,1.0]];
  var th=35, tx=1.5, ty=0.8;
  var mode='forward'; // 'forward' = T applied, 'inverse' = T^-1 applied, 'none'
  var shape=document.getElementById('shape'), ghost=document.getElementById('ghost'), edge=document.getElementById('edge');
  var mtx=document.getElementById('mtx'), edgelen=document.getElementById('edgelen');
  function P(p){return (OX+p[0]*S)+','+(OY-p[1]*S);}
  function T(p){var a=th*Math.PI/180;return [p[0]*Math.cos(a)-p[1]*Math.sin(a)+tx, p[0]*Math.sin(a)+p[1]*Math.cos(a)+ty];}
  function Tinv(p){var a=th*Math.PI/180;var x=p[0]-tx,y=p[1]-ty;return [x*Math.cos(a)+y*Math.sin(a), -x*Math.sin(a)+y*Math.cos(a)];}
  function cur(p){return mode==='forward'?T(p):(mode==='inverse'?Tinv(T(p)):p);}
  function draw(){
    document.getElementById('thV').textContent=Math.round(th);
    document.getElementById('txV').textContent=tx.toFixed(1);
    document.getElementById('tyV').textContent=ty.toFixed(1);
    var a=th*Math.PI/180,c=Math.cos(a),s=Math.sin(a);
    mtx.innerHTML='<span>'+c.toFixed(2)+'</span><span>'+(-s).toFixed(2)+'</span><span>'+tx.toFixed(1)+'</span>'+
                  '<span>'+s.toFixed(2)+'</span><span>'+c.toFixed(2)+'</span><span>'+ty.toFixed(1)+'</span>'+
                  '<span>0</span><span>0</span><span>1</span>';
    ghost.setAttribute('points', base.map(P).join(' '));
    var pts=base.map(cur);
    shape.setAttribute('points', pts.map(P).join(' '));
    // tracked edge = first two vertices
    edge.setAttribute('x1',OX+pts[0][0]*S); edge.setAttribute('y1',OY-pts[0][1]*S);
    edge.setAttribute('x2',OX+pts[1][0]*S); edge.setAttribute('y2',OY-pts[1][1]*S);
    var len=Math.hypot(pts[0][0]-pts[1][0],pts[0][1]-pts[1][1]);
    edgelen.textContent=len.toFixed(3)+' (always '+Math.hypot(base[0][0]-base[1][0],base[0][1]-base[1][1]).toFixed(3)+')';
  }
  document.getElementById('th').addEventListener('input',function(){th=+this.value;mode='forward';draw();});
  document.getElementById('tx').addEventListener('input',function(){tx=+this.value;mode='forward';draw();});
  document.getElementById('ty').addEventListener('input',function(){ty=+this.value;mode='forward';draw();});
  document.getElementById('apply').addEventListener('click',function(){mode='forward';draw();});
  document.getElementById('inv').addEventListener('click',function(){mode='inverse';draw();});
  document.getElementById('reset').addEventListener('click',function(){th=35;tx=1.5;ty=0.8;mode='forward';document.getElementById('th').value=35;document.getElementById('tx').value=1.5;document.getElementById('ty').value=0.8;draw();});
  draw();
})();
</script>
</body>
</html>
