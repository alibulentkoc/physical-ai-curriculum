<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Pose Is a Transformation — Lesson 6.2</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;--vio:#7c3aed;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:270px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 200px;min-width:190px}
  label{font-size:11px;color:var(--muted);display:block;margin:7px 0 3px} input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px;font-variant-numeric:tabular-nums}
  .readout div{margin:3px 0}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 300 250"></svg>
  <div class="panel">
    <label>base heading (in world)</label><input type="range" id="bth" min="0" max="360" step="1" value="30">
    <label>base position x</label><input type="range" id="bx" min="0.3" max="3" step="0.05" value="1.2">
    <label>gripper heading (in base)</label><input type="range" id="gth" min="0" max="360" step="1" value="40">
    <div class="readout" id="out"></div>
    <div class="hint">A pose <i>is</i> a transform. The gripper's pose in the world is T<sub>W←B</sub> · T<sub>B←G</sub> — the inner "base" cancels. Move the base and the gripper rides along; its world pose is the product.</div>
  </div>
</div></div>
<script>(function(){
  var W=300,H=250,ox=40,oy=200,s=52,svg=document.getElementById("svg"),out=document.getElementById("out"),NS="http://www.w3.org/2000/svg";
  var gOffset=[1.0,0.0];
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function compose(A,B){var c=Math.cos(A.th),sn=Math.sin(A.th);return {x:A.x+c*B.x-sn*B.y, y:A.y+sn*B.x+c*B.y, th:A.th+B.th};}
  function frame(P,col,name){var o=sv([P.x,P.y]),c=Math.cos(P.th),sn=Math.sin(P.th);
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:o[0]+28*c,y2:o[1]-28*sn,stroke:col,"stroke-width":2.5,"marker-end":"url(#a"+col.slice(1)+")"}));
    svg.appendChild(el("line",{x1:o[0],y1:o[1],x2:o[0]-22*sn,y2:o[1]-22*c,stroke:col,"stroke-width":2,opacity:.6}));
    svg.appendChild(el("circle",{cx:o[0],cy:o[1],r:4,fill:col}));
    svg.appendChild(el("text",{x:o[0]+5,y:o[1]+15,"font-size":10,fill:col})).textContent=name;}
  function render(){
    var base={x:+document.getElementById("bx").value,y:0.6,th:+document.getElementById("bth").value*Math.PI/180};
    var gInB={x:gOffset[0],y:gOffset[1],th:+document.getElementById("gth").value*Math.PI/180};
    var gInW=compose(base,gInB);
    svg.innerHTML="";
    var defs=el("defs",{});defs.innerHTML=
      '<marker id="a475569" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>'+
      '<marker id="a0d9488" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0d9488"/></marker>';svg.appendChild(defs);
    svg.appendChild(el("line",{x1:10,y1:oy,x2:W-8,y2:oy,stroke:"#e2e8f0","stroke-width":1.2}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#e2e8f0","stroke-width":1.2}));
    svg.appendChild(el("text",{x:ox+3,y:oy-3,"font-size":9,fill:"#94a3b8"})).textContent="world";
    // link base->gripper
    var bo=sv([base.x,base.y]),go=sv([gInW.x,gInW.y]);
    svg.appendChild(el("line",{x1:bo[0],y1:bo[1],x2:go[0],y2:go[1],stroke:"#cbd5e1","stroke-width":1.3,"stroke-dasharray":"3 3"}));
    frame(base,"#475569","base");
    frame(gInW,"#0d9488","gripper");
    var f=function(x){return (Math.round(x*100)/100).toFixed(2);};
    out.innerHTML='<div>base in world: ('+f(base.x)+', '+f(base.y)+', '+Math.round(base.th*180/Math.PI)+'°)</div>'+
      '<div>gripper in base: ('+f(gInB.x)+', '+f(gInB.y)+', '+Math.round(gInB.th*180/Math.PI)+'°)</div>'+
      '<div style="color:#0d9488"><b>gripper in world: ('+f(gInW.x)+', '+f(gInW.y)+', '+Math.round(gInW.th*180/Math.PI)+'°)</b></div>';
  }
  ["bth","bx","gth"].forEach(function(id){document.getElementById(id).addEventListener("input",render);});
  render();
})();</script></body></html>
