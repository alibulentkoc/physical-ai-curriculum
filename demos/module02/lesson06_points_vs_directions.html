<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Points vs Directions — Lesson 2.2</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--green:#15803d;--accent:#0d9488;--bad:#b91c1c;}
  *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:680px;margin:0 auto;padding:8px} .stage{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  svg{flex:1 1 300px;min-width:270px;width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  .panel{flex:1 1 200px;min-width:190px}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px} input[type=range]{width:100%}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13px;font-variant-numeric:tabular-nums}
  .readout div{margin:4px 0} .pt{color:#0d9488}.dir{color:#b45309}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}
</style></head><body>
<div class="wrap"><div class="stage">
  <svg id="svg" viewBox="0 0 300 240"></svg>
  <div class="panel">
    <label>translate by (tx, 0)</label><input type="range" id="tx" min="0" max="3" step="0.05" value="0">
    <div class="readout" id="out"></div>
    <div class="hint">Translate both: the <span class="pt">point (w=1)</span> moves, but the <span class="dir">direction (w=0)</span> keeps its values. That's why a surface normal is tagged w=0 — a direction has no location to shift.</div>
  </div>
</div></div>
<script>(function(){
  var W=300,H=240,ox=40,oy=190,s=42,svg=document.getElementById("svg"),out=document.getElementById("out"),NS="http://www.w3.org/2000/svg";
  var pt=[2,3],dir=[2,3];
  function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
  function sv(p){return [ox+p[0]*s,oy-p[1]*s];}
  function render(){
    var tx=+document.getElementById("tx").value;
    svg.innerHTML="";
    var defs=el("defs",{});defs.innerHTML='<marker id="ad" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b45309"/></marker>';svg.appendChild(defs);
    svg.appendChild(el("line",{x1:10,y1:oy,x2:W-8,y2:oy,stroke:"#cbd5e1","stroke-width":1.2}));
    svg.appendChild(el("line",{x1:ox,y1:H-8,x2:ox,y2:8,stroke:"#cbd5e1","stroke-width":1.2}));
    // point translates
    var p=sv([pt[0]+tx,pt[1]]), p0=sv(pt);
    if(tx>0.02) svg.appendChild(el("circle",{cx:p0[0],cy:p0[1],r:7,fill:"#0d9488",opacity:.2}));
    svg.appendChild(el("circle",{cx:p[0],cy:p[1],r:10,fill:"#0d9488"}));
    svg.appendChild(el("text",{x:p[0]+12,y:p[1]+4,"font-size":10,fill:"#0d9488"})).textContent="point";
    // direction does NOT translate (drawn as arrow from a moving base to show it keeps shape) — anchor at fixed base
    var b=sv([0.4,0.4]); var dh=sv([0.4+dir[0]*0.7,0.4+dir[1]*0.7]);
    svg.appendChild(el("line",{x1:b[0],y1:b[1],x2:dh[0],y2:dh[1],stroke:"#b45309","stroke-width":3,"marker-end":"url(#ad)"}));
    svg.appendChild(el("text",{x:dh[0]+6,y:dh[1],"font-size":10,fill:"#b45309"})).textContent="direction";
    out.innerHTML='<div class="pt">point: ['+(pt[0]+tx).toFixed(2)+', '+pt[1].toFixed(2)+', 1] — moved by '+tx.toFixed(2)+'</div>'+
      '<div class="dir">direction: ['+dir[0].toFixed(2)+', '+dir[1].toFixed(2)+', 0] — unchanged</div>';
  }
  document.getElementById("tx").addEventListener("input",render);
  render();
})();</script></body></html>
