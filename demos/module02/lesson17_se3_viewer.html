<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SE(3) Viewer — Lesson 4.3</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--x:#e11d48;--y:#15803d;--z:#1d4ed8;--teal:#0d9488;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:var(--ink);background:transparent}
  .wrap{max-width:760px;margin:0 auto;padding:8px}
  .demo{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .stage{flex:1 1 340px;min-width:300px}
  .panel{flex:1 1 250px;min-width:240px}
  svg{width:100%;height:auto;background:var(--soft);border:1px solid var(--line);border-radius:12px}
  label{font-size:13px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%}
  .mtx{display:inline-grid;grid-template-columns:repeat(4,auto);gap:3px 10px;border-left:2px solid var(--ink);border-right:2px solid var(--ink);padding:6px 9px;font-variant-numeric:tabular-nums;font-weight:700;margin-top:10px;font-size:12px}
  .mtx .r{color:#0284c7}.mtx .tt{color:var(--teal)}
  .readout{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;margin-top:10px}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .axx{stroke:var(--x)}.axy{stroke:var(--y)}.axz{stroke:var(--z)}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo">
    <div class="stage">
      <svg id="scene" viewBox="0 0 360 340" role="img" aria-label="A faux-3D isometric gripper frame whose orientation and position follow a 3D rotation axis, angle, and translation; the live 4x4 SE(3) matrix is shown. Rotating changes the rotation block; translating changes the last column. The frame never changes size.">
        <!-- floor -->
        <polygon points="40,260 230,260 320,215 130,215" fill="#eef2f7" stroke="#dbe3ea"/>
        <!-- world axes from origin -->
        <g id="world"></g>
        <!-- gripper frame -->
        <g id="frame"></g>
      </svg>
      <div class="hint">Faux-3D, one fixed viewpoint. Rotating changes only the upper-left block; translating changes only the last column — size never changes (rigid).</div>
    </div>
    <div class="panel">
      <label>Rotation axis</label>
      <select id="axis" style="width:100%;padding:6px;border:1px solid var(--line);border-radius:8px">
        <option value="z">z (yaw)</option><option value="x">x (pitch)</option><option value="y">y (roll)</option>
      </select>
      <label for="ang">Angle: <span id="angV">35</span>°</label>
      <input id="ang" type="range" min="0" max="360" step="1" value="35">
      <label for="tx">Translate x: <span id="txV">0.6</span></label>
      <input id="tx" type="range" min="-1" max="1.4" step="0.05" value="0.6">
      <label for="ty">Translate y: <span id="tyV">0.3</span></label>
      <input id="ty" type="range" min="-1" max="1.2" step="0.05" value="0.3">
      <label for="tz">Translate z: <span id="tzV">0.7</span></label>
      <input id="tz" type="range" min="0" max="1.4" step="0.05" value="0.7">
      <div>T = <span class="mtx" id="mtx"></span></div>
      <div class="readout" aria-live="polite" id="msg"></div>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
</div>
<script>
(function(){
  // faux-3D isometric projection: world (x,y,z) -> screen
  var OX=130, OY=215, S=90;
  function proj(p){ // p=[x,y,z]
    var sx = OX + (p[0]-p[1])*0.86*S*0.55;
    var sy = OY - (p[2])*S*0.7 - (p[0]+p[1])*0.5*S*0.30;
    return [sx,sy];
  }
  var axis='z', ang=35, t=[0.6,0.3,0.7];
  function deg(d){return d*Math.PI/180;}
  function R(){
    var a=deg(ang),c=Math.cos(a),s=Math.sin(a);
    if(axis==='z') return [[c,-s,0],[s,c,0],[0,0,1]];
    if(axis==='x') return [[1,0,0],[0,c,-s],[0,s,c]];
    return [[c,0,s],[0,1,0],[-s,0,c]];
  }
  function mul(M,v){return [M[0][0]*v[0]+M[0][1]*v[1]+M[0][2]*v[2], M[1][0]*v[0]+M[1][1]*v[1]+M[1][2]*v[2], M[2][0]*v[0]+M[2][1]*v[1]+M[2][2]*v[2]];}
  function add(a,b){return [a[0]+b[0],a[1]+b[1],a[2]+b[2]];}
  function line(p,q,cls,w){var P=proj(p),Q=proj(q);return '<line x1="'+P[0]+'" y1="'+P[1]+'" x2="'+Q[0]+'" y2="'+Q[1]+'" class="'+cls+'" stroke-width="'+(w||2)+'"/>';}
  function draw(){
    document.getElementById('angV').textContent=Math.round(ang);
    document.getElementById('txV').textContent=t[0].toFixed(2);
    document.getElementById('tyV').textContent=t[1].toFixed(2);
    document.getElementById('tzV').textContent=t[2].toFixed(2);
    // world axes
    document.getElementById('world').innerHTML =
      line([0,0,0],[1.3,0,0],'axx',1.3)+line([0,0,0],[0,1.3,0],'axy',1.3)+line([0,0,0],[0,0,1.3],'axz',1.3);
    // gripper frame: origin t, axes rotated by R, fixed unit length (rigid)
    var Rm=R(), o=t;
    var ex=add(o,mul(Rm,[0.5,0,0])), ey=add(o,mul(Rm,[0,0.5,0])), ez=add(o,mul(Rm,[0,0,0.5]));
    var O=proj(o);
    document.getElementById('frame').innerHTML =
      line(o,ex,'axx',3)+line(o,ey,'axy',3)+line(o,ez,'axz',3)+
      '<circle cx="'+O[0]+'" cy="'+O[1]+'" r="3.5" fill="#0f172a"/>';
    // matrix
    var m=Rm;
    function f(x){return (x>=0?' ':'')+x.toFixed(2);}
    document.getElementById('mtx').innerHTML =
      '<span class="r">'+f(m[0][0])+'</span><span class="r">'+f(m[0][1])+'</span><span class="r">'+f(m[0][2])+'</span><span class="tt">'+f(t[0])+'</span>'+
      '<span class="r">'+f(m[1][0])+'</span><span class="r">'+f(m[1][1])+'</span><span class="r">'+f(m[1][2])+'</span><span class="tt">'+f(t[1])+'</span>'+
      '<span class="r">'+f(m[2][0])+'</span><span class="r">'+f(m[2][1])+'</span><span class="r">'+f(m[2][2])+'</span><span class="tt">'+f(t[2])+'</span>'+
      '<span>0</span><span>0</span><span>0</span><span>1</span>';
    document.getElementById('msg').innerHTML='Rotating about <b>'+axis+'</b> changes only the blue rotation block; translating changes only the teal column. The frame stays unit size — SE(3) is rigid.';
  }
  document.getElementById('axis').addEventListener('change',function(){axis=this.value;draw();});
  document.getElementById('ang').addEventListener('input',function(){ang=+this.value;draw();});
  document.getElementById('tx').addEventListener('input',function(){t[0]=+this.value;draw();});
  document.getElementById('ty').addEventListener('input',function(){t[1]=+this.value;draw();});
  document.getElementById('tz').addEventListener('input',function(){t[2]=+this.value;draw();});
  document.getElementById('reset').addEventListener('click',function(){axis='z';ang=35;t=[0.6,0.3,0.7];document.getElementById('axis').value='z';document.getElementById('ang').value=35;document.getElementById('tx').value=0.6;document.getElementById('ty').value=0.3;document.getElementById('tz').value=0.7;draw();});
  draw();
})();
</script>
</body>
</html>
